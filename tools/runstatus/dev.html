<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitsoki Run Status — Dev</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
      h1 { margin-bottom: 1rem; font-size: 1.25rem; }
      .picker { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
      button {
        padding: 0.4rem 0.8rem; border: 1px solid #475569; background: #1e293b;
        color: #e2e8f0; cursor: pointer; border-radius: 4px;
      }
      button:hover { background: #334155; }
      button.active { border-color: #60a5fa; color: #60a5fa; }
      #status { color: #94a3b8; font-size: 0.875rem; }
    </style>
  </head>
  <body>
    <h1>Fixture Picker (dev only)</h1>
    <div class="picker">
      <!-- Fixture buttons will be populated by a later agent that generates fixture files -->
      <button id="btn-live" onclick="loadLive()">Live mode (/)</button>
    </div>
    <p id="status">No fixture loaded. Use the buttons above or open index.html for live mode.</p>

    <script type="module">
      // Stub: fixture picker wired up once fixtures/ are generated by a later agent.
      // To load a fixture manually:
      //   fetch('/fixtures/in-progress.snapshot.json')
      //     .then(r => r.json())
      //     .then(snap => { window.__KITSOKI_SNAPSHOT__ = snap; location.href = '/'; })
      window.loadLive = function () {
        delete window.__KITSOKI_SNAPSHOT__;
        document.getElementById('status').textContent = 'Launching live mode…';
        location.href = '/';
      };
    </script>
  </body>
</html>
