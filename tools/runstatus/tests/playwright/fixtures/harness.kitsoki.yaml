# Deterministic demo fixture for the harness-profile picker — the three
# providers the demo showcases. The flow posture never forks a backend, so the
# ${VAR} is satisfied by a dummy SYNTHETIC_API_KEY the spec sets; no real key is
# used. Shape matches docs/architecture/harness-profiles.md.
default_profile: claude-native
harness_profiles:
  claude-native:
    backend: claude
  synthetic-claude:
    backend: claude
    model: syn:large:text
    models:
      - syn:large:text
      - syn:small:text
    env:
      ANTHROPIC_BASE_URL: https://api.synthetic.new/anthropic
      ANTHROPIC_AUTH_TOKEN: "${SYNTHETIC_API_KEY}"
  codex-native:
    backend: codex
