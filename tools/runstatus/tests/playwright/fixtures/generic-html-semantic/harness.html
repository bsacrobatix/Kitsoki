<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generic HTML Semantic Annotation Harness</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #eef2f7;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #eef2f7; }
      button, textarea { font: inherit; }
      .semantic-demo { width: min(1480px, calc(100vw - 48px)); margin: 0 auto; padding: 28px 0 34px; }
      .hero {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 24px;
        padding: 22px 0 18px;
      }
      .kicker { margin: 0 0 8px; color: #0f766e; font-size: 13px; font-weight: 850; text-transform: uppercase; letter-spacing: .08em; }
      h1 { margin: 0; max-width: 760px; color: #111827; font-size: 34px; line-height: 1.08; letter-spacing: 0; }
      .hero-meter { min-width: 220px; border-left: 4px solid #f59e0b; padding: 12px 16px; background: #ffffff; border-radius: 8px; box-shadow: 0 12px 28px rgba(15, 23, 42, .08); }
      .hero-meter span { display: block; color: #64748b; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
      .hero-meter strong { display: block; color: #0f172a; font-size: 18px; }
      .case-tabs { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin: 6px 0 14px; }
      .case-tab {
        min-height: 72px;
        text-align: left;
        color: #334155;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        border-radius: 8px;
        padding: 12px 13px;
        cursor: pointer;
        font-weight: 760;
        line-height: 1.25;
      }
      .case-tab span { display: block; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
      .case-tab--active { border-color: #0f766e; box-shadow: inset 0 0 0 2px rgba(15, 118, 110, .16); }
      .workspace { display: grid; grid-template-columns: minmax(0, 1fr) 430px; gap: 14px; align-items: stretch; }
      .surface, .feedback-panel {
        background: #ffffff;
        border: 1px solid #d6dee9;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, .10);
      }
      .surface { overflow: hidden; }
      .surface-head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 15px;
        border-bottom: 1px solid #e2e8f0;
        background: #f8fafc;
      }
      .surface-head span { color: #0f766e; font-size: 12px; font-weight: 850; text-transform: uppercase; letter-spacing: .06em; }
      .surface-head strong { color: #111827; font-size: 16px; }
      .surface .artifact-annotator { width: 100%; }
      .feedback-panel { display: grid; grid-template-rows: minmax(0, 1fr) auto auto auto; gap: 12px; padding: 16px; }
      .panel-label, .feedback-label { margin: 0 0 8px; color: #64748b; font-size: 12px; font-weight: 850; text-transform: uppercase; letter-spacing: .06em; }
      pre {
        margin: 0;
        min-height: 314px;
        max-height: 314px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        background: #0f172a;
        color: #d9f99d;
        border-radius: 8px;
        padding: 14px;
        font: 12px/1.42 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      textarea {
        width: 100%;
        min-height: 92px;
        resize: none;
        border: 1px solid #bac5d4;
        border-radius: 8px;
        padding: 12px;
        color: #172033;
        background: #ffffff;
        line-height: 1.4;
      }
      .send-btn {
        border: 0;
        border-radius: 8px;
        background: #0f766e;
        color: #ffffff;
        min-height: 44px;
        font-weight: 830;
        cursor: pointer;
      }
      .send-btn:disabled { background: #94a3b8; cursor: default; }
      .sent { border: 1px solid #bbf7d0; background: #f0fdf4; color: #166534; border-radius: 8px; padding: 10px 12px; font-weight: 760; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./harness.ts"></script>
  </body>
</html>
