# Stage-0 study declaration only. This is intentionally not a runnable live
# sweep until the BugSwarm corpus is verified and its learning/confirmation
# lock has been materialized.
schema: task-optimization/v1
study_id: bugfix-codeact-v1
boundary: stories/bugfix
corpus_source: tools/arena/corpus/bugswarm.seed.yaml
corpus_lock: .artifacts/task-optimization/bugfix-codeact-v1/corpus.lock.json
live_gate_env: KITSOKI_TASK_OPT_LIVE
live_status: blocked
blocked_by:
  - "BugSwarm candidates require explicit Docker RED/GREEN verification; no live verification is authorized by this source."
  - "A frozen learning/confirmation split and content-addressed corpus lock are required before planning cells."
candidates:
  - key: gpt54-mini
    requested_model: gpt-5.4-mini
    requested_effort: medium
    profile: codex-gpt54-mini
    preflight: unsupported-until-profile-resolves
    note: "The checked-in profile catalog pins gpt-5.4, not gpt-5.4-mini. Do not alias or fall back; mark the cell unsupported unless this exact profile/model resolves."
  - key: spark
    requested_model: gpt-5.3-codex-spark
    requested_effort: medium
    profile: codex-spark
    preflight: require-local-resolution
    note: "This operator profile may be supplied by .kitsoki.local.yaml. Persist requested and effective model/effort; an ignored effort flag invalidates the cell."
  - key: sonnet-low
    requested_model: sonnet
    requested_effort: low
    profile: claude-sonnet-low
    preflight: declared
  - key: gpt-oss-120b
    requested_model: hf:openai/gpt-oss-120b
    requested_effort: n/a
    profile: syn-gpt-oss-120b
    preflight: require-local-resolution
    note: "Synthetic endpoint credentials are local-only. This cohort is a hosted proxy and must not make GX10 hardware claims."
preflight_contract:
  required: [requested_model, effective_model, requested_effort, effective_effort, provider, backend, profile_hash, launch_plan_hash]
  unsupported_result: unsupported
  effort_mismatch_result: invalid
  fallback_policy: forbidden
