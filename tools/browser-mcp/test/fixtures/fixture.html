<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>browser-mcp fixture</title>
</head>
<body>
  <h1 data-testid="heading">browser-mcp fixture page</h1>
  <button data-testid="save-btn" role="button" aria-label="Save">Save</button>
  <input data-testid="name-input" type="text" placeholder="Your name" />
  <a href="#panel" data-testid="jump-link">Jump to panel</a>
  <div id="panel" data-testid="panel" style="margin-top: 2000px;">
    <button data-testid="panel-btn">Panel button</button>
  </div>
  <script>
    document.querySelector('[data-testid="save-btn"]').addEventListener("click", () => {
      document.querySelector('[data-testid="save-btn"]').textContent = "Saved";
      document.querySelector('[data-testid="save-btn"]').setAttribute("data-clicked", "true");
    });
  </script>
</body>
</html>
