# dev-workflow-matrix manifest — the hand-maintained truth behind the
# GENERATED matrix at docs/testing/dev-workflow-matrix.md (WS-F F1 of
# .context/dev-workflows-surface-matrix-plan.md).
#
# Edit THIS file (statuses, reasons, verdict pointers), then regenerate:
#   make dev-workflow-matrix
#
# Every {workflow, surface, repo} cell must appear exactly once. Statuses:
#   works        (✅  works + no-LLM proven)
#   proof-thin   (🟡  works but proof thin or reliability suspect)
#   gap          (🔴  gap)
#   out-of-scope (⬜  intentionally out of scope for the surface)
#
# Each cell may point at standing completion-state verdict files
# (schemas/completion-state.schema.json), one per proof class:
#   verdicts.mechanical  — check_type: replay (no-LLM, per-commit)
#   verdicts.experience  — check_type: docs-fidelity | ux-heuristic |
#                          journey-verdict (persona-judged, budgeted — WS-G)
# A cell without a pointer (or whose pointed file is absent) renders as
# "no standing verdict" — that is honest, not an error.

