<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kitsoki tui-serve · live bridge</title>
  <!-- xterm.js served from this harness's node_modules (static root = tools/tui-bridge) -->
  <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css" />
  <script src="/node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="/node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <style>
    :root { --brand-bg: #070d1a; }
    html, body {
      margin: 0; height: 100%; width: 100%;
      background: radial-gradient(circle at 50% 30%, #14224a 0%, #0a1430 42%, #070d1a 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    #stage {
      position: relative; height: 100%; width: 100%;
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box; padding: 26px 64px 56px;
    }
    #footer {
      position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
      z-index: 1; pointer-events: none; display: flex; align-items: center; gap: 11px;
      color: #aab8cc; font: 700 18px ui-sans-serif, system-ui, sans-serif; letter-spacing: .05em;
    }
    #footer .accent { color: #fbbf24; }
    #footer .status { color: #64748b; font-weight: 600; }
    .term-window {
      position: relative; z-index: 1;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,.66), 0 0 0 1px #1e293b;
      background: #0b1120;
      width: 100%; height: 100%;
    }
    .term-titlebar {
      display: flex; align-items: center; gap: 10px;
      height: 38px; padding: 0 14px;
      background: linear-gradient(#15203a, #0e1730);
      border-bottom: 1px solid #1e293b;
    }
    .term-dot { width: 12px; height: 12px; border-radius: 50%; }
    .term-dot.r { background: #ff5f57; } .term-dot.y { background: #febc2e; } .term-dot.g { background: #28c840; }
    .term-title {
      margin-left: 8px; color: #94a3b8; font-size: 13px; font-weight: 600;
      letter-spacing: .01em;
    }
    .term-badge {
      margin-left: auto; color: #fbbf24; font-size: 11px; font-weight: 700;
      border: 1px solid #3b3320; background: #221c0a; border-radius: 6px;
      padding: 3px 8px; text-transform: uppercase; letter-spacing: .06em;
    }
    .term-body { position: absolute; inset: 38px 0 0 0; padding: 10px 12px 12px; }
    #term { height: 100%; }
    .xterm { padding: 2px; }
  </style>
</head>
<body>
  <div id="footer">
    <span class="accent">kitsoki</span><span>tui-serve</span>
    <span class="status" id="status">connecting…</span>
  </div>
  <div id="stage">
    <div class="term-window" id="win">
      <div class="term-titlebar">
        <span class="term-dot r"></span><span class="term-dot y"></span><span class="term-dot g"></span>
        <span class="term-title" id="winTitle">kitsoki — live pty bridge</span>
        <span class="term-badge">LIVE</span>
      </div>
      <div class="term-body"><div id="term"></div></div>
    </div>
  </div>
  <script>
    const THEME = {
      background: "#0b1120", foreground: "#e2e8f0", cursor: "#fbbf24",
      selectionBackground: "#33415588",
      black: "#0b1120", red: "#f87171", green: "#34d399", yellow: "#fbbf24",
      blue: "#60a5fa", magenta: "#c084fc", cyan: "#22d3ee", white: "#e2e8f0",
      brightBlack: "#64748b", brightRed: "#fca5a5", brightGreen: "#6ee7b7",
      brightYellow: "#fde68a", brightBlue: "#93c5fd", brightMagenta: "#d8b4fe",
      brightCyan: "#67e8f9", brightWhite: "#f8fafc",
    };
    const term = new window.Terminal({
      cols: 116, rows: 26,
      fontFamily: 'ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace',
      fontSize: 17, lineHeight: 1.3, letterSpacing: 0,
      cursorBlink: true, cursorStyle: "bar", scrollback: 2000,
      theme: THEME, convertEol: false, allowProposedApi: true,
    });
    const fitAddon = new window.FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById("term"));
    fitAddon.fit();

    const statusEl = document.getElementById("status");
    const setStatus = (s) => { statusEl.textContent = s; };

    // The bridge address: ?ws=ws://host:port/pty overrides the default, so a
    // single served page can point at any running `kitsoki tui-serve`.
    const wsUrl = new URLSearchParams(location.search).get("ws") || "ws://127.0.0.1:4700/pty";

    let socket;
    function connect() {
      setStatus("connecting…");
      socket = new WebSocket(wsUrl);
      socket.binaryType = "arraybuffer";

      socket.addEventListener("open", () => {
        setStatus("connected");
        sendResize();
      });
      socket.addEventListener("close", () => setStatus("disconnected"));
      socket.addEventListener("error", () => setStatus("error"));
      socket.addEventListener("message", (ev) => {
        if (typeof ev.data === "string") return; // no server->client text frames today
        term.write(new Uint8Array(ev.data));
      });
    }

    function sendResize() {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
    }

    // Real keystrokes in: xterm's onData carries the exact bytes a real
    // terminal would send (including escape sequences for arrows etc).
    term.onData((data) => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(new TextEncoder().encode(data));
      }
    });

    window.addEventListener("resize", () => { fitAddon.fit(); sendResize(); });

    // Drive/inspect surface for Playwright and claude-in-chrome: no OCR or
    // vision needed to read back the exact current screen contents. Reads
    // only the visible viewport (buf.viewportY .. +term.rows) — buf.length
    // covers the full scrollback, which would silently include history that
    // has already scrolled off-screen and doesn't match what a screenshot
    // shows.
    window.__dump = () => {
      const buf = term.buffer.active;
      const lines = [];
      for (let i = 0; i < term.rows; i++) {
        const line = buf.getLine(buf.viewportY + i);
        lines.push(line ? line.translateToString(true) : "");
      }
      return lines.join("\n");
    };
    window.__status = () => statusEl.textContent;
    window.__ready = true;

    connect();
  </script>
</body>
</html>
