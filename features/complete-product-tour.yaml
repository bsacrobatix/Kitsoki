# yaml-language-server: $schema=feature.schema.json
id: complete-product-tour
kind: product-tour
title: The complete product tour
tagline: One continuous walkthrough — eight independently-releasable sections.
summary: A ~10-minute walkthrough that takes a first-time evaluator from the thesis, through a real run, into the audit surfaces that PROVE (not assert) determinism, into live self-authoring, and out across breadth — closing on the punchline that the film itself is a passing deterministic test. Stitched from eight chaptered sections; the master and each section are generated from this one catalog, so they can never diverge.
narrative: 'Every beat exists to defeat one dismissal — "this is just structured output with ceremony." The throughline is control inversion, proven: the runtime is a YAML state machine, the LLM is a callee at named traceable decision points, and everything on screen is the consequence of that one choice — shown, never asserted. The whole cut is no-LLM and byte-deterministic (flow + cassette per section), so the promo can never drift from the product — which is itself the closing argument.'
docs:
  - docs/evaluate-kitsoki.md
  - docs/site/README.md
sections:
  - body: Most tools record what their model did once. kitsoki proves what the model was never allowed to do — starting with a turn the model was never even consulted on.
    clips:
      - chapters:
          - trace-routing
          - trace-routing
        source: trace-features
    id: pt-thesis
    title: The claim, and the first proof
  - body: Spin up a real run. The agent works inside one room; the runtime, not the model, decides what happens next.
    clips:
      - chapters:
          - aa-intro-home
          - aa-welcome
        source: agent-actions
    id: pt-run
    title: Watch it run — and watch who's in charge
  - body: 'Open the observer the run keeps pointing at: three views over one trace, decision-first detail, and how a turn mutated the world.'
    clips:
      - chapters:
          - trace-view-modes
          - trace-decision-detail
        source: trace-features
    id: pt-inside
    title: Look inside — determinism made inspectable
  - body: Every agent call's full I/O, byte-identical — and centre-frame, the host rejecting the model's submission and nudging it back into the schema.
    clips:
      - chapters:
          - aa-decide-guardrail
          - aa-rollup
        source: agent-actions
    id: pt-actions
    title: What the model did — and what it wasn't allowed to do
  - body: A room fully unpacked in the editor, then a live machine that pauses, edits its own YAML, hot-reloads changed behaviour, and records the edit in the trace.
    clips:
      - source: story-editor
      - chapters:
          - meta-story-edit
          - meta-persistence
        source: meta-mode
    id: pt-author
    title: Author your own — edit a running machine
  - body: 'A forwarded question that can never be silently dropped: it blocks, it''s answered, and on no answer the agent gets a clean error — every step on the trace.'
    clips:
      - source: operator-ask
    id: pt-control
    title: Runs on its own — but never silently defaults
  - body: Switch provider, model, and effort live — and every heterogeneous call is stamped on the audit record, so a mixed run stays auditable after the fact.
    clips:
      - source: harness-picker
    id: pt-harness
    title: Every backend, on the record
  - body: 'Runs survive a reload and roll up across stories — and everything you just watched is a passing deterministic test: flows + cassettes, no live LLM.'
    clips:
      - chapters:
          - ms-reload
          - ms-story-badge
        source: multi-story
    id: pt-breadth
    title: One engine, many domains — and it's all a test
qa:
  scenarios:
    - id: thesis-zero-llm
      required: true
      steps:
        - A trace timeline with event rows is visible.
        - A turn is shown with no agent.call rows — routed deterministically, the model never consulted.
      title: A turn routes with the model never called
    - id: actions-host-rejects
      required: true
      steps:
        - The agent-actions view shows an agent call's submission and execution.
        - An injected host rejection / nudge is visible, correcting the model back into the schema.
      title: The host rejects the model mid-call
    - id: author-live-edit
      required: true
      steps:
        - Meta mode accepts a free-text story edit on a live run.
        - After the edit the view reloads and the change is reflected (reload note or changed behaviour).
      title: A running machine edits itself and reloads
    - id: harness-provenance
      required: true
      steps:
        - The provider/model is switched live in the header.
        - A trace agent row is stamped with the selected profile (and model/effort).
      title: Every backend call is stamped on the trace
    - id: eight-sections
      required: false
      steps:
        - Eight distinct section title cards appear across the film.
        - The chapter rail groups chapters by section.
      title: The master reads as eight chaptered sections
