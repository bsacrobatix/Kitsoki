# yaml-language-server: $schema=feature.schema.json
id: session-media-workbench
kind: feature
title: Session Media Workbench
tagline: Pin the artifact, keep the conversation, move the devtools.
summary: A browser session can now pin a produced markdown/html/slidey/video artifact into a stable resizable media pane while the chat remains beside it and trace/graph devtools can dock right, dock bottom, float, or pop out.
promo:
  order: 27
docs:
  - docs/web/session-media-workbench.md
related:
  - mockup-video
  - trace-features
demo:
  format: rrweb
  spec: tests/playwright/session-media-workbench-video.spec.ts
  artifactDir: session-media-workbench
  videoBase: session-media-workbench-demo
  posterStep: smw-open-pane
  story: stories/mockup-video
  flow: stories/mockup-video/flows/demo_web.yaml
tour:
  export: SESSION_MEDIA_WORKBENCH_TOUR_STEPS
  steps:
    - id: smw-open-pane
      route: interactive
      target: media-workbench-toggle
      title: Pin the artifact beside chat
      body: The produced media no longer has to live only as another embed inside the transcript. Pin it into the session workbench and it becomes the stable thing this conversation is about.
      placement: top
      kind: action
      advance: click-target
      waitForTarget: media-workbench-toggle
      dwellMs: 5000
    - id: smw-media-pane
      route: interactive
      target: media-workbench-pane
      title: Stable media pane
      body: The selected html, slidey, markdown, or video artifact stays mounted here while new turns continue in the chat. The original chat bubble collapses to a receipt so the transcript keeps context without duplicating the embed.
      placement: right
      kind: explain
      advance: next
      waitForTarget: media-workbench-pane
      dwellMs: 5500
    - id: smw-chat-pane
      route: interactive
      target: chat-section
      title: Conversation stays live
      body: 'The chat remains a full session participant: typed input, streaming agent activity, routing chips, annotations, and follow-up turns all use the same run store and trace.'
      placement: left
      kind: explain
      advance: next
      waitForTarget: chat-section
      dwellMs: 5000
    - id: smw-media-receipt
      route: interactive
      target: chat-pinned-context
      title: Pinned media receipt
      body: The chat pane keeps the artifact's place in the session with a compact working-on receipt instead of mounting a duplicate media player beside the pinned pane.
      placement: bottom
      kind: explain
      advance: next
      waitForTarget: chat-pinned-context
      dwellMs: 4200
    - id: smw-devtools-graph
      route: interactive
      target: media-devtools-pane
      title: Devtools dock
      body: Traceability works like browser devtools. The graph and trace share a dockable pane beside the artifact and chat, so the operator can watch state and events while editing the visible thing.
      placement: left
      kind: explain
      advance: next
      waitForTarget: media-devtools-pane
      dwellMs: 5500
    - id: smw-resize-media
      route: interactive
      target: media-workbench-resizer
      title: Resize the workbench
      body: Drag the splitter between media and chat when the artifact needs more room. The split is stored with the rest of the workbench layout so the session feels stable after reloads.
      placement: right
      kind: action
      advance: click-target
      waitForTarget: media-workbench-resizer
      dwellMs: 4200
    - id: smw-trace-tab
      route: interactive
      target: devtools-tab-trace
      title: Switch to trace
      body: Swap the devtools pane from graph to the event trace without changing the media or chat layout.
      placement: left
      kind: action
      advance: click-target
      waitForTarget: devtools-tab-trace
      dwellMs: 3500
    - id: smw-horizontal
      route: interactive
      target: workbench-orient-horizontal
      title: Rearrange horizontally
      body: The layout can switch from side-by-side columns to a horizontal workbench, with media and chat above and devtools docked below.
      placement: bottom
      kind: action
      advance: click-target
      waitForTarget: workbench-orient-horizontal
      dwellMs: 4500
    - id: smw-resize-bottom
      route: interactive
      target: devtools-workbench-row-resizer
      title: Resize docked devtools
      body: When devtools moves below the media and chat, the horizontal splitter controls how much height the trace gets without unpinning the artifact or interrupting the conversation.
      placement: top
      kind: action
      advance: click-target
      waitForTarget: devtools-workbench-row-resizer
      dwellMs: 4200
    - id: smw-float
      route: interactive
      target: devtools-dock-float
      title: Float devtools
      body: Float the observability pane when the media needs more room. The floating pane is resizable and can be docked again.
      placement: bottom
      kind: action
      advance: click-target
      waitForTarget: devtools-dock-float
      dwellMs: 4500
    - id: smw-popout
      route: interactive
      target: devtools-popout
      title: Pop out trace or graph
      body: Pop out opens the selected devtools surface in a separate browser window using the existing single-surface trace/graph entrypoint, so it can live on another display while the media and chat stay together.
      placement: bottom
      kind: explain
      advance: next
      waitForTarget: devtools-popout
      dwellMs: 5000
