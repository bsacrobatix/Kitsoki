# yaml-language-server: $schema=feature.schema.json
id: operation-handles
kind: feature
title: Operation handles
tagline: Long-running work gets a visible handle, drive control, and artifact.
summary: 'Autonomous and supervised background operations surface as first-class handles in the session UI: while work runs the banner shows status, mode, phase facts, and a Drive action; when it lands the same handle shows the terminal artifact. This demo uses a tiny no-LLM story so the running and completed states are deterministic.'
promo:
  order: 42
demo:
  spec: tests/playwright/operation-handles-video.spec.ts
  artifactDir: operation-handles
  videoBase: operation-handles-demo
  posterStep: oh-running
  story: stories/operation-demo
  flow: stories/operation-demo/flows/background_operation.yaml
tour:
  export: OPERATION_HANDLES_TOUR_STEPS
  steps:
    - id: oh-intro-home
      route: home
      title: Start at the story library
      body: Every run begins here, in the story library. This tiny story exists only to show the operation handle lifecycle with no LLM and no external services.
      placement: center
      kind: explain
      advance: next
      waitForTarget: home-view
      dwellMs: 4500
    - id: oh-intro-story
      route: home
      target: story-card
      title: The operation demo story
      body: The story starts one background host call under an autonomous operation policy. The flow fixture delays that call so the UI can hold on the live handle before it completes.
      placement: right
      kind: explain
      advance: next
      waitForTarget: story-card
      dwellMs: 4500
    - id: oh-intro-start
      route: home
      target: new-session-btn
      title: Spin up a run
      body: Click New session to create an independently traced run and open the interactive session surface where the operation handle appears.
      placement: right
      kind: action
      advance: route-match
      advanceRoute: interactive
      waitForTarget: new-session-btn
      dwellMs: 3000
    - id: oh-session
      route: interactive
      target: chat-section
      title: The operator keeps the session
      body: The normal session view stays usable. Starting the operation does not replace the conversation with a waiting screen; the handle lives above the transcript.
      placement: left
      kind: explain
      advance: next
      waitForTarget: chat-section
      dwellMs: 4000
    - id: oh-start
      route: interactive
      target: intent-btn-start
      title: Start background work
      body: Click start. The transition creates an operation run, then launches the delayed host call in the background.
      placement: top
      kind: action
      advance: click-target
      waitForTarget: intent-btn-start
      dwellMs: 2500
    - id: oh-running
      route: interactive
      target: operation-run-banner
      title: A live operation handle
      body: The banner is the progress handle. It names the operation, shows that it is running in the background, and includes compact facts such as mode, execution, phase, and route.
      placement: bottom
      kind: explain
      advance: next
      waitForTarget: operation-run-banner
      dwellMs: 2500
    - id: oh-drive
      route: interactive
      target: operation-run-drive
      title: Drive when the policy allows it
      body: Autonomous and supervised operations expose Drive. The button uses the same operation driver as CLI, TUI, runstatus RPC, and Studio MCP, so every surface advances the same handle contract.
      placement: bottom
      kind: explain
      advance: next
      waitForTarget: operation-run-drive
      dwellMs: 2200
    - id: oh-completed
      route: interactive
      target: chat-section
      title: The handle lands with an artifact
      body: When the background job completes, the same banner becomes the terminal handle. The status changes to completed and the report path is exposed as an artifact action.
      placement: left
      kind: explain
      advance: next
      dwellMs: 5000
    - id: oh-done
      route: interactive
      title: That is operation handles
      body: The operation had a visible running handle, a policy-gated Drive affordance, and a completed artifact link, all from a deterministic no-LLM background job.
      placement: center
      kind: explain
      advance: next
      dwellMs: 4500
