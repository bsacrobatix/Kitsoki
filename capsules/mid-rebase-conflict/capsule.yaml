name: mid-rebase-conflict
source:
  synthetic: true
  default_branch: main
  steps:
    - action: write
      path: file.txt
      content: |
        base line
    - action: commit
      message: base
    - action: checkout
      branch: feature
      create: true
    - action: write
      path: file.txt
      content: |
        feature change
    - action: commit
      message: feature edit
    - action: checkout
      branch: main
    - action: write
      path: file.txt
      content: |
        main change
    - action: commit
      message: main edit
    - action: checkout
      branch: feature
    - action: git
      args: [rebase, main]
      allow_failure: true
network: none
verify:
  probes:
    - name: mid-rebase
      run: test -d .git/rebase-merge -o -d .git/rebase-apply
      expect: zero
    - name: conflict-markers
      run: grep -q '<<<<<<<' file.txt
      expect: zero
scenario:
  kind: git-flow
