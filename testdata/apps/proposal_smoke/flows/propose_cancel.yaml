test_kind: flow
app: ../app.yaml
initial_state: terminal

turns:
  - intent:
      name: propose
      slots:
        cmd: "rm -rf /"
    expect_state: reviewing
    expect_world:
      stage: reviewing

  - intent:
      name: cancel
    expect_state: terminal
    expect_world:
      stage: cancelled

expect_no_errors: true
