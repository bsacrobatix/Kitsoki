# Exercises world_override (Â§7.19): mutate world before guard evaluation so
# the test can skip the cloakroomâ†’hang_cloakâ†’foyer detour and jump straight
# to the "wearing_cloak == false â†’ bar.lit" outcome.
test_kind: flow
app: cloak-of-darkness
initial_state: foyer
initial_world:
  wearing_cloak: true
  disturbance: 0
  message_rumpled: false

turns:

  - intent: { name: go, slots: { direction: south } }
    world_override:
      wearing_cloak: false
    expect_state: bar.lit
    expect_world:
      wearing_cloak: false

expect_no_errors: true
