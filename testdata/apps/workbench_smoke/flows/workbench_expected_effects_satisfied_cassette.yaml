# Host cassette for workbench_expected_effects_satisfied.yaml. The submitted
# note's summary genuinely mentions both bench_expected_effects entries, so
# the engine's own join should find candidate_completed = true.
kind: host_cassette
app_id: workbench-smoke
app_version: "0.1.0"
match_on: [handler]

episodes:
  - id: bench_dispatch
    match: { handler: host.agent.task }
    response:
      data:
        ok: true
        submitted:
          summary: "Ran the flaky test until it passed, then filed a ticket to track the root cause."
    agent:
      verb: task
      agent: bench_agent
      model: ""
      duration_ms: 500
      response: "Ran the flaky test until it passed, then filed a ticket to track the root cause."
