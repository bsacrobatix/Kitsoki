# Incident Room — respond to production issues and on-call pages.

states:
  incident:
    description: "Incident Room — load context, identify changes, mitigate, update stakeholders."
    view: |
      Incident Room.
      Incident: {{ world.incident_title }}

      Options: load incident, identify recent changes, mitigate, update stakeholders,
               open postmortem, go back.
    relevant_world: [incident_title]
    relevant_slots: []
    on:
      load_incident:
        - target: incident_loading

      mitigate:
        - target: incident_mitigating

      update_stakeholders:
        - target: incident_updating_stakeholders

      open_postmortem:
        - target: incident_postmortem

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  incident_loading:
    description: "Loading incident context..."
    view: |
      Incident Context:

      [stub] Alert: AuthService P99 latency > 200ms (firing 15 minutes)

      Recent deploys (last 2 hours):
        - auth-service v2.4.1 deployed 20 min ago (abc1234)
        - billing-service v1.9.0 deployed 3 hours ago (def5678)

      Related dashboards:
        - auth-service: P99=245ms (elevated), error_rate=0.2% (normal)

      Likely cause: auth-service deploy 20 min ago introduced latency regression.
    relevant_world: [incident_title]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Incident context loaded: auth-service latency regression likely from recent deploy'"
        on_error: incident_error
    on:
      mitigate:
        - target: incident_mitigating

      update_stakeholders:
        - target: incident_updating_stakeholders

      go_back:
        - target: incident

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  incident_mitigating:
    description: "Applying mitigation..."
    view: |
      Applying mitigation for: {{ world.incident_title }}

      [stub] Mitigation options:
        A. Rollback auth-service to v2.4.0
        B. Toggle feature flag auth.new_validation_path=false
        C. Scale auth-service pods 3 → 6

      [stub] Applying: Rollback auth-service to v2.4.0...
        Status: ROLLING BACK
        ETA: 2 minutes

      Monitor the dashboard for recovery.
    relevant_world: [incident_title]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Rollback initiated: auth-service v2.4.0 deploying'"
        on_error: incident_error
    on:
      update_stakeholders:
        - target: incident_updating_stakeholders

      go_back:
        - target: incident

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  incident_updating_stakeholders:
    description: "Posting status to incident Slack channel..."
    view: |
      Status posted to #incidents:

      [stub] Slack update:
        "🔴 INCIDENT: AuthService latency elevated (245ms, threshold 200ms)
         Cause: likely auth-service v2.4.1 deploy (20 min ago)
         Mitigation: rolling back to v2.4.0 (ETA 2 min)
         Owner: on-call engineer
         Status: MITIGATING"
    relevant_world: [incident_title]
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'Slack incident update posted to #incidents'"
        on_error: incident_error
    on:
      open_postmortem:
        - target: incident_postmortem

      go_back:
        - target: incident

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  incident_postmortem:
    description: "Creating postmortem document..."
    view: |
      Postmortem created for: {{ world.incident_title }}

      [stub] Postmortem draft (Confluence):
        Title: AuthService Latency Regression 2024-01-15
        Timeline:
          10:05: auth-service v2.4.1 deployed
          10:25: Alert fired: P99 latency > 200ms
          10:35: Rollback initiated
          10:37: Rollback complete, latency recovered

        Impact: ~30 min elevated latency, no data loss
        Root cause: TBD (investigation in progress)
        Action items: TBD

      Document saved to Confluence.
    relevant_world: [incident_title]
    relevant_slots: []
    on:
      go_back:
        - target: incident

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  incident_error:
    description: "Incident operation failed."
    view: |
      Incident error: {{ world.last_error }}
    relevant_world: [last_error]
    relevant_slots: []
    on:
      go_back:
        - target: incident

      go_main:
        - target: main
