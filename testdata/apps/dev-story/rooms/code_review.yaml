# Code Review Room — review teammates' PRs.

states:
  code_review:
    description: "Code Review Room — review PRs assigned to you."
    view: |
      Code Review Room.

      Options: list prs to review, review pr, approve pr, go back.
    relevant_world: []
    relevant_slots: []
    on:
      list_review_prs:
        - target: code_review_listing

      review_pr:
        - target: code_review_reviewing

      approve_pr:
        - target: code_review_approving

      go_back:
        - target: "{{ world.prev_state }}"

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_listing:
    description: "Fetching PRs assigned for your review..."
    view: |
      PRs Awaiting Your Review:

      [stub] 3 PRs from GitHub:
        1. PR #38: feat/billing-discounts (alice) — 12 files, +450/-120
        2. PR #39: fix/login-redirect (bob) — 3 files, +45/-12
        3. PR #40: docs/api-update (charlie) — 2 files, +230/-15

      Review one? Use "review pr 38" etc.
    relevant_world: []
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo '[{\"id\":38,\"title\":\"feat/billing-discounts\",\"author\":\"alice\"},{\"id\":39,\"title\":\"fix/login-redirect\",\"author\":\"bob\"}]'"
        on_error: code_review_error
    on:
      review_pr:
        - target: code_review_reviewing

      go_back:
        - target: code_review

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_reviewing:
    description: "Reviewing the PR..."
    view: |
      Reviewing PR #{{ slots.pr_id }}

      [stub] PR #{{ slots.pr_id }}: feat/billing-discounts
        Author: alice
        Files changed: 12
        +450 / -120

        Summary of changes:
          - Added discount percentage support to billing engine
          - Refactored Invoice.Calculate() to support promotions
          - Added unit tests (coverage: 82%)

        Suggested comments:
          Line 45 (billing/invoice.go): Consider using Decimal type instead of float64
          Line 78 (billing/discount.go): Missing edge case for 100% discount

      Leave review comments, approve, or request changes.
    relevant_world: []
    relevant_slots: []
    on:
      approve_pr:
        - target: code_review_approving

      go_back:
        - target: code_review

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_approving:
    description: "Submitting review approval..."
    view: |
      Approval submitted for PR.

      [stub] Review posted: APPROVED
        "LGTM! One minor suggestion about decimal types left inline."

      PR is approved. The author can merge when CI passes.
    relevant_world: []
    relevant_slots: []
    on_enter:
      - invoke: host.run
        with:
          cmd: "echo 'PR approved: LGTM comment posted'"
        on_error: code_review_error
    on:
      go_back:
        - target: code_review

      go_main:
        - target: main

      go_inbox:
        - target: inbox
          push_history: false

  code_review_error:
    description: "Code review operation failed."
    view: |
      Error: {{ world.last_error }}
    relevant_world: [last_error]
    relevant_slots: []
    on:
      go_back:
        - target: code_review

      go_main:
        - target: main
