# form_per_field_when (gate true) — the `secret` field renders, so the
# widget dispatches with the captured value. Commit advances to
# form_readonly_expr and seeds money + day for its arithmetic.
test_kind: flow
app: ../app.yaml
initial_state: form_per_field_when
initial_world:
  show_secret_field: true

turns:
  - intent: { name: submit_gated_form, slots: { secret: "abracadabra" } }
    expect_state: form_readonly_expr
    expect_world:
      form_gated_value: "abracadabra"
      money:            100
      day:              3

expect_no_errors: true
