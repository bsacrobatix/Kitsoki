    actor: product-manager
    trigger: A proposal changeset is ready for review and the reviewer needs to see exactly what it adds, changes, or removes in the catalog before approving.
    desired_outcome: The reviewer opens the object-graph viewer in diff mode, sees every gapped node badged added/modified/removed grouped by layer, and only reads full node detail for the ones that actually changed.
