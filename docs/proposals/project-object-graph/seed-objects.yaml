  - schema: graph/site-page/v0
    id: sitepage-feature-operator-ask
    title: Operator questions forwarded feature page
    status: shipped
    visibility: public
    page_kind: feature_detail
    site_route: /features/operator-ask.html
    edit_surface: product_site_admin
    tagline: Agent questions become blocking operator modals — never silent defaults.
    summary: Product-site page for the shipped operator-ask capability, including promotional copy and its deterministic demo video.
    content_fields:
      title: Operator questions, forwarded
      tagline: Agent questions become blocking operator modals — never silent defaults.
      summary: "When a dispatched agent agent asks a question, kitsoki parks the turn and forwards it to the operator: the web UI raises a hard modal with the agent's question and options (single- or multi-select), and the answer flows back to unblock the agent. No headless auto-resolution, no silent landmines."
    promo:
      order: 40
    docs:
      - docs/architecture/operator-ask.md
    tour:
      export: OPERATOR_ASK_TOUR_STEPS
      steps:
        - id: oa-intro-home
          route: home
          title: Start at the story library
          body: Every run begins here, in the story library — each card is a deterministic story graph kitsoki runs the same way every time. We'll demonstrate operator-ask forwarding on the bug-fix pipeline.
          placement: center
          kind: explain
          advance: next
          waitForTarget: home-view
          dwellMs: 5000
        - id: oa-intro-story
          route: home
          target: story-card
          title: The bug-fix pipeline
          body: "This story hands a ticket to a dispatched `claude -p` autofix agent. Here's the landmine kitsoki defuses: run that agent headless and its AskUserQuestion doesn't block — the tool silently auto-resolves to an *empty* answer, so the agent sails past the fork on a non-decision you never see. kitsoki hard-denies that tool and forwards the question back to the operator instead — the agent turn parks, blocking, until a human answers."
          placement: right
          kind: explain
          advance: next
          waitForTarget: story-card
          dwellMs: 5500
        - id: oa-intro-start
          route: home
          target: new-session-btn
          title: Spin up a run
          body: Click New session to create a fresh run of the pipeline — the surface where the operator drives the run and where a forwarded question will surface.
          placement: right
          kind: action
          advance: route-match
          advanceRoute: interactive
          waitForTarget: new-session-btn
          dwellMs: 3500
        - id: oa-session
          route: interactive
          target: chat-section
          title: Driving the run
          body: "This is the session view: the operator drives the pipeline turn by turn. Somewhere inside, the dispatched autofix agent is running native execution — and it's about to hit a decision it can't make alone."
          placement: left
          kind: explain
          advance: next
          waitForTarget: chat-section
          dwellMs: 5000
        - id: oa-modal
          route: interactive
          target: operator-question-modal
          title: The agent has a question
          body: The agent forwarded an AskUserQuestion. kitsoki surfaces it as a hard, blocking modal — no dismiss, no backdrop close — because a real agent goroutine is parked on the answer. The header names the question; below it are the agent's own options, verbatim.
          placement: left
          kind: explain
          advance: next
          waitForTarget: operator-question-modal
          dwellMs: 6000
        - id: oa-options
          route: interactive
          target: oq-option-0-0
          title: The agent's options
          body: "Each option is exactly what the agent offered — its label and an optional description. This is a single-select question: the operator picks one path forward for the blocked agent."
          placement: right
          kind: explain
          advance: next
          waitForTarget: oq-option-0-0
          dwellMs: 5000
        - id: oa-pick
          route: interactive
          target: oq-option-0-0
          title: Pick a path
          body: Selecting an option arms the answer. The Send button stays disabled until every question has a selection — kitsoki never forwards a half-answer back to a parked agent.
          placement: right
          kind: action
          advance: click-target
          waitForTarget: oq-option-0-0
          dwellMs: 4500
        - id: oa-send
          route: interactive
          target: oq-submit
          title: Send the answer
          body: Send answer echoes the operator's choice back to the backend keyed by the question_id, which unblocks the exact parked agent goroutine — and the modal dismisses. The agent resumes with the operator's decision.
          placement: top
          kind: action
          advance: click-target
          waitForTarget: oq-submit
          dwellMs: 4500
        - id: oa-multi
          route: interactive
          target: operator-question-modal
          title: Multi-select questions too
          body: An agent can forward a multi-select question — 'choose any that apply'. The same modal renders checkboxes instead of radios; the operator can pick several before sending. Here the agent asks which checks to run before it ships.
          placement: left
          kind: explain
          advance: next
          waitForTarget: operator-question-modal
          dwellMs: 6000
        - id: oa-multi-pick
          route: interactive
          target: oq-option-0-0
          title: Pick several
          body: Toggle as many options as apply — the marks switch from radios to checkboxes. Multi-select answers travel back as a list, single-select as a single label.
          placement: right
          kind: action
          advance: click-target
          waitForTarget: oq-option-0-0
          dwellMs: 5000
        - id: oa-multi-send
          route: interactive
          target: oq-submit
          title: Unblock the agent
          body: Send answer forwards the full selection set back, the second parked goroutine unblocks, and the queue empties — the modal closes for good. That's the full operator-ask round-trip.
          placement: top
          kind: action
          advance: click-target
          waitForTarget: oq-submit
          dwellMs: 4500
        - id: oa-done
          route: interactive
          title: That's operator-ask forwarding
          body: "You've seen the full round-trip: a dispatched agent forwards a question, kitsoki parks the agent turn and surfaces a blocking modal, the operator picks (single- or multi-select), and Send answer echoes the choice back to unblock the exact parked goroutine. The headless default would have let the agent guess on an empty answer — here a human decides the fork instead, and the runtime never moves until they do."
          placement: center
          kind: explain
          advance: next
          dwellMs: 5500
    sources:
      - source-operator-ask-feature
      - source-product-site-docs
    edges:
      presents:
        - feature-operator-ask
      has_media:
        - evidence-operator-ask-tour
      governed_by:
        - req-public-site-claim-consistency
      changed_by: []

