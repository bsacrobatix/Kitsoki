    id: req-viewer-multi-actor-lenses
    title: Each actor role gets a lens onto its part of the lifecycle
    status: proposed
    visibility: internal
    statement: The viewer must let each actor kind (product manager, developer, maintainer, agent) start from the layers that match its concerns - capabilities and delta for PMs, proof and implementation for developers - without forking into per-role apps.
    rationale: PMs and developers care about different lifecycle stages of the same objects; one shared graph with role lenses keeps them coherent instead of maintaining parallel views of the truth.
    sources:
      - source-graph-viewer-prototype
      - source-docs-strategic-review
    edges:
      required_by:
