  - schema: graph/site-page/v0
    id: sitepage-feature-persona-qa
    title: Persona QA
    status: shipped
    visibility: public
    content_fields:
      title: Persona QA
      tagline: Preview a real QA request, run it across transports, and review one evidence-backed report.
      summary: "Persona QA is the scenario-qa story workflow: preview a plain-language QA request by transport, create a run bundle, drive one transport-pinned check at a time, judge captured evidence, then fold report.md and deck.slidey.json from the recorded outcomes and replay evidence."
    promo:
      order: 58
    docs:
      - docs/persona-qa.md
    related:
      - dynamic-workflows
      - review
    qa:
      scenarios:
        - id: preview-freeform-request
          required: true
          title: Preview resolves a real QA request without creating a run
          steps:
            - The tour opens on the Scenario QA story in the home library
            - A preview request is typed for required-input affordances on web and TUI
            - The UI shows status ready with two transport checks and no run id
            - The preview explains the behavior being checked, not an unrelated catalog scenario
        - id: check-first-leg
          required: true
          title: Check creates a run bundle and records the web transport check
          steps:
            - A free-text check request is typed with transport, target, and seed qualifiers
            - The session reaches the recording state
            - The recording view shows two total transport checks and a recorded driver plus judge outcome
            - Pass, fail, and degraded counters are visible while the second transport remains
        - id: next-leg-report
          required: true
          title: Next transport advances to TUI and produces the report
          steps:
            - A next transport action is visible while more transport checks remain
            - Selecting next transport drives the TUI check
            - The final report shows two of two transport checks passed
        - id: report-and-deck
          required: true
          title: Report closes out the run with clickable artifacts and replay paths
          steps:
            - The final state is a Scenario QA report
            - The report summary says two of two transport checks passed
            - The summary report path is visible as the primary report artifact
            - A deck.slidey.json path is visible in the report
            - Web and TUI replay paths are visible in the per-transport verdict list
            - A main room action is available from the closeout report
    tour:
      export: PERSONA_QA_TOUR_STEPS
      steps:
        - id: pqa-home
          route: home
          title: Start at Persona QA
          body: "Persona QA is a story workflow. The operator starts from the story library, then drives scenario QA like any other Kitsoki run."
          placement: center
          kind: explain
          advance: next
          waitForTarget: home-view
          dwellMs: 4200
        - id: pqa-story-card
          route: home
          target: story-card
          title: The scenario-qa story
          body: "The scenario-qa story is the product surface. It wraps the deterministic product-journey transport planner and the per-transport driver and judge loop."
          placement: right
          kind: explain
          advance: next
          waitForTarget: story-card
          dwellMs: 4400
        - id: pqa-start
          route: home
          target: new-session-btn
          title: Open a session
          body: "Create a fresh session. The fixture is no-LLM: host calls are replayed from the flow, while the browser still drives the real web UI."
          placement: right
          kind: action
          advance: route-match
          advanceRoute: interactive
          waitForTarget: new-session-btn
          dwellMs: 3200
        - id: pqa-preview
          route: interactive
          target: text-floor-input
          title: Preview the QA request
          body: "The operator describes the real behavior they want checked: required user-input affordances for a QA engineer/developer, scoped to web and TUI."
          placement: right
          kind: explain
          advance: next
          waitForTarget: text-floor-input
          dwellMs: 4200
          drive:
            - type: type-and-send
              text: "preview required user input affordance as a QA engineer and developer transport=web,tui target=kitsoki seed=affordance-demo"
        - id: pqa-preview-result
          route: interactive
          target: chat-section
          title: Two transport checks, no run
          body: "The preview names the requested behavior, lists web and TUI evidence contracts, and keeps the run id empty because no capture has started."
          placement: right
          kind: explain
          advance: next
          waitForTarget: chat-section
          dwellMs: 5200
        - id: pqa-check
          route: interactive
          target: text-floor-input
          title: Type a check request
          body: "The check uses the same plain-language request without the preview prefix. Without scenario=, the prose becomes an ad-hoc scenario. pause=each-leg is added here so the tour can show the per-leg mechanics below — omit it and a multi-transport check drains straight to the report on its own."
          placement: right
          kind: explain
          advance: next
          waitForTarget: text-floor-input
          dwellMs: 4300
          drive:
            - type: type-and-send
              text: "required user input affordance as a QA engineer and developer transport=web,tui target=kitsoki seed=affordance-demo pause=each-leg"
        - id: pqa-recording
          route: interactive
          target: chat-section
          title: Web transport recorded
          body: "The story pauses after the first transport check with driver status, judge verdict, and counters visible before TUI runs."
          placement: right
          kind: explain
          advance: next
          waitForTarget: chat-section
          dwellMs: 5200
        - id: pqa-next-tui
          route: interactive
          target: intent-btn-next_leg
          title: Drive the TUI check
          body: "Next transport advances exactly one transport check. The same scenario contract is reused, but the evidence contract changes to a rendered TUI frame."
          placement: right
          kind: action
          advance: click-target
          waitForTarget: intent-btn-next_leg
          dwellMs: 3600
        - id: pqa-report
          route: interactive
          target: chat-section
          title: One report and one deck
          body: "After the TUI check, the closeout view shows the two-pass result first, then the summary report, review deck, and replay paths."
          placement: right
          kind: explain
          advance: next
          waitForTarget: chat-section
          dwellMs: 5600
        - id: pqa-main-room
          route: interactive
          target: intent-btn-main_room
          title: Return to main
          body: "The closeout is not a dead end. Main room returns to the Scenario QA start screen while keeping the last run available for report rebuilds."
          placement: top
          kind: action
          advance: click-target
          waitForTarget: intent-btn-main_room
          dwellMs: 3600
        - id: pqa-done
          route: interactive
          title: Persona QA is closed out
          body: "The run ends with per-transport verdicts, replay evidence, a summary report, and a clear route back to the main room. The scenario came from operator input, not a fixed button."
          placement: center
          kind: explain
          advance: next
          dwellMs: 4200
    sources:
      - source-persona-qa-feature
    edges:
      presents:
        - feature-persona-qa
      has_media:
        - evidence-persona-qa-tour
      governed_by:
        - req-persona-qa-behavior
      changed_by: []


  - schema: graph/site-page/v0
    id: sitepage-feature-dev-story-bugfix
    title: Bug triage to autonomous fix
    status: shipped
    visibility: public
    kind: story-demo
    content_fields:
      title: Bug triage to autonomous fix
      tagline: Triage a ticket, hand it to the pipeline, watch it land.
      summary: 'The dev-story triage → autonomous-bugfix path, one room per beat: survey the ticket queue, pick a ticket, review the triage report, then hand off into the bugfix pipeline — reproducing, proposing, implementing, testing, reviewing, validating, done, and the opened PR.'
    docs:
      - docs/case-studies/bug-fix.md
    tour:
      export: DEV_STORY_BUGFIX_TOUR_STEPS
      steps:
      - advance: next
        body: 'dev-story: triage a bug, then watch the autonomous fix pipeline reproduce → propose → implement → test → review → validate → open a PR. Every step is a deterministic state-machine room kitsoki runs the same way every time — no LLM in the loop for this demo.'
        dwellMs: 5500
        id: ds-intro-home
        kind: explain
        placement: center
        route: home
        title: An engineer's day, end to end
        waitForTarget: home-view
      - advance: next
        body: This card is the dev-story — an engineer's day modelled as one graph. It opens in a triage queue, picks a fixable ticket, then hands that ticket off into the autonomous bugfix pipeline. Let's run it.
        dwellMs: 5000
        id: ds-intro-story
        kind: explain
        placement: right
        route: home
        target: story-card
        title: The dev-story
        waitForTarget: story-card
      - advance: route-match
        advanceRoute: interactive
        body: Click New session to create a fresh, independently-traced run of the dev-story.
        dwellMs: 3500
        id: ds-intro-start
        kind: action
        placement: right
        route: home
        target: new-session-btn
        title: Spin up a run
        waitForTarget: new-session-btn
      - advance: next
        body: 'We''re on the drive view: pick intents, submit turns, and watch the state badge advance one room at a time. The Observe link opens the read-only observer for this same run — the trace tree, timeline, and graph. We''ll drive the whole pipeline from here.'
        dwellMs: 5000
        id: ds-intro-observe
        kind: explain
        placement: bottom
        route: interactive
        target: observe-link
        title: Drive here, observe there
        waitForTarget: observe-link
      - advance: next
        body: The engineer's day starts in triage. The slotless go_ticket_search intent steps from the main room into ticket_search — the bug triage queue. Let's go there now.
        dwellMs: 4500
        id: ds-triage-open
        kind: explain
        placement: top
        route: any
        target: intent-btn-go_ticket_search
        title: Into bug triage
        waitForTarget: intent-btn-go_ticket_search
      - advance: next
        body: 'This is bug triage: the ticket_search room, loaded with the open bugs the moment we arrive — no search needed. Three are waiting: AA-13268 (P1, the note-list bug), AA-13204 (P2), AA-13190 (P3). Severity-ordered, the worst one first.'
        dwellMs: 6000
        id: ds-triage-survey
        kind: explain
        placement: top
        route: any
        target: chat-transcript
        title: The bug triage queue
        waitForTarget: chat-transcript
      - advance: next
        body: Straight from the queue, pick_ticket selects AA-13268 — 'Note list disappears after creating a second note' — by id. No leaving the triage room to do it.
        dwellMs: 5000
        id: ds-triage-pick
        kind: explain
        placement: top
        route: any
        target: chat-transcript
        title: Pick the fixable ticket
        waitForTarget: chat-transcript
      - advance: next
        body: 'Triage''s verdict, still in the ticket_search room: AA-13268 is picked (★), assessed P1 / open, and the room marks it ✓ Ready to hand off. We''ve reviewed the triage report and chosen the bug worth fixing — only now do we leave triage for the pipeline.'
        dwellMs: 6000
        id: ds-triage-review
        kind: explain
        placement: top
        route: any
        target: chat-transcript
        title: Review the triage report
        waitForTarget: chat-transcript
      - advance: next
        body: go_bugfix hands AA-13268 into the imported autonomous bugfix pipeline. The run enters bf.reproducing — the agent now owns the fix end to end, and each operator accept advances it exactly one room.
        dwellMs: 5500
        id: ds-handoff
        kind: explain
        placement: top
        route: any
        target: intent-btn-go_bugfix
        title: Hand off to the pipeline
        waitForTarget: intent-btn-go_bugfix
      - advance: next
        body: 'Now we''re in the pipeline. bf.reproducing confirms the bug is real before touching code: it stands up the environment, follows the steps (create alpha, create beta, list re-renders empty), and verifies the note list really does vanish. Accept to move on.'
        dwellMs: 5500
        id: ds-bf-reproducing
        kind: explain
        placement: top
        route: any
        target: intent-btn-bf__accept
        title: Reproduce the bug
        waitForTarget: intent-btn-bf__accept
      - advance: next
        body: 'bf.proposing — root cause: the list re-render reuses the same array reference, so React''s diff bails out. The proposal: replace the in-place splice with a new array on add. Accept the proposal.'
        dwellMs: 5500
        id: ds-bf-proposing
        kind: explain
        placement: top
        route: any
        target: intent-btn-bf__accept
        title: Propose a root-cause fix
        waitForTarget: intent-btn-bf__accept
      - advance: next
        body: bf.implementing — the agent edits NotesList.tsx in an isolated worktree, applying exactly the proposed change. Accept to run the tests.
        dwellMs: 5000
        id: ds-bf-implementing
        kind: explain
        placement: top
        route: any
        target: intent-btn-bf__accept
        title: Implement the fix
        waitForTarget: intent-btn-bf__accept
      - advance: next
        body: 'bf.testing — a regression test is added and the suite runs green: 4 passed, 0 failed. The fix is proven, not just plausible. Accept to self-review.'
        dwellMs: 5000
        id: ds-bf-testing
        kind: explain
        placement: top
        route: any
        target: intent-btn-bf__accept
        title: Add and run tests
        waitForTarget: intent-btn-bf__accept
      - advance: next
        body: bf.reviewing — the agent reviews its own diff for scope creep and unintended changes before anyone else sees it. Accept to validate end to end.
        dwellMs: 5000
        id: ds-bf-reviewing
        kind: explain
        placement: top
        route: any
        target: intent-btn-bf__accept
        title: Self-review the diff
        waitForTarget: intent-btn-bf__accept
      - advance: next
        body: 'bf.validating — a full end-to-end check: build ok, UI shows both notes, the originally-reported symptom is gone. Accept to close out.'
        dwellMs: 5000
        id: ds-bf-validating
        kind: explain
        placement: top
        route: any
        target: intent-btn-bf__accept
        title: Validate end to end
        waitForTarget: intent-btn-bf__accept
      - advance: next
        body: bf.done — the pipeline has reproduced, fixed, tested, reviewed and validated the bug. One last accept opens the pull request and transitions the ticket to resolved.
        dwellMs: 5000
        id: ds-bf-done
        kind: explain
        placement: top
        route: any
        target: intent-btn-bf__accept
        title: Close out the fix
        waitForTarget: intent-btn-bf__accept
      - advance: next
        body: pr.open_pr — the validated fix is pushed to fix/AA-13268, the PR is opened, and AA-13268 transitions to resolved. The whole arc — triage to merged-ready PR — ran as one deterministic graph, no LLM in the loop.
        dwellMs: 6000
        id: ds-pr-open
        kind: explain
        placement: left
        route: any
        target: state-badge
        title: Pull request opened
        waitForTarget: state-badge
      - advance: next
        body: You watched triage pick a fixable bug and hand it to an autonomous pipeline that reproduced, proposed, implemented, tested, reviewed, validated, and shipped the fix as a PR — every room a deterministic, replayable state-machine step. Hit '?' anytime to replay this tour.
        dwellMs: 5500
        id: ds-done
        kind: explain
        placement: center
        route: any
        title: That's the engineer's day
    sources:
      - source-dev-story-bugfix-feature
    edges:
      presents:
        - feature-dev-story-bugfix
      has_media:
        - evidence-dev-story-bugfix-demo
      governed_by:
        - req-dev-story-bugfix-end-to-end
      changed_by: []

