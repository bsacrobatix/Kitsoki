    id: sitepage-feature-web-inbox
    title: The async inbox
    status: shipped
    visibility: public
    content_fields:
      title: The async inbox
      tagline: Background work notifies you when it lands — toast, badge, jump back.
      summary: 'A background host call launched from the chat composer completes while you''re elsewhere: the runtime auto-posts a completion notification over SSE, the global inbox badge increments, a toast appears, and one click teleports the session back to the originating room.'
    promo:
      order: 45
    tour:
        export: WEB_INBOX_TOUR_STEPS
        steps:
            - advance: next
              body: Every run begins here, in the story library. We'll demonstrate the async inbox on a tiny story whose only job is to launch background work — exactly the shape that produces a runtime notification.
              dwellMs: 5000
              id: wi-intro-home
              kind: explain
              placement: center
              route: home
              title: Start at the story library
              waitForTarget: home-view
            - advance: next
              body: This story dispatches a long-running task in the background. When the task finishes, the runtime posts a notification — and that is what the global inbox surfaces, no matter which room you're in.
              dwellMs: 5000
              id: wi-intro-story
              kind: explain
              placement: right
              route: home
              target: story-card
              title: The async-inbox demo story
              waitForTarget: story-card
            - advance: route-match
              advanceRoute: interactive
              body: Click New session to create a fresh, independently-traced run of the story and drop into its interactive chat view.
              dwellMs: 3500
              id: wi-intro-start
              kind: action
              placement: right
              route: home
              target: new-session-btn
              title: Spin up a run
              waitForTarget: new-session-btn
            - advance: click-target
              body: Click start to kick off the background host call. It runs asynchronously — you keep control of the session while it works, and the inbox will tell you when it's done.
              dwellMs: 2500
              id: wi-launch
              kind: action
              placement: top
              route: interactive
              target: intent-btn-start
              title: Launch the background task
              waitForTarget: intent-btn-start
            - advance: next
              body: For a success or action-required notification the inbox raises a transient toast the instant the background job completes. It auto-dismisses after a few seconds — or you can click it to jump straight to the room the work came from.
              dwellMs: 3000
              id: wi-toast
              kind: explain
              placement: left
              route: interactive
              target: inbox-toast
              title: A toast for the completion
              waitForTarget: inbox-toast
            - advance: next
              body: Even after the toast fades the count persists on the global inbox badge — fixed in the chrome, visible on every route. When the background job reached a terminal state the runtime posted a notification, the server fanned it out over the global notifications SSE stream, and this badge incremented. The same badge also counts active work such as queued or failed subagents, while attention color is reserved for work that needs intervention.
              dwellMs: 5500
              id: wi-badge
              kind: explain
              placement: left
              route: interactive
              target: inbox-badge
              title: The global inbox badge lights up
              waitForTarget: inbox-badge-count
            - advance: next
              body: 'Opening the badge reveals the full inbox panel: prioritized active work first, then notification history. Notification-backed work, including matching job rows, offers a jump action backed by the same teleport target as the toast; failed subagent rows open focused chat context.'
              dwellMs: 5000
              id: wi-panel
              kind: explain
              placement: left
              route: interactive
              target: inbox-item
              title: The inbox panel
              waitForTarget: inbox-panel
            - advance: click-target
              body: Click 'jump →' on the notification. The inbox teleports the session back to the exact room the background job was launched from — the notification carries that origin state, so a one-click jump lands you where the work happened.
              dwellMs: 4500
              id: wi-jump
              kind: action
              placement: left
              route: interactive
              target: inbox-jump
              title: Jump to the originating room
              waitForTarget: inbox-jump
            - advance: next
              body: A background turn posted a runtime notification, the global badge reflected it alongside the active-work queue, a toast surfaced it, and one click teleported the session back to its originating room — all deterministic, no LLM. Hit '?' anytime to replay this tour.
              dwellMs: 5000
              id: wi-done
              kind: explain
              placement: center
              route: interactive
              title: That's the async inbox
