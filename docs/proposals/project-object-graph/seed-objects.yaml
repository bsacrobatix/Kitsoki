  - schema: graph/site-page/v0
    id: sitepage-feature-punch-list
    title: Punch-list story
    status: shipped
    visibility: public
    kind: story-demo
    content_fields:
      title: Punch-list story
      tagline: Run YAML worklists through Kitsoki stories with model policy and independent verification.
      summary: The punch-list story consumes a punch-list/v1 manifest, enforces profile/model policy, delegates live story driving, gates results on deterministic verification, and writes a report. This demo drives the top-10 GPT-5.5 dogfood manifest through a no-LLM flow so the full loop is reproducible while the policy and evidence surfaces stay visible.
    promo:
      order: 55
    docs:
      - docs/stories/punch-list.md
    tour:
        export: PUNCH_LIST_TOUR_STEPS
        steps:
            - advance: next
              body: Punch-list is a generic worklist runner. A YAML manifest names the stories to drive, the model policy to enforce, and the deterministic checks that decide whether each item passes.
              dwellMs: 4200
              id: pl-home
              kind: explain
              placement: center
              route: home
              title: Start with the punch-list story
              waitForTarget: home-view
            - advance: next
              body: This demo opens the punch-list story itself. The fixture seeds the real top-10 GPT-5.5 dogfood manifest so the recording stays deterministic and free of live model calls.
              dwellMs: 4200
              id: pl-story-card
              kind: explain
              placement: right
              route: home
              target: story-card
              title: One story, many work items
              waitForTarget: story-card
            - advance: route-match
              advanceRoute: interactive
              body: Start a fresh session. The flow fixture supplies the manifest path and stubs the live driver, the same no-LLM posture used by story tests.
              dwellMs: 3200
              id: pl-start-session
              kind: action
              placement: right
              route: home
              target: new-session-btn
              title: Create the run
            - advance: next
              body: 'The first room explains the contract: load punch-list/v1 YAML, enforce model policy, drive each item, verify independently, and produce a report.'
              dwellMs: 4500
              id: pl-idle
              kind: explain
              placement: right
              route: interactive
              target: chat-section
              title: Choose the manifest
              waitForTarget: chat-section
            - advance: next
              body: 'The start action parses the manifest and rejects bad policy before any live work can start: duplicate IDs, missing story paths, Claude profiles, and LLM-spending verifiers are blocked.'
              dwellMs: 4800
              id: pl-load
              kind: explain
              placement: bottom
              route: interactive
              target: current-state
              title: Load and lint
              waitForTarget: current-state
            - advance: next
              body: The board shows processed, passed, partial, failed, skipped, and pending counts, then selects the next pending item by priority.
              dwellMs: 4300
              id: pl-board
              kind: explain
              placement: right
              route: interactive
              target: chat-section
              title: Board view
              waitForTarget: chat-section
            - advance: next
              body: Processing an item walks through policy, drive, verify, and record. The live driver handoff must include trace and model evidence before verification is allowed to mark the item complete.
              dwellMs: 5200
              id: pl-first-item
              kind: explain
              placement: left
              route: interactive
              target: trace-timeline
              title: One item at a time
              waitForTarget: trace-timeline
            - advance: next
              body: The same loop repeats item by item. At the midpoint, five top-10 entries have passed and five remain pending, with no live model calls in the recording.
              dwellMs: 5200
              id: pl-midpoint
              kind: explain
              placement: right
              route: interactive
              target: chat-section
              title: Halfway through the list
              waitForTarget: chat-section
            - advance: next
              body: 'By the final queue beat, nine items are recorded as passed and the last item is selected: the story-qa workflow through dogfood-marathon.'
              dwellMs: 5000
              id: pl-final-pending
              kind: explain
              placement: right
              route: interactive
              target: chat-section
              title: Final pending item
              waitForTarget: chat-section
            - advance: next
              body: When no pending items remain, punch-list writes a markdown report under .artifacts/punch-list/ with all ten items, their status, story, trace path, and verifier summary.
              dwellMs: 4800
              id: pl-report
              kind: explain
              placement: right
              route: interactive
              target: chat-section
              title: Report result
              waitForTarget: chat-section
            - advance: next
              body: 'The shipped story is generic: swap in any punch-list/v1 manifest, run it through Studio MCP, and trust deterministic verification plus trace/model evidence rather than a maker self-report.'
              dwellMs: 4300
              id: pl-done
              kind: explain
              placement: center
              route: interactive
              title: Ready for real work
    qa:
        scenarios:
            - id: tour-driven
              required: true
              steps:
                - A tour popover opens on the story library
                - Tour popovers continue through the interactive punch-list run
                - A final centered tour popover appears at the end
              title: The demo is a single tour-driven walkthrough
            - id: manifest-board-loop
              required: true
              steps:
                - The punch-list story loads the top-10 manifest and shows 10 loaded items
                - The board view shows counts for processed, passed, failed, skipped, and pending items
                - The run visibly reaches 10 processed and 10 passed items
              title: Manifest load and board loop are visible
            - id: policy-verification-report
              required: true
              steps:
                - The run advances through processing an item
                - The report screen shows a 10-item passed summary
                - The report path under .artifacts/punch-list is visible
              title: Policy, verification, and report result are demonstrated
    sources:
      - source-punch-list-feature
    edges:
      presents:
        - feature-punch-list
      has_media:
        - evidence-punch-list-tour
      governed_by:
        - req-punch-list-behavior
      changed_by: []

