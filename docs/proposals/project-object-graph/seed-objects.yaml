  - schema: graph/site-page/v0
    id: sitepage-feature-trace-features
    title: Trace introspection, live
    status: shipped
    visibility: public
    content_fields:
      title: Trace introspection, live
      tagline: View modes, waterfall, decision-first detail, annotation, replay.
      summary: 'Every trace-introspection capability on a live run: view modes, the latency waterfall, observation category chips, decision-first detail with the confidence bar and alternatives, annotation, and deterministic replay.'
    promo:
      order: 25
    docs:
      - docs/tracing/run-status-ui.md
    related:
      - agent-actions
      - trace-introspection
    tour:
        export: TRACE_TOUR_STEPS
        steps:
            - advance: next
              body: Every run begins here. A story is a deterministic graph of rooms that kitsoki runs the same way every time, recording each decision and call as it goes. We'll demonstrate trace introspection on the bug-fix pipeline.
              dwellMs: 5000
              id: trace-intro-home
              kind: explain
              placement: center
              route: home
              title: Start at the story library
              waitForTarget: home-view
            - advance: next
              body: This story triages a ticket, lets an agent patch the code, then judges the result against a confidence gate — looping until it passes. It exercises every kind of decision, agent call, and host call, which makes it the ideal run to introspect.
              dwellMs: 5500
              id: trace-intro-story
              kind: explain
              placement: right
              route: home
              target: story-card
              title: The bug-fix pipeline
              waitForTarget: story-card
            - advance: route-match
              advanceRoute: interactive
              body: Click New session to create a fresh, independently-traced run of the pipeline.
              dwellMs: 3500
              id: trace-intro-start
              kind: action
              placement: right
              route: home
              target: new-session-btn
              title: Spin up a run
              waitForTarget: new-session-btn
            - advance: route-match
              advanceRoute: any
              body: The trace tools live in the read-only observer view — built for inspecting a run while it's live or after it's finished. Switch to it to introspect this run.
              dwellMs: 4000
              id: trace-intro-observe
              kind: action
              placement: bottom
              route: interactive
              target: observe-link
              title: Switch to the observer
              waitForTarget: observe-link
            - advance: next
              body: kitsoki records every decision, agent call, host call, and world mutation as a structured, immutable event stream. This tour walks the full introspection stack — everything you can see, annotate, and replay from a finished run.
              dwellMs: 4500
              id: trace-welcome
              kind: explain
              placement: center
              route: any
              title: Trace introspection
            - advance: next
              body: Tree shows the event sequence, Timeline is a latency waterfall, Graph is the state diagram — three co-equal projections of the same immutable event stream. Switch anytime.
              dwellMs: 5000
              id: trace-view-modes
              kind: explain
              placement: bottom
              route: any
              target: view-mode-tabs
              title: Three views, one trace
              waitForTarget: view-mode-tabs
            - advance: click-target
              body: Click the Timeline tab to see a duration-proportional waterfall. Each bar's width is the call's duration_ms within its turn window.
              dwellMs: 3000
              id: trace-timeline-tab
              kind: action
              placement: bottom
              route: any
              target: tab-timeline
              title: Switch to the waterfall
            - advance: next
              body: Bars are colored by observation kind — purple for decisions, blue for agent calls, amber for host calls. A bottleneck stands out immediately instead of requiring manual millisecond arithmetic.
              dwellMs: 5500
              id: trace-waterfall
              kind: explain
              placement: right
              route: any
              target: waterfall-bar
              title: Latency at a glance
              waitForTarget: waterfall-bar
            - advance: click-target
              body: Switch back to Tree view to see each event in sequence with its kind badge.
              dwellMs: 3000
              id: trace-tree-tab
              kind: action
              placement: bottom
              route: any
              target: tab-tree
              title: Back to the event tree
            - advance: next
              body: Expand a turn's start event and read its routing detail. The 'Direct' row says yes — this turn was matched to its intent deterministically and advanced without ever calling an LLM. Across a typical run roughly four turns in five resolve this way, with zero agent calls. The model is a callee at named decision points, not the dispatcher for every step — the line a structured-output wrapper can't draw, because there the model is always in the loop.
              dwellMs: 6000
              id: trace-routing
              kind: explain
              placement: right
              route: any
              target: routing-detail
              title: The turn the model never saw
              waitForTarget: routing-detail
            - advance: next
              body: 'Expand a world.update row and the change is laid out key by key — added, removed, or changed, with the before and after side by side. This is the state delta the runtime actually applied, not a sentence an agent wrote about what it did: kitsoki owns the world, so every mutation is structured, diffable data you can audit — never prose you have to trust.'
              dwellMs: 5500
              id: trace-world-diff
              kind: explain
              placement: right
              route: any
              target: world-diff-viewer
              title: How the turn mutated the world
              waitForTarget: world-diff-viewer
            - advance: next
              body: 'Every event has a semantic kind: decision, agent-call, host-call, narration, world-mutation, routing, or lifecycle. Click a chip to filter down to one category — the same taxonomy drives row colors, the waterfall, and a future graph layout.'
              dwellMs: 6000
              id: trace-category-chips
              kind: explain
              placement: bottom
              route: any
              target: category-filter-chips
              title: Observation kind taxonomy
              waitForTarget: category-filter-chips
            - advance: next
              body: For a gate or routing event, the pane leads with the verdict — available intents, chosen intent, confidence, reason — not the raw prompt. The prompt is still there as a collapsed evidence drawer.
              dwellMs: 6000
              id: trace-decision-detail
              kind: explain
              placement: left
              route: any
              target: decide-verdict
              title: Decision-first detail
            - advance: next
              body: The bar fills to the model's confidence and marks the configured threshold with a tick. Green means the engine auto-fired; red means it bailed to human review.
              dwellMs: 5000
              id: trace-confidence-bar
              kind: explain
              placement: left
              route: any
              target: confidence-bar
              title: Confidence vs threshold
              waitForTarget: confidence-bar
            - advance: next
              body: Below the winning verdict, the pane lists every runner-up intent the model considered — with its own confidence score. Seeing the margin between winner and second-place reveals whether the decision was crisp or borderline.
              dwellMs: 5000
              id: trace-alternatives
              kind: explain
              placement: left
              route: any
              target: decide-verdict
              title: Runner-up alternatives
            - advance: next
              body: Score, label, or comment on any gate or agent call. Annotations are stored in a sidecar stream — the deterministic trace is unchanged, but every scored decision becomes a labeled training datapoint.
              dwellMs: 5500
              id: trace-annotation
              kind: explain
              placement: left
              route: any
              target: annotate-button
              title: Annotate a decision
              waitForTarget: annotate-button
            - advance: next
              body: 'Re-run one recorded agent call against a different LLM or local model and diff the verdict — without touching the original run. This makes the pluggable-operator moat visible: same recorded input, different operator, auditable output diff.'
              dwellMs: 6000
              id: trace-replay
              kind: explain
              placement: left
              route: any
              target: replay-button
              title: Replay against a different operator
              waitForTarget: replay-button
            - advance: next
              body: 'You''ve seen the complete trace-introspection stack: semantic kind taxonomy, latency waterfall, decision-first detail, confidence bars, runner-up alternatives, human annotation, and single-call replay. Hit ''?'' anytime to replay this tour.'
              dwellMs: 5500
              id: trace-done
              kind: explain
              placement: center
              route: any
              title: That's the full picture
    sources:
      - source-trace-features-feature
    edges:
      presents:
        - feature-trace-features
      has_media:
        - evidence-trace-features-tour
      governed_by:
        - req-trace-features-behavior
      changed_by: []

