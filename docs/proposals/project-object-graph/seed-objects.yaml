  - schema: graph/feature/v0
    id: feature-operator-ask
    title: Operator questions forwarded from headless agents
    status: shipped
    visibility: public
    summary: Dispatched agent questions become blocking operator UI questions instead of silent empty-answer defaults.
    sources:
      - source-operator-ask-feature
    edges:
      requirements:
        - req-operator-ask-no-silent-default
        - req-operator-ask-blocking-round-trip
        - req-operator-ask-multi-select
      use_cases:
        - usecase-maintainer-answers-blocked-agent
      evidence:
        - evidence-operator-ask-tour
      proposed_by: []
      implemented_by:
        - impl-operator-ask-runtime-web

  - schema: graph/requirement/v0
    id: req-operator-ask-no-silent-default
    title: Headless agents must not silently answer their own operator questions
    status: satisfied
    visibility: public
    statement: A dispatched agent question must block or be forwarded; empty auto-resolution is forbidden for live operator workflows.
    rationale: AskUserQuestion in headless dispatched agents silently resolves with empty answers, which can move a workflow through an unreviewed fork.
    sources:
      - source-operator-ask-feature
    edges:
      required_by:
        - feature-operator-ask
      motivated_by:
        - usecase-maintainer-answers-blocked-agent
      verified_by:
        - evidence-operator-ask-tour

  - schema: graph/requirement/v0
    id: req-operator-ask-blocking-round-trip
    title: Operator answer must unblock the exact parked agent question
    status: satisfied
    visibility: public
    statement: The UI answer is keyed to the original question id and resumes that parked agent turn only after the operator sends a complete answer.
    sources:
      - source-operator-ask-feature
    edges:
      required_by:
        - feature-operator-ask
      motivated_by:
        - usecase-maintainer-answers-blocked-agent
      verified_by:
        - evidence-operator-ask-tour

  - schema: graph/requirement/v0
    id: req-operator-ask-multi-select
    title: Forwarded questions support single-select and multi-select answers
    status: satisfied
    visibility: public
    statement: Operator forwarding must preserve the agent's single-select or multi-select answer shape and return the selected option set.
    sources:
      - source-operator-ask-feature
    edges:
      required_by:
        - feature-operator-ask
      motivated_by:
        - usecase-maintainer-answers-blocked-agent
      verified_by:
        - evidence-operator-ask-tour

  - schema: graph/use-case/v0
    id: usecase-maintainer-answers-blocked-agent
    title: Maintainer answers a blocked implementation agent
    status: supported
    visibility: public
    actor: maintainer
    trigger: A dispatched bugfix or implementation agent reaches a decision it cannot safely make alone.
    desired_outcome: The maintainer sees the exact question and options, answers in web or TUI, and the parked agent resumes with that answer recorded.
    sources:
      - source-operator-ask-feature
    edges:
      actor:
        - actor-maintainer
      exercises:
        - feature-operator-ask
      acceptance:
        - req-operator-ask-no-silent-default
        - req-operator-ask-blocking-round-trip
        - req-operator-ask-multi-select

