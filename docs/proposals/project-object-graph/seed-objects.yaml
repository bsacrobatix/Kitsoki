  # --- Personas and persona-driven QA -------------------------------------
  # Personas are concrete profiles of actor roles (persona derives_from
  # actor). They mirror tools/product-journey/personas.json - the profiles
  # that drive the persona-QA journey runs - and their evidence is those runs:
  # a persona walks a use case / scenario from its own perspective (experience,
  # preferred tools, surface preference, risk focus) and leaves a run bundle.

  - schema: graph/persona/v0
    id: persona-core-maintainer
    title: Core maintainer
    status: active
    visibility: internal
    actor_kind: human
    experience: Senior; maintains a mature repository and is skeptical of bot-generated churn.
    surface_preference: terminal-first
    preferred_tools:
      - terminal
      - git
    risk_focus:
      - reviewability
      - house-style
      - minimal diffs
    summary: Maintainer persona that judges every journey by whether the resulting change is reviewable, house-style, and minimally invasive.
    sources:
      - source-product-journey-personas
    edges:
      persona_of:
        - actor-maintainer
      participates_in:
        - usecase-maintainer-answers-blocked-agent
        - usecase-maintainer-audits-frozen-run
      qa_evidence:
        - evidence-persona-qa-journeys

  - schema: graph/persona/v0
    id: persona-dependency-debugger
    title: Dependency debugger
    status: active
    visibility: internal
    actor_kind: human
    experience: Experienced developer using Kitsoki to fix a bug in a dependency blocking their own project.
    surface_preference: web-first
    preferred_tools:
      - kitsoki web
      - browser devtools
    risk_focus:
      - time-to-repro
