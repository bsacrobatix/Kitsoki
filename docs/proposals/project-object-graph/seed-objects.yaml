    id: actor-maintainer
    title: Maintainer
    status: active
    visibility: public
    actor_kind: human
    summary: Person responsible for answering project-specific decisions, approving risky forks, and steering implementation agents when automation cannot decide safely.
    sources:
      - source-operator-ask-feature
      - source-human-action-workflows
    edges:
      uses:
        - feature-operator-ask
        - feature-agent-actions
        - feature-trace-introspection
      participates_in:
        - usecase-maintainer-answers-blocked-agent
      owns: []
      assigned_changes: []

