    id: sitepage-feature-review
    title: Video review and feedback
    status: shipped
    visibility: public
    content_fields:
      title: Video review and feedback
      tagline: Chaptered playback with frame-anchored feedback flags.
      summary: 'The /review surface for produced videos: a chapter timeline synced to playback, a flag list for frame-anchored feedback, and a detail pane per flag — the feedback half of the produce → review → refine loop.'
