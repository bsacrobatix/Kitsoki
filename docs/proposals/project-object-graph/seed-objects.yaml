  - schema: graph/requirement/v0
    id: req-viewer-multi-actor-lenses
    title: Each actor role gets a lens onto its part of the lifecycle
    status: proposed
    visibility: internal
    statement: The viewer must let each actor kind (product manager, developer, maintainer, agent) start from the layers that match its concerns - capabilities and delta for PMs, proof and implementation for developers - without forking into per-role apps.
    rationale: PMs and developers care about different lifecycle stages of the same objects; one shared graph with role lenses keeps them coherent instead of maintaining parallel views of the truth.
    sources:
      - source-graph-viewer-prototype
      - source-docs-strategic-review
    edges:
      required_by:
        - feature-graph-viewer
      motivated_by:
        - usecase-pm-scans-roadmap-delta
        - usecase-developer-traces-requirement-to-proof
      verified_by: []

  - schema: graph/requirement/v0
    id: req-viewer-permission-visibility
    title: Visibility is permission-managed but the graph stays whole
    status: proposed
    visibility: internal
    statement: Every rendered object passes through the visibility model (public/internal today, per-role permissions later); actors keep navigable visibility across the full graph, and objects outside their permission are absent from every projection rather than greyed out or leaked through edges.
    rationale: Shared decision 5 of the epic - one system holds public promo surface and proprietary inner workings; the viewer is the first surface that must enforce reachability filtering, not just node filtering.
    sources:
      - source-project-object-graph-proposal
      - source-graph-viewer-prototype
    edges:
      required_by:
        - feature-graph-viewer
      motivated_by:
        - usecase-pm-scans-roadmap-delta
      verified_by: []

  - schema: graph/requirement/v0
    id: req-viewer-full-graph-traversal
    title: Any object is reachable from any other by walking typed edges
    status: satisfied
    visibility: internal
    statement: From any selected object, incoming and outgoing edge groups are walkable in both the catalog view and the graph canvas, and selection stays in sync when switching projections.
    sources:
      - source-graph-viewer-prototype
    edges:
      required_by:
        - feature-graph-viewer
      motivated_by:
        - usecase-developer-traces-requirement-to-proof
      verified_by: []

