schema: project-object-graph/seed-catalog/v0
catalog:
  id: kitsoki-project-object-graph-seed
  title: Kitsoki project object graph seed
  status: draft
  visibility: internal
  purpose: review-fixture
  source_window:
    branch: main
    sampled_at: "2026-07-04"
    inputs:
      - id: source-project-object-graph-proposal
        kind: proposal
        path: docs/proposals/project-object-graph.md
      - id: source-lifecycle-taxonomy
        kind: proposal
        path: docs/proposals/lifecycle-taxonomy.md
      - id: source-human-action-workflows
        kind: proposal
        path: docs/proposals/human-action-workflows.md
      - id: source-operator-ask-feature
        kind: feature_catalog
        path: features/operator-ask.yaml
      - id: source-agent-actions-feature
        kind: feature_catalog
        path: features/agent-actions.yaml
      - id: source-trace-introspection-feature
        kind: feature_catalog
        path: features/trace-introspection.yaml
      - id: source-meta-mode-feature
        kind: feature_catalog
        path: features/meta-mode.yaml
      - id: source-dev-story-bugfix-feature
        kind: feature_catalog
        path: features/dev-story-bugfix.yaml
      - id: source-product-site-docs
        kind: docs
        path: docs/site/README.md
      - id: source-docs-strategic-review
        kind: context_note
        path: .context/docs-review-and-strategic-plan-2026-07-04.md
      - id: source-project-object-graph-scratch
        kind: context_note
        path: .context/project-object-graph-proposal-2026-07-04.md
      - id: source-graph-viewer-prototype
        kind: prototype
        path: docs/proposals/project-object-graph/viewer
      - id: source-product-journey-personas
        kind: qa_tooling
        path: tools/product-journey/personas.json
      - id: source-product-journey-qa
        kind: qa_tooling
        path: tools/product-journey/README.md

type_registry:
  - id: core-node
    schema: graph-type/v0
    derives_from: null
    summary: Shared envelope for every project object graph node.
    required_fields:
      - id
      - schema
      - title
      - status
      - visibility
      - sources
      - edges
    edge_fields:
      - id: sources
        target_type: source
        cardinality: many
  - id: feature
    schema: graph-type/v0
    derives_from: core-node
    summary: Durable product capability or capability group.
    edge_fields:
      - id: requirements
        target_type: requirement
        cardinality: many
      - id: use_cases
        target_type: use-case
        cardinality: many
      - id: evidence
        target_type: evidence
        cardinality: many
      - id: implemented_by
        target_type: implementation
        cardinality: many
      - id: proposed_by
        target_type: proposal
        cardinality: many
  - id: site-page
    schema: graph-type/v0
    derives_from: core-node
    summary: Public product-site page generated from graph-backed capability, demo, and copy fields.
    edge_fields:
      - id: presents
        target_type: feature
        cardinality: one
        renders: true
      - id: has_media
        target_type: evidence
        cardinality: many
        renders: true
      - id: governed_by
        target_type: requirement
        cardinality: many
      - id: changed_by
        target_type: change
        cardinality: many
  - id: actor
    schema: graph-type/v0
    derives_from: core-node
    summary: A human role, agent role, or automated executor that owns, uses, reviews, or implements graph objects.
    edge_fields:
      - id: uses
        target_type: feature
        cardinality: many
      - id: owns
        target_type: feature
        cardinality: many
      - id: participates_in
        target_type: use-case
        cardinality: many
      - id: assigned_changes
        target_type: change
        cardinality: many
  - id: agent
    schema: graph-type/v0
    derives_from: actor
    summary: Automated actor that mines, plans, implements, validates, or reviews graph work under story/runtime control.
    edge_fields:
      - id: uses
        target_type: feature
        cardinality: many
      - id: participates_in
        target_type: use-case
        cardinality: many
      - id: assigned_changes
        target_type: change
        cardinality: many
  - id: persona
    schema: graph-type/v0
    derives_from: actor
    summary: Concrete profile of an actor role - experience level, preferred tools and tech stack, surface preference, risk focus - used to drive persona-based QA journeys through use cases from that perspective.
    edge_fields:
      - id: persona_of
        target_type: actor
        cardinality: one
      - id: participates_in
        target_type: use-case
        cardinality: many
      - id: qa_evidence
        target_type: evidence
        cardinality: many
  - id: requirement
    schema: graph-type/v0
    derives_from: core-node
    summary: Durable, testable statement the project must satisfy.
    edge_fields:
      - id: required_by
        target_type: feature
        cardinality: many
      - id: verified_by
        target_type: evidence
        cardinality: many
      - id: motivated_by
        target_type: use-case
        cardinality: many
  - id: use-case
    schema: graph-type/v0
    derives_from: core-node
    summary: Actor goal and scenario that motivates requirements.
    edge_fields:
      - id: actor
        target_type: actor
        cardinality: one
      - id: exercises
        target_type: feature
        cardinality: many
      - id: acceptance
        target_type: requirement
        cardinality: many
  - id: proposal
    schema: graph-type/v0
    derives_from: core-node
    summary: Transient design or change proposal represented as graph data.
    edge_fields:
      - id: owned_by
        target_type: actor
        cardinality: one
      - id: proposes
        target_type: feature
        cardinality: many
      - id: creates_requirements
        target_type: requirement
        cardinality: many
      - id: creates_use_cases
        target_type: use-case
        cardinality: many
      - id: decomposes_to
        target_type: change
        cardinality: many
  - id: evidence
    schema: graph-type/v0
    derives_from: core-node
    summary: Deterministic proof artifact, fixture, trace, media, or lint result.
    edge_fields:
      - id: verifies
        target_type: requirement
        cardinality: many
      - id: demonstrates
        target_type: feature
        cardinality: many
      - id: exercises
        target_type: use-case
        cardinality: many
      - id: from_persona
        target_type: persona
        cardinality: one
  - id: implementation
    schema: graph-type/v0
    derives_from: core-node
    summary: Shipped code, docs, story files, or runtime surfaces implementing a feature.
    edge_fields:
      - id: implements
        target_type: feature
        cardinality: many
  - id: change
    schema: graph-type/v0
    derives_from: core-node
    summary: Transient work node compatible with the existing change-node decomposition contract.
    edge_fields:
      - id: assigned_to
        target_type: actor
        cardinality: one
      - id: implements
        target_type: feature
        cardinality: many
      - id: satisfies
        target_type: requirement
        cardinality: many

