type_registry:
  - id: core-node
    schema: graph-type/v0
    derives_from: null
    summary: Shared envelope for every project object graph node.
    required_fields:
      - id
      - schema
      - title
      - status
      - visibility
      - sources
      - edges
    edge_fields:
      - id: sources
        target_type: source
        cardinality: many
  - id: feature
    schema: graph-type/v0
    derives_from: core-node
    summary: Durable product capability or capability group. in_area's first
      entry is the primary area for tree-shaped rollups (site nav, portfolio
      rollup); a feature listing more than one is spanning by convention, not
      by schema.
    edge_fields:
      - id: requirements
        target_type: requirement
        cardinality: many
      - id: use_cases
        target_type: use-case
        cardinality: many
      - id: evidence
        target_type: evidence
        cardinality: many
      - id: implemented_by
        target_type: implementation
        cardinality: many
      - id: proposed_by
        target_type: proposal
        cardinality: many
      - id: in_area
        target_type: area
        cardinality: many
  - id: site-page
    schema: graph-type/v0
    derives_from: core-node
    summary: Public product-site page generated from graph-backed capability, demo, and copy fields.
    edge_fields:
      - id: presents
        target_type: feature
        cardinality: one
        renders: true
      - id: has_media
        target_type: evidence
        cardinality: many
        renders: true
      - id: governed_by
        target_type: requirement
        cardinality: many
      - id: changed_by
        target_type: change
        cardinality: many
  - id: actor
    schema: graph-type/v0
    derives_from: core-node
    summary: A human role, agent role, or automated executor that owns, uses, reviews, or implements graph objects. owns stays targeted at feature (per-feature ownership, migrating out); owns_area is the new group-level ownership edge (design doc lean 4.2 — the existing ~4 actor nodes' owns data all point at feature, so retargeting owns itself would break them).
    edge_fields:
      - id: uses
        target_type: feature
        cardinality: many
      - id: owns
        target_type: feature
        cardinality: many
      - id: owns_area
        target_type: area
        cardinality: many
      - id: participates_in
        target_type: use-case
        cardinality: many
      - id: assigned_changes
        target_type: change
        cardinality: many
  - id: agent
    schema: graph-type/v0
    derives_from: actor
    summary: Automated actor that mines, plans, implements, validates, or reviews graph work under story/runtime control.
    edge_fields:
      - id: uses
        target_type: feature
        cardinality: many
      - id: participates_in
        target_type: use-case
        cardinality: many
      - id: assigned_changes
        target_type: change
        cardinality: many
  - id: persona
    schema: graph-type/v0
    derives_from: actor
    summary: Concrete profile of an actor role - experience level, preferred tools and tech stack, surface preference, risk focus - used to drive persona-based QA journeys through use cases from that perspective.
    edge_fields:
      - id: persona_of
        target_type: actor
        cardinality: one
        nests_under: true
      - id: participates_in
        target_type: use-case
        cardinality: many
      - id: qa_evidence
        target_type: evidence
        cardinality: many
  - id: requirement
    schema: graph-type/v0
    derives_from: core-node
    summary: Durable, testable statement the project must satisfy.
    edge_fields:
      - id: required_by
        target_type: feature
        cardinality: many
      - id: verified_by
        target_type: evidence
        cardinality: many
      - id: motivated_by
        target_type: use-case
        cardinality: many
  - id: use-case
    schema: graph-type/v0
    derives_from: core-node
    summary: Actor goal and scenario that motivates requirements.
    edge_fields:
      - id: actor
        target_type: actor
        cardinality: one
      - id: exercises
        target_type: feature
        cardinality: many
      - id: acceptance
        target_type: requirement
        cardinality: many
  - id: proposal
    schema: graph-type/v0
    derives_from: core-node
    summary: Transient design or change proposal represented as graph data.
    edge_fields:
      - id: owned_by
        target_type: actor
        cardinality: one
      - id: proposes
        target_type: feature
        cardinality: many
      - id: creates_requirements
        target_type: requirement
        cardinality: many
      - id: creates_use_cases
        target_type: use-case
        cardinality: many
      - id: child_of
        target_type: proposal
        cardinality: one
        nests_under: true
      - id: decomposes_to
        target_type: change
        cardinality: many
  - id: evidence
    schema: graph-type/v0
    derives_from: core-node
    summary: Deterministic proof artifact, fixture, trace, media, or lint result.
    edge_fields:
      - id: verifies
        target_type: requirement
        cardinality: many
      - id: demonstrates
        target_type: feature
        cardinality: many
      - id: exercises
        target_type: use-case
        cardinality: many
      - id: from_persona
        target_type: persona
        cardinality: one
  - id: implementation
    schema: graph-type/v0
    derives_from: core-node
    summary: Shipped code, docs, story files, or runtime surfaces implementing a feature.
    edge_fields:
      - id: implements
        target_type: feature
        cardinality: many
  - id: change
    schema: graph-type/v0
    derives_from: core-node
    summary: Transient work node compatible with the existing change-node decomposition contract.
    edge_fields:
      - id: assigned_to
        target_type: actor
        cardinality: one
      - id: implements
        target_type: feature
        cardinality: many
      - id: satisfies
        target_type: requirement
        cardinality: many
  - id: area
    schema: graph-type/v0
    derives_from: core-node
    summary: Stable product or functional area — the ownable, near-hierarchical
      home of features. Areas form a DAG via part_of (single primary parent
      recommended by lint, not by schema); part_of is acyclic the same way
      change.depends_on is.
    edge_fields:
      - id: part_of
        target_type: area
        cardinality: one
        acyclic: true
      - id: owned_by
        target_type: actor
        cardinality: many
  - id: initiative
    schema: graph-type/v0
    derives_from: core-node
    summary: Time-bounded cross-cutting project bundling proposals/changes
      across areas. Absorbs roadmap-portfolio-work's initiative level; its
      horizon and priority scalars live in per-type fields, not edges.
    edge_fields:
      - id: targets
        target_type: area
        cardinality: many
      - id: includes
        target_type: change
        cardinality: many
      - id: proposals
        target_type: proposal
        cardinality: many
      - id: owned_by
        target_type: actor
        cardinality: one

nodes:
  - schema: graph/actor/v0
    id: actor-maintainer
    title: Maintainer
    status: active
    visibility: public
    actor_kind: human
    summary: Person responsible for answering project-specific decisions, approving risky forks, and steering implementation agents when automation cannot decide safely.
    sources:
      - source-operator-ask-feature
      - source-human-action-workflows
    edges:
      uses:
        - feature-operator-ask
        - feature-agent-actions
        - feature-trace-introspection
      participates_in:
        - usecase-maintainer-answers-blocked-agent
      owns: []
      owns_area: []
      assigned_changes: []

  - schema: graph/actor/v0
    id: actor-product-owner
    title: Product owner
    status: active
    visibility: internal
    actor_kind: human
    summary: Person accountable for desired-state gaps, roadmap priority, and whether graph deltas represent the right product direction.
    sources:
      - source-project-object-graph-proposal
      - source-docs-strategic-review
    edges:
      uses:
        - feature-project-object-graph
      participates_in:
        - usecase-product-owner-computes-roadmap-delta
      owns:
        - feature-project-object-graph
      owns_area:
        - area-kitsoki
      assigned_changes: []

  - schema: graph/actor/v0
    id: actor-product-manager
    title: Product manager
    status: draft
    visibility: internal
    actor_kind: human
    summary: Role that turns backlog signals, context notes, proposal overlap, and customer scenarios into requirements and prioritized roadmap deltas.
    sources:
      - source-docs-strategic-review
      - source-project-object-graph-scratch
    edges:
      uses:
        - feature-project-object-graph
        - feature-graph-viewer
      participates_in:
        - usecase-product-owner-computes-roadmap-delta
        - usecase-pm-scans-roadmap-delta
      owns: []
      owns_area:
        - area-media-and-demos
        - area-web-experience
      assigned_changes: []

  - schema: graph/actor/v0
    id: actor-developer
    title: Developer
    status: active
    visibility: internal
    actor_kind: human
    summary: Person who implements scoped graph substrate, adapters, catalog migrations, and deterministic validation gates.
    sources:
      - source-project-object-graph-proposal
      - source-lifecycle-taxonomy
    edges:
      uses:
        - feature-project-object-graph
        - feature-agent-actions
        - feature-trace-introspection
        - feature-meta-mode
        - feature-graph-viewer
      participates_in:
        - usecase-developer-traces-requirement-to-proof
      owns: []
      owns_area:
        - area-agent-execution
        - area-observability
        - area-dev-workflow
        - area-platform-install
      assigned_changes:
        - change-object-graph-substrate
        - change-capability-catalog-dogfood
        - change-roadmap-delta-view

  - schema: graph/agent/v0
    id: actor-planning-agent
    title: Planning agent
    status: proposed
    visibility: internal
    actor_kind: agent
    summary: Automated planner that mines proposals, feature catalog entries, and .context notes into typed graph objects with source provenance.
    sources:
      - source-docs-strategic-review
      - source-project-object-graph-scratch
    edges:
      uses:
        - feature-project-object-graph
        - feature-dev-story-bugfix
      participates_in:
        - usecase-agent-mines-backlog-into-graph
      owns: []
      assigned_changes:
        - change-object-graph-substrate

  - schema: graph/feature/v0
    id: feature-operator-ask
    title: Operator questions forwarded from headless agents
    status: shipped
    visibility: public
    summary: Dispatched agent questions become blocking operator UI questions instead of silent empty-answer defaults.
    sources:
      - source-operator-ask-feature
    edges:
      in_area:
        - area-agent-execution
      requirements:
        - req-operator-ask-no-silent-default
        - req-operator-ask-blocking-round-trip
        - req-operator-ask-multi-select
      use_cases:
        - usecase-maintainer-answers-blocked-agent
      evidence:
        - evidence-operator-ask-tour
      proposed_by: []
      implemented_by:
        - impl-operator-ask-runtime-web

  - schema: graph/requirement/v0
    id: req-operator-ask-no-silent-default
    title: Headless agents must not silently answer their own operator questions
    status: satisfied
    visibility: public
    statement: A dispatched agent question must block or be forwarded; empty auto-resolution is forbidden for live operator workflows.
    rationale: AskUserQuestion in headless dispatched agents silently resolves with empty answers, which can move a workflow through an unreviewed fork.
    sources:
      - source-operator-ask-feature
    edges:
      required_by:
        - feature-operator-ask
      motivated_by:
        - usecase-maintainer-answers-blocked-agent
      verified_by:
        - evidence-operator-ask-tour

  - schema: graph/requirement/v0
    id: req-operator-ask-blocking-round-trip
    title: Operator answer must unblock the exact parked agent question
    status: satisfied
    visibility: public
    statement: The UI answer is keyed to the original question id and resumes that parked agent turn only after the operator sends a complete answer.
    sources:
      - source-operator-ask-feature
    edges:
      required_by:
        - feature-operator-ask
      motivated_by:
        - usecase-maintainer-answers-blocked-agent
      verified_by:
        - evidence-operator-ask-tour

  - schema: graph/requirement/v0
    id: req-operator-ask-multi-select
    title: Forwarded questions support single-select and multi-select answers
    status: satisfied
    visibility: public
    statement: Operator forwarding must preserve the agent's single-select or multi-select answer shape and return the selected option set.
    sources:
      - source-operator-ask-feature
    edges:
      required_by:
        - feature-operator-ask
