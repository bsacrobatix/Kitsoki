    id: sitepage-feature-story-editor
    title: The story editor
    status: shipped
    visibility: public
    content_fields:
      title: The story editor
      tagline: Rooms, hooks, domain model, and the Agent Workbench — one inspector.
      summary: 'The per-story editor surface: the BFS-ordered room list, room detail with hook and domain model and IDE deep-link, the meta-chat column, and the Agent Workbench''s contract cards and cassette browser.'
    promo:
      order: 60
    docs:
      - docs/tui/story-editor.md
    tour:
        export: STORY_EDITOR_TOUR_STEPS
        steps:
            - advance: next
              body: Every kitsoki story is a deterministic graph of rooms authored in YAML. The Story Editor gives that graph a browseable surface — room order, wiring, and agent contracts — without leaving the web UI. We'll walk it on the PRD-authoring story.
              dwellMs: 5000
              id: se-intro-home
              kind: explain
              placement: center
              route: home
              title: Authoring, without the YAML expedition
              waitForTarget: home-view
            - advance: next
              body: Every story card now carries an 'Edit story' link. It opens that story's room graph in the editor — no session, no LLM, just a static read of the story as authored.
              dwellMs: 5000
              id: se-intro-card
              kind: explain
              placement: right
              route: home
              target: edit-story-btn
              title: Open a story in the editor
              waitForTarget: edit-story-btn
            - advance: route-match
              advanceRoute: any
              body: Click 'Edit story' to open the PRD story's graph.
              dwellMs: 3500
              id: se-intro-open
              kind: action
              placement: right
              route: home
              target: edit-story-btn
              title: Into the editor
              waitForTarget: edit-story-btn
            - advance: next
              body: The editor is a two-column shell. On the right, every room in the story — on the left, a meta-chat scratchpad. The room list is the map you navigate by.
              dwellMs: 5000
              id: se-shell
              kind: explain
              placement: right
              route: any
              target: editor-room-list
              title: The story map
              waitForTarget: editor-room-list
            - advance: next
              body: Rooms are sorted by their average BFS distance from the entry point — idle (0) → clarifying (1) → brief (2) → references (3) → drafting (4). Early rooms first, unreachable rooms last. You think in 'how far from the start', not YAML file order.
              dwellMs: 5500
              id: se-roomlist
              kind: explain
              placement: right
              route: any
              target: editor-room-list
              title: Ordered by reachability
              waitForTarget: editor-room-item
            - advance: next
              body: The left column is the same off-path meta agent you have on the run surface — ask 'what does this room's prompt do?' without leaving the page. It needs a live session, so until one is attached it shows this placeholder.
              dwellMs: 5000
              id: se-meta
              kind: explain
              placement: right
              route: any
              target: editor-meta-chat
              title: Meta chat, alongside
              waitForTarget: editor-meta-chat
            - advance: next
              body: 'Selecting ''clarifying'' pins it in the detail pane: its hook, its domain model, its typed view, and an IDE deep-link — everything you''d otherwise reconstruct by reading YAML across files.'
              dwellMs: 5000
              id: se-detail
              kind: explain
              placement: left
              route: any
              target: editor-room-detail
              title: A room, fully unpacked
              waitForTarget: editor-room-detail
            - advance: next
              body: The header carries a vscode://file deep-link to the exact line of the room's source. Editing stays in your IDE — the editor reads and links, it doesn't write YAML.
              dwellMs: 4500
              id: se-ide
              kind: explain
              placement: bottom
              route: any
              target: editor-ide-link
              title: Jump to source
              waitForTarget: editor-ide-link
            - advance: next
              body: 'Each on_enter effect renders as a typed card — the host call, its arguments, and the world bindings it produces. The clarifying room fires a decide agent to surface the gaps in the brief. This is also the security boundary: every host.* call a room makes is checked against the story''s allow-list at load time, and each agent runs with an explicit tool allow-list — so the hooks you read here are the complete, auditable list of what the machine can do, no matter what the model asks for.'
              dwellMs: 5500
              id: se-hook
              kind: explain
              placement: right
              route: any
              target: editor-hook
              title: The hook (on_enter)
              waitForTarget: editor-hook-effect
            - advance: next
              body: 'Three sections: world keys this room reads and writes (with direction), the intents it defines, and its transitions. Transition targets are links — click one to jump straight to that room.'
              dwellMs: 5500
              id: se-domain
              kind: explain
              placement: right
              route: any
              target: editor-domain-model
              title: The domain model
              waitForTarget: editor-domain-model
            - advance: next
              body: The room's typed view is rendered read-only by the very same component the run surface uses — no divergence between what you author and what the operator sees.
              dwellMs: 5000
              id: se-view
              kind: explain
              placement: left
              route: any
              target: editor-story-viewer
              title: The typed view, rendered
              waitForTarget: editor-story-viewer-view
            - advance: next
              body: 'For any room that calls an agent, the workbench lists its contracts: the call kind, the prompt template, the declared output schema, and the cassette key that flow-tests match on — the contract an author tunes.'
              dwellMs: 5500
              id: se-workbench
              kind: explain
              placement: left
              route: any
              target: editor-agent-workbench
              title: The Agent Workbench
              waitForTarget: editor-agent-card
            - advance: next
              body: Each contract embeds a cassette browser — pick a recorded episode, preview its output, and replay the call in isolation to see the room render with that response. The PRD story ships no agent cassettes yet, so the browser honestly shows its empty state.
              dwellMs: 5000
              id: se-cassette
              kind: explain
              placement: left
              route: any
              target: editor-cassette-list
              title: Browse the cassettes
              waitForTarget: editor-cassette-list
            - advance: next
              body: 'That''s the Story Editor: a reachability-ordered room map, per-room hook / domain-model / typed-view detail, IDE deep-links, a meta-chat scratchpad, and an agent workbench with a cassette browser — all a static, no-LLM read of the story as authored. Hit ''?'' anytime to replay this tour.'
              dwellMs: 5500
              id: se-done
              kind: explain
              placement: center
