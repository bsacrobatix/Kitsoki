      - "the transaction validates a proposed delta against the WM.6-pinned decomposition-graph schema PLUS the full structural lint (acyclic depends_on DAG, globally disjoint-or-chained scope, goal_ref in GOAL.md's criteria, known gate.class, a runnable RED-first gate present) and REJECTS a bad delta (cycle / scope overlap / missing RED gate / dangling dep) before it is applied — RED-first for plan edits, mirroring RED-first for code"
