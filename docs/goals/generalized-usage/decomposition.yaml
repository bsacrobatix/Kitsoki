    gate:
      class: "G-LIVE+REPLAY"
      red_now: "no frozen corpus; task selection would be curated-to-flatter-kitsoki (selection-bias threat)"
      green_when: "bench.py verify is green on every task (RED@baseline, GREEN@fix); the one schema-validated mining LLM pass is recorded; split frozen"
      cmd: "python3 tools/arena/tests/validate_corpus.py tools/arena/corpus/cost-bench.manifest.yaml"
