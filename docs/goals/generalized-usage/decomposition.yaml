      - "video-catalog.md (WM.4's authoritative list) enumerates EVERY change in decomposition.yaml carrying a `demo_video:` field, including the new WS.3 sandbox-confinement demo, with what each clip shows and which feed the WM.4 compendium"
      - "a gate cross-checks decomposition.yaml's demo_video: fields against video-catalog.md's rows AND against an actually-produced clip artifact path for each row — a flagged change with no catalog row, or a catalog row with no produced clip, fails"
      - "scope stays chained to WM.4 via depends_on (both changes touch video-catalog.md; sequenced, not concurrently owned) rather than duplicating the file's ownership claim"
    gate:
      class: G-LINT
      red_now: "video-catalog.md either doesn't exist yet or isn't cross-checked against decomposition.yaml's demo_video: fields; nothing asserts a produced clip exists for each flagged change"
      green_when: "python3 tools/lint-video-catalog.py --goal-dir docs/goals/generalized-usage passes: every demo_video-flagged change has a catalog row and a produced-clip path that exists"
      cmd: "python3 tools/lint-video-catalog.py --goal-dir docs/goals/generalized-usage"
    agent_brief: >
      Write tools/lint-video-catalog.py: parse decomposition.yaml for every
      change with a `demo_video:` field, parse WM.4's video-catalog.md for its
      enumerated rows, and fail if any flagged change is missing a row or if a
      row's produced-clip path doesn't exist on disk. This rides on top of
      WM.4 (which owns producing video-catalog.md and the clips themselves) —
      this change is the completeness GATE on that catalog, kept on the
      depends_on chain with WM.4 since both touch the same file. Include the
      new WS.3 sandbox-confinement demo explicitly in the fixture used to test
      the lint. No LLM — pure YAML/Markdown parsing + file-existence checks.
