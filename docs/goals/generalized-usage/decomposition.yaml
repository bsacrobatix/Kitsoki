    prior_work: "Surfaced live (Cycle 2/3, .context/goal-seeker-fallback-log.md): the goal-seeker flow suite scores 1/9 via the studio MCP story.test {dir:.worktrees/...} but 9/9 via `kitsoki test flows` from the worktree root. Same KITSOKI_APP_DIR root as 2.7 (issue #37), but one layer lower and more general — the shared host.starlark.run adapter, so it fixes every cwd-detached story driver, not just MCP."
    scope: ["internal/host/starlark_run.go"]
    depends_on: []
    acceptance:
      - "when no world.workdir and no starlark_inspect_cassette are set, the production fs-inspector installed by host.starlark.run roots at KITSOKI_APP_DIR (when published) before falling back to the process cwd"
      - "a story's flow suite driven via the MCP studio's story.test/story.turn from a worktree other than the server's own cwd resolves relative ctx.fs paths (e.g. goal_dir) against the target worktree, not the MCP server's checkout"
    gate:
      class: G-GOTEST
      red_now: "internal/host/starlark_run.go's default-inspector fallback (the block right after \"Root at world.workdir when present, else the process cwd\") never references AppDirEnv/KITSOKI_APP_DIR — `grep -q AppDirEnv internal/host/starlark_run.go` fails today even though the sibling script-path resolution (~line 52) already consults it"
      green_when: "the fallback consults KITSOKI_APP_DIR between world.workdir and os.Getwd(), proven by a new go test (TestStarlarkRunDefaultInspector_PrefersAppDir) AND by the grep; go test ./internal/host/... stays green"
      cmd: "grep -q AppDirEnv internal/host/starlark_run.go && go test ./internal/host/..."
    agent_brief: >
      internal/host/starlark_run.go's default-inspector-injection block (~line 121)
      falls back to os.Getwd() when world.workdir is unset, but never checks
      KITSOKI_APP_DIR (AppDirEnv, agent_ask.go) first — even though the adjacent
