    title: "M0 — commit the benchmark protocol; freeze hypotheses H1–H4 + success criteria"
    kind: docs
    pipeline: implementation
    critical: true
    depends_on: []
    scope: ["docs/research/cost-efficiency-benchmark.md"]
    acceptance:
      - "the protocol (from .context/cost-efficiency-benchmark-plan.md) is committed to a durable home with hypotheses, metrics, and pre-registered success criteria FROZEN before any live spend"
      - "cost-per-solve is the headline metric; held-out-only headline + full round disclosure are the anti-Goodhart defenses"
    gate:
      class: G-LINT
      red_now: "the protocol lives only in .context (transient), unfrozen; live spend before freeze would be unfalsifiable"
      green_when: "docs/research/cost-efficiency-benchmark.md exists with the frozen H1–H4 criteria + threats-to-validity"
      cmd: "test -f docs/research/cost-efficiency-benchmark.md && grep -q 'held-out' docs/research/cost-efficiency-benchmark.md"
    agent_brief: >
      Promote .context/cost-efficiency-benchmark-plan.md to docs/research/ as the
      committed, frozen protocol (M0). Freeze hypotheses H1–H4, the metric
      definitions, and the success criteria. Nothing runs live before this is signed
      off. This is the pre-registration that makes the whole study falsifiable.

  - id: "WB.1"
    wall: WB
    goal_ref: [G4, G5]
