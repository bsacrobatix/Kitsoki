goal_slug: generalized-usage

# runtime — the goal's EXECUTION CONTEXT, declared once so opening the goal-seeker
# needs zero operator seed. The story's bootstrap reads this (scripts/gs_resolve.star)
# and derives world.workdir + world.main_worktree_path from worktree_path and
# world.base_branch from base_branch, so lint/dispatch/integrate root at the goal's
# own worktree instead of the MCP process cwd (the main checkout). worktree_path is
# repo-root-relative (resolved against the checkout the MCP runs from). An explicit
# initial_world workdir seed still wins — this is the default, not an override.
runtime:
  base_branch:   stabilize/generalized-usage      # the branch dispatch/integrate target
  worktree_path: .worktrees/generalized-usage      # where docs/goals/<slug>/ + the code live

# First slice: the meta/dogfood-enablement wall (WM) + the Install wall (W1).
# Walls W2-W5 + hygiene follow once this slice is proven. Every change carries a
# deterministic gate (RED now, GREEN when it lands); scope globs are the write
# boundary and are sharpened at implementation time. See ../generalized-usage/plan.md
# and .context/generalized-usage-decomposition-overview.md for the full wall map.
coverage_note: >
  This slice covers WM (the goal-seeker STORY + the kitsoki gaps it needs + the
  dev-story/MCP fixes that let the plan be driven THROUGH kitsoki on a foreign repo)
  and W1 (everything a stranger needs to install and first-run). WM.0 is the
  goal-seeker itself, built as a kitsoki story (reusing punch-list + ship-it/fleet),
  not an out-of-engine script — the critical dogfooded mechanism that works the rest.
  WM.1/WM.2 are limitations the story surfaces, captured per the "limitations → plan"
  rule; build-discovered gaps append as WM.x. No two changes own the same file at
  ready-time (the disjoint-scope lint is the gate on that claim). This slice also
  folds in wall WS (Sandbox / capability enforcement, clears G3 — the deferred
  design in docs/proposals/agent-capability-model.md and its three slices +
  conformance, now decomposed) and wall WP (Complete Package — every shipped
  change ships its docs/demo/site update, not just code). WM.7 makes evolving
  THIS file itself (as just done for WS/WP) a change-managed transaction going
  forward, not a hand edit.

definition_of_done: >
  A change counts as DONE — eligible for the goal-seeker's record/integrate step
  to mark it integrated — only when, as applicable: (a) its code + its RED→GREEN
  deterministic gate are green; (b) narrative docs are updated in docs/ proper,
  and if the change was driven from a docs/proposals/*.md file, that proposal is
  trimmed-or-deleted per docs/proposals/README.md's lifecycle + the repo CLAUDE.md
  rule ("move content to proper narrative docs and delete the proposal") — WP.1
  gates this; (c) a demo is produced if the change carries a `demo_video:` field
  (the no-LLM rrweb tour, embedded in its WM.3 per-change deck via WM.4's
  pipeline) — WP.3 gates this; (d) the feature-site + pitch (features/*.yaml,
  docs/decks/kitsoki-pitch.slidey.json) are updated truthfully if the change is
  user-facing — WP.2 gates this. The record/integrate step checks this whole
  package, not just the code gate. This extends to the PLAN itself: changing
  decomposition.yaml's scope/graph is itself gated (delta-lint + provenance +
  no-lost-work for the graph), never a silent hand edit — see WM.7.

changes:
  # 0.2 pulled to the FRONT: install-critical G1 (a stranger's fresh clone gets 2 broken
  # MCP servers from hardcoded /Users/brad paths), no deps, single-file, simple end-state
  # gate — the right first change to LAND (install-before-engine prioritization + the
  # end-to-end landing proof for the goal-seeker loop).
  - id: "0.2"
    wall: W1
    goal_ref: [G1]
    title: Repo .mcp.json has no hardcoded /Users/brad paths
    kind: docs
    pipeline: implementation
    scope: [".mcp.json"]
    depends_on: []
    acceptance:
      - "a fresh clone gets zero broken MCP servers (slidey/stagehand entries portable or optional)"
    gate:
      class: G-LINT
      red_now: ".mcp.json hardcodes /Users/brad/... for slidey+stagehand; every cloner gets 2 broken servers"
      green_when: "a path-scan lint over .mcp.json exits 0"
      cmd: "! grep -q '/Users/brad' .mcp.json"
    agent_brief: >
      Make the repo .mcp.json portable: remove hardcoded /Users/brad slidey+stagehand
      entries (make them optional or path-relative). Add the grep to the lint gate.

  # ---- WM — Meta / dogfood-enablement (do first; each is also a G2/G6 item) ----
  - id: "WM.0"
    wall: WM
    goal_ref: [G6]
    title: goal-seeker as a kitsoki STORY (reuses punch-list + ship-it/fleet); /goal is a thin session driver
    demo_video: "FLAGSHIP — tour the goal-seeker loop running (evaluate → dispatch → integrate → evaluate) with the PM decks updating live; embed in WM.0 deck + exec summary"
    kind: story
    pipeline: implementation
    critical: true
    scope: ["stories/goal-seeker/**", ".agents/skills/goal/**"]
    depends_on: []
    acceptance:
      - "a stories/goal-seeker/ story imports punch-list (load→drive→verify→report loop) + ship-it (lost-work-safe integrate → verify → cleanup) and adds an `evaluate` host.agent.decide gate emitting {verdict, summary, next_instruction} over a BOUNDED preamble (relevant_world + a host.starlark.run projection with detail-pointers)"
      - "deterministic steps (ledger fold, preamble build, decomposition lint, scope-disjoint ready-set) are host.starlark.run glue — NOT a standalone Python CLI; goal.py is retained only as the golden reference oracle the .star is tested against, then deleted"
      - "the whole loop is flow-tested with NO LLM (host.agent.* stubbed); a forced-conflict flow parks-with-ref and asserts both SHAs still reachable — no committed work lost"
      - "/goal (Claude Code) is a thin driver that advances the goal-seeker SESSION one turn via kitsoki turn / MCP session.drive"
      - "ADVERSARIAL DETERMINISM FLOWS (no LLM) — the port must NOT silently regress the goal.py guarantees: a false-`done` verdict is rejected by a deterministic post-decide re-check (evaluator says done, ledger disagrees → loop); a worker self-reported `green` is IGNORED (only reviewer/integrator flips green); a not-RED change refuses to start. Each asserted against goal.py's golden outputs before goal.py is deleted, and the golden-oracle corpus includes the false-done / worker-self-green / cycle / scope-overlap / not-RED cases"
    gate:
      class: G-FLOW
      red_now: "no goal-seeker story exists; the loop lives as an out-of-engine Python script (goal.py) — undogfooded"
      green_when: "kitsoki test flows stories/goal-seeker/ drives evaluate→dispatch→verify→integrate→evaluate to a done verdict with no LLM"
      cmd: "kitsoki test flows stories/goal-seeker/app.yaml"
    agent_brief: >
      Build stories/goal-seeker/ as a kitsoki story, the maximally-dogfooded form of
      the /goal loop. Compose, don't reinvent: import punch-list for load→drive→
      verify→report and ship-it for the lost-work-safe integrate→verify→cleanup→ship
      (integrate_existing seam). Add an `evaluate` room: a host.agent.decide gate that
      reads a BOUNDED preamble (declare relevant_world; build the projection +
      detail-pointers in host.starlark.run over world+trace) and emits {verdict,
      summary, next_instruction}; loop until verdict=done. Port goal.py's fold /
      preamble / lint / scope-disjoint-ready logic to host.starlark.run (.star), and
      keep goal.py ONLY as the golden oracle the .star is tested against (delete it
      when the story's flows are green). Make /goal a thin driver over the session.
      Known gaps this surfaces are WM.1–WM.4 below; append any further gaps as WM.x
      rather than working around them in Python. See .context/goal-command-design.md
      (which this supersedes on the Python-vs-story point).

  - id: "2.3"
    wall: WM
    goal_ref: [G2, G4]
    title: Synthetic/profile propagation to nested Agent tools (issue #28)
    kind: runtime
    pipeline: bugfix
    scope: ["internal/agent/**"]
    depends_on: []
    acceptance:
      - "a synthetic.new profile propagates to nested Agent-tool dispatches, so cheap/free synthetic workers can be used throughout"
    gate:
      class: G-GOTEST
      red_now: "issue #28 — synthetic profile doesn't propagate to nested agents; free synthetic workers can't be used broadly"
      green_when: "a test asserts the synthetic profile reaches a nested agent dispatch"
      cmd: "go test ./internal/agent/..."
    agent_brief: >
      Fix issue #28 so a synthetic.new profile propagates to nested Agent tools. This
      is the enabler for "use synthetic.new as much as possible" in the worker pool (WM.5).

  - id: "WM.4"
    wall: WM
    goal_ref: [G5, G6]
    title: Tour-driven demo-video production — embedded in the PM decks (no-LLM rrweb)
    kind: story
    pipeline: implementation
    critical: true
    depends_on: ["WM.0", "WM.3"]
    scope: ["stories/goal-seeker/tours/**", "docs/goals/generalized-usage/video-catalog.md"]
    acceptance:
      - "the EXEC SUMMARY embeds a short COMPENDIUM tour video at the top — a highlight reel of the highest-impact work (the FLAGSHIP demo_video clips: install 0.1, goal-seeker loop WM.0, cost proof WB.5, + the current best), assembled deterministically from those clips; kept SHORT (overview, not detail), refreshed as flagships land"
      - "the video-demonstrable changes (those carrying a `demo_video:` field) each produce a tour-driven demo video via the no-LLM rrweb pipeline (kitsoki-ui-demo / slidey rrweb-embed), EMBEDDED in that change's per-change deck (WM.3) and surfaced in the exec summary"
      - "a committed video catalog (docs/goals/generalized-usage/video-catalog.md) lists exactly which changes get a video and what each shows (marking which feed the compendium) — kept in sync with the `demo_video:` fields"
      - "videos are produced deterministically (rrweb capture → server-free render; no live LLM in the demo pipeline) and gated so a broken/empty embed (per-change OR compendium) fails CI"
    gate:
      class: G-FLOW
      red_now: "decks carry no embedded demo videos; the demo_video-annotated changes have no produced tour"
      green_when: "a flow asserts a video-demonstrable change's deck embeds a playable rrweb tour (no LLM) and the exec summary links it"
      cmd: "kitsoki test flows stories/goal-seeker/app.yaml --flows stories/goal-seeker/flows/deck_video_embed.yaml"
    agent_brief: >
      Own tour-driven demo-video production for the goal-seeker. Using the established
      no-LLM rrweb pipeline (kitsoki-ui-demo skill + slidey rrweb embeds; see memory
      rrweb-replay-video-production, slidey-hybrid-deck-pipeline), produce a demo video
      for EACH change carrying a `demo_video:` field, embed it in that change's deck
      (WM.3) and roll it into the exec summary. Maintain docs/goals/generalized-usage/
      video-catalog.md as the authoritative list (in sync with the demo_video: fields).
      Deterministic: rrweb capture → server-free render, no live LLM; gate on a
      non-empty playable embed. Also assemble a SHORT compendium/highlight-reel from
      the flagship clips and embed it at the top of the exec summary as the "what's
      been done, at a glance" overview — refreshed as flagships land, kept brief.

  - id: "WM.5"
    wall: WM
    goal_ref: [G4]
    title: Harness ladder — systematic {backend,provider,model,effort} rung with effort-first capability escalation + infra fallback (ENGINE landed; story-level pool consumes it)
    kind: runtime
    pipeline: implementation
    critical: true
    depends_on: ["WM.0", "2.2", "2.3"]
    scope: ["internal/host/ladder.go", "internal/webconfig/webconfig.go", "stories/goal-seeker/scripts/model_policy.star", "stories/goal-seeker/rooms/dispatch_pool.yaml", "docs/goals/generalized-usage/model-selection.md"]
    acceptance:
      - "ENGINE (LANDED 79c310e9 — internal/host/ladder.go): host.agent.decide/task dispatch walks a SYSTEMATIC 4-axis rung {backend,provider,model,effort}; a CAPABILITY failure escalates EFFORT-FIRST (low→max on the same model) THEN the next stronger model (model-outer/effort-inner); an INFRA failure (down/429/quota/5xx/timeout/model_not_found) rotates PROVIDER + backs the dead one off (reuses quota_control.go), SEPARATELY from the capability ladder; opt-in via webconfig harness_ladder: (nil = today's behavior byte-identical). Default rung GLM-5.2→gpt-5.5→spark→sonnet→opus, effort [low..max]. 18 no-LLM stub tests green."
      - "INSTRUMENTED: every attempt tags backend/provider/model/effort/failure_kind + escalated_by (effort|model) into the trace Meta so effort-vs-model efficacy is study-able (feeds the model-selection eval)"
      - "STORY POOL (remaining): the goal-seeker configures the engine ladder for its maker dispatch (cheap-first: GLM/synthetic default → escalate) so live workers distribute across multiple provider quotas with graceful exhaustion (park-with-ref, no lost work); an ongoing model-selection eval records (change × model × outcome × cost) and steers toward the cheapest model that solves each archetype"
    gate:
      class: "G-GOTEST"
      red_now: "the ladder ENGINE is landed+green; the story-level pool (goal-seeker maker dispatch configured with the ladder + model-selection eval) is not yet wired"
      green_when: "the ladder engine tests pass AND the goal-seeker live maker dispatch is configured with harness_ladder (cheap-first + escalation), proven by a flow/replay that exercises a fallback rung without lost work"
      cmd: "go test ./internal/host/ -run Ladder ./internal/webconfig/"
      replay_cmd: "kitsoki test flows stories/goal-seeker/app.yaml --flows stories/goal-seeker/flows/worker_pool_quota.yaml"
    agent_brief: >
      The ENGINE half is DONE (internal/host/ladder.go, 79c310e9): a generalized,
      reusable harness ladder wrapping host.agent.decide/task — systematic
      {backend,provider,model,effort} rung, effort-first capability escalation
      (low→max same model, then next model), infra fallback (rotate provider +
      backoff) kept SEPARATE, and per-attempt escalated_by instrumentation. Remaining:
      wire the goal-seeker's live maker dispatch to a cheap-first harness_ladder
      (GLM/synthetic default → claude/codex low effort → frontier on proven need),
      spread across provider quotas with graceful exhaustion (park-with-ref, never
      lose work), and add the ongoing model-selection eval that records
      (change × model × outcome × cost) and steers toward the cheapest model per
      archetype (ties into WB H2 + the model-task-engineering skill).

  # --- kitsoki gaps the goal-seeker STORY surfaces (added per "limitations → plan") ---
  - id: "WM.1"
    wall: WM
    goal_ref: [G6]
    title: Bounded preamble projection from world+trace inside host.starlark.run
    kind: runtime
    pipeline: bugfix
    scope: ["internal/host/starlark/**"]
    depends_on: []
    acceptance:
      - "a host.starlark.run script can read enough of the session trace/world to build the bounded preamble + detail-pointers"
      - "if the trace isn't reachable from starlark today, a minimal host helper exposes a bounded projection (NOT the whole trace)"
    gate:
      class: G-GOTEST
      red_now: "unknown whether host.starlark.run can project the trace into a bounded preamble; likely needs a host helper"
      green_when: "a starlark script builds the preamble in a flow; go test covers the host helper if one is added"
      cmd: "go test ./internal/host/starlark/..."
    agent_brief: >
      Discovered-gap for WM.0: the evaluator's bounded preamble must be built
      deterministically from world+trace via host.starlark.run. Confirm the trace is
      reachable; if not, add a minimal bounded-projection host helper (never expose the
      whole growing trace — that would reintroduce the cache-growth problem).

  - id: "WM.2"
    wall: WM
    goal_ref: [G2]
    title: Cross-provider model override on a host.agent.decide gate (opus + gpt-5.5 high)
    kind: runtime
    pipeline: bugfix
    scope: ["internal/host/agents.go", "internal/host/agent_decide.go", "internal/app/types.go", "internal/orchestrator/orchestrator.go", "stories/goal-seeker/flows/evaluate_multiprovider.yaml"]
    depends_on: ["WS.2", "WM.0"]
    # depends_on WM.0: WM.2 authors flows/evaluate_multiprovider.yaml under the
    # goal-seeker story WM.0 owns (scope overlap → must chain).
    # depends_on WS.2: the real fix site (internal/host/agents.go applyProvider,
    # internal/app/types.go ProviderDecl, internal/host/agent_decide.go) is the same
    # surface WS.1->WS.2 reshape; sequencing WM.2 after WS.2 avoids a real merge hazard,
    # not just the disjoint-scope lint. Live decide-gate stays degraded-but-functional
    # (cf299206) until then; the interim unblock is pinning the evaluator to model: opus
    # (bare claude backend serves it) — see stories/goal-seeker/app.yaml.
    acceptance:
      - "a named `providers:` entry can declare a `backend:` (claude|codex|copilot) alongside model/effort/env"
      - "a single host.agent.decide invoke's `with: { provider: <name> }` routes THAT call to the named provider's backend, independent of the session's active harness profile — the evaluate decide-gate can run on opus (claude) or gpt-5.5 high (codex) per-gate"
      - "a replay flow (stories/goal-seeker/flows/evaluate_multiprovider.yaml) drives two decide invokes under two different provider overrides and asserts the journaled model/backend differ accordingly, with no live LLM call"
    gate:
      class: "G-LIVE+REPLAY"
      red_now: "host.Provider / app.ProviderDecl carry only {Model, Effort, Env} — no Backend field (internal/host/agents.go:114, internal/app/types.go:184); the CLI backend is resolved once per session dispatch (internal/orchestrator/host_dispatch.go:126-132), not per-call, so no host.agent.decide invoke can pin a different backend than the session's; flows/evaluate_multiprovider.yaml does not exist"
      green_when: "the replay flow exercises two decide invokes under two provider overrides (one backend: claude, one backend: codex) and the journaled per-call model differs accordingly with no live LLM call"
      replay_cmd: "kitsoki test flows stories/goal-seeker/app.yaml --flows stories/goal-seeker/flows/evaluate_multiprovider.yaml"
    agent_brief: >
      Add a Backend field to host.Provider / app.ProviderDecl (yaml `backend:`) and
      wire it through applyProvider (internal/host/agents.go) so a per-invoke
      `with: { provider: <name> }` on host.agent.decide can install a different CLI
      backend (WithAgentBackendNamed) than the session's active harness profile,
      independent of the operator's session-wide selection. Also wire the field through
      providersForContext (internal/orchestrator/orchestrator.go). Author
      flows/evaluate_multiprovider.yaml as a no-LLM replay flow proving two decide calls
      resolve to two different backends/models (stub the CLI exec at the backend-runner
      boundary; assert via the agent.decide.complete journal that already stamps model).
      Do NOT wire a "second opinion on done" re-ask loop in this change — that's a
      follow-up once the override plumbing lands; keep this slice to the override
      mechanism + the flow.

  - id: "2.7"
    wall: WM
    goal_ref: [G2, G6]
    title: MCP session.new can drive host.starlark.run stories (issue #37)
    kind: runtime
    pipeline: bugfix
    scope: ["internal/mcp/studio/session_tools.go", "internal/mcp/studio/app_dir.go"]
    depends_on: []
    acceptance:
      - "an MCP-driven session can run a story whose rooms call host.starlark.run"
      - "KITSOKI_APP_DIR is published to the session so relative .star paths resolve"
    gate:
      class: G-GOTEST
      red_now: "MCP session.new leaves KITSOKI_APP_DIR unpublished; starlark stories error under the driver"
      green_when: "a studio-MCP test drives a starlark-backed story room to completion"
      cmd: "go test ./internal/mcp/studio/..."
    agent_brief: >
      Fix issue #37: the studio MCP session runner does not publish KITSOKI_APP_DIR,
      so host.starlark.run can't resolve relative script paths under an MCP-driven
      session. Publish the app dir on session.new; add a studio-MCP test that drives
      a starlark room. This unblocks the kitsoki-mcp-driver working most stories.

  - id: "2.1"
