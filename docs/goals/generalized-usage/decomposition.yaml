  - id: "WM.3"
    wall: WM
    goal_ref: [G6]
    title: Deterministic PM deck hierarchy — exec summary → per-unit decks → artifacts
    kind: story
    pipeline: implementation
    depends_on: ["WM.0"]
    scope: ["stories/goal-seeker/rooms/report.yaml", "stories/goal-seeker/scripts/report_deck.star", "stories/goal-seeker/flows/report_deck.yaml"]
    acceptance:
      - "EVERY unit of work (each integrated change) emits a focused summary doc (.artifacts/goal/<slug>/changes/<id>.md) + a per-change slidey deck, built DETERMINISTICALLY from that change's ledger row + trace (host.starlark.run builds the spec; no LLM)"
      - "an OVERALL EXECUTIVE SUMMARY deck is the project-management top view: goal criteria G1–G6 status, per-wall progress, per-change state·gate·latest-verdict — refreshed every cycle, redeployed to ONE stable bundle/URL (running status, not a new file per turn)"
      - "the exec summary is NAVIGABLE: each per-change row LINKS to that change's own deck, which in turn LINKS to the real artifacts (trace, git show <sha>, gate cmd, worktree, log line) — the user clicks down the hierarchy, nothing is inlined"
      - "the whole hierarchy is deterministically managed: rebuildable from ledger+log at any time, no LLM in the PM structure"
    gate:
      class: G-FLOW
      red_now: "the goal-seeker has no report surface; status lives only in log.jsonl/ledger.json — not navigable, not PM-legible"
      green_when: "a flow drives two cycles + one integration and asserts (a) a per-change deck+doc exists for the integrated change, (b) the exec summary links to it, (c) it links to the artifacts — all with no LLM call"
      cmd: "kitsoki test flows stories/goal-seeker/app.yaml --flows stories/goal-seeker/flows/report_deck.yaml"
    agent_brief: >
      Build the goal-seeker's reporting as a DETERMINISTIC PM DECK HIERARCHY (Brad's
      project-management view). Three levels, all built via host.starlark.run from
      ledger+log+trace (like the bug-report deck), rendered/bundled via the slidey MCP,
      NO LLM: (1) per-change — every integrated change emits a focused summary doc +
      its own slidey deck; (2) exec summary — one stable bundle refreshed each cycle
      showing G1–G6 status, per-wall progress, and a per-change table; (3) navigation —
      the exec summary links DOWN to each change deck, which links DOWN to the real
      artifacts. Summary+pointer discipline throughout: click to navigate, never inline.
      This is the same discipline as the evaluator preamble, applied to reporting.

  - id: "Z.0"
    wall: WZ
    goal_ref: [G5, G6]
    title: End-of-goal retrospective case-study review (closeout, trackable)
    demo_video: "closeout tour — walk the case-study: per-wall what-changed, the cost result, the trained-process story"
    kind: docs
    pipeline: implementation
    depends_on: ["WM.0", "WM.3"]
