      - "the golden delta corpus IS this session's own WS+WP fold-in: a flow replays 'add the WS wall' as an ACCEPTED delta, and a corrupted variant (injected cycle / scope overlap / missing RED gate) as a REJECTED delta"
    gate:
      class: G-FLOW
      red_now: "the plan is updated today by dispatching an agent to hand-edit decomposition.yaml directly (this session's own WS/WP/WM.7 fold-in) — no trigger/provenance recording, no delta-lint gate, no adversarial review, no graph versioning, no observable plan-evolution event"
      green_when: "a flow applies the 'add the WS wall' delta through the transaction and asserts lint-stays-green + provenance-recorded + prior-version-retained + no-in-flight-change-orphaned; a corrupted delta (injected cycle/scope-overlap/missing-gate) is rejected with no partial apply"
      cmd: "kitsoki test flows stories/decompose-update/app.yaml --flows stories/decompose-update/flows/managed_delta.yaml"
    agent_brief: >
      Build the managed-update transaction for decomposition.yaml itself — the
      write seam that replaces "dispatch an agent to hand-edit the YAML" (what
      literally happened for WS/WP/WM.7 in this session) with a deterministic,
      gated, traceable step. Compose, don't reinvent: reuse WM.6's pinned
      schema + validator as the structural gate, and work-decomposition.md's
