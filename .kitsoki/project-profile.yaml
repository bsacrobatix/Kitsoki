schema: project-profile/v1
id: kitsoki
title: Kitsoki
summary: Kitsoki's own dogfood project profile. This is the checked-in source of truth for repo-local automation defaults; personal overrides belong in .kitsoki.local.yaml.
repo:
  root: "."
  vcs: git
  default_branch: main
  remote: constructorfabric/Kitsoki
  monorepo: false
stack:
  kind: go
  languages: [go, typescript, yaml]
  package_managers: [go, pnpm]
commands:
  build: "go build ./..."
  test: "go test ./..."
tracker:
  sources:
    - id: local
      label: Local
      provider: host.local_files.ticket
      kind: local
      mode: local
      args:
        root: .artifacts
    - id: origin
      label: bsacrobatix/Kitsoki
      provider: host.gh.ticket
      kind: github
      mode: remote
      args:
        repo: bsacrobatix/Kitsoki
    - id: upstream
      label: constructorfabric/Kitsoki
      provider: host.gh.ticket
      kind: github
      mode: remote
      args:
        repo: constructorfabric/Kitsoki
kitsoki:
  story: dev-story
  instance:
    id: kitsoki-dev
    path: .kitsoki/stories/kitsoki-dev/app.yaml
    bindings:
      ticket: host.ticket_federation
      vcs: host.git
      ci: host.local
      workspace: host.capsule_workspace
      transport: host.append_to_file
  judge_mode: human
dev_story_profile:
  bugfix:
    build_cmd: "go build ./..."
    test_cmd: "go test ./..."
