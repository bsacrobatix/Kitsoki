# dogfood_smoke — boot, land in core.landing, verify iface.ticket.search
# resolves through host.local_github.ticket and returns local + GitHub rows.
#
# Smallest possible flow proving:
#   - kitsoki-dev's `imports.core` folds dev-story cleanly under the
#     `core` alias.
#   - host_bindings rebind iface.ticket → host.local_github.ticket
#     across the second-fold boundary (the iface op call inside
#     core.ticket_search resolves to host.local_github.ticket.search at
#     dispatch time).
#   - the bare day-level intents (go_main, go_ticket_search) prefixed
#     to core__ are dispatchable from inside the import compound.
#
# A stubbed `host.local_github.ticket` handler returns a canned mixed list —
# the SHAPE matches what the real handler returns (tickets plus per-source
# counts); the flow doesn't run the real providers because flows use stubs only.
# A real-handler walk against the on-disk seeds is documented in
# .kitsoki/stories/kitsoki-dev/README.md under "Manual walkthrough".

test_kind: flow
app: ../app.yaml
initial_state: core.landing
initial_world: {}

host_handlers:
  host.local_github.ticket:
    data:
      ok: true
      local_count: 1
      github_count: 1
      tickets:
        - { id: "2026-05-14T103205Z-tui-view-render-before-bind", title: "TUI view templates render BEFORE on_enter binds", status: "open", severity: "P2", assignee: "", source: "local", url: ".artifacts/issues/bugs/2026-05-14T103205Z-tui-view-render-before-bind.md" }
        - { id: "1200", title: "User-submitted report loops in ticket picker", status: "open", priority: "", assignee: "", source: "github", url: "https://github.com/constructorfabric/Kitsoki/issues/1200" }

turns:
  # Verify we landed at core.landing with the look intent. The lift
  # via imports.core.intents.import would surface this as bare `look`
  # at the parent table, but kitsoki-dev keeps the lift list minimal
  # (proposal §9 strict declared-mode encourages prefixed names for
  # navigation). The operator types core__look from inside the import.
  - intent: { name: core__look, slots: {} }
    expect_state: core.landing

  # Enter the ticket-search room (via the lifted go_ticket_search
  # intent — dev-story's hub navigation surfaces this at the core
  # level).
  - intent: { name: core__go_ticket_search, slots: {} }
    expect_state: core.ticket_search

  # Run a search; ticket_searching's on_enter fires iface.ticket.search
  # which is bound at the kitsoki-dev instance to host.local_github.ticket.
  - intent: { name: core__search_tickets, slots: { query: "open kitsoki bugs" } }
    expect_state: core.ticket_searching
    expect_view_matches: "Local[\\s\\S]*TUI view templates render BEFORE on_enter binds[\\s\\S]*GitHub[\\s\\S]*User-submitted report loops in ticket picker"
    expect_world:
      # ticket_repo remains empty until a GitHub row is picked; the selector's
      # GitHub section is driven by ticket_github_repo.
      ticket_repo: ""
      ticket_github_repo: "origin"

  # Land back at main.
  - intent: { name: core__go_main, slots: {} }
    expect_state: core.landing

expect_no_errors: true
