# kitsoki-dev — the self-hosted dev-story instance.
#
# This is the golden project-owned wrapper for @kitsoki/dev-story. It imports
# the shared hub under `core`, declares strict hosts at the parent level, and
# projects only project defaults through world_in. Local artifact bug files stay
# the default ticket/conversation log, while GitHub Issues appear beside them
# for user-submitted issues and coordination without making local developer
# picks close/comment on GitHub.
#
# Composition is one import edge: dev-story (general-purpose hub) is
# imported under alias `core` with concrete host bindings. The bf → pr chain —
# and every day-level room
# (main, ticket_search, inbox, agent, …) — is reachable via the
# `core` compound.
#
# # Two-command quickstart
#
#   $ kitsoki run .kitsoki/stories/kitsoki-dev/app.yaml
#   # Lands in core.landing. Type `tickets` to search; `pick TKT` to pick;
#   # `bugfix` to enter the pipeline.
#
# Autonomous variant (set judge_mode at boot via a warp scenario):
#
#   $ kitsoki run .kitsoki/stories/kitsoki-dev/app.yaml \
#       --warp scenarios/autonomous_ready.yaml
#
# # ticket_globs — multi-glob coverage
#
# The local-files ticket provider scans `<repo_root>/issues/bugs/*.md`. This
# instance sets `repo_root` to `.artifacts`, so local developer iterations read
# `.artifacts/issues/bugs/*.md` and do not create committed ticket files.
# for files matching the bug frontmatter schema (docs/stories/bugs.md).
# The `ticket_globs:` world key documents the FULL set of paths a
# future multi-glob provider scan will cover:
#
#   issues/bugs/*.md                   — kitsoki self-bugs
#   issues/features/*.md               — kitsoki PRD-track features
#   stories/*/issues/bugs/*.md         — per-story bugs (story authoring)
#   stories/*/issues/features/*.md     — per-story features
#
# A bug filed via `/meta story bug` against `stories/oregon-trail/`
# lands at `stories/oregon-trail/issues/bugs/<id>.md` and is reachable
# from this same app — the multi-glob is what "devstory oversees
# kitsoki AND its stories" means in practice. (Wave 3.5: extend the
# provider to honour ticket_globs literally; current handler reads
# `<repo_root>/issues/bugs/` only.)
#
# # transport — the bug file IS the conversation log
#
# `transport: host.append_to_file` means every checkpoint artifact
# (post + judge verdict + operator reply) is appended into the bug
# file itself as `## Comment <iso> by <author>` blocks. The file is
# ticket, conversation thread, and audit trail in one place — nothing
# is lost when the session ends.

app:
  id: kitsoki-dev
  version: 0.1.0
  title: "kitsoki-dev — work on kitsoki itself with local artifact tickets"
  author: "Kitsoki"
  license: "CC0"

routing:
  embedding:
    model: "nomic-embed-text-v1.5"
  # Explicit — the loader's own free-form-fallback auto-detect
  # (effectiveFreeFormFallback, internal/app/loader.go) hardcodes the bare
  # intent name "work" (and the "__work" import-alias suffix); dev-story's
  # landing room now names its capture intent `landing_capture` (workbench:'s
  # fixed `<room>_capture` naming, docs/proposals/room-workbench.md Task 3.1),
  # so after folding under the `core` alias the auto-detect would find nothing
  # and menu-shaped rooms in this instance would lose their free-text sink.
  free_form_fallback:
    state: core.landing
    intent: core__landing_capture

# agent_plugins must be declared at the instance level — they are NOT inherited
# from imported children. Mirrors the declaration in dev-story/app.yaml.
agent_plugins:
  agent.local_llm:
    plugin: builtin.local_llm
    model: qwen2.5-1.5b-instruct
    grammar: true

# Host allow-list (proposal §9). With `hosts: declared` on the import,
# every host the child subtree may invoke must appear here. Five
# iface defaults (ticket / vcs / ci / workspace / transport) are
# rebound to concrete handlers below; the bare hosts (inbox, agent)
# pass through.
hosts:
  # Iface-backed handlers — rebound via host_bindings below. Listed
  # here so `hosts: declared` is satisfied.
  - host.local_files.ticket
  - host.local_github.ticket
  - host.gh.ticket
  - host.gh.ticket.get
  - host.gh.ticket.comment
  - host.gh.ticket.transition
  - host.git
  - host.local
  - host.git_worktree
  - host.append_to_file
  # Bare hosts the chain calls directly.
  - host.inbox.add
  # agent-split Phase 9 verbs (all stories migrated).
  - host.agent.ask
  - host.agent.decide
  - host.agent.task
  - host.agent.codeact
  # Pulled in transitively via dev-story → cypilot import (cypilot
  # uses host.run for its prd/adr/decomposition rooms). The strict
  # `hosts: declared` import on `core` requires every transitively-
  # exposed host to appear here too.
  - host.run
  # Design pipeline (dev-story rooms/design*.yaml):
  # 4-stage pipeline using decide/task gates, workspace artifact writes,
  # IDE open on first brief scaffold, and embedding-based reference search.
  # Required under `hosts: declared`.
  - host.agent.search
  - host.artifacts_dir
  - host.slidey.render
  - host.ide.open_file
  # design_search resolves design_durable_path to a writable location
  # (falling back to .context/designs) before minting any workspace folder
  # or writing any artifact. Required under `hosts: declared`.
  - host.fs.writable_dir
  # Design draft (dev-story design_draft) + PRD drafting (prd/drafting) mirror
  # the editable artifact into the IDE and present the verdict-gated refine as a
  # diff. Required under `hosts: declared`.
  - host.ide.open_diff
  # PRD discovery pipeline (dev-story imports stories/prd/): a
  # conversational discovery (converse + a persistent chat) feeding the
  # PRD → Design walk. Required under `hosts: declared`.
  - host.agent.converse
  - host.chat.resolve
  - host.chat.transcript
  - host.ide.get_diagnostics
  # Code-review surface (dev-story's code_review room opens diffs in the best
  # surface). Required under `hosts: declared`.
  - host.diff.open
  # Ad-hoc structured plan (dev-story rooms/verifying.yaml): the verify gate runs
  # a sandboxed, recordable Starlark script with the read-only inspection
  # surface (ctx.fs / ctx.probe). Required under `hosts: declared`.
  - host.starlark.run
  - host.decomposition.update
  - host.dev.onboarding
  - host.dev.profile_setup
  - host.proposal.publish

# This instance has no day-level rooms of its own — every visible
# state comes from the imported dev-story hub. Imports are folded in
# under the `core` alias.
imports:
  core:
    source: ../../../stories/dev-story
    entry: landing

    # § 9 strict mode — every host the chain may use must be declared
    # in the parent's `hosts:` block above. The loader cross-checks at
    # fold time.
    hosts: declared

    # Concrete bindings for every host_interface declared by dev-story
    # (and transitively by bf / pr). These rebind the dev-story
    # defaults to the local-files / git providers.
    #
    # The append_to_file transport is the project-specific choice:
    # checkpoint posts go INTO the bug file (the `thread:` arg on
    # iface.transport.post carries the file path), so the local file
    # is the comment thread.
    host_bindings:
      # Local iteration default: search local artifact tickets and GitHub
      # Issues side by side. Picked local artifacts keep local close-out; picked
      # GitHub issues carry ticket_repo into the child stories.
      ticket:    host.local_github.ticket
      vcs:       host.git
      ci:        host.local
      workspace: host.git_worktree
      transport: host.append_to_file

    # The dev-story hub already declares judge_mode +
    # judge_confidence_threshold; project the instance-level values
    # into them so the operator can flip mode from the warp scenario
    # without re-authoring child YAML.
    world_in:
      judge_mode:                 "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      repo_root:                  "{{ world.repo_root }}"
      ticket_repo:                "{{ world.ticket_repo }}"
      ticket_github_repo:         "{{ world.ticket_github_repo }}"
      bugfix_destination:         "{{ world.bugfix_destination }}"
      design_durable_path:        "{{ world.design_durable_path }}"
      test_cmd:                   "{{ world.test_cmd }}"
      quick_test_cmd:             "{{ world.quick_test_cmd }}"
      quick_test_timeout_seconds: "{{ world.quick_test_timeout_seconds }}"
      full_test_timeout_seconds:  "{{ world.full_test_timeout_seconds }}"

# Instance-level world. Provider-pointing keys plus judge-mode
# defaults; the operator can override any of them at session start
# via a `--warp` scenario file.
#
# `repo_root` is wired: dev-story threads it into `iface.ticket.*` calls as
# the `root` arg, which the local-files provider honours
# (args.root → $KITSOKI_TICKETS_ROOT → cwd); host.gh.ticket ignores it.
# `ticket_globs` remains forward-compat only — the provider reads
# `<root>/issues/bugs/*.md` literally; a future enhancement would accept
# it as a multi-glob scan list.
world:
  # Provider-pointing keys. repo_root reaches iface.ticket.* via the
  # dev-story rooms' `root:` passthrough; ticket_globs is still unwired.
  repo_root:    { type: string, default: ".artifacts" }
  ticket_globs: { type: string, default: "issues/bugs/*.md,issues/features/*.md,stories/*/issues/bugs/*.md,stories/*/issues/features/*.md" }

  # ticket_repo is intentionally empty for local artifact iteration. It is set
  # after picking a GitHub row, so downstream close-out knows the selected
  # ticket is remote. ticket_github_repo feeds the selector's GitHub section.
  ticket_repo:  { type: string, default: "" }
  ticket_github_repo: { type: string, default: "constructorfabric/Kitsoki" }
  # Default local destination: land fixes into the local base branch
  # (main here) after the bugfix RED/GREEN gate and shared ship-it tail pass.
  # Operators can still choose open-pr or leave-worktree from the dev-story UI.
  bugfix_destination: { type: string, default: "local-merge" }

  # The self-hosted test-fix loop uses the same project-level command an operator
  # would run locally. dev-story's imported fix-tests loop falls back to
  # `make test` when this is empty; keeping it explicit here documents the
  # self-instance contract.
  test_cmd: { type: string, default: "make test" }
  quick_test_cmd: { type: string, default: "go test -short -count=1 ./cmd/kitsoki ./internal/mcp/studio ./internal/host ./internal/app" }
  quick_test_timeout_seconds: { type: int, default: 180 }
  full_test_timeout_seconds: { type: int, default: 1200 }

  # Proposal/idea work must not write under docs/proposals in the protected
  # primary checkout. Keep scratch + published design docs in local context.
  design_durable_path: { type: string, default: ".context/designs" }

  # Judge polymorphism. Defaults: supervised + 0.8 confidence floor.
  # Flip judge_mode to `llm_then_human` for an unattended run.
  judge_mode:                 { type: string, default: "human" }
  judge_confidence_threshold: { type: float,  default: 0.8 }
  autonomous_default_mode:    { type: string, default: "llm_then_human" }

# Root: enter the dev-story hub.
root: core
