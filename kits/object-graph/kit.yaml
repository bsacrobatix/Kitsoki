# @kitsoki/object-graph — the S5 proof-of-concept kit
# (.context/kits-implementation-plan.md D4 / S5): the project object graph's
# DOMAIN (type pack, endpoint declarations, viewer UI, conformance flows, a
# seed example) extracted out of the engine. The generic substrate it binds
# to (internal/graph, exposed as host.graph.*) stays in the engine per D1 —
# "a kit ships data + declarations only, never Go."
#
# In-tree first (plan decision 2): this kit lives at kits/object-graph/ in
# the kitsoki repo rather than a separate repo. A repo split is deferred to
# a later slice, same as dev-story's own Phase A/B split (D5).
schema: kit/v1
kit: object-graph
namespace: kitsoki
version: 0.1.0
title: Project object graph viewer
summary: |
  Views and validates a project object graph catalog (internal/graph's
  envelope/type-registry/lint/diff/apply substrate, exposed by the engine as
  host.graph.*): a `graph` interface for load/lint/diff/apply/project plus a
  starlark-served `presentation` op (the layer taxonomy, as data — see
  scripts/presentation.star), and a Vue viewer page (Cytoscape-based)
  reachable at the kit's own UI route. kitsoki's own seed-objects.yaml
  catalog is NOT shipped here — this kit is the domain-neutral viewer/editor;
  seed-objects.yaml stays kitsoki-instance data (D4).
requires:
  kitsoki: ">=0.0.0"
provides:
  stories: [object-graph]
  schemas:
    - graph/core-node/v0
    - graph/actor/v0
    - graph/agent/v0
    - graph/persona/v0
    - graph/site-page/v0
    - graph/feature/v0
    - graph/requirement/v0
    - graph/use-case/v0
    - graph/proposal/v0
    - graph/change/v0
    - graph/evidence/v0
    - graph/implementation/v0
    - graph/area/v0
  interfaces: [graph]
  ui: [graph]
  onboarding: object-graph.start
conformance:
  flows: ["stories/object-graph/flows/*.yaml"]
