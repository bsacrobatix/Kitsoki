# Shared, checked-in kitsoki config — the team baseline.
#
# This file is committed, so it must load for EVERYONE with zero setup: it
# carries only the ambient Claude profile (native subscription auth, no secrets,
# no ${VAR}). Profiles that need an API key or retarget a CLI at another
# endpoint (synthetic, codex, a local llama.cpp) reference env vars that aren't
# universally set, so they would hard-fail this file at load — they live in the
# gitignored override instead.
#
# Personal / secret-bearing / machine-specific settings go in a sibling
# `.kitsoki.local.yaml` (gitignored). Load deep-merges it on top of this file,
# LOCAL-WINS: it can add new profiles, replace a profile here whole, or point
# `default_profile` at a profile only it declares. Start from the template:
#
#   cp .kitsoki.local.yaml.example .kitsoki.local.yaml
#   export SYNTHETIC_API_KEY=sk-...      # in your shell / profile / .envrc
#   kitsoki web                          # then pick the provider in the header
#   # …or in the TUI:  /provider synthetic-claude  ·  /model 2
#
# See docs/guide/agents/harness-profiles.md for profiles and
# docs/guide/agents/launch-policy.md for the local agent launch guard.
# If you want agents confined to capsules and kept out of this checkout, put
# `agent_launch_policy:` in `.kitsoki.local.yaml`, not this shared baseline.

default_profile: claude-native

# Project-specific instances live under .kitsoki/stories; reusable/exported
# story templates live under stories.
story_dirs:
  - ./.kitsoki/stories
  - ./stories

harness_profiles:
  # Your native OpenAI Codex subscription (ambient auth — nothing to set).
  # This makes a declared GPT-5.4 comparison cell resolve to the same worker
  # model for every operator who has the Codex CLI available.
  codex-gpt54:
    backend: codex
    model: gpt-5.4
    models: [gpt-5.4]
    effort: medium
    efforts: [low, medium, high, xhigh, max]

  # Your native Anthropic Claude Code subscription (ambient auth — nothing to
  # set). claude supports a model selector (short names) and --effort.
  claude-native:
    backend: claude
    model: opus
    models: [opus, sonnet, haiku]
    effort: medium
    efforts: [low, medium, high, xhigh, max]

  # Your native Google Antigravity (agy CLI) subscription (ambient auth — nothing to set).
  agy-native:
    backend: agy
    model: gemini-3.5-flash
    models: [gemini-3.5-flash, gemini-3.5-pro, gemini-next]
