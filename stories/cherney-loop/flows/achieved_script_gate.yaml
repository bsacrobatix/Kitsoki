# Script gate passes → @exit:achieved. The deterministic checker (host.run)
# returns exit 0, so the gate passes and the loop terminates with the goal met.
test_kind: flow
app: ../app.yaml
initial_state: iterating
initial_world:
  goal_text:        "Make the unit tests pass"
  gate_mode:        "script"
  gate_command:     "go test ./..."
  iteration:        1
  iteration_budget: 8
  maker_summary:    "fixed the off-by-one in parse()"

host_handlers:
  host.run:           { data: { ok: true,  exit_code: 0, stdout: "ok  kitsoki  0.5s" } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent: { name: evaluate, slots: {} }
    expect_state: __exit__achieved
    expect_world:
      goal_achieved:   true
      terminal_reason: "achieved"

expect_terminal: true
