# Gate fails at the iteration ceiling → @exit:exhausted (iteration_budget).
# iteration (3) >= iteration_budget (3), so after the failed gate the loop stops
# instead of running a fourth maker pass.
test_kind: flow
app: ../app.yaml
initial_state: iterating
initial_world:
  goal_text:        "Make the unit tests pass"
  gate_mode:        "script"
  gate_command:     "go test ./..."
  iteration:        3
  iteration_budget: 3
  maker_summary:    "still failing one case"

host_handlers:
  host.run:           { data: { ok: false, exit_code: 1, stdout: "FAIL: TestParse expected 3 got 4" } }
  host.oracle.task:   { data: { submitted: { summary: "stub" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  - intent: { name: evaluate, slots: {} }
    expect_state: __exit__exhausted
    expect_world:
      terminal_reason: "iteration_budget"

expect_terminal: true
