states:
  idle:
    description: "Cherney loop — parked"
    relevant_world: [goal_text, gate_mode]
    view:
      extends: "base"
      blocks:
        body:
          - prose: "A Cherney loop iterates an agent toward a goal until a gate proves the goal is met — or a budget runs out. Each iteration is shown and recorded."
          - kv:
              pairs:
                Goal: '{{ world.goal_text|default:"(not yet chosen)" }}'
                Gate: "{{ world.gate_mode }}"
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "begin"
                  hint:  "configure a loop"
                - label: "look"
    on:
      begin:
        - target: configuring
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Type `begin` to configure a loop."
