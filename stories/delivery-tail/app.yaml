# delivery-tail — shared neutral delivery tail: integrate → verify → cleanup → report.
#
# The deterministic delivery half of any brief-based loop: lost-work-safe
# integrate of the maker's branch into main, independent re-verify of the gate on
# the merged commit, no-swallowed cleanup, and a shipped read-out.
#
# This story is a REUSABLE TAIL — it is NEVER entered at a configure/operator
# root. It is entered at `integrate` by a parent story (ship-it, bugfix) that
# has already run its maker and seeds worktree_path + workspace_branch + gate_command
# via world_in. Exits shipped (requires shipped_sha) or needs-human (requires
# last_error) — every failure arc carries the real error.
#
# Pipeline:
#   integrate ─▶ verify ─▶ cleanup ─▶ report ─▶ @exit:shipped
#      │             │         │
#      └─────────────┴─────────┴──────────────▶ @exit:needs-human (last_error)
#
# World-in contract (parent must seed these):
#   worktree_path      — the maker's worktree path (branch is checked out here)
#   workspace_branch   — the maker's branch name
#   gate_command       — the deterministic gate (script mode; re-run on merged commit)
#   base_branch        — integration branch (default: main)
#   main_worktree_path — where integrate/verify/cleanup run (default: ".")
#   workspace_id       — worktree identity (.worktrees/<id>)
#   build_check_disabled — skip build check (default: false)
#   brief              — displayed in the shipped read-out

app:
  id: delivery-tail
  version: 0.1.0
  title: "delivery-tail — integrate → verify → cleanup → shipped"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.run
  - host.git_worktree
  - host.artifacts_dir

world:
  # ── World-in (parent seeds these) ──────────────────────────────────────────
  worktree_path:       { type: string, default: "" }    # maker worktree (branch checked out here)
  workspace_branch:    { type: string, default: "" }    # maker branch name
  gate_command:        { type: string, default: "" }    # deterministic gate (re-run on merged commit)
  base_branch:         { type: string, default: "main" }
  main_worktree_path:  { type: string, default: "." }   # where integrate/verify/cleanup run
  build_check_disabled: { type: bool,  default: false }
  workspace_id:        { type: string, default: "" }    # .worktrees/<id>
  brief:               { type: string, default: "" }    # displayed in report read-out

  # ── Internal state (minted by the tail rooms) ─────────────────────────────
  integrate_outcome:  { type: string, default: "" }   # integrated | conflict | build_fail | error
  integrated_sha:     { type: string, default: "" }   # the merged commit
  integrated:         { type: bool,   default: false }
  verify_ok:          { type: string, default: "" }   # tri-state: "" until re-verify binds
  verify_output:      { type: string, default: "" }   # the re-run gate's stdout/stderr tail
  shipped_sha:        { type: string, default: "" }   # merged commit, set after green re-verify
  cleanup_outcome:    { type: string, default: "" }   # cleaned | refused
  last_error:         { type: string, default: "" }   # the real failure on any needs-human arc
  status:             { type: string, default: "" }   # shipped | needs-human
  # Raw host.run result of integrate_exec — always present, even when the script
  # aborts before emitting JSON. Bound so the room can synthesize a non-blank
  # last_error on a no-JSON abort (bug #9b) instead of stalling at `integrate`.
  run_exit:           { type: string, default: "" }   # integrate_exec exit code
  run_stdout:         { type: string, default: "" }   # integrate_exec raw stdout (abort tail)

intents:
  # Entry intent — only used by the bootstrap stub (flow tests). Not reached
  # in production imports (parent enters at `integrate` directly).
  begin:
    description: "Enter the delivery tail (flow test bootstrap only)."
    examples: ["begin", "start"]
    priority: 80
  # Internal routing intents (post-bind guarded emits from the tail rooms).
  integrated_ok:
    description: "(internal) integrate succeeded → verify."
    examples: []
    priority: 1
  integrate_failed:
    description: "(internal) integrate conflict/build-fail → needs-human."
    examples: []
    priority: 1
  integrate_aborted:
    description: "(internal) integrate produced no parseable result → needs-human (#9b)."
    examples: []
    priority: 1
  verify_green:
    description: "(internal) re-verify green on merged commit → cleanup."
    examples: []
    priority: 1
  verify_red:
    description: "(internal) re-verify RED on merged commit → needs-human."
    examples: []
    priority: 1
  cleaned_ok:
    description: "(internal) cleanup removed cleanly → report."
    examples: []
    priority: 1
  cleanup_failed:
    description: "(internal) cleanup refused → needs-human."
    examples: []
    priority: 1
  ship_done:
    description: "(internal) report rendered → @exit:shipped."
    examples: []
    priority: 1
  look:
    description: "Re-render the current room."
    examples: ["look", "status"]
    priority: 5

exits:
  shipped:     { requires: [shipped_sha] }
  needs-human: { requires: [last_error] }

root: bootstrap

include:
  - rooms/*.yaml
