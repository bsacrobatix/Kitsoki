      # PRD: Notes Service

      ## Problem & Context
      Teams capture notes across scattered tools; nothing ties a note to
      the work it belongs to, so context is lost between sessions.

      ## Target Users
      Platform engineers and their teams who already live in the kitsoki
      workspace.

      ## Goals
      - A first-class notes surface attached to sessions and tickets.
      - Fast capture and retrieval with zero context switch.

      ## Non-Goals
      - Not a general-purpose wiki; notes are scoped to sessions and tickets.

      ## Requirements
      - Functional: create, edit, link, and search notes from any room.
      - Non-functional: notes-saved-per-session is the headline metric.
      - Security: tenant isolation is mandatory; admins see only aggregate metrics.

      ## Open Questions
      - Should a note be private by default or shared with the room?
