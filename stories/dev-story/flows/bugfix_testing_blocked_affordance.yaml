# bugfix_testing_blocked_affordance — imported bugfix testing room surfaces
# blocked/failed artifacts as first-class operator attention, not just prose.
#
# Persona: distracted developer in dev-story who is likely to press continue
# unless the screen makes the problem obvious. The child bugfix artifact is
# pre-seeded with status=blocked so testing.on_enter skips the agent call. Inline
# handlers keep `kitsoki web --flow` deterministic; the sibling cassette preserves
# the same replay data for cassette-backed harnesses.

test_kind: flow
app: ../app.yaml
initial_state: bf.testing
initial_world:
  ticket_id:    "TKT-AFF-1"
  ticket_title: "Blocked test review needs visible affordance"
  thread:       "TKT-AFF-1"
  bugfix_mode:  "full"
  judge_mode:   "human"

  bf__ticket_id:       "TKT-AFF-1"
  bf__ticket_title:    "Blocked test review needs visible affordance"
  bf__thread:          "TKT-AFF-1"
  bf__bugfix_mode:     "full"
  bf__judge_mode:      "human"
  bf__implementing_budget: 3
  bf__implement_review_artifact:
    summary_title: "Blocked: no trustworthy regression proof"
    status: "blocked"
    tests_added: []
    tests_run:
      passed: 12
      failed: 1
      skipped: 0
      log: "FAIL TestVisibleOutcome: test asserts setup but never verifies the user-visible outcome"
    blockers:
      - file: "internal/widget/widget_test.go"
        severity: "blocker"
        description: "Missing deterministic regression proof; the test asserts setup instead of the user-visible outcome."
    summary_markdown: >
      The implementation may be close, but the testing room cannot approve it.
      The current regression only proves that setup code ran. It does not assert
      the user-visible outcome described by the ticket, so a distracted operator
      must not be able to mistake this checkpoint for a normal pass.

host_handlers:
  host.local:
    data:
      ok: false
      log: "FAIL TestVisibleOutcome: test asserts setup but never verifies the user-visible outcome"
      passed: 12
      failed: 1
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title: "Blocked: no trustworthy regression proof"
        status: "blocked"
        tests_added: []
        tests_run:
          passed: 12
          failed: 1
          skipped: 0
          log: "FAIL TestVisibleOutcome: test asserts setup but never verifies the user-visible outcome"
        blockers:
          - file: "internal/widget/widget_test.go"
            severity: "blocker"
            description: "Missing deterministic regression proof; the test asserts setup instead of the user-visible outcome."
        summary_markdown: >
          The implementation may be close, but the testing room cannot approve
          it. The current regression only proves that setup code ran. It does
          not assert the user-visible outcome described by the ticket, so a
          distracted operator must not be able to mistake this checkpoint for a
          normal pass.

turns:
  - intent: { name: bf__look, slots: {} }
    expect_state: bf.testing
    expect_view_matches: "ACTION NEEDED: TESTING BLOCKED[\\s\\S]*Continue does[\\s\\S]*return to implementing[\\s\\S]*Blockers[\\s\\S]*Missing deterministic regression proof[\\s\\S]*Tests run[\\s\\S]*Failed[\\s\\S]*1[\\s\\S]*Summary[\\s\\S]*blocked: fix tests[\\s\\S]*ACTION NEEDED: return to implementing"

expect_no_errors: true
