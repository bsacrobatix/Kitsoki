# prd_to_design_full (dev-story) - the whole PRD -> Design walk, one session.
#
# This is the neutral default-project variant of the PRD -> Design flow. A
# generated wrapper can retarget the same rooms to a foreign repo by changing
# the doc profile, fixed filenames, or ticket policy; this fixture keeps the
# default local project shape:
#
#   * PRD   → docs/prd/<slug>.md       (slug-named, prd_doc_filename: "")
#   * DESIGN → docs/proposals/<slug>.md (slug-named, design_doc_filename: "")
#   * a feature ticket IS minted at issues/features/ (design_ticket_dir set)
#
# The single session walks the canonical conversation-driven-development loop:
#
#   main → prd → … → prd_published → continue → design → … → design_done → main
#
# publishing both docs in fixture-safe locations and minting the linking
# feature ticket on design publish. It is the host-stub source the
# dev-story-prd-design tour video drives the UI against.
#
# Structural notes:
#   * initial_state: landing           (dev-story is the root app here).
#   * intents/states: BARE prd__ / design half names (no `core__` prefix) — a
#                     flow that starts in the dev-story root needs no instance ->
#                     core projection.
#   * initial_world: defaults - no external-target override keys.
#                    design_ticket_dir is "issues/features" to mint a ticket.
#
# Intent-only (no LLM). The prd discovery rooms' on_enter agent calls are
# served by the same stubbed hosts as stories/prd/flows/happy_path.yaml; the
# design half mirrors flows/design_happy_path.yaml. prd's intents are typed
# PREFIXED (prd__discuss …) because imports.prd.intents.import is []; the design
# half uses the dev-story hub's OWN bare intents (discuss/confirm/ready/accept).

test_kind: flow
app: ../app.yaml
initial_state: landing
initial_world:
  judge_mode: "human"
  workdir:    "."
  # Doc profile - project-local defaults, but PRD fixture writes stay out of the checkout.
  publish_durable_path: "/tmp/kitsoki-prd-fixtures"  # PRD home (projected into the prd import)
  prd_doc_filename:     ""                           # "" => slug-named /tmp/kitsoki-prd-fixtures/<slug>.md
  design_template_dir:  "docs/proposals/templates"   # default proposal templates
  design_durable_path:  "docs/proposals"             # DESIGN home
  design_doc_filename:  ""                            # "" ⇒ slug-named docs/proposals/<slug>.md
  design_ticket_dir:    "issues/features"            # mint the linking feature ticket

starlark_inspect_cassette: ../cassettes/prd_to_design_full.inspect.yaml

host_handlers:
  host.fs.writable_dir:
    data: { path: "docs/proposals", used_fallback: false }
  host.ide.open_file:
    data: { ok: true, connected: true }
  host.chat.resolve:
    data: { ok: true, chat_id: "chat-1", title: "PRD idea discovery", is_new: true }
  host.agent.converse:
    data: { ok: true, answer: "A self-serve tour subcommand so product teams can render their own demo videos.", chat_id: "chat-1", claude_session_id: "sess-1" }
  host.agent.search:
    data: { hits: [], top: null }
  host.agent.decide:
    # prd clarifying question generation (the un-id'd decide).
    data:
      ok: true
      submitted:
        questions:
          - { id: "q1", question: "Who is the primary actor?", why: "scopes the persona" }
          - { id: "q2", question: "What is the single most important success metric?", why: "defines done" }
    by_call:
      match_answer:
        data:
          ok: true
          submitted:
            answers_block:       "Q1: product maintainers\nQ2: demos-rendered-without-Playwright\n"
            answered_ids_append: "|1||2|"
            matched_count:       2
      name_slug:
        data:
          ok: true
          submitted: { slug: "tour-subcommand", rationale: "the binary-native tour renderer being proposed" }
      existing_scan:
        data:
          ok: true
          submitted: { overlaps: [], roadmap_fit: "A net-new binary capability; no overlap with the current proposals." }
      references_research:
        data:
          ok: true
          submitted:
            items:
              - { path: "/tmp/kitsoki-prd-fixtures/tour-subcommand.md", sections: "§5", rationale: "the PRD this design realizes" }
      brief_check:
        data:
          ok: true
          submitted: { verdict: "continue", reason: "Crisp why, proposal shape, components named.", questions: [] }
  host.artifacts_dir:
    data: { ok: true, path: "docs/proposals/.workspace/tour-subcommand/001-brief.md", message_id: "out#1" }
  host.agent.task:
    by_call:
      # PRD author (prd drafting) — id: prd_author.
      prd_author:
        data:
          ok: true
          submitted:
            title:               "PRD: Tour Subcommand"
            summary_markdown:    "## PRD: Tour Subcommand\n\nA sufficiently long summary body to satisfy the schema minimum length for the prd_artifact summary_markdown field, covering problem, actors, goals, and metrics for the binary-native tour renderer."
            file_path:           ".artifacts/prd/tour-subcommand/004-prd.md"
            confidence:          0.84
            needs_clarification: false
            follow_up_questions: []
      # DESIGN author (design_draft) — id: design_author.
      design_author:
        data:
          ok: true
          submitted:
            title:               "Runtime: product tour subcommand"
            kind:                "runtime"
            summary_markdown:    "## Runtime: product tour subcommand\n\nThe binary renders feature tours to MP4 with headless Chrome + ffmpeg, driven by the feature catalog's `drive:` actions - no Playwright, no Node - realizing the PRD requirements."
            file_path:           "docs/proposals/.workspace/tour-subcommand/004-proposal.md"
            confidence:          0.82
            needs_clarification: false
            follow_up_questions: []
      # DESIGN brief refiner — design_refine on_enter (refine_brief) AND the
      # conversational re-refine on `discuss` (refine_brief_update). Same shape.
      refine_brief:
        data:
          ok: true
          submitted:
            summary: "Idea is clear; the design sections need the component model."
            gaps:    ["Outline the renderer components and their seams", "Define the drive-action → DOM contract"]
      refine_brief_update:
        data:
          ok: true
          submitted:
            summary: "Folded in the operator's note — the component model is now scoped."
            gaps:    ["Define the drive-action → DOM contract"]
  host.run:
    by_call:
      # Design publish still uses publish_design.py through host.run. PRD publish
      # now runs prd_publish.star through host.starlark.run and is covered by
      # the inspect cassette above.
      publish:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            design_file:  "docs/proposals/tour-subcommand.md"
            ticket_id:    "F-2026-06-12T120000Z-tour-subcommand"
            ticket_path:  "issues/features/F-2026-06-12T120000Z-tour-subcommand.md"
            ticket_title: "product tour subcommand"
      roadmap_ledger_proposal_published:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            ok: true
            ledger: ".artifacts/roadmap/progress.yaml"
            event_id: "evt-tour-subcommand"
            item_id: "proposal/tour-subcommand"
            changed: true

turns:
  # ── PRD half ───────────────────────────────────────────────────────────────
  - intent: { name: go_prd, slots: {} }
    expect_state: prd.idle
    expect_world:
      prd__workdir: "."
  - intent: { name: prd__discuss, slots: { message: "I want a product tour subcommand" } }
    expect_state: prd.idle
  - intent: { name: prd__start, slots: {} }
    expect_state: prd.search
  - intent: { name: prd__confirm, slots: {} }
    expect_state: prd.clarifying
  # Clarification round 1.
  - intent: { name: prd__answer, slots: { text: "product maintainers, metric is demos-rendered-without-Playwright" } }
    expect_state: prd.clarifying
  - intent: { name: prd__submit_answers, slots: {} }
    expect_state: prd.brief
  # Clarification round 2 — the brief's `clarify` re-opens clarifying, preserving
  # the accumulated transcript (clarification is iterative, not one-shot).
  - intent: { name: prd__clarify, slots: {} }
    expect_state: prd.clarifying
  - intent: { name: prd__answer, slots: { text: "must run headless in CI; ffmpeg + headless Chrome only, no Node" } }
    expect_state: prd.clarifying
  - intent: { name: prd__submit_answers, slots: {} }
    expect_state: prd.brief
  - intent: { name: prd__confirm, slots: {} }
    expect_state: prd.references
  - intent: { name: prd__confirm, slots: {} }
    expect_state: prd.drafting
  - intent: { name: prd__accept, slots: {} }
    expect_state: prd_published
    expect_world:
      prd__prd_file: "/tmp/kitsoki-prd-fixtures/tour-subcommand.md"

  # ── The PRD → Design handoff ───────────────────────────────────────────────
  - intent: { name: continue, slots: {} }
    expect_world:
      design_idea: "Author a design from the PRD at /tmp/kitsoki-prd-fixtures/tour-subcommand.md"
      design_seed_idea: ""

  # ── Design half ────────────────────────────────────────────────────────────
  - intent: { name: discuss, slots: { message: "realize the tour-subcommand PRD as a runtime design" } }
    expect_state: design_search
  - intent: { name: confirm, slots: {} }
    expect_state: design_refine
  # Refine the brief conversationally (the design's clarification loop) before
  # the quality check — the same iterative shaping the PRD does with questions.
  - intent: { name: discuss, slots: { message: "outline the renderer components and the drive-action contract" } }
    expect_state: design_refine
  # `ready` arms the judge and re-enters; the judge's `continue` verdict fires
  # advance_brief via emit_intent, so the turn settles in design_draft.
  - intent: { name: ready, slots: {} }
    expect_state: design_draft
  - intent: { name: accept, slots: {} }
    expect_state: design_done
    expect_world:
      # Project-local defaults: slug-named publish + the feature ticket is
      # minted because design_ticket_dir is issues/features.
      design_file:        "docs/proposals/tour-subcommand.md"
      design_ticket_path: "issues/features/F-2026-06-12T120000Z-tour-subcommand.md"
      ticket_id:          "F-2026-06-12T120000Z-tour-subcommand"
      ticket_type:        "feature"
  - intent: { name: go_main, slots: {} }
    expect_state: landing

expect_no_errors: true
