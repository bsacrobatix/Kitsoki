# proposal_search_regenerate — the search room's regenerate loop.
#
# `regenerate` discards both the scout and researcher results and re-runs them
# from scratch on the next on_enter. The new design has no budget tracking for
# the search room (it was only needed for the old references room's refine loop);
# regenerate simply clears the binds and self-transitions.
#
# This flow starts directly in proposal_search with results already populated,
# verifies that regenerate clears them, and that on re-entry the oracle calls
# fire again (once: guards re-arm when the binds are cleared).

test_kind: flow
app: ../app.yaml
initial_state: proposal_search
initial_world:
  judge_mode:         "human"
  proposal_idea:      "Add a per-session working folder primitive."
  proposal_workspace: "docs/proposals/.workspace/wf"
  # Pre-populated search results (set as if the room ran already).
  proposal_existing_state:
    overlaps: []
    roadmap_fit: "Original roadmap fit."
  proposal_existing_path:   "docs/proposals/.workspace/wf/002-existing-state.md"
  proposal_references:
    items:
      - { path: "docs/proposals/process-design.md", sections: "§4.3", rationale: "old reference" }
  proposal_references_path: "docs/proposals/.workspace/wf/003-references.json"

host_handlers:
  host.oracle.decide:
    by_call:
      existing_scan:
        data:
          ok: true
          submitted:
            overlaps: []
            roadmap_fit: "Refreshed roadmap fit."
      references_research:
        data:
          ok: true
          submitted:
            items:
              - { path: "docs/proposals/process-design.md", sections: "§4.3", rationale: "refreshed reference" }
  host.artifacts_dir:
    data: { ok: true, path: "docs/proposals/.workspace/wf/out.md", message_id: "out#1" }

turns:
  # Regenerate: clear both results and self-transition (on_enter re-fires).
  - intent: { name: regenerate, slots: {} }
    expect_state: proposal_search
    expect_world:
      proposal_existing_state:
        overlaps:    []
        roadmap_fit: "Refreshed roadmap fit."
      proposal_references:
        items:
          - { path: "docs/proposals/process-design.md", sections: "§4.3", rationale: "refreshed reference" }
    expect_host_calls:
      - handler: host.oracle.decide
        args: { call: "existing_scan" }
      - handler: host.oracle.decide
        args: { call: "references_research" }

expect_no_errors: true
