# main_smoke — boot, land in main, look around, no-op.
#
# Smallest possible flow. Proves dev-story loads, the import resolution
# works (bf + pr fold cleanly), and main's view renders.

test_kind: flow
app: ../app.yaml
initial_state: main
initial_world: {}

host_handlers: {}

turns:
  - intent: { name: look, slots: {} }
    expect_state: main

  - intent: { name: go_main, slots: {} }
    expect_state: main

expect_no_errors: true
