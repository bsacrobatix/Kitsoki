# bugfix_bare_command_pick_ticket_guard -- bare "fix bug" now flows into the
# explicit bugfix-intake fast path so operators are sent to the quick inline
# intake (no ticket required) instead of staying on landing.

test_kind: flow
app: ../app.yaml
initial_state: landing

turns:
  - intent:
      name: landing_capture
    slots:
        request: "fix bug"
    expect_state: bugfix_intake
    expect_events:
      - kind: machine.say
        effect:
          text: "Bugfix selected without a ticket. Paste an issue URL or describe the bug to start the bugfix pipeline."
    expect_world:
      last_error: |
        No ticket selected — pick one before entering the bugfix pipeline.

        Suggestions:
        - `tickets` — search and pick a ticket
        - paste a GitHub issue URL
        - `fix this bug ...` — paste an inline bug report

expect_no_errors: true
