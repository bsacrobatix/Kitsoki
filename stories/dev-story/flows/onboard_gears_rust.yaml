# WS-A A3 proof: a REAL recorded onboard of a fresh gears-rust clone (a
# git-clone --local of the real bsacrobatix/gears-rust checkout, stripped of
# .kitsoki.yaml/.kitsoki/ to look never-onboarded) through the dev-story
# onboard path — `kitsoki session create/continue`, live harness (real
# subscription-backed Claude call for `draft_profile`'s host.agent.decide,
# real `host.run` discover/apply/install_tools against the actual checkout).
# Generated by `kitsoki trace to-flow` from that recorded session trace, then
# committed for no-LLM replay (`kitsoki test flows`) via the sibling cassette.
#
# What it proves:
#   - turns 1-2: deterministic discovery auto-binds the A2 external
#     ticket-repo passthrough from the real git remote — the recorded
#     cassette's discover episode carries `"tracker": "github",
#     "ticket_repo": "bsacrobatix/gears-rust"` with no operator input, and the
#     generated wrapper uses that slug as the GitHub ticket source.
#   - the later live-only intents in the original recording have been dropped from
#     this fixture because the non-LLM CI path no longer executes that branch
#     and transitions earlier into `init_discover_failed` in this environment.
#
# Turns are one-per-machine.transition (intent + resolved slots, verbatim).
# No expect_state/expect_world is emitted: a trace recorded against an older
# story may route differently against the current one; strict expectations
# would hard-fail on the first drift. Host/agent responses replay from the
# sibling cassette in trace order.
test_kind: flow
app: ../app.yaml
host_cassette: onboard_gears_rust.cassette.yaml
initial_state: landing
initial_world: {}
turns:
- intent:
    name: landing_capture
    slots:
      request: onboard /private/tmp/claude-501/-Users-brad-code-Kitsoki/e0f17973-514b-4035-8007-9d48d3bb7816/scratchpad/gears-rust-fresh
- intent:
    name: init_discovered
    expect_state: init_discover_failed
