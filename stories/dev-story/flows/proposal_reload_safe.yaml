# proposal_reload_safe — on_enter is idempotent: a room whose result is
# already present does NOT re-run its oracle call.
#
# Proves the reload-safety contract for the search room. We start in
# proposal_search with proposal_existing_path ALREADY set and a distinctive
# proposal_existing_state preset. The existing_scan stub returns a DIFFERENT
# (empty) result — so if the once: guard failed and the scan re-ran, the
# preset would be overwritten. Asserting the preset survives proves the scan
# was skipped.
#
# We advance via the intake `discuss` arc to trigger the search room's
# on_enter. The search room's once: guards key off proposal_existing_state
# (for the scout) and proposal_references (for the researcher) — both
# already set in initial_world, so both LLM calls are skipped.

test_kind: flow
app: ../app.yaml
initial_state: proposal
initial_world:
  judge_mode:         "human"
  proposal_idea:      "Add a per-session working folder primitive."
  proposal_slug:      "wf"
  proposal_workspace: "docs/proposals/.workspace/wf"
  # Both search results already present — the once: guards must preserve them.
  proposal_existing_path:  "docs/proposals/.workspace/wf/002-existing-state.md"
  proposal_existing_state:
    overlaps:
      - { path: "docs/proposals/PRESET-SURVIVED.md", kind: "accepted", summary: "preset", recommendation: "amend" }
    roadmap_fit: "preset-survived"
  proposal_references_path: "docs/proposals/.workspace/wf/003-references.json"
  proposal_references:
    items:
      - { path: "docs/PRESET-REF.md", sections: "§1", rationale: "preset reference" }

host_handlers:
  host.oracle.decide:
    by_call:
      name_slug:
        data: { ok: true, submitted: { slug: "wf", rationale: "working folder" } }
      # If the once: guard failed, these would fire and overwrite the presets.
      existing_scan:
        data: { ok: true, submitted: { overlaps: [], roadmap_fit: "SHOULD-NOT-RUN" } }
      references_research:
        data: { ok: true, submitted: { items: [] } }
  host.run:
    by_call:
      uniquify:
        data:
          ok: true
          exit_code: 0
          stdout: '{"slug":"wf","workspace":"docs/proposals/.workspace/wf"}'
          stdout_json: { slug: "wf", workspace: "docs/proposals/.workspace/wf" }
  host.artifacts_dir:
    data: { ok: true, path: "docs/proposals/.workspace/wf/out.md", message_id: "out#1" }

turns:
  # Intake message → advance to proposal_search. The intake arc calls name_slug
  # (oracle.decide), but the search room's on_enter once: guards (keyed off
  # proposal_existing_state and proposal_references — both already set) SKIP both
  # the scout and researcher. Presets survive verbatim — not overwritten by the
  # "SHOULD-NOT-RUN" stubs — which is the assertion this flow makes.
  - intent: { name: discuss, slots: { message: "I want a per-session working folder" } }
    expect_state: proposal_search
    expect_world:
      proposal_existing_state:
        overlaps:
          - { path: "docs/proposals/PRESET-SURVIVED.md", kind: "accepted", summary: "preset", recommendation: "amend" }
        roadmap_fit: "preset-survived"
      proposal_references:
        items:
          - { path: "docs/PRESET-REF.md", sections: "§1", rationale: "preset reference" }
    # name_slug (oracle.decide) IS called in the intake arc — only the search
    # room's existing_scan and references_research are the ones we're asserting
    # did NOT run. We verify this via the world assertion: if the presets survived
    # (not overwritten by "SHOULD-NOT-RUN" stubs), the once: guards worked.
    expect_host_calls:
      - handler: host.oracle.decide
        args: { call: "name_slug" }
      - handler: host.run
        args: { call: "uniquify" }

expect_no_errors: true
