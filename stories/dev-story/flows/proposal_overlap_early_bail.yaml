# proposal_overlap_early_bail — regression of record for the "third folder" bug.
#
# Reported symptom: proposing the same idea a third time, the pipeline dutifully
# minted a THIRD workspace folder and only surfaced the duplicate AFTER it had
# gathered all the references. The scout's overlap verdict gated nothing
# structural — the folder was created at intake and references ran in the same
# breath as the scan.
#
# The fix makes the scout an EARLY GATE:
#   - intake mints only a candidate slug; NO folder is created.
#   - proposal_search.on_enter runs ONLY the scout (no folder, no references).
#   - when the scout finds an overlap, change_existing continues the existing
#     draft WITHOUT ever calling uniquify — so no fourth folder is born.
#
# This flow drives the full intake → scan → amend path with the scout returning
# overlaps, and asserts the side-effects that USED to leak now do not:
#   turn 1: NO host.run (uniquify), NO host.oracle.search/references, NO
#           002/003 artifact writes; proposal_workspace stays empty.
#   turn 2: change_existing → proposal_refine pointing the workspace at the
#           EXISTING draft, again with NO host.run (no new folder minted).

test_kind: flow
app: ../app.yaml
initial_state: proposal
initial_world:
  judge_mode: "human"

host_handlers:
  host.oracle.decide:
    by_call:
      name_slug:
        data: { ok: true, submitted: { slug: "web-pixel-pet", rationale: "pixel-art companion for the web ui" } }
      existing_scan:
        data:
          ok: true
          submitted:
            overlaps:
              - { path: "docs/proposals/.workspace/tamagotchi-pet-ui/", kind: "in_progress", summary: "In-progress draft for this exact idea — the most complete of the duplicates; continue this one.", recommendation: "amend" }
              - { path: "docs/proposals/.workspace/tamagotchi-web-pet/", kind: "in_progress", summary: "Second duplicate draft for the same idea; drop it.", recommendation: "supersede" }
            roadmap_fit: "Already in flight as two in-progress drafts — continue tamagotchi-pet-ui, do not start a third."
  # Stubs for proposal_refine on_enter (reached via change_existing).
  host.artifacts_dir:
    data: { ok: true, path: "docs/proposals/.workspace/tamagotchi-pet-ui/001-brief.md", message_id: "out#1" }
  host.ide.open_file:
    data: { ok: true, connected: true }
  host.oracle.task:
    by_call:
      refine_brief:
        data:
          ok: true
          submitted: { summary: "Continuing the existing tamagotchi-pet-ui draft.", gaps: [] }

turns:
  # Intake: one message mints only the candidate slug, then the scout fires on
  # entry to proposal_search and finds the duplicates. CRITICALLY, no folder is
  # minted and no references are gathered — the gate bails before any of that.
  - intent: { name: discuss, slots: { message: "tomogachi pets for web ui - pixel art creatures to keep the user company" } }
    expect_state: proposal_search
    expect_world:
      proposal_slug: "web-pixel-pet"
      # No folder created — the regression was a fresh folder appearing here.
      proposal_workspace: ""
      proposal_existing_state:
        overlaps:
          - { path: "docs/proposals/.workspace/tamagotchi-pet-ui/", kind: "in_progress", summary: "In-progress draft for this exact idea — the most complete of the duplicates; continue this one.", recommendation: "amend" }
          - { path: "docs/proposals/.workspace/tamagotchi-web-pet/", kind: "in_progress", summary: "Second duplicate draft for the same idea; drop it.", recommendation: "supersede" }
        roadmap_fit: "Already in flight as two in-progress drafts — continue tamagotchi-pet-ui, do not start a third."
    expect_host_calls:
      - handler: host.oracle.decide
        args: { call: "name_slug" }
      - handler: host.oracle.decide
        args: { call: "existing_scan" }
    # The bug: a folder + reference sweep happened despite the overlap. None of
    # these may fire on the scan turn now.
    expect_no_host_calls: [host.run, host.oracle.search, host.artifacts_dir]

  # Continue the pre-existing case. The existing draft becomes the workspace and
  # we drop straight into refine — NO new folder is minted (no host.run).
  - intent: { name: change_existing, slots: { target: "docs/proposals/.workspace/tamagotchi-pet-ui/" } }
    expect_state: proposal_refine
    expect_world:
      proposal_overlap_decision: "change_existing"
      proposal_change_target:    "docs/proposals/.workspace/tamagotchi-pet-ui/"
      proposal_workspace:        "docs/proposals/.workspace/tamagotchi-pet-ui/"
    expect_host_calls:
      - handler: host.oracle.task
        args: { call: "refine_brief" }
    # No fourth folder — uniquify must never run on the amend path.
    expect_no_host_calls: [host.run]

expect_no_errors: true
