# ideas_review_pick_seeds_proposal — the writer's-block handoff, intent-only.
#
# Entering `ideas` runs the reviewer (decide) which surfaces candidates. `pick 1`
# seeds `design_seed_idea` from candidate 1, then enters the proposal intake and
# immediately normalizes into the design-search phase where the seed is promoted to
# `design_idea` and can be cleared.
#
# The intake room has no on_enter (no chat to resolve), but design-search uses
# the writable-dir probe to choose a workspace root.

test_kind: flow
app: ../app.yaml
# Enter via go_ideas so the `ideas` on_enter (the reviewer decide) fires — a
# flow's seeded initial_state does NOT run on_enter.
initial_state: landing
initial_world:
  judge_mode: "human"

host_handlers:
  host.fs.writable_dir:
    data: { path: "docs/proposals", used_fallback: false }
  host.agent.decide:
    by_call:
      ideas_review:
        data:
          ok: true
          submitted:
            summary: "Backlog current; two candidates worth proposing."
            reclassifications: []
            candidates:
              - { item: "single LLM chat across rooms with scoped containment", rationale: "richer context without the history-mcp hack", effort: "medium" }
              - { item: "choice widget (yes/no, multi-choice)", rationale: "reused across many rooms", effort: "small" }
  host.artifacts_dir:
    data: { ok: true, path: ".artifacts/ideas-review/latest.json", message_id: "latest.json#1" }

turns:
  # Enter the reviewer — on_enter surfaces the candidates.
  - intent: { name: go_ideas, slots: {} }
    expect_state: ideas

# Pick candidate 1 → seed the proposal pipeline. Intake flow now promotes to
# `design_search` where design is normalized and then refined.
  - intent: { name: pick, slots: { n: 1 } }
    expect_state: design_search
    expect_world:
      design_seed_idea: ""
      design_idea: "single LLM chat across rooms with scoped containment"

expect_no_errors: true
