# profile_setup_apply_failed — apply refuses an invalid/raw-secret candidate
# and surfaces the script output instead of reporting configured.

test_kind: flow
app: ../app.yaml
initial_state: profile_setup_review
initial_world:
  workdir: "/tmp/kitsoki-profile-fixture"
  repo_root: "/tmp/kitsoki-profile-fixture"
  profile_setup_target_path: "/tmp/kitsoki-profile-fixture"
  profile_setup_status: "review"
  profile_setup_discovery:
    status: "ok"
    local_config_path: "/tmp/kitsoki-profile-fixture/.kitsoki.local.yaml"
  profile_setup_candidate_action: "upsert_openai"
  profile_setup_candidate_profile:
    action: "upsert_openai"
    name: "bad-profile"
    backend: "codex"
    model: "gpt-5.5"
    env_var: "sk-raw-secret"
  profile_setup_patch_preview: "default_profile: bad-profile\n"

host_handlers:
  host.starlark.run:
    by_call:
      profile_setup_apply:
        data:
          result:
            schema: "kitsoki-profile-setup-apply/v1"
            status: "failed"
            target_path: "/tmp/kitsoki-profile-fixture"
            error: "env var 'sk-raw-secret' is invalid; provide a variable name, not a raw key"

turns:
  - intent: { name: confirm_profile_setup, slots: {} }
    expect_state: profile_setup_apply_failed
    expect_world:
      profile_setup_apply_ok: false
      profile_setup_apply_result:
        schema: "kitsoki-profile-setup-apply/v1"
        status: "failed"
        target_path: "/tmp/kitsoki-profile-fixture"
        error: "env var 'sk-raw-secret' is invalid; provide a variable name, not a raw key"
    expect_view_matches: "raw key"

  - intent: { name: profile_setup_discovered, slots: {} }
    expect_state: profile_setup_review
    expect_world:
      profile_setup_status: "review"

expect_no_errors: true
