# gitops_issue_comment_transition_uses_ticket_provider — issue mutations in the
# git-ops hub go through iface.ticket, not ad-hoc `gh` shell commands.
#
# A parent project wrapper can bind the ticket interface to host.gh.ticket. This
# flow stubs that provider and proves the nested dev-story -> gitops import can
# comment on and close an issue from the story surface.

test_kind: flow
app: ../app.yaml
initial_state: landing
initial_world:
  ticket_repo: "acme/repo"

host_bindings:
  gitops__ticket: host.gh.ticket

host_handlers:
  host.run:
    by_call:
      refresh_intercept:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             main
            main_worktree_path: "."
            commits_ahead:      0
            commits_behind:     0
            has_uncommitted:    false
            on_integration:     true
            no_common_ancestor: false
  host.gh.ticket:
    by_op:
      comment:
        data:
          ok: true
          comment_id: "https://github.com/acme/repo/issues/105#issuecomment-2"
          url: "https://github.com/acme/repo/issues/105#issuecomment-2"
      transition:
        data:
          ok: true
          status: "closed"

turns:
  - intent: { name: go_gitops, slots: {} }
    expect_state: gitops.intercept

  - intent:
      name: gitops__issue_comment
      slots:
        id: "105"
        body: "Fixed in 60867ddb."
    expect_state: gitops.intercept
    expect_host_calls:
      - handler: host.gh.ticket.comment
        args:
          repo: "acme/repo"
          id: "105"
          body: "Fixed in 60867ddb."
    expect_world:
      gitops__ticket_repo: "acme/repo"
      gitops__issue_id: "105"
      gitops__issue_status: "commented"
      gitops__issue_source: "ticket provider"
      gitops__issue_comment_url: "https://github.com/acme/repo/issues/105#issuecomment-2"

  - intent:
      name: gitops__issue_transition
      slots:
        id: "105"
        to: "resolved"
    expect_state: gitops.intercept
    expect_host_calls:
      - handler: host.gh.ticket.transition
        args:
          repo: "acme/repo"
          id: "105"
          to: "resolved"
    expect_world:
      gitops__ticket_repo: "acme/repo"
      gitops__issue_id: "105"
      gitops__issue_status: "closed"
      gitops__issue_source: "ticket provider"

expect_no_errors: true
