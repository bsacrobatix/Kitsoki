# bugfix_oversight_gated — user selects human-gated oversight before launching
# the imported bugfix pipeline. Proves the selection projects into bf and starts
# the gated operation policy.

test_kind: flow
app: ../app.yaml
initial_state: landing
initial_world:
  auto_triage: false
  ticket_id:      "TKT-OG-1"
  ticket_title:   "Oversight gated launch"
  ticket_type:    "bug"
  ticket_url:     "issues/bugs/TKT-OG-1.md"
  thread:         "TKT-OG-1"
  workdir:        ".worktrees/tkt-og-1"
  workspace_id:   "ws-og-1"
  base_branch:    "main"
  feature_branch: "fix/tkt-og-1"

host_handlers:
  host.capsule_workspace:
    data: { ok: true, log: "synced", path: ".worktrees/tkt-og-1" }
  host.agent.task:
    data:
      ok: true
      submitted:
        summary_title:    "Stub reproduction"
        summary_markdown: "The bug reproduces under deterministic fixture data."
        bug_verified:     true
        steps:            ["run fixture"]
        involved_components: [{ name: "fixture", reason: "stub" }]
        environment_check: { frontend_running: true, backend_running: true, dataset_ready: true }
        confidence:       0.9
        reasoning:        "stub"

turns:
  - intent: { name: oversight_gated, slots: {} }
    expect_state: landing
    expect_world:
      oversight_mode: "gated"
      judge_mode: "human"

  - intent: { name: go_bugfix, slots: {} }
    expect_state: bf.reproducing
    expect_world:
      bf__oversight_mode: "gated"
      bf__judge_mode: "human"

expect_operation_policy: bf__bugfix_full
expect_operation_status: running
expect_no_errors: true
