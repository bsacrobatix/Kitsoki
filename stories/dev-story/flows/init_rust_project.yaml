# init_rust_project -- project onboarding for a Cargo/Makefile repo should
# preserve the clean external-instance architecture: dev-story stays general,
# while the target repo owns a thin `@kitsoki/dev-story` instance and command
# profile. Host calls are stubbed; no LLM or real checkout mutation happens.

test_kind: flow
app: ../app.yaml
initial_state: landing
initial_world:
  workdir: "/Users/brad/code/gears-rust"
  repo_root: "/Users/brad/code/gears-rust"

host_handlers:
  host.run:
    by_call:
      discover:
        data:
          ok: true
          exit_code: 0
          stdout: '{"target_path":"/Users/brad/code/gears-rust","project_id":"gears-rust","project_title":"Gears Rust","stack":"rust project","dev_command":"make dev","test_command":"make test","build_command":"make build","conventions":"hybrid","tracker":"none"}'
          stdout_json:
            target_path: "/Users/brad/code/gears-rust"
            project_id: "gears-rust"
            project_title: "Gears Rust"
            stack: "rust project"
            dev_command: "make dev"
            test_command: "make test"
            build_command: "make build"
            conventions: "hybrid"
            tracker: "none"
      apply:
        data:
          ok: true
          exit_code: 0
          stdout: '{"status":"applied","config_path":"/Users/brad/code/gears-rust/.kitsoki.yaml","profile_path":"/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml","instance_path":"/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml","gitignore_path":"/Users/brad/code/gears-rust/.gitignore","writes":["/Users/brad/code/gears-rust/.kitsoki.yaml","/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml","/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml","/Users/brad/code/gears-rust/stories/gears-rust-dev/README.md"]}'
          stdout_json:
            status: "applied"
            config_path: "/Users/brad/code/gears-rust/.kitsoki.yaml"
            profile_path: "/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml"
            instance_path: "/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml"
            gitignore_path: "/Users/brad/code/gears-rust/.gitignore"
            writes:
              - "/Users/brad/code/gears-rust/.kitsoki.yaml"
              - "/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml"
              - "/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml"
              - "/Users/brad/code/gears-rust/stories/gears-rust-dev/README.md"
      install_tools:
        data:
          ok: true
          exit_code: 0
          stdout: '{"target":"/Users/brad/code/gears-rust","skills":["kitsoki-story-authoring"],"agents":["kitsoki-mcp-driver.md"],"mcp_path":"/Users/brad/code/gears-rust/.mcp.json","mcp_written":true}'
          stdout_json:
            target: "/Users/brad/code/gears-rust"
            skills:
              - "kitsoki-story-authoring"
            agents:
              - "kitsoki-mcp-driver.md"
            mcp_path: "/Users/brad/code/gears-rust/.mcp.json"
            mcp_written: true

turns:
  - intent: { name: work, slots: { request: "onboard ~/code/gears-rust" } }
    expect_state: init_discover
    expect_world:
      init_request: "onboard ~/code/gears-rust"
      init_target_path: "/Users/brad/code/gears-rust"
      init_project_id: "gears-rust"
      init_project_title: "Gears Rust"
      init_stack: "rust project"
      init_dev_command: "make dev"
      init_test_command: "make test"
      init_build_command: "make build"
      init_profile_status: "discovering"
    expect_view_matches: "continue"

  - intent: { name: init_discovered, slots: {} }
    expect_state: init
    expect_world:
      init_profile_status: "draft"
      init_test_command: "make test"
      init_build_command: "make build"
    expect_view_matches: "make test"

  - intent: { name: confirm_init, slots: {} }
    expect_state: init_apply
    expect_world:
      init_profile_status: "applying"
      init_apply_result:
        status: "applied"
        config_path: "/Users/brad/code/gears-rust/.kitsoki.yaml"
        profile_path: "/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml"
        instance_path: "/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml"
        gitignore_path: "/Users/brad/code/gears-rust/.gitignore"
        writes:
          - "/Users/brad/code/gears-rust/.kitsoki.yaml"
          - "/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml"
          - "/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml"
          - "/Users/brad/code/gears-rust/stories/gears-rust-dev/README.md"
      init_tools_ok: true
    expect_view_matches: "studio MCP"

  - intent: { name: init_applied, slots: {} }
    expect_state: init_done
    expect_world:
      init_profile_status: "applied"
      init_apply_result:
        status: "applied"
        config_path: "/Users/brad/code/gears-rust/.kitsoki.yaml"
        profile_path: "/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml"
        instance_path: "/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml"
        gitignore_path: "/Users/brad/code/gears-rust/.gitignore"
        writes:
          - "/Users/brad/code/gears-rust/.kitsoki.yaml"
          - "/Users/brad/code/gears-rust/.kitsoki/project-profile.yaml"
          - "/Users/brad/code/gears-rust/stories/gears-rust-dev/app.yaml"
          - "/Users/brad/code/gears-rust/stories/gears-rust-dev/README.md"
    expect_view_matches: "gears-rust-dev"

expect_no_errors: true
