# init_apply_failed_surfaced — failure class: host domain error caught by an
# `on_error:` redirect during onboarding (init_apply's apply step fails).
#
# Sibling of init_tools_failed.yaml, covering the FIRST loud read-out:
# init_apply's `apply` host.run exits non-zero (fail_on_error sets the host
# error) → `on_error: init_apply_failed` routes to the dedicated failure
# room. The never-silent contract: the operator sees WHERE it failed ("apply
# failed" read-out + the command output) and last_error carries the structured
# onboarding error — no bounce back to landing with no reason. The retry arc
# (confirm_init) must also clear last_error so a rerun starts clean.

test_kind: flow
app: ../app.yaml
initial_state: init
initial_world:
  init_target_path: "/Users/brad/code/slidey"
  init_project_id: "slidey"
  init_project_title: "Slidey"
  init_profile_status: "draft"

host_handlers:
  host.run:
    by_call:
      apply:
        # Non-zero exit + fail_on_error → domain host error, on_error routes
        # to the loud read-out instead of init_done.
        data:
          result:
            status: "apply-failed"
            target_path: "/Users/brad/code/slidey"
            error: "target directory is not writable: /Users/brad/code/slidey"
      install_tools:
        data:
          ok: true
          exit_code: 0
          stdout: '{"status":"installed"}'
  host.starlark.run:
    by_call:
      apply:
        data:
          result:
            status: "apply-failed"
            target_path: "/Users/brad/code/slidey"
            error: "target directory is not writable: /Users/brad/code/slidey"

  # confirm_init enters init_apply: on_enter's apply fails → on_error routes
  # to init_apply_failed. The read-out names the failure and shows the
  # command output; last_error carries the onboarding error.
turns:
  - intent: { name: confirm_init, slots: {} }
    expect_state: init_apply_failed
    expect_world:
      init_apply_ok: false
      last_error: "project onboarding apply failed"
    expect_view_matches: "apply failed"

  # The view also surfaces the command's own output so the operator can act.
  - intent: { name: look, slots: {} }
    expect_state: init_apply_failed
    expect_view_matches: "target directory is not writable"

expect_no_errors: true
