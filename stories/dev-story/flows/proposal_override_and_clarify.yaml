# proposal_override_and_clarify — override_new despite an overlap, then the
# clarify back-edge from refine to proposal.
#
# Covers the two arcs the happy/overlap flows don't: `override_new` (force a
# new proposal even though the scout found an overlap — recorded as decision
# "new") and `clarify` from the refine room (step all the way back to intake,
# resetting all downstream state including the search results).

test_kind: flow
app: ../app.yaml
initial_state: proposal_search
initial_world:
  judge_mode:         "human"
  proposal_idea:      "Add a local model oracle sidecar."
  proposal_workspace: "docs/proposals/.workspace/lmo"

host_handlers:
  host.oracle.decide:
    by_call:
      existing_scan:
        data:
          ok: true
          submitted:
            overlaps:
              - { path: "docs/proposals/local-model-oracle.md", kind: "accepted", summary: "Already proposes a sidecar.", recommendation: "amend" }
            roadmap_fit: "Overlaps the accepted proposal."
      references_research:
        data:
          ok: true
          submitted: { items: [] }
  # override_new now cascades through proposal_materialize, which mints the
  # folder (uniquify), runs the semantic reference search, then advances.
  host.oracle.search:
    data: { hits: [], top: null }
  host.run:
    by_call:
      uniquify:
        data:
          ok: true
          exit_code: 0
          stdout: '{"slug":"lmo","workspace":"docs/proposals/.workspace/lmo"}'
          stdout_json: { slug: "lmo", workspace: "docs/proposals/.workspace/lmo" }
  host.artifacts_dir:
    data: { ok: true, path: "docs/proposals/.workspace/lmo/out.md", message_id: "out#1" }
  # Stubs for proposal_refine on_enter (advanced to by override_new → materialize)
  host.ide.open_file:
    data: { ok: true, connected: true }
  host.oracle.task:
    by_call:
      refine_brief:
        data:
          ok: true
          submitted: { summary: "Brief started.", gaps: ["Scope is unclear"] }

turns:
  # Force a new proposal despite the overlap — decision recorded as "new",
  # no change_target set. Advances to proposal_refine.
  - intent: { name: override_new, slots: {} }
    expect_state: proposal_refine
    expect_world:
      proposal_overlap_decision: "new"
      proposal_change_target:    ""

  # Step back all the way to intake — resets search + brief state.
  - intent: { name: clarify, slots: {} }
    expect_state: proposal
    expect_world:
      proposal_existing_state:   {}
      proposal_existing_path:    ""
      proposal_overlap_decision: ""
      proposal_change_target:    ""
      proposal_references:       {}
      proposal_references_path:  ""
      proposal_brief_path:       ""
      proposal_brief_decision:   {}
      proposal_brief_cycle:      0
      proposal_refine_analysis:  {}

expect_no_errors: true
