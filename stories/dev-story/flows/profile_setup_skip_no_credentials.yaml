# profile_setup_skip_no_credentials — no installed/logged-in backend is found
# and the operator exits without writing local config.

test_kind: flow
app: ../app.yaml
initial_state: landing
initial_world:
  workdir: "/tmp/kitsoki-profile-fixture"
  repo_root: "/tmp/kitsoki-profile-fixture"

host_handlers:
  host.starlark.run:
    by_call:
      profile_setup_discover:
        data:
          result:
            schema: "kitsoki-profile-setup-discovery/v1"
            status: "ok"
            target_path: "/tmp/kitsoki-profile-fixture"
            config_path: "/tmp/kitsoki-profile-fixture/.kitsoki.yaml"
            local_config_path: "/tmp/kitsoki-profile-fixture/.kitsoki.local.yaml"
            default_profile: ""
            profiles: []
            backend_sources:
              - { backend: "codex", installed: false, logged_in: "no", path_source: "" }
            env_sources:
              - { name: "OPENAI_API_KEY", present: false }
            candidate_action: ""
            candidate_profile: {}
            patch_preview: ""
            warnings:
              - ".kitsoki.local.yaml does not exist yet; apply will create it"

turns:
  - intent: { name: go_profile_setup, slots: { target: "/tmp/kitsoki-profile-fixture" } }
    expect_state: profile_setup_discover
    expect_world:
      profile_setup_candidate_action: ""
      profile_setup_effective_profiles: []
    expect_view_matches: "Default profile"

  - intent: { name: profile_setup_discovered, slots: {} }
    expect_state: profile_setup_review
    expect_world:
      profile_setup_status: "review"
    expect_view_matches: "No patch is selected yet"

  - intent: { name: skip_profile_setup, slots: {} }
    expect_state: landing
    expect_world:
      profile_setup_status: "skipped"
      last_error: "local harness profile setup skipped"

expect_no_errors: true
