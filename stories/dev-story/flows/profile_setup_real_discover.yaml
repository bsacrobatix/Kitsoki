# profile_setup_real_discover — regression for live sessions where the profile
# setup capability must resolve through the real Starlark host call. This keeps
# discovery unstubbed but does not call a provider or write files.

test_kind: flow
app: ../app.yaml
use_orchestrator: true
initial_state: landing
initial_world:
  workdir: "."
  repo_root: "."

# Trigger RegisterBuiltins so host.starlark.run is real in this fixture. No LLM host is
# invoked by the profile_setup_discover room.
host_bindings:
  host.starlark.run: host.starlark.run

turns:
  - intent: { name: go_profile_setup, slots: {} }
    expect_state: profile_setup_discover
    expect_world:
      profile_setup_status: "discovering"
    expect_view_matches: "Default profile"

expect_no_errors: true
