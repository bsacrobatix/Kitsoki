# ticket_search_smoke — main → ticket_search → run a search via
# iface.ticket.search → see results bind into world.ticket_results.

test_kind: flow
app: ../app.yaml
initial_state: main
initial_world: {}

host_handlers:
  # iface.ticket.search → host.local_files.ticket.search → registry
  # prefix-fallback → host.local_files.ticket. The stub returns a
  # canned `tickets:` blob.
  host.local_files.ticket:
    data:
      ok: true
      tickets: "TKT-001: Esc hangs the TUI; TKT-002: Foyer banner truncated"

turns:
  # main → ticket_search.
  - intent: { name: go_ticket_search, slots: {} }
    expect_state: ticket_search

  # search → ticket_searching → on_enter fires iface.ticket.search →
  # ticket_results bound from the stub.
  - intent: { name: search_tickets, slots: { query: "open kitsoki bugs" } }
    expect_state: ticket_searching
    expect_world:
      ticket_query:   "open kitsoki bugs"
      ticket_results: "TKT-001: Esc hangs the TUI; TKT-002: Foyer banner truncated"

  # Pick a ticket; the room transitions back to ticket_search with
  # ticket_id / thread populated.
  - intent: { name: pick_ticket, slots: { id: "TKT-001" } }
    expect_state: ticket_search
    expect_world:
      ticket_id: "TKT-001"
      thread:    "TKT-001"

  - intent: { name: go_main, slots: {} }
    expect_state: main

expect_no_errors: true
