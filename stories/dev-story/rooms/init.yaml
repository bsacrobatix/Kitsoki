# init -- deterministic project onboarding.
#
# The flow is deliberately boring and auditable:
#   landing -> init_discover -> init(review) -> init_apply -> init_done
#   init_done -> init_readiness -> init_done
#   init_done -> init_customizations -> init_done
#
# Discovery and apply are host.run scripts that emit JSON. Flow fixtures stub
# both calls, so this remains no-LLM and cost-free in tests. The review room is
# the operator checkpoint: no files are written until confirm_init enters the
# apply room.

states:

  init_discover:
    description: "Discover a project profile from the target checkout before any writes happen."
    relevant_world:
      - init_request
      - init_target_path
      - init_profile_status
      - init_run_output
      - init_discovery_error
      - init_transcript_count
      - init_mining_recommendation
      - init_repo_vcs
      - init_repo_default_branch
      - init_repo_remote
      - init_ticket_provider
      - init_ticket_repo
      - init_story_pack
      - init_story_pack_title
      - init_story_pack_summary
      - init_story_packs
      - init_starter_stories
      - workdir
      - repo_root
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "discovering profile"
          color:    "#14B8A6"
      - kv:
          pairs:
            Request: "{{ world.init_request|default:'(current project)' }}"
            Target:  "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Status:  "{{ world.init_profile_status }}"
      - prose: "Inspecting local project files to infer commands, stack, and the Kitsoki instance shape."
        when: "world.init_project_id == ''"
      - prose: "{{ world.init_discovery_error|default:'' }}"
        when: "world.init_discovery_error != ''"
      - kv:
          pairs:
            Project: "{{ world.init_project_title }}"
            ID:      "{{ world.init_project_id }}"
            Stack:   "{{ world.init_stack }}"
        when: "world.init_project_id != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "review the discovered profile"
              intent: init_discovered
              when:   "world.init_project_id != ''"
            - label:  "retry"
              hint:   "rerun deterministic discovery"
              intent: init_discovered
              when:   "world.init_project_id == ''"
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: discover
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -eu
              script_name="$0"
              find_init_script() {
                name="$1"
                for root in \
                  "${KITSOKI_APP_DIR:-}" \
                  "${KITSOKI_REPO:+$KITSOKI_REPO/stories/dev-story}" \
                  "$PWD/stories/dev-story" \
                  "$PWD/internal/basestories/stories/dev-story"
                do
                  [ -n "$root" ] || continue
                  candidate="$root/scripts/$name"
                  if [ -f "$candidate" ]; then
                    printf '%s\n' "$candidate"
                    return 0
                  fi
                done
                cache_root="${XDG_CACHE_HOME:-${HOME:-}/.cache}/kitsoki/stories"
                if [ -d "$cache_root" ]; then
                  for candidate in "$cache_root"/*/dev-story/scripts/"$name"; do
                    if [ -f "$candidate" ]; then
                      printf '%s\n' "$candidate"
                      return 0
                    fi
                  done
                fi
                return 1
              }
              script="$(find_init_script "$script_name")" || {
                printf '{"schema":"kitsoki-init-script/v1","status":"error","error":"init helper not found: %s"}\n' "$script_name"
                exit 1
              }
              exec python3 "$script" "$@"
            - "init_discover.py"
            - "{{ world.init_request }}"
            - "{{ world.workdir }}"
            - "{{ world.repo_root }}"
        bind:
          init_run_ok:        "ok"
          init_run_output:    "stdout"
          init_discovery:     "stdout_json"
          init_discovery_error: "stdout_json.error"
          init_target_path:   "stdout_json.target_path"
          init_project_id:    "stdout_json.project_id"
          init_project_title: "stdout_json.project_title"
          init_stack:         "stdout_json.stack"
          init_dev_command:   "stdout_json.dev_command"
          init_test_command:  "stdout_json.test_command"
          init_build_command: "stdout_json.build_command"
          init_repo_vcs:      "stdout_json.repo_vcs"
          init_repo_default_branch: "stdout_json.repo_default_branch"
          init_repo_remote:   "stdout_json.repo_remote"
          init_conventions:   "stdout_json.conventions"
          init_tracker:       "stdout_json.tracker"
          init_ticket_provider: "stdout_json.tracker"
          init_ticket_repo:   "stdout_json.ticket_repo"
          init_story_pack:    "stdout_json.story_pack"
          init_story_pack_title: "stdout_json.story_pack_title"
          init_story_pack_summary: "stdout_json.story_pack_summary"
          init_story_packs:   "stdout_json.story_packs"
          init_starter_stories: "stdout_json.starter_stories"
          init_transcript_count:      "stdout_json.transcript_count"
          init_transcript_sources:    "stdout_json.transcript_sources"
          init_mining_recommendation: "stdout_json.mining_recommendation"
        on_error: init_discover_failed
    on:
      init_discovered:
        - when: "world.init_project_id != ''"
          target: init
          effects:
            - set:
                init_profile_status: "draft"
                init_discovery_error: ""
                last_error: ""
        - default: true
          target: init_discover_failed
          effects:
            - set:
                init_profile_status: "discovery-failed"
                last_error: "project discovery failed"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_discover"
      look:
        - target: .

  init_discover_failed:
    description: "Project discovery failed before a reviewable profile was available."
    relevant_world:
      - init_request
      - init_target_path
      - init_profile_status
      - init_run_output
      - init_discovery_error
      - workdir
      - repo_root
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "discovery failed"
          color:    "#EF4444"
      - prose: "Discovery did not produce a usable project profile. No files were written."
      - kv:
          pairs:
            Request: "{{ world.init_request|default:'(current project)' }}"
            Target:  "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Status:  "{{ world.init_profile_status }}"
      - heading: "Output"
        when: "world.init_run_output != ''"
      - code: "{{ world.init_run_output }}"
        when: "world.init_run_output != ''"
      - heading: "Error"
        when: "world.init_discovery_error != ''"
      - prose: "{{ world.init_discovery_error|default:'' }}"
        when: "world.init_discovery_error != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "retry"
              hint:   "rerun deterministic discovery"
              intent: init_discovered
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      init_discovered:
        - target: init_discover
          effects:
            - set:
                init_discovery: {}
                init_run_ok: false
                init_run_output: ""
                init_discovery_error: ""
                init_repo_vcs: "none"
                init_repo_default_branch: ""
                init_repo_remote: ""
                init_ticket_provider: "local"
                init_ticket_repo: ""
                init_story_pack: "core-engineering"
                init_story_pack_title: "Core engineering starter"
                init_story_pack_summary: ""
                init_story_packs: []
                init_starter_stories: []
                init_transcript_count: 0
                init_transcript_sources: []
                init_mining_recommendation: {}
                init_profile_status: "discovering"
                last_error: ""
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_discover_failed"
      look:
        - target: .

  init:
    description: "Review the discovered project onboarding profile before applying local setup files."
    default_intent: revise_init
    relevant_world:
      - init_request
      - init_discovery
      - init_discovery_error
      - init_target_path
      - init_project_id
      - init_project_title
      - init_stack
      - init_dev_command
      - init_test_command
      - init_build_command
      - init_repo_vcs
      - init_repo_default_branch
      - init_repo_remote
      - init_ticket_provider
      - init_ticket_repo
      - init_conventions
      - init_tracker
      - init_story_pack
      - init_story_pack_title
      - init_story_pack_summary
      - init_story_packs
      - init_starter_stories
      - init_transcript_count
      - init_mining_recommendation
      - init_profile_status
      - init_feedback
      - workdir
      - repo_root

    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "review profile before writes"
          color:    "#14B8A6"
      - prose: >
          Review the project profile Kitsoki discovered. Accepting writes the
          local Kitsoki config, project profile, and story instance into the
          target checkout; feedback is recorded before another discovery pass.
      - kv:
          pairs:
            Target:      "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Project:     "{{ world.init_project_title|default:'(not yet inferred)' }}"
            ID:          "{{ world.init_project_id|default:'(not yet inferred)' }}"
            Stack:       "{{ world.init_stack|default:'(not yet inferred)' }}"
            Status:      "{{ world.init_profile_status }}"
      - heading: "Commands"
      - kv:
          pairs:
            Dev server:  "{{ world.init_dev_command|default:'(not yet inferred)' }}"
            Test:        "{{ world.init_test_command|default:'(not yet inferred)' }}"
            Build:       "{{ world.init_build_command|default:'(not yet inferred)' }}"
      - heading: "Repository"
      - kv:
          pairs:
            VCS:            "{{ world.init_repo_vcs|default:'none' }}"
            Default branch: "{{ world.init_repo_default_branch|default:'(none)' }}"
            Remote:         "{{ world.init_repo_remote|default:'(none)' }}"
      - heading: "Setup"
      - kv:
          pairs:
            Conventions: "{{ world.init_conventions }}"
            Tracker:     "{{ world.init_tracker }}"
            Ticket provider: "{% if world.init_ticket_provider == 'github' %}GitHub Issues ({{ world.init_ticket_repo|default:'repo not detected' }}){% else %}local markdown / pasted reports{% endif %}"
            Capability: "{% if world.init_ticket_provider == 'github' && world.init_ticket_repo != '' %}full{% else %}good{% endif %}"
            Transcripts: "{{ world.init_transcript_count|default:0 }}"
            Writes:      ".kitsoki.yaml, .kitsoki/project-profile.yaml, .kitsoki/stories/{{ world.init_project_id }}-dev/app.yaml"
            Mode:        "{{ world.init_profile_mode }}"
      - heading: "Starter Stories"
        when: "len(world.init_starter_stories) > 0"
      - kv:
          pairs:
            Pack: "{{ world.init_story_pack_title|default:'Core engineering starter' }} ({{ world.init_story_pack|default:'core-engineering' }})"
            Normal command: "kitsoki project-profile story-packs add <pack>"
        when: "len(world.init_starter_stories) > 0"
      - code: |
          {% for story in world.init_starter_stories %}- {{ story.id }} ({{ story.source_story }}): {{ story.summary }}
          {% endfor %}
        when: "len(world.init_starter_stories) > 0"
      - heading: "Session Mining"
        when: "world.init_transcript_count > 0"
      - prose: "{{ world.init_mining_recommendation.note }}"
        when: "world.init_transcript_count > 0"
      - kv:
          pairs:
            Sample:   "{{ world.init_mining_recommendation.sample }}"
            Sessions: "{{ world.init_mining_recommendation.transcript_count }}"
        when: "world.init_transcript_count > 0"
      - code: |
          {% for source in world.init_mining_recommendation.sources %}- {{ source.backend }}: {{ source.sessions }} sessions at {{ source.dir }}
          {% endfor %}
        when: "world.init_transcript_count > 0"
      - heading: "Profile Validation"
        when: "world.init_profile_validation.ok"
      - kv:
          pairs:
            Schema:   "passed"
            Semantic: "passed"
            Warnings: "{{ world.init_profile_validation.warnings|default:'[]' }}"
        when: "world.init_profile_validation.ok"
      - heading: "Feedback"
        when: "world.init_feedback != ''"
      - prose: "{{ world.init_feedback }}"
        when: "world.init_feedback != ''"
      - heading: "Actions"
      - prose: "Type feedback in your own words to revise the draft, or use an action below."
      - choice:
          mode: single
          prompt: ""
          items:
            - label:  "accept"
              hint:   "write the local Kitsoki onboarding files"
              intent: confirm_init
            - label:  "LLM draft"
              hint:   "draft a richer project profile, then validate schema + semantics"
              intent: draft_profile
            - label:  "story packs"
              hint:   "choose the starter pack for first-run adoption"
              intent: review_story_pack
            - label:  "ticket provider"
              hint:   "choose local/copy-paste ticket intake or GitHub Issues"
              intent: select_ticket_provider
              slots:  { provider: "review" }
            - label:  "revise"
              hint:   "record feedback for the next profile draft"
              intent: revise_init
              param:
                slot:        feedback
                type:        string
                placeholder: "what should change"
                required:    true
            - label:  "rediscover"
              hint:   "rerun deterministic discovery"
              intent: init_discovered
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look

    on:
      confirm_init:
        - when: "world.init_project_id == ''"
          target: .
          guard_hint: "Discovery has not produced a project profile yet."
          effects:
            - set:
                last_error: "Cannot apply onboarding until discovery produces a project id."
        - target: init_apply
          effects:
            - set:
                init_profile_status: "applying"
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                init_readiness_result: {}
                init_readiness_ok: false
                init_readiness_output: ""
                init_customization_result: {}
                init_customization_ok: false
                init_customization_output: ""
                init_customization_action: "promote"
                init_customization_feedback: ""
                last_error: ""
      review_story_pack:
        - target: init_story_pack
          effects:
            - set:
                last_error: ""
      select_ticket_provider:
        - target: init_ticket_provider
          effects:
            - set:
                last_error: ""
      revise_init:
        - target: .
          effects:
            - set:
                init_profile_status: "needs-revision"
                init_feedback: "{{ slots.feedback }}"
            - say: "Onboarding feedback recorded."
      draft_profile:
        - when: "world.init_project_id == ''"
          target: .
          guard_hint: "Discovery has not produced a project profile yet."
          effects:
            - set:
                last_error: "Cannot draft an LLM profile until deterministic discovery produces a project id."
        - target: init_profile_draft
          effects:
            - set:
                init_profile_status: "drafting-with-llm"
                init_profile_mode: "llm-draft"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
      init_discovered:
        - target: init_discover
          effects:
            - set:
                init_discovery: {}
                init_run_ok: false
                init_run_output: ""
                init_discovery_error: ""
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                init_repo_vcs: "none"
                init_repo_default_branch: ""
                init_repo_remote: ""
                init_ticket_provider: "local"
                init_ticket_repo: ""
                init_story_pack: "core-engineering"
                init_story_pack_title: "Core engineering starter"
                init_story_pack_summary: ""
                init_story_packs: []
                init_starter_stories: []
                init_profile_mode: "deterministic"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                init_transcript_count: 0
                init_transcript_sources: []
                init_mining_recommendation: {}
                init_profile_status: "discovering"
                last_error: ""
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init"
      look:
        - target: .

  init_story_pack:
    description: "Choose the named starter story pack before onboarding writes the project profile."
    relevant_world:
      - init_target_path
      - init_project_title
      - init_story_pack
      - init_story_pack_title
      - init_story_pack_summary
      - init_story_packs
      - init_starter_stories
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "choose story pack"
          color:    "#14B8A6"
      - kv:
          pairs:
            Target:   "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Project:  "{{ world.init_project_title|default:'(not yet inferred)' }}"
            Selected: "{{ world.init_story_pack_title|default:'Core engineering starter' }} ({{ world.init_story_pack|default:'core-engineering' }})"
      - code: |
          {% for pack in world.init_story_packs %}- {{ pack.id }}: {{ pack.title }} - {{ pack.summary }}
            stories: {{ pack.stories }}
          {% endfor %}
        when: "len(world.init_story_packs) > 0"
      - choice:
          mode: single
          prompt: "Story packs"
          items:
            - label:  "core engineering"
              hint:   "setup, bug fixing, repo-history capsules, PRs, git ops"
              intent: select_story_pack
              slots:  { pack: "core-engineering" }
            - label:  "core setup"
              hint:   "setup and git ops"
              intent: select_story_pack
              slots:  { pack: "core-setup" }
            - label:  "planning delivery"
              hint:   "PRD/design, implementation, PRs"
              intent: select_story_pack
              slots:  { pack: "planning-delivery" }
            - label:  "review quality"
              hint:   "bugs, tests, code/docs review, PRs"
              intent: select_story_pack
              slots:  { pack: "review-quality" }
            - label:  "full dev-story"
              hint:   "all day-level workflows"
              intent: select_story_pack
              slots:  { pack: "full-dev-story" }
            - label:  "back"
              hint:   "return to profile review"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      select_story_pack:
        - when: "slots.pack == 'core-engineering' || slots.pack == 'focused-engineering'"
          target: init
          effects:
            - set:
                init_story_pack: "core-engineering"
                init_story_pack_title: "Core engineering starter"
                init_story_pack_summary: "Focused first-run set for ordinary software repositories: setup, bug fixing, repo-history capsules, PR refinement, and git operations."
                init_starter_stories:
                  - { id: "setup", title: "Project setup", source_story: "dev-story:onboarding", status: "enabled", summary: "Onboard the checkout, install project-local Kitsoki tooling, and run explicit readiness checks.", expansion: "Keep this enabled as the team's bootstrap and refresh path." }
                  - { id: "bugfix", title: "Bug fixing", source_story: "bugfix", status: "enabled", summary: "Drive a picked bug through reproduce, fix, test, review, and validation gates.", expansion: "Add narrower project bug policies through profile customizations or prompt overlays." }
                  - { id: "repo-bakeoff", title: "Repo-history capsules", source_story: "repo-bakeoff", status: "enabled", summary: "Turn historical bug fixes into capsule records, prove RED/GREEN arming, and render live-cell commands.", expansion: "Use once the repo has 3-10 isolated historical bugs with regression tests or PR-proven oracles." }
                  - { id: "pr-refinement", title: "PR refinement", source_story: "pr-refinement", status: "enabled", summary: "Open or attach to a PR, monitor CI/review feedback, respond, and merge when accepted.", expansion: "Add provider-specific PR policy after the base loop is proven on real pull requests." }
                  - { id: "git-ops", title: "Git operations", source_story: "git-ops", status: "enabled", summary: "Use the guarded git command hub for status, worktrees, commits, rebases, sync, and integration.", expansion: "Extend with project branch and remote-sync policy once the team's git flow is stable." }
                init_profile_status: "draft"
                last_error: ""
            - say: "Selected the core engineering starter pack."
        - when: "slots.pack == 'core-setup'"
          target: init
          effects:
            - set:
                init_story_pack: "core-setup"
                init_story_pack_title: "Core setup"
                init_story_pack_summary: "Bring a project under project-local Kitsoki tooling with setup and guarded git operations only."
                init_starter_stories:
                  - { id: "setup", title: "Project setup", source_story: "dev-story:onboarding", status: "enabled", summary: "Onboard the checkout, install project-local Kitsoki tooling, and run explicit readiness checks.", expansion: "Keep this enabled as the team's bootstrap and refresh path." }
                  - { id: "git-ops", title: "Git operations", source_story: "git-ops", status: "enabled", summary: "Use the guarded git command hub for status, worktrees, commits, rebases, sync, and integration.", expansion: "Extend with project branch and remote-sync policy once the team's git flow is stable." }
                init_profile_status: "draft"
                last_error: ""
            - say: "Selected the core setup pack."
        - when: "slots.pack == 'planning-delivery'"
          target: init
          effects:
            - set:
                init_story_pack: "planning-delivery"
                init_story_pack_title: "Planning and delivery"
                init_story_pack_summary: "Add PRD/design and implementation loops on top of setup and git operations."
                init_starter_stories:
                  - { id: "setup", title: "Project setup", source_story: "dev-story:onboarding", status: "enabled", summary: "Onboard the checkout, install project-local Kitsoki tooling, and run explicit readiness checks.", expansion: "Keep this enabled as the team's bootstrap and refresh path." }
                  - { id: "git-ops", title: "Git operations", source_story: "git-ops", status: "enabled", summary: "Use the guarded git command hub for status, worktrees, commits, rebases, sync, and integration.", expansion: "Extend with project branch and remote-sync policy once the team's git flow is stable." }
                  - { id: "prd", title: "Prd", source_story: "prd", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "implementation", title: "Implementation", source_story: "implementation", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "pr-refinement", title: "PR refinement", source_story: "pr-refinement", status: "enabled", summary: "Open or attach to a PR, monitor CI/review feedback, respond, and merge when accepted.", expansion: "Add provider-specific PR policy after the base loop is proven on real pull requests." }
                init_profile_status: "draft"
                last_error: ""
            - say: "Selected the planning and delivery pack."
        - when: "slots.pack == 'review-quality'"
          target: init
          effects:
            - set:
                init_story_pack: "review-quality"
                init_story_pack_title: "Review and quality"
                init_story_pack_summary: "Emphasize bug fixing, test repair, code review, docs review, and git operations."
                init_starter_stories:
                  - { id: "setup", title: "Project setup", source_story: "dev-story:onboarding", status: "enabled", summary: "Onboard the checkout, install project-local Kitsoki tooling, and run explicit readiness checks.", expansion: "Keep this enabled as the team's bootstrap and refresh path." }
                  - { id: "git-ops", title: "Git operations", source_story: "git-ops", status: "enabled", summary: "Use the guarded git command hub for status, worktrees, commits, rebases, sync, and integration.", expansion: "Extend with project branch and remote-sync policy once the team's git flow is stable." }
                  - { id: "bugfix", title: "Bug fixing", source_story: "bugfix", status: "enabled", summary: "Drive a picked bug through reproduce, fix, test, review, and validation gates.", expansion: "Add narrower project bug policies through profile customizations or prompt overlays." }
                  - { id: "fix-tests", title: "Fix Tests", source_story: "fix-tests", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "code-review", title: "Code Review", source_story: "code-review", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "docs-review", title: "Docs Review", source_story: "docs-review", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "pr-refinement", title: "PR refinement", source_story: "pr-refinement", status: "enabled", summary: "Open or attach to a PR, monitor CI/review feedback, respond, and merge when accepted.", expansion: "Add provider-specific PR policy after the base loop is proven on real pull requests." }
                init_profile_status: "draft"
                last_error: ""
            - say: "Selected the review and quality pack."
        - when: "slots.pack == 'full-dev-story'"
          target: init
          effects:
            - set:
                init_story_pack: "full-dev-story"
                init_story_pack_title: "Full dev-story"
                init_story_pack_summary: "Expose the full day-level dev-story catalog after the team is ready for broader adoption."
                init_starter_stories:
                  - { id: "setup", title: "Project setup", source_story: "dev-story:onboarding", status: "enabled", summary: "Onboard the checkout, install project-local Kitsoki tooling, and run explicit readiness checks.", expansion: "Keep this enabled as the team's bootstrap and refresh path." }
                  - { id: "git-ops", title: "Git operations", source_story: "git-ops", status: "enabled", summary: "Use the guarded git command hub for status, worktrees, commits, rebases, sync, and integration.", expansion: "Extend with project branch and remote-sync policy once the team's git flow is stable." }
                  - { id: "bugfix", title: "Bug fixing", source_story: "bugfix", status: "enabled", summary: "Drive a picked bug through reproduce, fix, test, review, and validation gates.", expansion: "Add narrower project bug policies through profile customizations or prompt overlays." }
                  - { id: "fix-tests", title: "Fix Tests", source_story: "fix-tests", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "pr-refinement", title: "PR refinement", source_story: "pr-refinement", status: "enabled", summary: "Open or attach to a PR, monitor CI/review feedback, respond, and merge when accepted.", expansion: "Add provider-specific PR policy after the base loop is proven on real pull requests." }
                  - { id: "prd", title: "Prd", source_story: "prd", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "implementation", title: "Implementation", source_story: "implementation", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "deliver", title: "Deliver", source_story: "deliver", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "code-review", title: "Code Review", source_story: "code-review", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "docs-review", title: "Docs Review", source_story: "docs-review", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "deploy", title: "Deploy", source_story: "deploy", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "observability", title: "Observability", source_story: "observability", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
                  - { id: "incident", title: "Incident", source_story: "incident", status: "enabled", summary: "Project-selected Kitsoki story. Confirm it loads and has project-ready fixtures before treating it as a default path.", expansion: "Promote this story after adding project readiness evidence." }
