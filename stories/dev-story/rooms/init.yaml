  init_ticket_provider:
    description: "Choose the ticket provider before onboarding writes the project profile."
    relevant_world:
      - init_target_path
      - init_project_title
      - init_tracker
      - init_ticket_provider
      - init_ticket_repo
      - init_repo_remote
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "choose ticket provider"
          color:    "#14B8A6"
      - kv:
          pairs:
            Target:   "{{ world.init_target_path|default:world.repo_root|default:world.workdir|default:'.' }}"
            Project:  "{{ world.init_project_title|default:'(not yet inferred)' }}"
            Detected: "{% if world.init_tracker == 'github' %}GitHub Issues{% else %}no remote provider detected{% endif %}"
            Repository: "{{ world.init_ticket_repo|default:'(none)' }}"
            Selected: "{% if world.init_ticket_provider == 'github' %}GitHub Issues{% else %}local markdown / pasted reports{% endif %}"
      - prose: "Good capability is available without a provider: paste bug reports or keep local markdown tickets. Full ticket capability uses a configured provider for search, issue-body fetch, comments, and status transitions."
      - choice:
          mode: single
          prompt: "Ticket provider"
          items:
            - label:  "local reports"
              hint:   "good capability; no remote credentials required"
              intent: select_ticket_provider
              slots:  { provider: "local" }
            - label:  "GitHub detected"
              hint:   "full capability using the detected owner/repo"
              intent: select_ticket_provider
              slots:  { provider: "github" }
              when:   "world.init_ticket_repo != ''"
            - label:  "GitHub repo"
              hint:   "full capability with an owner/repo slug"
              intent: select_ticket_provider
              param:
                slot:        repo
                type:        string
                placeholder: "owner/repo"
                required:    true
            - label:  "back"
              hint:   "return to profile review"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      select_ticket_provider:
        - when: "slots.provider == 'local'"
          target: init
          effects:
            - set:
                init_ticket_provider: "local"
                init_ticket_repo: ""
                init_profile_status: "draft"
                last_error: ""
            - say: "Selected local ticket intake."
        - when: "slots.provider == 'github' && world.init_ticket_repo != ''"
          target: init
          effects:
            - set:
                init_ticket_provider: "github"
                init_profile_status: "draft"
                last_error: ""
            - say: "Selected GitHub Issues for {{ world.init_ticket_repo }}."
        - when: "slots.repo != nil && slots.repo != ''"
          target: init
          effects:
            - set:
                init_ticket_provider: "github"
                init_ticket_repo: "{{ slots.repo }}"
                init_profile_status: "draft"
                last_error: ""
            - say: "Selected GitHub Issues for {{ slots.repo }}."
        - default: true
          target: .
          guard_hint: "Choose local reports or provide a GitHub owner/repo slug."
      quit:
        - target: init
          effects:
            - set:
                init_profile_status: "draft"
                last_error: ""
      look:
        - target: .

  init_profile_draft:
    description: "Ask an LLM for a richer project-profile/v1 candidate before validation."
    relevant_world:
      - init_discovery
      - init_profile_draft
      - init_target_path
      - init_project_id
      - init_feedback
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "LLM profile draft"
          color:    "#8B5CF6"
      - kv:
          pairs:
            Target:  "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Status:  "{{ world.init_profile_status }}"
      - prose: "Drafting a project-profile/v1 candidate from deterministic discovery and repository evidence."
        when: "world.init_profile_draft.schema == ''"
      - kv:
          pairs:
            Draft: "{{ world.init_profile_draft.id|default:'(pending)' }}"
            Path:  "{{ world.init_profile_draft.kitsoki.instance.path|default:'(pending)' }}"
        when: "world.init_profile_draft.schema != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "validate"
              hint: "run JSON Schema and semantic validation"
              intent: profile_drafted
              when: "world.init_profile_draft.schema != ''"
            - label: "retry"
              hint: "discard this draft and ask again"
              intent: draft_profile
            - label: "back"
              hint: "return to deterministic profile review"
              intent: quit
            - label: "look"
              hint: "re-render"
              intent: look
    on_enter:
      - invoke: host.agent.decide
        id: draft_profile
        once: true
        with:
          prompt: prompts/init_profile_draft.md
          schema: schemas/project-profile.json
          agent: profile_drafter
          args:
            discovery:   "{{ world.init_discovery }}"
            feedback:    "{{ world.init_feedback }}"
            target_path: "{{ world.init_target_path }}"
        bind:
          init_profile_draft: submitted
        on_error: init
    on:
      profile_drafted:
        - when: "world.init_profile_draft.schema != ''"
          target: init_profile_validate
          effects:
            - set:
                init_profile_status: "validating-profile"
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
        - default: true
          target: .
          effects:
            - set:
                last_error: "Profile draft is not ready yet."
      draft_profile:
        - target: .
          effects:
            - set:
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
      quit:
        - target: init
          effects:
            - set:
                init_profile_status: "draft"
                init_profile_mode: "deterministic"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
      look:
        - target: .

  init_profile_validate:
    description: "Validate an LLM-drafted project profile before it can be applied."
    relevant_world:
      - init_profile_draft
      - init_profile_validation
      - init_target_path
      - init_project_id
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "schema + semantic validation"
          color:    "#0EA5E9"
      - kv:
          pairs:
            Target: "{{ world.init_target_path }}"
            Draft:  "{{ world.init_profile_draft.id|default:'(pending)' }}"
            Status: "{{ world.init_profile_status }}"
      - prose: "The draft must pass the embedded project-profile JSON Schema and Kitsoki semantic checks before apply can use it."
      - kv:
          pairs:
            OK:       "{{ world.init_profile_validation.ok|default:false }}"
            Schema:   "{{ world.init_profile_validation.schema|default:'[]' }}"
            Semantic: "{{ world.init_profile_validation.semantic|default:'[]' }}"
            Warnings: "{{ world.init_profile_validation.warnings|default:'[]' }}"
        when: "len(world.init_profile_validation) > 0"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "use draft"
              hint: "return to review with this validated profile selected"
              intent: profile_validated
              when: "world.init_profile_validation.ok"
            - label: "revise draft"
              hint: "ask the LLM for a corrected profile"
              intent: draft_profile
            - label: "back"
              hint: "return to deterministic profile review"
              intent: quit
            - label: "look"
              hint: "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: validate_profile
        with:
          cmd: kitsoki
          args:
            - "project-profile"
            - "validate"
            - "--json"
            - "--envelope"
            - "--repo-root"
            - "{{ world.init_target_path }}"
            - "--profile-json"
            - "{{ world.init_profile_draft }}"
        bind:
          init_profile_validation: "stdout_json"
          init_profile_json: "stdout_json.profile_json"
        on_error: init_profile_validate
    on:
      profile_validated:
        - when: "world.init_profile_validation.ok"
          target: init
          effects:
            - set:
                init_profile_status: "draft"
                init_profile_mode: "llm-validated"
                last_error: ""
        - default: true
          target: .
          effects:
            - set:
                last_error: "Profile validation has not passed."
      draft_profile:
        - target: init_profile_draft
          effects:
            - set:
                init_profile_status: "drafting-with-llm"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
                last_error: ""
      quit:
        - target: init
          effects:
            - set:
                init_profile_status: "draft"
                init_profile_mode: "deterministic"
                init_profile_draft: {}
                init_profile_validation: {}
                init_profile_json: ""
      look:
        - target: .

  init_apply:
    description: "Apply the reviewed onboarding files to the target checkout."
    relevant_world:
      - init_discovery
      - init_apply_result
      - init_target_path
      - init_project_id
      - init_project_title
      - init_profile_status
      - init_apply_output
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "applying local setup"
          color:    "#14B8A6"
      - kv:
          pairs:
            Target:  "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Status:  "{{ world.init_profile_status }}"
      - prose: "Writing local Kitsoki onboarding files. No agents or project tests run in this step."
        when: "world.init_apply_result.status != 'applied'"
      - kv:
          pairs:
            Config:   "{{ world.init_apply_result.config_path|default:'' }}"
            Profile:  "{{ world.init_apply_result.profile_path|default:'' }}"
            Instance: "{{ world.init_apply_result.instance_path|default:'' }}"
        when: "world.init_apply_result.status == 'applied'"
      - kv:
          pairs:
            Mining seed: "{{ world.init_apply_result.mining_seed_path }}"
        when: "world.init_apply_result.mining_seed_path != ''"
      - prose: "Installed the kitsoki agent toolkit (skills + subagents) and registered the studio MCP."
        when: "world.init_tools_ok"
      - kv:
          pairs:
            Profile validation: "{{ world.init_apply_result.profile_validation.ok|default:false }}"
        when: "world.init_apply_result.status == 'applied'"
      - heading: "Validation Warnings"
        when: "world.init_apply_result.profile_validation.warnings"
      - code: |
          {% for warning in world.init_apply_result.profile_validation.warnings %}- {{ warning }}
          {% endfor %}
        when: "world.init_apply_result.profile_validation.warnings"
      - kv:
          pairs:
            MCP: "{{ world.init_tools_result.mcp_path|default:'(pending)' }}"
        when: "world.init_tools_ok"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "show the applied onboarding result"
              intent: init_applied
              when:   "world.init_apply_result.status == 'applied'"
            - label:  "retry"
              hint:   "rerun apply"
              intent: init_applied
              when:   "world.init_apply_result.status != 'applied'"
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: apply
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -eu
              script_name="$0"
              find_init_script() {
                name="$1"
                for root in \
                  "${KITSOKI_APP_DIR:-}" \
                  "${KITSOKI_REPO:+$KITSOKI_REPO/stories/dev-story}" \
                  "$PWD/stories/dev-story" \
                  "$PWD/internal/basestories/stories/dev-story"
                do
                  [ -n "$root" ] || continue
                  candidate="$root/scripts/$name"
                  if [ -f "$candidate" ]; then
                    printf '%s\n' "$candidate"
                    return 0
                  fi
                done
                cache_root="${XDG_CACHE_HOME:-${HOME:-}/.cache}/kitsoki/stories"
                if [ -d "$cache_root" ]; then
                  for candidate in "$cache_root"/*/dev-story/scripts/"$name"; do
                    if [ -f "$candidate" ]; then
                      printf '%s\n' "$candidate"
                      return 0
                    fi
                  done
                fi
                return 1
              }
              script="$(find_init_script "$script_name")" || {
                printf '{"schema":"kitsoki-init-script/v1","status":"error","error":"init helper not found: %s"}\n' "$script_name"
                exit 1
              }
              exec python3 "$script" "$@"
            - "init_apply.py"
            - "{{ world.init_target_path }}"
            - "{{ world.init_project_id }}"
            - "{{ world.init_project_title }}"
            - "{{ world.init_stack }}"
            - "{{ world.init_dev_command }}"
            - "{{ world.init_test_command }}"
            - "{{ world.init_build_command }}"
            - "{{ world.init_conventions }}"
            - "{{ world.init_ticket_provider == 'github' ? 'github' : 'none' }}"
            - "{{ world.init_profile_json }}"
            - "{{ world.init_mining_recommendation }}"
            - "{{ world.init_starter_stories }}"
            - "{{ world.init_story_pack }}"
            - "{{ world.init_ticket_repo }}"
          fail_on_error: true
        bind:
          init_apply_ok: "ok"
          init_apply_output: "stdout"
          init_apply_result: "stdout_json"
        on_error: init_apply_failed
      # Install the kitsoki agent toolkit (skills + shared subagents) and
      # register the studio MCP into the target checkout, so an onboarded
      # project is a fully working kitsoki environment (not just config files).
      # This is load-bearing: a failed install (e.g. the toolkit was not staged
      # into the binary, or the command errored) must NOT silently pass as
      # "applied" — `fail_on_error: true` makes a non-zero exit set the host
      # error, and `on_error` routes to a loud read-out the operator can retry.
      # `kitsoki` resolves via host.run's kitsoki-bin-on-PATH (the running
      # binary), independent of the operator's login PATH.
      - invoke: host.run
        once: true
        id: install_tools
        with:
          cmd: kitsoki
          args:
            - "project-tools"
            - "install"
            - "--json"
            - "--target"
            - "{{ world.init_target_path }}"
          fail_on_error: true
        bind:
          init_tools_ok: "ok"
          init_tools_output: "stdout"
          init_tools_result: "stdout_json"
        on_error: init_tools_failed
    on:
      init_applied:
        - when: "world.init_apply_result.status == 'applied'"
          target: init_done
          effects:
            - set:
                init_profile_status: "{{ world.init_apply_result.status ?? 'applied' }}"
                last_error: ""
            - say: "Project onboarding files applied."
        - default: true
          target: init_apply_failed
          effects:
            - set:
                init_profile_status: "apply-failed"
                last_error: "project onboarding apply failed"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_apply"
      look:
        - target: .

  init_apply_failed:
    description: "Project onboarding apply failed before all files were written."
    relevant_world:
      - init_apply_result
      - init_apply_output
      - init_target_path
      - init_project_id
      - init_project_title
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "apply failed"
          color:    "#EF4444"
      - prose: >-
          Profile validation failed during apply. Return to the profile review
          before retrying; rerunning apply will repeat the same validation
          failure until the profile is corrected.
        when: "world.init_apply_result.status == 'profile-validation-failed'"
      - prose: "Apply did not complete successfully. Review the output, then retry or return to the profile review."
        when: "world.init_apply_result.status != 'profile-validation-failed'"
      - kv:
          pairs:
            Target:  "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Status:  "{{ world.init_profile_status }}"
      - heading: "Output"
        when: "world.init_apply_output != ''"
      - code: "{{ world.init_apply_output }}"
        when: "world.init_apply_output != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "review"
              hint:   "return to the profile review"
              intent: revise_init
              slots:
                feedback: "review after apply failure"
              when:   "world.init_apply_result.status == 'profile-validation-failed'"
            - label:  "retry"
              hint:   "rerun apply"
              intent: confirm_init
              when:   "world.init_apply_result.status != 'profile-validation-failed'"
            - label:  "review"
              hint:   "return to the profile review"
              intent: revise_init
              slots:
                feedback: "review after apply failure"
              when:   "world.init_apply_result.status != 'profile-validation-failed'"
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      confirm_init:
        - target: init_apply
          effects:
            - set:
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                init_profile_status: "applying"
                last_error: ""
      revise_init:
        - target: init
          effects:
            - set:
                init_feedback: "{{ slots.feedback }}"
                init_profile_status: "needs-revision"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_apply_failed"
      look:
        - target: .

  init_tools_failed:
    description: "Config + instance were written, but the toolkit + studio MCP install failed."
    relevant_world:
      - init_target_path
      - init_project_title
      - init_apply_result
      - init_tools_output
      - init_profile_status
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "toolkit + MCP install failed"
          color:    "#EF4444"
      - prose: >-
          The onboarding files were written, but installing the kitsoki agent
          toolkit (skills + subagents) and registering the studio MCP did not
          complete. Without it this checkout has config but cannot drive kitsoki
          (no .mcp.json, no skills/agents). If the binary reports the toolkit was
          not staged, rebuild with `make embed-skills` (wired into `make
          install`). You can retry, or continue and install it later by hand with
          `kitsoki project-tools install --target {{ world.init_target_path }}`.
      - kv:
          pairs:
            Target:   "{{ world.init_target_path }}"
            Project:  "{{ world.init_project_title }}"
            Config:   "{{ world.init_apply_result.config_path|default:'' }}"
            Instance: "{{ world.init_apply_result.instance_path|default:'' }}"
      - heading: "Output"
        when: "world.init_tools_output != ''"
      - code: "{{ world.init_tools_output }}"
        when: "world.init_tools_output != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "retry"
              hint:   "rerun apply + toolkit/MCP install"
              intent: confirm_init
            - label:  "continue"
              hint:   "proceed without the toolkit (install it by hand later)"
              intent: init_applied
            - label:  "quit"
              hint:   "back to the workbench"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      confirm_init:
        - target: init_apply
          effects:
            - set:
                init_apply_result: {}
                init_apply_ok: false
                init_apply_output: ""
                init_tools_result: {}
                init_tools_ok: false
                init_tools_output: ""
                init_readiness_result: {}
                init_readiness_ok: false
                init_readiness_output: ""
                init_customization_result: {}
                init_customization_ok: false
                init_customization_output: ""
                init_customization_action: "promote"
                init_customization_feedback: ""
                init_profile_status: "applying"
                last_error: ""
      init_applied:
        - target: init_done
          effects:
            - set:
                init_profile_status: "applied-no-tools"
                last_error: "onboarding applied; toolkit + MCP install skipped (run `kitsoki project-tools install` to finish)"
      quit:
        - target: landing
          effects:
            - set:
                last_error: "project onboarding closed"
                prev_state: "init_tools_failed"
      look:
        - target: .

  init_done:
    description: "Show the applied project onboarding result."
    relevant_world:
      - init_apply_result
      - init_target_path
      - init_project_id
      - init_project_title
      - init_profile_status
      - init_readiness_result
      - init_readiness_ok
      - init_readiness_output
      - init_customization_result
      - init_customization_ok
      - init_customization_output
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "applied"
          color:    "#22C55E"
      - kv:
          pairs:
            Target:        "{{ world.init_target_path }}"
            Project:       "{{ world.init_project_title }}"
            Status:        "{{ world.init_profile_status }}"
            Config:        "{{ world.init_apply_result.config_path|default:'' }}"
            Profile:       "{{ world.init_apply_result.profile_path|default:'' }}"
            Profile valid: "{{ world.init_apply_result.profile_validation.ok|default:false }}"
            Instance:      "{{ world.init_apply_result.instance_path|default:'' }}"
            Gitignore:     "{{ world.init_apply_result.gitignore_path|default:'' }}"
            Readiness:     "{{ world.init_readiness_result.status|default:'not-run' }}"
            Customizations: "{{ world.init_customization_result.counts.pending|default:0 }} pending"
      - heading: "Writes"
        when: "world.init_apply_result.writes"
      - template: |
          {% for path in world.init_apply_result.writes %}- {{ path }}
          {% endfor %}
        when: "world.init_apply_result.writes"
      - heading: "Readiness"
        when: "world.init_readiness_result.status != ''"
      - kv:
          pairs:
            Status: "{{ world.init_readiness_result.status|default:'unknown' }}"
            Report: "{{ world.init_readiness_result.out|default:'.artifacts/kitsoki-readiness.json' }}"
        when: "world.init_readiness_result.status != ''"
      - template: |
          {% for check in world.init_readiness_result.checks %}- {{ check.id }}: {{ check.status }} — {{ check.detail }}
          {% endfor %}
        when: "world.init_readiness_result.checks"
      - heading: "Mined Customizations"
        when: "world.init_customization_result.entries"
      - template: |
          {% for entry in world.init_customization_result.entries %}- {{ entry.id }}: {{ entry.status }} — {{ entry.summary }}
          {% endfor %}
        when: "world.init_customization_result.entries"
      - heading: "Actions"
      - choice:
          mode: single
          prompt: ""
          items:
            - label:  "customizations"
              hint:   "promote and review session-mined project customizations"
              intent: review_customizations
            - label:  "readiness"
              hint:   "run declared post-apply checks and update the profile readiness summary"
              intent: run_readiness
            - label:  "workbench"
              hint:   "return to the dev-story workbench"
              intent: go_main
            - label:  "look"
              hint:   "re-render"
              intent: look
    on:
      review_customizations:
        - target: init_customizations
          effects:
            - set:
                init_customization_result: {}
                init_customization_ok: false
                init_customization_output: ""
                init_customization_action: "promote"
                init_customization_feedback: ""
                init_profile_status: "reviewing-customizations"
                last_error: ""
      run_readiness:
        - target: init_readiness
          effects:
            - set:
                init_readiness_result: {}
                init_readiness_ok: false
                init_readiness_output: ""
                init_profile_status: "checking-readiness"
                last_error: ""
      go_main:
        - target: landing
          effects:
            - set:
                prev_state: "init_done"
                last_error: "project onboarding complete"
      look:
        - target: .

  init_customizations:
    description: "Review session-mined project customizations after onboarding."
    relevant_world:
      - init_target_path
      - init_project_title
      - init_profile_status
      - init_customization_result
      - init_customization_ok
      - init_customization_output
      - init_customization_action
      - init_customization_feedback
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "customization review"
          color:    "#A855F7"
      - prose: "Promoting emitted session-mining reports into pending profile customizations for operator review."
        when: "world.init_customization_result.action == ''"
      - kv:
          pairs:
            Target: "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Action: "{{ world.init_customization_result.action|default:world.init_customization_action }}"
            Pending: "{{ world.init_customization_result.counts.pending|default:0 }}"
            Accepted: "{{ world.init_customization_result.counts.accepted|default:0 }}"
            Needs refinement: "{{ world.init_customization_result.counts.needs_refinement|default:0 }}"
      - heading: "Entries"
        when: "world.init_customization_result.entries"
      - template: |
          {% for entry in world.init_customization_result.entries %}- {{ entry.id }}: {{ entry.status }} — {{ entry.summary }}
            evidence: {{ entry.evidence }}
          {% endfor %}
        when: "world.init_customization_result.entries"
      - heading: "Changed"
        when: "world.init_customization_result.changed"
      - template: |
          {% for entry in world.init_customization_result.changed %}- {{ entry.id }}: {{ entry.status }} — {{ entry.summary }}
          {% endfor %}
        when: "world.init_customization_result.changed"
      - heading: "Feedback"
        when: "world.init_customization_feedback != ''"
      - prose: "{{ world.init_customization_feedback }}"
        when: "world.init_customization_feedback != ''"
      - heading: "Output"
        when: "world.init_customization_output != ''"
      - code: "{{ world.init_customization_output|default:'' }}"
        when: "world.init_customization_output != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "mark pending customizations accepted in the profile"
              intent: accept_customizations
            - label:  "refine"
              hint:   "record feedback on pending customizations"
              intent: refine_customizations
              param:
                slot: feedback
                type: string
                placeholder: "what should change"
                required: true
            - label:  "refresh"
              hint:   "promote newly emitted mining reports"
              intent: review_customizations
            - label:  "continue"
              hint:   "return to the applied onboarding result"
              intent: customizations_reviewed
            - label:  "workbench"
              hint:   "return to the dev-story workbench"
              intent: go_main
            - label:  "look"
              hint:   "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: customizations
        with:
          cmd: bash
          cwd: "{{ world.init_target_path }}"
          args:
            - "-c"
            - |
              if [ ! -f .kitsoki/promote-session-mining.py ]; then
                printf '{"action":"missing-helper","entries":[],"changed":[],"counts":{},"updated":false,"error":".kitsoki/promote-session-mining.py was not found"}\n'
                exit 0
              fi
              case "$1" in
                accept)
                  python3 .kitsoki/promote-session-mining.py --accept-pending --json
                  ;;
                refine)
                  python3 .kitsoki/promote-session-mining.py --refine-pending "$2" --json
                  ;;
                list)
                  python3 .kitsoki/promote-session-mining.py --list --json
                  ;;
                *)
                  python3 .kitsoki/promote-session-mining.py --json
                  ;;
              esac
            - "customizations"
            - "{{ world.init_customization_action }}"
            - "{{ world.init_customization_feedback }}"
          timeout: "2m"
        bind:
          init_customization_ok: "ok"
          init_customization_output: "stdout"
          init_customization_result: "stdout_json"
    on:
      accept_customizations:
        - target: .
          effects:
            - set:
                init_customization_result: {}
                init_customization_ok: false
                init_customization_output: ""
                init_customization_action: "accept"
                init_customization_feedback: ""
                last_error: ""
      refine_customizations:
        - target: .
          effects:
            - set:
                init_customization_result: {}
                init_customization_ok: false
                init_customization_output: ""
                init_customization_action: "refine"
                init_customization_feedback: "{{ slots.feedback }}"
                last_error: ""
      review_customizations:
        - target: .
          effects:
            - set:
                init_customization_result: {}
                init_customization_ok: false
                init_customization_output: ""
                init_customization_action: "promote"
                init_customization_feedback: ""
                last_error: ""
      customizations_reviewed:
        - target: init_done
          effects:
            - set:
                init_profile_status: "{{ world.init_apply_result.status ?? 'applied' }}"
                last_error: ""
      go_main:
        - target: landing
          effects:
            - set:
                prev_state: "init_customizations"
                last_error: "project onboarding customizations reviewed"
      look:
        - target: .

  init_readiness:
    description: "Run the generated post-apply readiness verifier for an onboarded target."
    relevant_world:
      - init_target_path
      - init_project_title
      - init_profile_status
      - init_readiness_result
      - init_readiness_ok
      - init_readiness_output
    view:
      - banner:
          text:     "PROJECT ONBOARDING"
          subtitle: "readiness check"
          color:    "#0EA5E9"
      - prose: "Running the generated readiness verifier against the target checkout. Project command failures are captured as report data."
        when: "world.init_readiness_result.status == ''"
      - kv:
          pairs:
            Target: "{{ world.init_target_path }}"
            Project: "{{ world.init_project_title }}"
            Status: "{{ world.init_readiness_result.status|default:world.init_profile_status }}"
            Report: "{{ world.init_readiness_result.out|default:'.artifacts/kitsoki-readiness.json' }}"
      - heading: "Checks"
        when: "world.init_readiness_result.checks"
      - template: |
          {% for check in world.init_readiness_result.checks %}- {{ check.id }}: {{ check.status }} — {{ check.detail }}
          {% endfor %}
        when: "world.init_readiness_result.checks"
      - heading: "Output"
        when: "world.init_readiness_output != ''"
      - code: "{{ world.init_readiness_output|default:'' }}"
        when: "world.init_readiness_output != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "return to the applied onboarding result"
              intent: readiness_checked
            - label:  "retry"
              hint:   "rerun readiness checks"
              intent: run_readiness
            - label:  "workbench"
              hint:   "return to the dev-story workbench"
              intent: go_main
            - label:  "look"
              hint:   "re-render"
              intent: look
    on_enter:
      - invoke: host.run
        once: true
        id: readiness
        with:
          cmd: bash
          cwd: "{{ world.init_target_path }}"
          args:
            - "-c"
            - |
              if [ ! -f .kitsoki/check-readiness.py ]; then
                printf '{"schema":"kitsoki-readiness/v1","status":"error","out":".artifacts/kitsoki-readiness.json","checks":[{"id":"readiness-script","status":"fail","detail":".kitsoki/check-readiness.py was not found"}]}\n'
                exit 0
              fi
              python3 .kitsoki/check-readiness.py --json --update-profile
          timeout: "10m"
        bind:
          init_readiness_ok: "ok"
          init_readiness_output: "stdout"
          init_readiness_result: "stdout_json"
    on:
      readiness_checked:
        - target: init_done
          effects:
            - set:
                init_profile_status: "{{ world.init_apply_result.status ?? 'applied' }}"
                last_error: ""
      run_readiness:
        - target: .
          effects:
            - set:
                init_readiness_result: {}
                init_readiness_ok: false
                init_readiness_output: ""
                last_error: ""
      go_main:
        - target: landing
          effects:
            - set:
                prev_state: "init_readiness"
                last_error: "project onboarding readiness checked"
      look:
        - target: .
