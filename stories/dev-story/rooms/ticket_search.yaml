# ticket_search — provider-neutral ticket search. Replaces the legacy
# Jira-flavoured `testdata/apps/dev-story/rooms/jira_search.yaml`.
#
# Search dispatches via iface.ticket.search; in standalone runs the
# default binding (host.local_files.ticket) scans the configured
# ticket globs. The cyber-repo flavour rebinds iface.ticket to
# host.jira via the parent instance's host_bindings.
#
# After picking a ticket, the operator transitions into the bf import
# (`go_bugfix`) which projects the picked ticket's keys into bf's
# private world via world_in:.

states:

  ticket_search:
    description: "Browse tickets — pick one, then `continue` into the bugfix pipeline."
    relevant_world: [ticket_query, ticket_results, ticket_id, ticket_title]
    # Proactive fetch on entry — the operator should land here and SEE
    # the queue, not be prompted to type a search query first. The
    # empty `ticket_query` default returns the full list; the optional
    # `search_tickets` intent narrows it via the ticket_searching state.
    #
    # NOTE: ordering today is filed_at-ASC (host's listAllBugs sorts by
    # id, and ids are ISO-prefixed). `|reverse` in the view flips that
    # to newest-first. True priority ranking requires the host to read
    # `severity:` (not `priority:`) and sort multi-key — see
    # internal/host/localfiles_ticket.go: bugSummary / listAllBugs.
    on_enter:
      - invoke: iface.ticket.search
        with:
          query: "{{ world.ticket_query }}"
          limit: 25
        bind:
          ticket_results: tickets
        on_error: ticket_search
    view:
      extends: "base"
      blocks:
        body:
          - heading: 'Tickets{% if world.ticket_query %} (filter: {{ world.ticket_query }}){% endif %}'
          # Live result list bound from iface.ticket.search in on_enter.
          # Style guide §6.2 — the canonical "render a world array as a
          # list element" shape is still TBD; until then this code: block
          # is the agreed pattern across operator stories.
          #
          # # Table format (one line per ticket)
          #
          #   {pick} {status} {sev} {date}     {title-truncated}
          #
          # Columns (all fixed-width via `|col:N`, so the header line
          # and every row align even when terminal width is tight):
          #
          #   pick    1 char  — ★ for the currently-picked ticket, blank
          #                     otherwise
          #   status  1 char  — ●/◐/○ glyph by ticket lifecycle state
          #   sev     3 chars — P0..P3 (or blank for severity-less rows)
          #   date   10 chars — `id|slice:":10"` is the ISO-prefix
          #                     YYYY-MM-DD portion of the local-files-
          #                     provider id, used as the "Filed" date
          #                     until the host exposes filed_at as a
          #                     first-class summary field
          #   title  52 chars — `truncatechars:52` adds an ellipsis when
          #                     the title overflows so the operator sees
          #                     "this row has more text"
          #
          # # Why a `code:` block instead of a typed `table:` element
          #
          # A dedicated `table:` element would be cleaner long-term but
          # is a meatier addition (new element kind in app/view_element.go,
          # new renderer in render/elements/, new dispatcher case). The
          # `|col:N` / `|rcol:N` pongo2 filters added in this commit
          # let an author build aligned-column output inside a regular
          # `code:` block — same primitive a Python author would reach
          # for, no element-layer churn.
          #
          # # README-style ghost rows
          #
          # The local-files provider's lister scans `issues/{bugs,features
          # ,epics}/` and emits a row per `*.md`, including section
          # READMEs without frontmatter. Those rows have empty `status`
          # and no `severity`, so the `{% if t.status %}` guard below
          # drops them — a real ticket always has a status per
          # `issues/README.md` §2. (A host-side filter is the right
          # long-term fix; this is the band-aid until the same dogfood
          # cycle resolves the open localfiles ticket.)
          #
          # # Severity field name
          #
          # `t.severity` is the on-disk frontmatter field per
          # `issues/README.md` §2. The fallback to `t.priority` covers
          # the transition window — the local-files provider's
          # `bugSummary` (open ticket 2026-05-18T045257Z-localfiles-
          # ticket-rank-by-severity-and-recency) still projects the
          # field as `priority` on HEAD; once that fix lands the
          # fallback is a no-op.
          #
          # # Where's the ticket ID?
          #
          # Local-files-provider IDs are 60-char ISO-timestamped slugs.
          # Showing them in a row inflates the line past every
          # reasonable terminal width and pushes the title off-screen.
          # We omit the ID column from the table and keep the full ID
          # in the `Picked:` kv pair below so the operator can see
          # exactly what was selected. For first-time picks, the
          # operator reads the title to identify the ticket and types
          # `pick_ticket id=<filename>`; a future change should expose
          # an index-based pick (`pick_ticket n=2`) so the ID stops
          # being typed at all.
          - code: |
              {% if world.ticket_results|length == 0 %}(none — file one in issues/bugs/)
              {% else %}     St  Sev  Filed       Title
              {% for t in world.ticket_results|reverse %}{% if t.status %}   {% if t.id == world.ticket_id %}★{% else %} {% endif %}  {% if t.status == "resolved" or t.status == "closed" %}●{% elif t.status == "in-progress" or t.status == "in_progress" %}◐{% elif t.status == "open" %}○{% else %}·{% endif %}  {{ t.severity|default:t.priority|default:""|col:3 }}  {{ t.id|slice:":10"|col:10 }}  {{ t.title|default:"(untitled)"|truncatechars:52 }}
              {% endif %}{% endfor %}{% endif %}
          # Readiness banner. Two sibling elements with mutually-exclusive
          # `when:` guards: the ready case is a `heading:` (emerald-bold,
          # the style-guide §1 "go" color), the not-ready case is a plain
          # `prose:` paragraph (no false green). The glyph carries the
          # state across mono-colour renders too.
          - heading: "✓ Ready — type `continue` to hand off to the bugfix pipeline"
            when:  "world.ticket_id != ''"
          - prose: "✗ Pick a ticket from the list above to continue."
            when:  "world.ticket_id == ''"
          - kv:
              pairs:
                # Title-first to match the row format above; ID trails in
                # parentheses so a quick glance lands on the human label.
                # The "(none — …)" hint advertises the pick_ticket syntax
                # when the operator has not picked yet.
                Picked: '{% if world.ticket_id %}{{ world.ticket_title|default:"(no title)" }}  ({{ world.ticket_id }}){% else %}(none — type `pick_ticket id=<TKT>` from the list above){% endif %}'
        choices:
          - heading: "Actions"
          - list:
              items:
                # Primary drive-forward action. `continue` is the canonical
                # name; `go_bugfix` is kept as a hidden alias on the `on:`
                # block below for flows/fixtures that still reference it.
                - label: "continue"
                  hint:  "hand the picked ticket to the bugfix pipeline"
                  when:  "available('continue')"
                - label: "✗ continue — {{ blocked_reason('continue') }}"
                  when:  "!available('continue')"
                - label: "pick_ticket id=<TKT>"
                  hint:  "pick a ticket from the list above"
                - label: "search_tickets query=<text>"
                  hint:  "narrow the list"
                - label: "go_back"
                - label: "go_main"
                - label: "look"
    on:
      search_tickets:
        - target: ticket_searching
          effects:
            - set:
                ticket_query:   "{{ slots.query }}"
                ticket_results: ""
      pick_ticket:
        # Stash the picked id + a placeholder title. The optional
        # `type:` slot pins ticket_type for the drive arc; fixtures
        # and operators that know the routing target set it directly.
        # Live-typed picks without the slot keep whatever ticket_type
        # was previously in world — a future iface.ticket.get on entry
        # to main (which reads the type from the local-files provider's
        # source dir tagging) can populate it lazily.
        #
        # The local-files provider scans issues/{bugs,features,
        # epics}/ and tags every row with its source kind; that tag
        # surfaces via world.ticket_results but the kitsoki expr engine
        # forbids loop-var member access inside set: templates, so we
        # rely on slots.type instead of an in-template row lookup.
        #
        # `target: .` is deliberate — pick should NOT re-fire on_enter
        # (the list is already in world.ticket_results from the fresh
        # fetch on the way in).
        - target: .
          effects:
            - set:
                ticket_id:     "{{ slots.id }}"
                ticket_type:   "{{ slots.type ?? world.ticket_type }}"
                thread:        "{{ slots.id }}"
            # iface.ticket.get returns the real human-readable
            # title from the ticket's frontmatter; bind it as
            # ticket_title so downstream rooms (bugfix phases,
            # impl review) display "Date — Title" instead of
            # the 60-char ID slug + "(picked from list)" stub.
            - invoke: iface.ticket.get
              with:
                id: "{{ slots.id }}"
              bind:
                ticket_title: title
              on_error: idle
      # Hand off to the bugfix sub-story for the picked ticket.
      # bf.idle's on_enter auto-emits `start` when entered with a
      # ticket and no in-progress artifact, so the operator types
      # `continue` ONCE and lands inside the pipeline. world_in:
      # projects ticket_id / workdir / etc through the boundary.
      #
      # `continue` is the canonical name surfaced in the action menu;
      # `go_bugfix` is the legacy alias kept here so existing flows
      # and fixtures (dev-story/flows/*, scenarios/pickup_*.yaml, the
      # dogfood smoke test) keep working unchanged.
      continue:
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket from the list before continuing."
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket first."
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: main
      go_inbox:
        - target: inbox
          push_history: false
      look:
        - target: .

  ticket_searching:
    description: "Running ticket search."
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                "Searching for": "{{ world.ticket_query }}"
          - heading: "Results"
          - code: '{{ world.ticket_results|default:"(empty)" }}'
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "pick_ticket id=<TKT>"
                  hint:  "pick a ticket from the results"
                - label: "go_back"
                - label: "look"
    relevant_world: [ticket_query, ticket_results]
    on_enter:
      - invoke: iface.ticket.search
        with:
          query: "{{ world.ticket_query }}"
          limit: 25
        bind:
          ticket_results: tickets
        on_error: ticket_search
    on:
      pick_ticket:
        # Mirror of pick_ticket in ticket_search above — slot/world
        # precedence on ticket_type; see comment there.
        - target: ticket_search
          effects:
            - set:
                ticket_id:    "{{ slots.id }}"
                ticket_title: "(picked from search)"
                ticket_type:  "{{ slots.type ?? world.ticket_type }}"
                thread:       "{{ slots.id }}"
      search_tickets:
        - target: ticket_searching
          effects:
            - set:
                ticket_query: "{{ slots.query }}"
      go_back:
        - target: ticket_search
      go_main:
        - target: main
      go_inbox:
        - target: inbox
          push_history: false
      look:
        - target: .
