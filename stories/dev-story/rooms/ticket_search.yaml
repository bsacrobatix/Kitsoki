# ticket_search — provider-neutral ticket search. Replaces the legacy
# Jira-flavoured `testdata/apps/dev-story/rooms/jira_search.yaml`.
#
# Search dispatches via iface.ticket.search; in standalone runs the
# default binding (host.local_files.ticket) scans the configured
# ticket globs. The cyber-repo flavour rebinds iface.ticket to
# host.jira via the parent instance's host_bindings.
#
# After picking a ticket, the operator transitions into the bf import
# (`go_bugfix`) which projects the picked ticket's keys into bf's
# private world via world_in:.

states:

  ticket_search:
    description: "Search tickets across the configured provider."
    view: |
      Ticket search.

      Current query:   {{ world.ticket_query ?? "(empty)" }}
      Results:         {{ world.ticket_results ?? "(none yet)" }}
      Picked ticket:   {{ world.ticket_id ?? "(none)" }} {{ world.ticket_title }}

      Intents: search_tickets, pick_ticket, go_bugfix, go_back, go_main.
    relevant_world: [ticket_query, ticket_results, ticket_id, ticket_title]
    on:
      search_tickets:
        - target: ticket_searching
          effects:
            - set:
                ticket_query:   "{{ slots.query }}"
                ticket_results: ""
      pick_ticket:
        # Stash the picked id + a placeholder title. In Wave 2 we don't
        # invoke iface.ticket.get here (would need a real handler); the
        # bf import's world_in: just needs ticket_id to wire the rest
        # via the bug file lookup at the local-files binding's site.
        - target: ticket_search
          effects:
            - set:
                ticket_id:     "{{ slots.id }}"
                ticket_title:  "(picked from search)"
                thread:        "{{ slots.id }}"
      # Hand off to the bugfix sub-story for the picked ticket. The
      # `target: bf` compound enters at bf.idle; world_in: projects
      # ticket_id / workdir / etc.
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket first."
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: main
      go_inbox:
        - target: inbox
          push_history: false
      look:
        - target: .

  ticket_searching:
    description: "Running ticket search."
    view: |
      Searching for: {{ world.ticket_query }}

      Results:
      {{ world.ticket_results ?? "(empty)" }}

      Type `pick_ticket id=<TKT>` to pick, or `go_back`.
    relevant_world: [ticket_query, ticket_results]
    on_enter:
      - invoke: iface.ticket.search
        with:
          query: "{{ world.ticket_query }}"
          limit: 25
        bind:
          ticket_results: tickets
        on_error: ticket_search
    on:
      pick_ticket:
        - target: ticket_search
          effects:
            - set:
                ticket_id:    "{{ slots.id }}"
                ticket_title: "(picked from search)"
                thread:       "{{ slots.id }}"
      search_tickets:
        - target: ticket_searching
          effects:
            - set:
                ticket_query: "{{ slots.query }}"
      go_back:
        - target: ticket_search
      go_main:
        - target: main
      go_inbox:
        - target: inbox
          push_history: false
      look:
        - target: .
