# ticket_search — provider-neutral ticket search. Replaces the legacy
# Jira-flavoured `testdata/apps/dev-story/rooms/jira_search.yaml`.
#
# Search dispatches via iface.ticket.search; in standalone runs the
# default binding (host.local_files.ticket) scans the configured ticket globs.
# A generated project wrapper or importing instance can rebind iface.ticket to
# GitHub, Jira, or another provider via host_bindings.
#
# After picking a ticket, the operator transitions into the bf import
# (`go_bugfix`) which projects the picked ticket's keys into bf's
# private world via world_in:.

states:

  ticket_pick_error:
    description: "Ticket details could not be loaded; show the provider error and return to search."
    relevant_world: [ticket_id, ticket_source_ref, last_error]
    view:
      - banner:
          text: "TICKET FETCH FAILED"
          subtitle: "The selected local or remote ticket was not loaded"
          color: "#DC2626"
      - heading: "Ticket fetch failed"
      - prose: "{{ world.last_error|default:'(no provider error detail)' }}"
      - kv:
          pairs:
            Ticket: '{{ world.ticket_id|default:"(none)" }}'
            Source: '{{ world.ticket_source_ref|default:"(unknown)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "back to tickets", intent: go_back, hint: "refresh all configured ticket sources, then retry" }
            - { label: "go_main", intent: go_main, hint: "return to the engineering workbench" }
            - { label: "look", intent: look, hint: "re-render the provider error" }
    on:
      go_back:
        - target: ticket_search
      go_main:
        - target: landing
      look:
        - target: .

  ticket_search:
    description: "Browse tickets — pick one, then `continue` into the bugfix pipeline."
    relevant_world: [ticket_query, ticket_sources, ticket_results, ticket_source_groups, ticket_id, ticket_title, oversight_mode]
    # Proactive fetch on entry — the operator should land here and SEE
    # the queue, not be prompted to type a search query first. The
    # empty `ticket_query` default returns the full list; the optional
    # `search_tickets` intent narrows it via the ticket_searching state.
    #
    # Ordering: severity ASC then id DESC (newest first within each
    # severity bucket). Sorted host-side by listAllBugs in
    # `internal/host/localfiles_ticket.go`; the view iterates the
    # results as-is, no `|reverse` workaround needed.
    on_enter:
      - invoke: iface.ticket.search
        with:
          query: "{{ world.ticket_query }}"
          limit: 25
          # Ordered provider-neutral federation config. Empty preserves the
          # legacy single-provider repo/root path below.
          sources: "{{ world.ticket_sources }}"
          # repo is honoured by host.gh.ticket (the GitHub binding for
          # onboarded repos); ignored by host.local_files.ticket.
          # "" ⇒ gh's local-remote default.
          repo: "{{ world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo }}"
          # root is honoured by host.local_files.ticket (tickets under an
          # external checkout root); ignored by host.gh.ticket. "" ⇒ cwd.
          root: "{{ world.repo_root }}"
        bind:
          ticket_results: tickets
          ticket_source_groups: source_groups
          ticket_provider_errors: provider_errors
          ticket_local_count: local_count
          ticket_github_count: github_count
        on_error: ticket_search
    # Flattened view (no extends/blocks) — `choice:` cannot live
    # inside a `blocks:` map (see docs/stories/choice-widget.md §3.1).
    #
    # The ticket list is dynamic (world.ticket_results), so the
    # picker uses `param:` to capture the id rather than a literal
    # items[] enumeration. The two-rows-same-intent pattern
    # (cookbook §2.2) guards `go_bugfix` so the operator sees why
    # it's unavailable until a ticket is picked.
    view:
      # Live result list bound from iface.ticket.search in on_enter.
      # Style guide §6.2 — the canonical "render a world array as a
      # list element" shape is still TBD; until then this code: block
      # is the agreed pattern across operator stories.
      #
      # Table format (one line per ticket):
      #
      #   {n} {pick} {status} {sev} {date}     {title-truncated}
      #
      # Columns (fixed-width via `|col:N` / `|rcol:N`):
      #   n       2 chars — `forloop.Counter` right-aligned (1-based row index);
      #                     paired with the `pick_ticket n=<index>` choice item below
      #   pick    1 char  — ★ for the currently-picked ticket
      #   status  1 char  — ●/◐/○ by ticket lifecycle state
      #   sev     3 chars — P0..P3 (blank for severity-less rows)
      #   date   10 chars — `id|slice:":10"` ISO-date prefix
      #   title  52 chars — truncatechars:52 adds an ellipsis on overflow
      #
      # The host (`internal/host/localfiles_ticket.go`) sorts results by
      # severity ASC + id DESC, so the row index is stable across renders
      # within a session — safe to type `pick_ticket n=2` and have it
      # mean the same row the operator just read.
      #
      # Frontmatter-less Markdown is a valid local report: the local-files
      # provider normalizes a missing status to `open`, and the view renders
      # every returned row. README.md is excluded by the provider. Severity
      # prefers `t.severity` while retaining `priority` as a compatibility
      # fallback for external providers.
      - heading: 'Tickets{% if world.ticket_query %} (filter: {{ world.ticket_query }}){% endif %}'
      - code: |
          {% if world.ticket_provider_errors|default:""|length > 0 %}Warnings
          {% for err in world.ticket_provider_errors|default:"" %}- {{ err }}
          {% endfor %}
          {% endif %}{% if world.ticket_source_groups|default:""|length > 0 %}{% for group in world.ticket_source_groups|default:"" %}{{ group.label|default:group.id|default:"Tickets" }}
           #     St  Sev  Filed       Title
          {% for t in group.tickets|default:"" %}{{ t.index|default:forloop.Counter|stringformat:"%d"|rcol:2 }}  {% if t.id == world.ticket_id and t.source == world.ticket_source %}★{% else %} {% endif %}  {% if t.status == "resolved" or t.status == "closed" %}●{% elif t.status == "in-progress" or t.status == "in_progress" %}◐{% elif t.status == "open" %}○{% else %}·{% endif %}  {{ t.severity|default:t.priority|default:""|col:3 }}  {{ t.id|slice:":10"|col:10 }}  {{ t.title|default:"(untitled)"|truncatechars:52 }}
          {% endfor %}{% if group.tickets|default:""|length == 0 %}(none)
          {% endif %}{% if group.error %}⚠ {{ group.error }}
          {% endif %}
          {% endfor %}{% elif world.ticket_results|default:""|length > 0 %}Tickets
           #     St  Sev  Filed       Title
          {% for t in world.ticket_results|default:"" %}{{ t.index|default:forloop.Counter|stringformat:"%d"|rcol:2 }}  {% if t.id == world.ticket_id %}★{% else %} {% endif %}  {% if t.status == "resolved" or t.status == "closed" %}●{% elif t.status == "in-progress" or t.status == "in_progress" %}◐{% elif t.status == "open" %}○{% else %}·{% endif %}  {{ t.severity|default:t.priority|default:""|col:3 }}  {{ t.id|slice:":10"|col:10 }}  {{ t.title|default:"(untitled)"|truncatechars:52 }}
          {% endfor %}{% else %}(none — no configured source returned tickets)
          {% endif %}
      # Readiness banner — two sibling elements with mutually-exclusive
      # `when:` guards. The ready case is a `heading:` (style-guide §1
      # emerald "go"); the not-ready case is plain prose (no false green).
      # The glyph carries the state across mono-colour renders.
      - heading: "✓ Ready — `drive` to hand off to the {% if world.ticket_type == 'feature' %}implementation{% elif world.ticket_type == 'epic' %}cypilot{% else %}bugfix{% endif %} pipeline"
        when:  "world.ticket_id != ''"
      - prose: "✗ Pick a ticket from the list above to continue."
        when:  "world.ticket_id == ''"
      - kv:
          pairs:
            # Title-first to match the row format above; ID trails in
            # parentheses so a quick glance lands on the human label.
            Picked: '{% if world.ticket_id %}{{ world.ticket_title|default:"(no title)" }}  ({{ world.ticket_id }}){% else %}(none — pick one below){% endif %}'
            Oversight: "{{ world.oversight_mode|default:'gated' }}"
      - kv:
          pairs:
            Source: '{{ world.ticket_source_label|default:world.ticket_source|default:"(unknown source)" }}{% if world.ticket_source_repo and world.ticket_source_repo != world.ticket_source_label %} · {{ world.ticket_source_repo }}{% endif %}{% if world.ticket_source_ref %} · {{ world.ticket_source_ref }}{% endif %}{% if world.ticket_legacy_id %}  (filed locally as {{ world.ticket_legacy_id }}){% endif %}'
        when: "world.ticket_id != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            # Two `pick_ticket` shapes coexist: index-by-number (n=) and
            # by-filename (id=). The intent-level slots in app.yaml mark
            # both as optional; the arc below short-circuits via `??` so
            # whichever the operator provides wins. We keep both items so
            # tab-completed id picks from copy-paste / fixture YAML still
            # work, while live operators get the scannable `n=2` path.
            - label:  "pick_ticket"
              intent: pick_ticket
              hint:   "pick by row number from the table above"
              param:
                slot:        n
                type:        int
                placeholder: "row number (e.g. 2)"
                required:    true
            - label:  "pick_ticket_by_id"
              intent: pick_ticket
              hint:   "pick by ticket id, or source:id when multiple sources are configured"
              param:
                slot:        id
                type:        string
                placeholder: "ticket id or source:id"
                required:    true
            - label:  "search_tickets"
              intent: search_tickets
              hint:   "narrow the list"
              param:
                slot:        query
                type:        string
                placeholder: "text to filter on"
                required:    true
            - label:  "drive"
              intent: drive
              hint:   "hand the picked ticket to its pipeline (bug→bugfix, feature→implementation, epic→cypilot)"
              when:   "world.ticket_id != ''"
            - label:  "✗ drive — pick a ticket first"
              intent: drive
              when:   "world.ticket_id == ''"
            - label:  "gated"
              intent: oversight_gated
              hint:   "human checkpoint decisions"
              when:   "world.oversight_mode != 'gated'"
            - label:  "LLM review"
              intent: oversight_llm_review
              hint:   "LLM checkpoint decisions, human fallback"
              when:   "world.oversight_mode != 'llm-review'"
            - label:  "no gate"
              intent: oversight_no_gate
              hint:   "operation driver accepts checkpoints"
              when:   "world.oversight_mode != 'no-gate'"
            - label:  "go_bugfix"
              intent: go_bugfix
              hint:   "force the bugfix pipeline regardless of ticket type"
              when:   "world.ticket_id != '' && world.ticket_type != 'bug'"
            - label:  "bugfix_to_pr"
              intent: bugfix_open_pr
              hint:   "fix the picked bug, then open a pull request"
              when:   "world.ticket_id != ''"
            - label:  "bugfix_to_worktree"
              intent: bugfix_leave_worktree
              hint:   "fix the picked bug and leave the worktree for review"
              when:   "world.ticket_id != ''"
            - label:  "bugfix_to_local_merge"
              intent: bugfix_merge_local
              hint:   "fix the picked bug and merge into the local base branch"
              when:   "world.ticket_id != ''"
            - { label: "go_back", intent: go_back, hint: "return to the previous room" }
            - { label: "go_main", intent: go_main, hint: "back to the engineer's day landing" }
            - { label: "look",    intent: look,    hint: "re-render" }
    on:
      search_tickets:
        - target: ticket_searching
          effects:
            - set:
                ticket_query:   "{{ slots.query }}"
                ticket_results: []
                ticket_source_groups: []
      pick_ticket:
        # Stash the picked id + a placeholder title. The optional
        # `type:` slot pins ticket_type for the drive arc; fixtures
        # and operators that know the routing target set it directly.
        # Live-typed picks without the slot keep whatever ticket_type
        # was previously in world — a future iface.ticket.get on entry
        # to main (which reads the type from the local-files provider's
        # source dir tagging) can populate it lazily.
        #
        # The local-files provider scans issues/{bugs,features,
        # epics}/ and tags every row with its source kind; that tag
        # surfaces via world.ticket_results but the kitsoki expr engine
        # forbids loop-var member access inside set: templates, so we
        # rely on slots.type instead of an in-template row lookup.
        #
        # `target: .` is deliberate — pick should NOT re-fire on_enter
        # (the list is already in world.ticket_results from the fresh
        # fetch on the way in).
        #
        # Two picking shapes: `id=<filename>` and `n=<row index>`.
        # The arc walks them in priority order:
        #   1. n out of range → bounce with guard_hint
        #   2. either slot present → resolve via `slots.id ?? results[n-1].id`
        #   3. neither present → bounce with guard_hint
        - when: "slots.n != nil && (int(slots.n) < 1 || int(slots.n) > len(world.ticket_results))"
          target: .
          guard_hint: "Row {{ slots.n }} is out of range — pick 1..{{ len(world.ticket_results) }}."
        - when: "slots.id == nil && slots.n == nil"
          target: .
          guard_hint: "Provide either id=<ticket id or source:id> or n=<row number>."
        - target: .
          effects:
            # slots.id wins when supplied; otherwise fall through to the
            # n-based row lookup. expr-lang's `??` is nil-coalesce (NOT
            # empty-string coalesce), so the `param.required: true` on
            # each choice item is what guarantees the surviving value is
            # non-empty.
            - set:
                ticket_id:     "{{ slots.id ?? world.ticket_results[int(slots.n) - 1].id }}"
                ticket_body:   ""
                ticket_source: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source ?? '') : '' }}"
                ticket_source_label: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_label ?? '') : '' }}"
                ticket_source_kind: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_kind ?? (world.ticket_results[int(slots.n) - 1].source ?? '')) : '' }}"
                ticket_source_mode: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_mode ?? (world.ticket_results[int(slots.n) - 1].source == 'github' ? 'remote' : 'local')) : '' }}"
                ticket_source_repo: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_repo ?? '') : '' }}"
                # Populate ticket_type from the picked ROW so `drive`
                # routes by kind (bug → bf, feature → impl, epic → cyp).
                # Direct index access off world.ticket_results works in
                # set: templates — it's the same shape `.id` uses above.
                # (The earlier "loop-var member access is forbidden" note
                # referred to `{% for %}` iteration in VIEWS, not index
                # access here.) slots.type wins for fixtures that pin it;
                # the n-based pick falls through to the row's own kind tag
                # (emitted by the local-files provider's bugSummary).
                ticket_type:   "{{ slots.type ?? (slots.n != nil ? world.ticket_results[int(slots.n) - 1].type : nil) ?? world.ticket_type }}"
                thread:        "{{ slots.id ?? (world.ticket_results[int(slots.n) - 1].url != '' ? world.ticket_results[int(slots.n) - 1].url : world.ticket_results[int(slots.n) - 1].id) }}"
            # iface.ticket.get returns the real human-readable
            # title from the ticket's frontmatter; bind it as
            # ticket_title so downstream rooms (bugfix phases,
            # impl review) display "Date — Title" instead of
            # the 60-char ID slug + "(picked from list)" stub.
            - invoke: iface.ticket.get
              with:
                id: "{{ slots.id ?? world.ticket_results[int(slots.n) - 1].id }}"
                source: "{{ slots.n != nil ? world.ticket_results[int(slots.n) - 1].source : '' }}"
                ref: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].ref ?? '') : slots.id }}"
                sources: "{{ world.ticket_sources }}"
                repo: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_repo ?? (world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo)) : (world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo) }}"
                root: "{{ world.repo_root }}"
              bind:
                ticket_id:    id
                ticket_title: title
                ticket_url:   url
                ticket_type:  type
                # The bug's optional `repro_command:` frontmatter. Projected
                # into the bf import's world.gate_command (bugfix-repro-gate
                # slice) so the `reproducing` room runs it RED-first. Absent ⇒
                # "" ⇒ bf falls through to the LLM-only reproducer.
                gate_command: repro_command
                # Source / identity (P5). host.gh.ticket emits source=github
                # and lifts legacy_id (the original issues/bugs/<iso>.md id)
                # out of the ```kitsoki metadata block; the local-files
                # provider emits source=local plus url/path pointing at the
                # ticket file. Bound here so the view and child imports keep
                # the local artifact path or the remote issue URL.
                ticket_source:    source
                ticket_source_label: source_label
                ticket_source_kind: source_kind
                ticket_source_mode: source_mode
                ticket_source_repo: source_repo
                ticket_legacy_id: legacy_id
                ticket_source_ref: ref
                thread: url
              on_error: ticket_pick_error
            - set:
                ticket_source_kind: "{{ world.ticket_source_kind != '' ? world.ticket_source_kind : world.ticket_source }}"
                ticket_source_mode: "{{ world.ticket_source_mode != '' ? world.ticket_source_mode : (world.ticket_source == 'github' ? 'remote' : 'local') }}"
                ticket_source_repo: "{{ world.ticket_source_repo != '' ? world.ticket_source_repo : (world.ticket_source == 'github' ? (world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo) : '') }}"
                ticket_source_ref:  "{{ world.ticket_source_ref != '' ? world.ticket_source_ref : (world.ticket_url != '' ? world.ticket_url : world.thread) }}"
                thread: "{{ world.ticket_url != '' ? world.ticket_url : world.thread }}"
            - set:
                # ticket_repo remains the legacy GitHub-only compatibility key.
                # Other remote trackers keep identity in ticket_source_repo and
                # must not trigger bugfix's direct host.gh.ticket fallback.
                ticket_repo: "{{ world.ticket_source_kind == 'github' ? world.ticket_source_repo : '' }}"
      # Hand off to the bugfix sub-story for the picked ticket.
      # bf.idle's on_enter auto-emits `start` when entered with a
      # ticket and no in-progress artifact, so the operator types
      # `continue` ONCE and lands inside the pipeline. world_in:
      # projects ticket_id / workdir / etc through the boundary.
      #
      # `continue` is the canonical name surfaced in the action menu;
      # `go_bugfix` is the legacy alias kept here so existing flows
      # and fixtures (dev-story/flows/*, scenarios/pickup_*.yaml, and smoke
      # tests) keep working unchanged.
      continue:
        - when: "world.ticket_id != '' && world.ticket_type == 'feature'"
          target: impl
        - when: "world.ticket_id != '' && world.ticket_type == 'epic'"
          target: cyp
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket from the list before continuing."
      # Type-aware handoff — the canonical way to launch a picked
      # ticket's pipeline from the queue. Mirrors main.yaml's `drive`
      # arc: bug → bf, feature → impl, epic → cyp. pick_ticket now
      # populates ticket_type from the picked row, so a feature filed
      # from a proposal (issues/features/*) drives straight into the
      # implementation story instead of bouncing into bugfix. Tickets
      # with an unknown/blank type fall through to bf (the historical
      # default) so existing fixtures keep working.
      drive:
        - when: "world.ticket_id != '' && world.ticket_type == 'feature'"
          target: impl
        - when: "world.ticket_id != '' && world.ticket_type == 'epic'"
          target: cyp
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket from the list before driving."
      go_implementation:
        - when: "world.ticket_id != ''"
          target: impl
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket first."
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket first."
      bugfix_open_pr:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set: { bugfix_destination: "open-pr" }
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket first."
      bugfix_leave_worktree:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set: { bugfix_destination: "leave-worktree" }
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket first."
      bugfix_merge_local:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set: { bugfix_destination: "local-merge" }
        - default: true
          target: ticket_search
          guard_hint: "Pick a ticket first."
      oversight_gated:
        - target: .
          effects:
            - set:
                oversight_mode: "gated"
                judge_mode: "human"
      oversight_llm_review:
        - target: .
          effects:
            - set:
                oversight_mode: "llm-review"
                judge_mode: "llm_then_human"
      oversight_no_gate:
        - target: .
          effects:
            - set:
                oversight_mode: "no-gate"
                judge_mode: "human"
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: landing
      go_inbox:
        - target: inbox
          push_history: false
      look:
        - target: .

  ticket_searching:
    description: "Running ticket search."
    # Flattened view (see above).
    view:
      - kv:
          pairs:
            "Searching for": "{{ world.ticket_query }}"
      - heading: "Results"
      - code: |
          {% if world.ticket_provider_errors|default:""|length > 0 %}Warnings
          {% for err in world.ticket_provider_errors|default:"" %}- {{ err }}
          {% endfor %}
          {% endif %}{% if world.ticket_source_groups|default:""|length > 0 %}{% for group in world.ticket_source_groups|default:"" %}{{ group.label|default:group.id|default:"Tickets" }}
           #     St  Sev  Filed       Title
          {% for t in group.tickets|default:"" %}{{ t.index|default:forloop.Counter|stringformat:"%d"|rcol:2 }}  {% if t.id == world.ticket_id and t.source == world.ticket_source %}★{% else %} {% endif %}  {% if t.status == "resolved" or t.status == "closed" %}●{% elif t.status == "in-progress" or t.status == "in_progress" %}◐{% elif t.status == "open" %}○{% else %}·{% endif %}  {{ t.severity|default:t.priority|default:""|col:3 }}  {{ t.id|slice:":10"|col:10 }}  {{ t.title|default:"(untitled)"|truncatechars:52 }}
          {% endfor %}{% if group.tickets|default:""|length == 0 %}(none)
          {% endif %}{% if group.error %}⚠ {{ group.error }}
          {% endif %}
          {% endfor %}{% elif world.ticket_results|default:""|length > 0 %}Tickets
           #     St  Sev  Filed       Title
          {% for t in world.ticket_results|default:"" %}{{ t.index|default:forloop.Counter|stringformat:"%d"|rcol:2 }}  {% if t.id == world.ticket_id %}★{% else %} {% endif %}  {% if t.status == "resolved" or t.status == "closed" %}●{% elif t.status == "in-progress" or t.status == "in_progress" %}◐{% elif t.status == "open" %}○{% else %}·{% endif %}  {{ t.severity|default:t.priority|default:""|col:3 }}  {{ t.id|slice:":10"|col:10 }}  {{ t.title|default:"(untitled)"|truncatechars:52 }}
          {% endfor %}{% else %}(none — no configured source returned tickets)
          {% endif %}
      - choice:
          mode: single
          prompt: "Actions"
          items:
            # Same two-shape picker as ticket_search above — see comment
            # there. The n=<row number> variant is the default offering.
            - label:  "pick_ticket"
              intent: pick_ticket
              hint:   "pick by row number from the results"
              param:
                slot:        n
                type:        int
                placeholder: "row number (e.g. 2)"
                required:    true
            - label:  "pick_ticket_by_id"
              intent: pick_ticket
              hint:   "pick by ticket id, or source:id when multiple sources are configured"
              param:
                slot:        id
                type:        string
                placeholder: "ticket id or source:id"
                required:    true
            - { label: "go_back", intent: go_back, hint: "return to ticket_search" }
            - { label: "look",    intent: look,    hint: "re-render" }
    relevant_world: [ticket_query, ticket_sources, ticket_results, ticket_source_groups]
    on_enter:
      - invoke: iface.ticket.search
        with:
          query: "{{ world.ticket_query }}"
          limit: 25
          sources: "{{ world.ticket_sources }}"
          # repo is honoured by host.gh.ticket (the GitHub binding for
          # onboarded repos); ignored by host.local_files.ticket.
          # "" ⇒ gh's local-remote default.
          repo: "{{ world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo }}"
          # root is honoured by host.local_files.ticket (tickets under an
          # external checkout root); ignored by host.gh.ticket. "" ⇒ cwd.
          root: "{{ world.repo_root }}"
        bind:
          ticket_results: tickets
          ticket_source_groups: source_groups
          ticket_provider_errors: provider_errors
          ticket_local_count: local_count
          ticket_github_count: github_count
        on_error: ticket_search
    on:
      pick_ticket:
        # Mirror of pick_ticket in ticket_search above — same id-or-n
        # short-circuit and out-of-range guard, but the target lands
        # back in ticket_search (not `.`) so the operator sees the
        # full table after picking.
        - when: "slots.n != nil && (int(slots.n) < 1 || int(slots.n) > len(world.ticket_results))"
          target: ticket_searching
          guard_hint: "Row {{ slots.n }} is out of range — pick 1..{{ len(world.ticket_results) }}."
        - when: "slots.id == nil && slots.n == nil"
          target: ticket_searching
          guard_hint: "Provide either id=<ticket id or source:id> or n=<row number>."
        - target: ticket_search
          effects:
            - set:
                ticket_id:    "{{ slots.id ?? world.ticket_results[int(slots.n) - 1].id }}"
                ticket_body:  ""
                ticket_title: "(picked from search)"
                ticket_type:  "{{ slots.type ?? world.ticket_type }}"
                thread:       "{{ slots.id ?? (world.ticket_results[int(slots.n) - 1].url != '' ? world.ticket_results[int(slots.n) - 1].url : world.ticket_results[int(slots.n) - 1].id) }}"
                ticket_source: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source ?? '') : '' }}"
                ticket_source_label: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_label ?? '') : '' }}"
                ticket_source_kind: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_kind ?? (world.ticket_results[int(slots.n) - 1].source ?? '')) : '' }}"
                ticket_source_mode: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_mode ?? (world.ticket_results[int(slots.n) - 1].source == 'github' ? 'remote' : 'local')) : '' }}"
                ticket_source_repo: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_repo ?? '') : '' }}"
                ticket_source_ref:  "{{ slots.id ?? (world.ticket_results[int(slots.n) - 1].url != '' ? world.ticket_results[int(slots.n) - 1].url : world.ticket_results[int(slots.n) - 1].id) }}"
            - invoke: iface.ticket.get
              with:
                id: "{{ slots.id ?? world.ticket_results[int(slots.n) - 1].id }}"
                source: "{{ slots.n != nil ? world.ticket_results[int(slots.n) - 1].source : '' }}"
                ref: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].ref ?? '') : slots.id }}"
                sources: "{{ world.ticket_sources }}"
                repo: "{{ slots.n != nil ? (world.ticket_results[int(slots.n) - 1].source_repo ?? (world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo)) : (world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo) }}"
                root: "{{ world.repo_root }}"
              bind:
                ticket_id:    id
                ticket_title: title
                ticket_url:   url
                ticket_type:  type
                gate_command: repro_command
                ticket_source:    source
                ticket_source_label: source_label
                ticket_source_kind: source_kind
                ticket_source_mode: source_mode
                ticket_source_repo: source_repo
                ticket_legacy_id: legacy_id
                ticket_source_ref: ref
                thread: url
              on_error: ticket_pick_error
            - set:
                ticket_source_kind: "{{ world.ticket_source_kind != '' ? world.ticket_source_kind : world.ticket_source }}"
                ticket_source_mode: "{{ world.ticket_source_mode != '' ? world.ticket_source_mode : (world.ticket_source == 'github' ? 'remote' : 'local') }}"
                ticket_source_repo: "{{ world.ticket_source_repo != '' ? world.ticket_source_repo : (world.ticket_source == 'github' ? (world.ticket_github_repo != '' ? world.ticket_github_repo : world.ticket_repo) : '') }}"
                ticket_source_ref:  "{{ world.ticket_source_ref != '' ? world.ticket_source_ref : (world.ticket_url != '' ? world.ticket_url : world.thread) }}"
                thread: "{{ world.ticket_url != '' ? world.ticket_url : world.thread }}"
            - set:
                ticket_repo: "{{ world.ticket_source_kind == 'github' ? world.ticket_source_repo : '' }}"
      search_tickets:
        - target: ticket_searching
          effects:
            - set:
                ticket_query: "{{ slots.query }}"
      go_back:
        - target: ticket_search
      go_main:
        - target: landing
      go_inbox:
        - target: inbox
          push_history: false
      look:
        - target: .
