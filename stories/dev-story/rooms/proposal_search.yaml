# proposal_search — prior-art scout + reference researcher.
#
# Stage 2 of the 4-stage proposal pipeline:
#   intake → proposal_search → proposal_refine → proposal_draft (+ publish)
#
# on_enter runs two oracle.decide calls (once: guarded by their binds):
#   1. existing_scan  — identifies overlapping proposals and roadmap fit
#      (proposal_scout agent); result written to proposal_existing_state
#      and a 002-existing-state.md artifact via host.artifacts_dir.
#   2. references_research — curates the reference materials the brief
#      should build on (proposal_researcher agent); result written to
#      proposal_references and a 003-references.json artifact.
#
# The `confirm` intent is GUARDED on an empty overlap list: with overlaps
# present, `confirm` bounces back (default arm) and the operator must
# use `change_existing` (amend) or `override_new` (force new). Either
# advances to proposal_refine. `regenerate` discards both results and
# re-fires on_enter. `quit` abandons back to main.
#
# Reload-safety: both on_enter calls are `once: true` keyed off their
# bind targets (proposal_existing_state and proposal_references). A
# /reload that lands here with results already set skips both calls.

states:

  proposal_search:
    description: "Searching for prior art and curating references."
    view:
      - banner:
          text:     "SEARCHING"
          subtitle: "Prior art + reference curation"
          color:    "#F59E0B"
      - prose: "Scanning existing proposals and docs for overlaps, then curating references."
      - kv:
          pairs:
            Idea:      '{{ world.proposal_idea }}'
            Workspace: '{{ world.proposal_workspace }}'
        when: "world.proposal_idea != ''"
      - heading: "Overlap scan"
      - prose: '{{ world.proposal_existing_state.roadmap_fit|default:"(running — waiting for scout result)" }}'
      - prose: "⚠ Overlap detected — review the list below, then `change_existing <path>` to amend or `override_new` to create a new proposal despite the overlap."
        when: "len(world.proposal_existing_state.overlaps ?? []) > 0"
      - prose: "No overlapping proposals found — `confirm` to proceed to brief authoring."
        when: "len(world.proposal_existing_state.overlaps ?? []) == 0 && world.proposal_existing_state.roadmap_fit != ''"
      - heading: "References"
      - prose: '{{ world.proposal_references_path|default:"(running — waiting for researcher result)" }}'
        when: "world.proposal_references_path == ''"
      - code: |
          {% for item in world.proposal_references.items %}- {{ item.path }}  {{ item.sections }}  {{ item.rationale }}
          {% empty %}(no references yet){% endfor %}
        when: "world.proposal_references_path != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "confirm"
              hint:   "no overlap — proceed to brief authoring"
              intent: confirm
            - label:  "change_existing"
              hint:   "amend an overlapping proposal instead"
              intent: change_existing
              param:
                slot:        target
                type:        string
                placeholder: "path/to/existing-proposal.md"
                required:    true
            - label:  "override_new"
              hint:   "create a new proposal despite the detected overlap"
              intent: override_new
            - label:  "regenerate"
              hint:   "re-run the scout and researcher from scratch"
              intent: regenerate
            - label:  "quit"
              hint:   "abandon this proposal"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [proposal_idea, proposal_workspace, proposal_existing_state, proposal_existing_path, proposal_overlap_decision, proposal_references, proposal_references_path]
    on_enter:
      # Scout: check for overlapping proposals + roadmap fit.
      # once: keyed off proposal_existing_state (non-empty ⇒ already ran).
      - invoke: host.oracle.decide
        once: true
        id: existing_scan
        with:
          agent: proposal_scout
          prompt_path: prompts/proposal_existing_state.md
          schema: schemas/existing-state.json
          working_dir: "."
          args:
            idea:           "{{ world.proposal_idea }}"
            existing_paths: "{{ world.proposal_existing_paths }}"
        bind:
          proposal_existing_state: submitted
        on_error: proposal
      - invoke: host.artifacts_dir
        with:
          thread:   "002-existing-state"
          workdir:  "{{ world.proposal_workspace }}"
          content:  "{{ world.proposal_existing_state }}"
        bind:
          proposal_existing_path: path
        on_error: proposal
      # Researcher: curate reference materials for the brief.
      # once: keyed off proposal_references (non-empty ⇒ already ran).
      - invoke: host.oracle.decide
        once: true
        id: references_research
        with:
          agent: proposal_researcher
          prompt_path: prompts/proposal_references.md
          schema: schemas/references.json
          working_dir: "."
          args:
            idea:      "{{ world.proposal_idea }}"
            workspace: "{{ world.proposal_workspace }}"
        bind:
          proposal_references: submitted
        on_error: proposal
      - invoke: host.artifacts_dir
        with:
          thread:   "003-references.json"
          workdir:  "{{ world.proposal_workspace }}"
          content:  "{{ world.proposal_references }}"
        bind:
          proposal_references_path: path
        on_error: proposal
    on:
      # No overlap: proceed to brief authoring.
      confirm:
        - when: "len(world.proposal_existing_state.overlaps ?? []) > 0"
          target: .
          effects:
            - set:
                proposal_overlap_decision: ""
        - target: proposal_refine
          effects:
            - set:
                proposal_overlap_decision: "new"

      # Overlap found: amend an existing proposal.
      change_existing:
        - target: proposal_refine
          effects:
            - set:
                proposal_overlap_decision: "change_existing"
                proposal_change_target:    "{{ slots.target }}"

      # Override: create new despite overlap.
      override_new:
        - target: proposal_refine
          effects:
            - set:
                proposal_overlap_decision: "new"
                proposal_change_target:    ""

      # Re-run both scout and researcher from scratch.
      # Use explicit target (not ".") so on_enter re-fires and the oracle calls run.
      regenerate:
        - target: proposal_search
          effects:
            - set:
                proposal_existing_state:   {}
                proposal_existing_path:    ""
                proposal_references:       {}
                proposal_references_path:  ""

      quit:
        - target: main
          effects:
            - set:
                last_error:         "proposal abandoned at search"
                prev_state:         "main"
                proposal_seed_idea: ""
      look:
        - target: .
