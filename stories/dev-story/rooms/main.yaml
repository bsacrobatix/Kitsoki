# main â€” engineer's-day landing. Oregon-trail-shaped: a narrative
# situation report up top, a Status block, a live "tickets in your
# queue" list pulled via iface.ticket.list_mine on enter, then a
# Choose block whose items appear/grey-out via available() /
# blocked_reason() guards on the bound intents.
#
# Pipeline routing: `drive` is the one intent the operator picks
# once a ticket is selected. It branches on world.ticket_type â€”
# bug â†’ bf, feature â†’ impl â€” so the operator never picks the
# pipeline directly. The legacy `go_bugfix` / `go_implementation`
# / `go_pr_refinement` intents stay as escape hatches but are now
# guarded on the relevant prerequisite.

states:

  main:
    description: "dev-story â€” Independence, Missouri for the engineer's day."
    relevant_world: [ticket_id, ticket_title, ticket_type, last_pr_url, status, inbox_unread, workdir, feature_branch]

    view:
      extends: "base"
      blocks:
        body:
          - prose: >
              You drive tickets through their pipeline from here. Pick a
              ticket first, then drive it. Bug tickets route through the
              bugfix pipeline; feature tickets route through the
              implementation pipeline â€” the ticket's type chooses, you
              don't pick the pipeline yourself.
        choices:
          - heading: "Actions"
          # Every row uses {label, hint} form so the TUI applies the
          # action-chip style to the bare intent name (style guide Â§3).
          # Blocked rows use the `âś—` prefix + blocked_reason() hint per
          # the "Prerequisite" pattern.
          - list:
              items:
                - label: "`tickets`"
                  hint:  "search for a ticket to pick"
                - label: "`workspaces`"
                  hint:  "resume a workspace you already started"
                - label: "`drive`"
                  hint:  "push the picked ticket through its pipeline"
                  when:  "available('drive')"
                - label: "âś— `drive`"
                  hint:  "{{ blocked_reason('drive') }}"
                  when:  "!available('drive')"
                - label: "`pr`"
                  hint:  "hand the picked workspace's PR to pr-refinement"
                  when:  "available('go_pr_refinement')"
                - label: "âś— `pr`"
                  hint:  "{{ blocked_reason('go_pr_refinement') }}"
                  when:  "!available('go_pr_refinement')"
                - label: "`code review`"
                  hint:  "review a teammate's PR"
                - label: "`inbox`"
                  hint:  "read notifications ({{ world.inbox_unread }} unread)"
                - label: "`oracle`"
                  hint:  "ask the LLM a one-shot question"
                - label: "`standup`"
                  hint:  "prep today's standup summary"
                # `deploy`, `observability`, `incident`, `docs` are stubs;
                # consolidated under one short hint instead of a mega-
                # label so the list's max_label stays sane (a 49-char
                # row forces every other row's hint column down to ~23
                # chars and surfaces as cross-row wrap).
                - label: "`stubs`"
                  hint:  "deploy Â· observability Â· incident Â· docs (not wired)"
                - label: "`look`"

    on:
      go_ticket_search:
        - target: ticket_search
          effects:
            - set: { prev_state: "main" }
      go_workspace_manager:
        - target: workspace_manager
          effects:
            - set: { prev_state: "main" }
      go_inbox:
        - target: inbox
          push_history: false
          effects:
            - set: { prev_state: "main" }
      go_oracle:
        - target: oracle
          effects:
            - set: { prev_state: "main" }
      go_standup:
        - target: standup
          effects:
            - set: { prev_state: "main" }
      go_code_review:
        - target: code_review
          effects:
            - set: { prev_state: "main" }
      go_deploy:
        - target: deploy
          effects:
            - set: { prev_state: "main" }
      go_observability:
        - target: observability
          effects:
            - set: { prev_state: "main" }
      go_incident:
        - target: incident
          effects:
            - set: { prev_state: "main" }
      go_docs:
        - target: docs
          effects:
            - set: { prev_state: "main" }

      # Auto-routing one-shot: ticket_type chooses the pipeline. The
      # local-files provider scans issues/{bugs,features,epics}/ and
      # tags every row with its source kind, so picks land with
      # ticket_type set and the drive arc routes deterministically.
      # bf.idle's on_enter auto-emits `start` when a ticket is loaded
      # and no reproduction artifact exists yet (see
      # stories/bugfix/rooms/idle.yaml), so the operator types `drive`
      # ONCE and lands inside the pipeline.
      drive:
        - when: "world.ticket_id != '' && world.ticket_type == 'bug'"
          target: bf
        - when: "world.ticket_id != '' && world.ticket_type == 'feature'"
          target: impl
        - when: "world.ticket_id != '' && world.ticket_type == 'epic'"
          target: cyp
        - when: "world.ticket_id == ''"
          target: main
          guard_hint: "Pick a ticket first â€” type `tickets`."
        - default: true
          target: main
          guard_hint: "Ticket has no type set â€” re-pick from `tickets` so its type is recorded."

      # Escape hatches â€” same destinations as drive, but with
      # explicit names some flows / scenarios reference. All three
      # pipeline hatches require a picked ticket.
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
        - default: true
          target: main
          guard_hint: "Pick a ticket first â€” type `tickets`."
      go_implementation:
        - when: "world.ticket_id != ''"
          target: impl
        - default: true
          target: main
          guard_hint: "Pick a ticket first â€” type `tickets`."
      go_cypilot:
        - when: "world.ticket_id != ''"
          target: cyp
        - default: true
          target: main
          guard_hint: "Pick a ticket first â€” type `tickets`."

      # PR refinement needs an open PR (or at least a feature branch
      # that's been pushed); blocking it from a cold main is the
      # whole point of the prerequisite story.
      go_pr_refinement:
        - when: "world.last_pr_url != '' || world.feature_branch != ''"
          target: pr
        - default: true
          target: main
          guard_hint: "No open PR yet â€” drive a ticket through the pipeline first."

      go_code_review_story:
        - target: rev
      go_main:
        - target: main
      go_back:
        - target: main
      look:
        - target: .
