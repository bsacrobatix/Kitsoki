# landing — the free-form workbench (dev-story's root, replacing `main`).
#
# The resting FLOOR of the engineer's day: a full-tool agent that behaves
# like Claude Code (broad toolbox, drives real work) rather than a static
# catalog. The operator describes what they want in their own words; a
# question the agent need not act on is answered in place by the
# read-only agent off-ramp; the highest-value `main` navigation survives
# as quick-action buttons and as intents, so every pipeline is one
# utterance / one click away.
#
# `workbench:` (docs/proposals/room-workbench.md) — the reference consumer,
# Task 3.1. The block below desugars at load time into exactly what this
# room used to hand-roll: `write_mode: read_only`
# (internal/host/write_mode_gate.go — every MUTATING tool call, Edit / Write /
# side-effecting Bash, holds for an operator write-mode grant before the
# effect lands, recorded as a machine.write_mode_granted event; headless the
# gate denies and the agent stays read-only), an `agent_off_ramp` (the
# read-only Q&A floor for genuine no-match prose), a synthesized `on_enter
# host.agent.task` dispatch of `landing_agent` (WS toolbox: landing_toolbox +
# effect: write — app.yaml agents.landing_agent — so the loader's
# effect-taxonomy + roomDispatchesAgent preconditions are satisfied by
# construction), and `default_intent: landing_capture` (the macro's fixed
# `<room>_capture` naming, room-workbench.md Open question 1).
#
# `landing_capture`'s `on:` arc below is HAND-AUTHORED, not the macro's
# synthesized one: it carries extra behavior workbench: does not (and should
# not) auto-generate — the onboarding-command escape hatch and thread
# continuity (prior-note / prior-plan preservation across a fresh dispatch).
# expandWorkbenches only synthesizes an arc/intent when one isn't already
# present, so this hand-authored version wins with no conflict. Renamed from
# `work` (Task 3.1) purely so the name matches what workbench: requires;
# every flow/intents fixture that dispatched `work` was renamed to
# `landing_capture` alongside it — same guards, slots, and effects, so the
# diff is a pure rename, not a behavior change.
#
# Structurally a hub like `main`: no @exit: of its own — it is where every
# pipeline returns (the imports' exits re-point to: landing). The only
# shift from `main` is the resting surface (an agent turn instead of a
# catalog) plus the write-mode hold.
#
# NOT auto-generated by workbench: (hand-authored, unmigrated by design —
# room-workbench.md's Backward-compatibility note): the ad-hoc-plan
# propose/accept/apply/verify sub-loop (`applying`/`verifying`/`plan_done`,
# docs/stories/ad-hoc-plan.md) and the on-path-bail routing (`take_route`).
#
# VIEW SHAPE — flattened (no extends/blocks) so the `choice:` quick-action
# block survives the render pipeline and the free-text floor appears
# beneath it (docs/stories/choice-widget.md §3.1; the same shape
# stories/off-ramp-demo/rooms/desk.yaml uses for its off-ramp floor).

states:

  landing:
    description: "dev-story — the free-form workbench. Describe what you want, or pick a quick action."
    relevant_world: [ticket_id, ticket_title, ticket_type, design_file, last_pr_url, status, inbox_unread, workdir, feature_branch, oversight_mode, captured, landing_request, landing_note]
    prerequisites:
      - id: local-harness-profile
        title: "Local harness profile"
        satisfied_when: "world.profile_setup_status == 'configured' || world.profile_setup_status == 'skipped'"
        summary: "This session has not checked local harness profile setup."
        help: "Run local harness profile setup to inspect installed/logged-in backends and optionally write .kitsoki.local.yaml."
        action:
          label: "provider"
          hint: "review installed/logged-in harnesses and local profile patch"
          intent: go_profile_setup
      - id: project-onboarding
        title: "Project onboarding"
        satisfied_when: "world.init_profile_status == 'applied' || world.init_profile_status == 'applied-no-tools'"
        summary: "This session has not applied the project onboarding profile."
        help: "Run onboarding to write the project profile, instance story, toolkit, and local readiness script."
        action:
          label: "onboard"
          hint: "discover a project profile, review it, then apply local setup"
          intent: go_init
      - id: onboarding-readiness
        title: "Onboarding readiness"
        when: "world.init_profile_status == 'applied' || world.init_profile_status == 'applied-no-tools'"
        satisfied_when: "world.init_readiness_result.status == 'pass'"
        summary: "The generated readiness checks have not passed in this session."
        help: "Run readiness after onboarding to verify story load, project tests, and build gates."
        action:
          label: "readiness"
          hint: "run declared post-apply checks and update the profile readiness summary"
          intent: run_readiness

    # Free-text sink (docs/architecture/semantic-routing.md §1.5). Prose
    # the match tiers don't claim — a fresh request — routes
    # deterministically (no LLM) to the `landing_capture` agent, filling its
    # required `request` slot with the whole utterance. Affirmations while a
    # plan is pending are intercepted BEFORE this sink by the pending-plan
    # guard in `contextual_routing` (below), which routes them
    # deterministically to `accept_plan` without an LLM call. Content-bearing
    # follow-ups also hit the contextual guard and route to `landing_capture`
    # (refine) with a recorded decision. The off-ramp remains the read-only
    # floor for any path neither sink covers.
    # See .context/landing-onpath-offpath-bail.md slice C.
    #
    # default_intent (landing_capture) + agent_off_ramp (agent_qa) below are
    # both synthesized by `workbench:` — see the state-level block near the
    # bottom of this state.

    # Contextual routing (CRR slice 3): when a plan is pending at
    # landing_note.plan, the pending-plan guard intercepts free-text input
    # BEFORE default_intent fires — a bare affirmation routes to accept_plan
    # (deterministic, no LLM) and content-bearing input routes to
    # landing_capture (refine, also deterministic). This removes the
    # prompt-only workaround that asked the workbench agent to infer
    # "ok go ahead" as acceptance. NOT synthesized by workbench: — contextual
    # routing stays hand-authored regardless of workbench: use.
    contextual_routing:
      enabled: true
      room_chat: landing_capture
      plan_accept_intent: accept_plan
      plan_refine_intent: landing_capture
      pending_plan_path: landing_note.plan

    # The room workbench primitive (docs/proposals/room-workbench.md; Task
    # 3.1's reference migration). Desugars at load time into exactly what
    # this room used to hand-roll: write_mode: read_only, agent_off_ramp:
    # {agent: agent_qa}, a synthesized on_enter host.agent.task dispatching
    # landing_agent (bound to landing_note, guarded on a non-empty
    # landing_request, once: keyed so `look` / returning from a pipeline
    # re-renders the stored note instead of re-dispatching), and
    # default_intent: landing_capture. capture_slot: landing_request keeps
    # the existing world-key name (referenced throughout this room's view
    # and by every flow fixture) instead of the macro's own default
    # (landing_request, since capture_slot defaults to <room>_request
    # anyway — kept explicit here for clarity given how much of this file
    # reads world.landing_request). off_ramp_agent: agent_qa reproduces the
    # hand-rolled off-ramp exactly (the same persona the dedicated `agent`
    # room uses, so an answered question reads the same either way).
    #
    # landing_capture's `on:` arc is hand-authored below (not the macro's
    # plain synthesized arc) because it carries the onboarding escape hatch
    # and thread-continuity (prior-note/prior-plan preservation) the macro
    # does not auto-generate; expandWorkbenches only synthesizes an
    # arc/intent when one doesn't already exist, so the hand-authored
    # version below wins with no conflict.
    workbench:
      agent: landing_agent
      prompt: prompts/landing.md
      acceptance_schema: schemas/landing-note.json
      capture_slot: landing_request
      off_ramp_agent: agent_qa
      # Thread continuity — fed into prompts/landing.md as args.prior_*
      # (empty on the first request). The prompt frames prior_summary /
      # prior_details as "earlier you reported X; the operator now says Y"
      # so a continuation ("ok go ahead") builds on it instead of starting
      # fresh, and renders prior_plan so a continuation that adjusts the
      # plan ("dry-run first") REFINES it instead of re-proposing from
      # scratch. landing_capture's `on:` arc (below) is what actually sets
      # these three world keys before each re-dispatch.
      context_args:
        prior_summary: "{{ world.landing_prior_summary }}"
        prior_details: "{{ world.landing_prior_details }}"
        prior_plan:    "{{ world.landing_plan_prior }}"

    view:
      - prose: "{{ world.last_error }}"
        when: "world.last_error != ''"
      - banner:
          text:     "WORKBENCH"
          subtitle: "free-form · read-only until you approve a change"
          color:    "#06B6D4"
        when: "world.last_error == ''"

      # First-start banner — rendered until the operator's first request
      # lands. Pairs with the on_enter once: sentinel below.
      - prose: >
          You're in the free-form workbench — describe what you want to do,
          in your own words, and I'll work on it like Claude Code. I run
          read-only by default and ask before making any change. Or pick a
          quick action below to drop straight into a pipeline.
        when: "world.last_error == '' && world.landing_request == ''"

      # Echo the agent's last close-out note once it has run.
      - heading: "Last result"
        when: "(world.landing_note.summary ?? '') != ''"
      - kv:
          pairs:
            Request: "{{ world.landing_request }}"
            Summary: "{{ world.landing_note.summary }}"
        when: "(world.landing_note.summary ?? '') != ''"
      - code: '{{ world.landing_note.details|default:"" }}'
        when: "(world.landing_note.details ?? '') != ''"

      # The agent's suggested next steps (e.g. surfaced when a mutating edit
      # was held read-only pending a write-mode grant). Rendered only when the
      # array is non-empty so a note without next_steps shows nothing here.
      - heading: "Next steps"
        when: "world.landing_note.next_steps"
      - template: |
          {% for s in world.landing_note.next_steps %}- {{ s }}
          {% endfor %}
        when: "world.landing_note.next_steps"

      # On-path bail. When the workbench agent concluded the request really
      # belongs in a named pipeline it set landing_note.route; surface the
      # reason here and offer a one-click jump as the FIRST quick action
      # below (only one `choice:` element is allowed per view, so the bail
      # button is folded into Quick actions rather than its own widget).
      # Offered, NOT forced — every other quick action and the free-text
      # floor stay available, so the operator can ignore this and keep
      # working here. The button fires take_route, whose arc emit_intents
      # the agent-chosen pipeline intent.
      - heading: "On-path suggestion"
        when: "(world.landing_note.route.intent ?? '') != ''"
      - prose: "{{ world.landing_note.route.reason }}"
        when: "(world.landing_note.route.intent ?? '') != ''"

      # Proposed plan card. When the planner emitted a structured plan in its
      # close-out note (schemas/plan.json), render it as a reviewable card —
      # mirroring the on-path route block above. The Accept & apply button is
      # folded into the single Quick actions choice below (only one choice:
      # element is allowed per view); a free-text adjustment refines it (the
      # work sink re-dispatches the planner with this plan as prior context).
      - heading: "Proposed plan"
        when: "len(world.landing_note.plan ?? '') > 0"
      - kv:
          pairs:
            Goal:   "{{ world.landing_note.plan.goal }}"
            Step:   "{{ world.landing_note.plan.step.description }}"
            Verify: "{{ world.landing_note.plan.verify.reason }}"
        when: "len(world.landing_note.plan ?? '') > 0"
      - prose: "Accept & apply this plan from the quick actions below, or type an adjustment (\"dry-run first\", \"skip closed issues\") to refine it."
        when: "len(world.landing_note.plan ?? '') > 0"

      # The progressive-determinism read-out: how much free-form work has
      # been mined into named structure this session (incremented by the
      # slice-3 apply path; rendered read-only here).
      - kv:
          pairs:
            "Captured this session": "{{ world.captured }}"
            Oversight: "{{ world.oversight_mode|default:'gated' }}"

      - heading: "Quick actions"
      - choice:
          mode: single
          prompt: ""
          items:
            # Accept & apply the proposed plan — top of the menu when a plan is
            # present. Fires accept_plan, whose arc freezes accepted_plan and
            # enters `applying`.
            - label:  "Accept & apply this plan"
              hint:   "run the step, then verify it landed (or type an adjustment to refine)"
              intent: accept_plan
              when:   "len(world.landing_note.plan ?? '') > 0"
            # On-path bail — top of the menu when the agent suggested a path.
            - label:  "→ {{ world.landing_note.route.label }}"
              hint:   "jump onto the suggested pipeline (or ignore and keep working here)"
              intent: take_route
              when:   "(world.landing_note.route.intent ?? '') != ''"
            - label:  "tickets"
              hint:   "search and pick a ticket"
              intent: go_ticket_search
            - label:  "drive"
              hint:   "push the picked ticket through its pipeline"
              intent: drive
              when:   "available('drive')"
            - label:  "✗ drive — {{ blocked_reason('drive') }}"
              hint:   "pick a ticket first"
              intent: drive
              when:   "!available('drive')"
            - label:  "gated"
              hint:   "human checkpoint decisions"
              intent: oversight_gated
              when:   "world.oversight_mode != 'gated'"
            - label:  "LLM review"
              hint:   "LLM checkpoint decisions, human fallback"
              intent: oversight_llm_review
              when:   "world.oversight_mode != 'llm-review'"
            - label:  "no gate"
              hint:   "operation driver accepts checkpoints"
              intent: oversight_no_gate
              when:   "world.oversight_mode != 'no-gate'"
            - label:  "bugfix"
              hint:   "drive the picked ticket through the bugfix pipeline"
              intent: go_bugfix
            - label:  "bugfix → PR"
              hint:   "fix the picked bug, then open a pull request"
              intent: bugfix_open_pr
              when:   "world.ticket_id != ''"
            - label:  "bugfix → workspace"
              hint:   "fix the picked bug and leave the workspace for review"
              intent: bugfix_leave_worktree
              when:   "world.ticket_id != ''"
            - label:  "bugfix → local merge"
              hint:   "fix the picked bug and merge into the local base branch"
              intent: bugfix_merge_local
              when:   "world.ticket_id != ''"
            - label:  "implement"
              hint:   "drive the picked task through the implementation pipeline"
              intent: go_implementation
            - label:  "decompose"
              hint:   "fan a published proposal out into briefs, review, and fleet"
              intent: go_deliver
              when:   "world.design_file != ''"
            - label:  "fix tests"
              hint:   "run the test command, fix failures, and review for no regressions"
              intent: go_fix_tests
            - label:  "dogfood"
              hint:   "run the 15-case local + GitHub dogfood marathon"
              intent: go_dogfood_marathon
            - label:  "cypilot"
              hint:   "drive the picked epic through the SDLC waterfall"
              intent: go_cypilot
            - label:  "git"
              hint:   "status, sync, rebase, commit, merge, workspaces"
              intent: go_gitops
            - label:  "pr"
              hint:   "hand an open PR to pr-refinement"
              intent: go_pr_refinement
              when:   "available('go_pr_refinement')"
            - label:  "✗ pr (no open PR yet)"
              hint:   "drive a ticket to the PR stage first"
              intent: go_pr_refinement
              when:   "!available('go_pr_refinement')"
            - label:  "code review"
              hint:   "review a teammate's PR"
              intent: go_code_review_story
            - label:  "demo video"
              hint:   "produce/refresh a tour video and gate it with vision QA"
              intent: make_demo
            - label:  "prd"
              hint:   "author a PRD, then carry it into design"
              intent: go_prd
            - label:  "idea"
              hint:   "draft an ad hoc proposal — no ticket needed"
              intent: go_idea
            - label:  "model eval"
              hint:   "prepare model/harness effectiveness, speed, and cost reports"
              intent: go_model_eval
            - label:  "provider"
              hint:   "inspect installed/logged-in harnesses and write .kitsoki.local.yaml"
              intent: go_profile_setup
            - label:  "onboard"
              hint:   "discover a project profile, review it, then apply local setup"
              intent: go_init
            - label:  "readiness"
              hint:   "run declared post-apply checks and update the profile readiness summary"
              intent: run_readiness
              when:   "world.init_profile_status == 'applied' || world.init_profile_status == 'applied-no-tools'"
            - label:  "inbox"
              hint:   "read notifications ({{ world.inbox_unread }} unread)"
              intent: go_inbox
            - label:  "look"
              hint:   "re-render the workbench"
              intent: look

      - prose: "Type a request in your own words (\"fix the login crash\", \"pick TKT-014 and drive it\", \"ask claude how imports resolve\"), or pick a quick action above."
        when: "world.last_error == ''"

    on_enter:
      # 1. First-start banner sentinel — fires once, reload-safe (the set is
      #    guarded on its own world key so re-entry / look does not re-fire).
      #    The view renders the banner while landing_request is still empty.
      #    The richer first-run-per-project consent banner (epic slice 4)
      #    layers on top of this later.
      - when: "world.landing_started == false"
        set: { landing_started: true }

      # 2. The agent turn — synthesized by the `workbench:` block above (host
      #    .agent.task with the full-tool landing_agent; working_dir is
      #    world.workdir, empty ⇒ the subprocess inherits the repo root, the
      #    standalone default; once: keyed off its bind (landing_note) so
      #    returning from a pipeline / a `look` re-renders the stored note
      #    instead of re-dispatching; the landing_capture arc below clears
      #    landing_note to re-arm; guarded on a non-empty landing_request so
      #    a cold boot shows the banner + quick actions without dispatching;
      #    a mutating tool call the agent attempts holds for the write-mode
      #    opt-in the same workbench: block sets up).

      # 3. PlanProposed signal. When the agent's close-out note carried a
      #    structured plan, narrate it (surfaces as a machine.say event) so the
      #    proposed-plan decision is recorded in the trace. Guarded on the plan
      #    being present so a plain exploration turn stays quiet. Reads
      #    landing_note (bound by the synthesized task above), so it settles
      #    post-bind.
      - when: "len(world.landing_note.plan ?? '') > 0"
        say: "Plan proposed: {{ world.landing_note.plan.goal }} (verify mode: {{ world.landing_note.plan.verify.mode }}, mutating: {{ world.landing_note.plan.step.mutating }})."

    on:
      # Free-form work — the operator describes what they want. Captures the
      # request, clears the prior note to re-arm the on_enter agent task,
      # and loops back so on_enter dispatches the landing_agent on the
      # fresh request. `request` is required so the semantic router falls
      # through to the LLM router and captures the whole utterance.
      #
      # Named landing_capture (not the macro's plain synthesized arc) because
      # this arc carries the onboarding escape hatch (below) and thread
      # continuity (the guarded landing_plan_prior / landing_prior_* sets)
      # that workbench: does not auto-generate; expandWorkbenches only
      # synthesizes an arc for this intent name if one isn't already present,
      # so this hand-authored version is what actually runs.
      landing_capture:
        # Dogfood marathon escape hatch. This must route deterministically from
        # the kitsoki-dev landing floor: the operator's first natural utterance
        # is the request, then the dogfood room presents its own clean
        # `start the marathon` prompt.
        - when: "hasPrefix(lower(trim(slots.request)), 'i want to do a dogfood marathon') || hasPrefix(lower(trim(slots.request)), 'dogfood marathon') || hasPrefix(lower(trim(slots.request)), 'run a dogfood marathon')"
          target: dogfood
          effects:
            - set:
                prev_state: "landing"
                last_error: ""
        # Local harness/profile setup escape hatch. This is intentionally
        # separate from project onboarding: it only inspects local backend
        # availability and writes the user's gitignored `.kitsoki.local.yaml`
        # after a review gate.
        - when: "hasPrefix(lower(trim(slots.request)), 'setup local harness') || hasPrefix(lower(trim(slots.request)), 'configure provider') || hasPrefix(lower(trim(slots.request)), 'first run provider') || hasPrefix(lower(trim(slots.request)), 'local llm profile')"
          target: profile_setup_discover
          effects:
            - set:
                profile_setup_target_path: "{{ world.repo_root }}"
                profile_setup_status: "discovering"
                profile_setup_discovery: {}
                profile_setup_effective_profiles: []
                profile_setup_default_profile: ""
                profile_setup_candidate_action: ""
                profile_setup_candidate_profile: {}
                profile_setup_patch_preview: ""
                profile_setup_warnings: []
                profile_setup_apply_result: {}
                profile_setup_apply_ok: false
                profile_setup_apply_output: ""
                profile_setup_error: ""
                last_error: ""
                prev_state: "landing"
        # Onboarding command escape hatch. landing's default_intent captures
        # unmatched prose into `landing_capture` before an LLM router runs, so
        # natural utterances like "onboard ~/code/slidey" need a deterministic
        # arm here or they dispatch the general workbench agent. Keep this
        # narrow: only leading onboarding verbs route to the project
        # onboarding flow.
        - when: "hasPrefix(lower(trim(slots.request)), 'onboard') || hasPrefix(lower(trim(slots.request)), 'project onboarding') || hasPrefix(lower(trim(slots.request)), 'init project')"
          target: init_discover
          effects:
            - set:
                init_request:        "{{ slots.request }}"
                init_discovery:      {}
                init_run_ok:         false
                init_run_output:     ""
                init_discovery_error: ""
                init_ticket_provider: ""
                init_ticket_repo:     ""
                init_apply_result:   {}
                init_apply_ok:       false
                init_apply_output:   ""
                init_profile_status: "discovering"
                init_feedback:       ""
                last_error:          ""
                prev_state:          "landing"
        - target: landing
          effects:
            # Preserve the prior note BEFORE clearing landing_note so the
            # next agent dispatch can continue the thread. All effects read the
            # same pre-effect snapshot, so landing_prior_* / landing_plan_prior
            # capture the OLD note even though landing_note is cleared below.
            #
            # Preserve the prior PLAN first, guarded + SEPARATE from the
            # summary/details set: a free-text adjustment ("dry-run first") then
            # re-dispatches the planner with the plan it last proposed so it
            # REFINES it (prompts/landing.md folds landing_plan_prior in). A bare
            # {{ ...plan }} on a note WITHOUT a plan (the common case) would null
            # the entire set: block — hence the guard + a separate clear arm.
            - when: "len(world.landing_note.plan ?? '') > 0"
              set:
                landing_plan_prior: "{{ world.landing_note.plan }}"
            - when: "len(world.landing_note.plan ?? '') == 0"
              set:
                landing_plan_prior: {}
            - set:
                landing_prior_summary: "{{ world.landing_note.summary ?? '' }}"
                landing_prior_details: "{{ world.landing_note.details ?? '' }}"
                landing_request:       "{{ slots.request }}"
                landing_note:          {}
                last_error:            ""

      # On-path bail (B). Fired by the "→ on-path" choice item when the
      # workbench agent set landing_note.route. Projects the suggested
      # ticket onto world, then emit_intents the agent-chosen pipeline
      # intent (go_bugfix / drive / go_prd / …). The emit lands on one of
      # the go_* / drive arcs below, so their existing guards (is a ticket
      # picked?) and ticket_type routing still apply — no duplicated
      # routing logic. The Turn loop dispatches transition-arm emits
      # (machine.go applyEffectsTraced → dispatchEmittedIntents).
      take_route:
        - effects:
            - set:
                ticket_id:   "{{ world.landing_note.route.ticket_id ?? world.ticket_id }}"
                ticket_type: "{{ world.landing_note.route.ticket_type ?? world.ticket_type }}"
                last_error:  ""
            - emit_intent: "{{ world.landing_note.route.intent }}"

      # Accept & apply the proposed plan. Freeze the plan into accepted_plan
      # (so a later landing_note clear can't disturb the executing plan), emit
      # the PlanDecided signal (plan_decision + a say), clear last_error, and
      # enter `applying`. Guarded on a plan being present so a stray button
      # press without a plan is a guarded no-op. apply_plan is a strict alias.
      accept_plan:
        - when: "len(world.landing_note.plan ?? '') > 0"
          target: applying
          effects:
            - set:
                accepted_plan: "{{ world.landing_note.plan }}"
                plan_decision: "accepted"
                last_error:    ""
            - say: "Plan accepted — applying: {{ world.landing_note.plan.goal }}"
        - default: true
          target: .
          guard_hint: "No plan to apply — describe a concrete task so the agent can propose one."
          effects:
            - say: "There's no proposed plan to apply yet."
      # apply_plan is a strict alias of accept_plan (same guard, same effects).
      apply_plan:
        - when: "len(world.landing_note.plan ?? '') > 0"
          target: applying
          effects:
            - set:
                accepted_plan: "{{ world.landing_note.plan }}"
                plan_decision: "accepted"
                last_error:    ""
            - say: "Plan accepted — applying: {{ world.landing_note.plan.goal }}"
        - default: true
          target: .
          guard_hint: "No plan to apply — describe a concrete task so the agent can propose one."
          effects:
            - say: "There's no proposed plan to apply yet."

      # ── Re-homed main navigation (verbatim guards) ───────────────────
      go_ticket_search:
        - target: ticket_search
          effects:
            - set: { prev_state: "landing" }
            - set: { last_error: "" }
      go_workspace_manager:
        - target: workspace_manager
          effects:
            - set: { prev_state: "landing" }
      go_inbox:
        - target: inbox
          push_history: false
          effects:
            - set: { prev_state: "landing" }
      go_agent:
        - target: agent
          effects:
            - set: { prev_state: "landing" }
      go_standup:
        - target: standup
          effects:
            - set: { prev_state: "landing" }
      go_prd:
        - target: prd
          effects:
            - set: { prev_state: "landing", last_error: "" }
      go_idea:
        - target: design
          effects:
            - set: { prev_state: "landing", design_seed_idea: "" }
      go_ideas:
        - target: ideas
          effects:
            - set: { prev_state: "landing" }
            - set: { last_error: "" }
      go_model_eval:
        - target: model_eval
          effects:
            - set: { prev_state: "landing" }
      go_profile_setup:
        - target: profile_setup_discover
          effects:
            - set:
                prev_state: "landing"
                last_error: ""
                profile_setup_target_path: "{{ slots.target ?? world.repo_root ?? world.workdir ?? '.' }}"
                profile_setup_status: "discovering"
                profile_setup_discovery: {}
                profile_setup_effective_profiles: []
                profile_setup_default_profile: ""
                profile_setup_candidate_action: ""
                profile_setup_candidate_profile: {}
                profile_setup_patch_preview: ""
                profile_setup_warnings: []
                profile_setup_apply_result: {}
                profile_setup_apply_ok: false
                profile_setup_apply_output: ""
                profile_setup_error: ""
      go_init:
        - target: init_discover
          effects:
            - set:
                prev_state:          "landing"
                last_error:          ""
                # An explicit `target` slot lets a button-driven onboarding
                # point at an external repo deterministically (no free-text
                # routing); empty ⇒ parse_target falls back to the checkout.
                init_request:        "{{ slots.target }}"
                init_discovery:      {}
                init_run_ok:         false
                init_run_output:     ""
                init_discovery_error: ""
                init_apply_result:   {}
                init_apply_ok:       false
                init_apply_output:   ""
                init_profile_status: "discovering"
                init_feedback:       ""
      run_readiness:
        - when: "world.init_profile_status == 'applied' || world.init_profile_status == 'applied-no-tools'"
          target: init_readiness
          effects:
            - set:
                init_readiness_result: {}
                init_readiness_ok: false
                init_readiness_output: ""
                init_profile_status: "checking-readiness"
                last_error: ""
        - default: true
          target: landing
          effects:
            - set: { last_error: "Run project onboarding before readiness." }
      go_code_review:
        - target: code_review
          effects:
            - set: { prev_state: "landing" }
      go_deploy:
        - target: deploy
          effects:
            - set: { prev_state: "landing" }
      go_observability:
        - target: observability
          effects:
            - set: { prev_state: "landing" }
      go_incident:
        - target: incident
          effects:
            - set: { prev_state: "landing" }
      go_docs:
        - target: docs
          effects:
            - set: { prev_state: "landing" }

      # Auto-routing one-shot — ticket_type chooses the pipeline (verbatim
      # from main.yaml: bug → bf, feature → impl, epic → cyp).
      drive:
        - when: "world.ticket_id != '' && world.ticket_type == 'bug'"
          target: bf
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id != '' && world.ticket_type == 'feature'"
          target: impl
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id != '' && world.ticket_type == 'epic'"
          target: cyp
          effects:
            - set: { last_error: "" }
        - when: "world.ticket_id == ''"
          target: landing
          guard_hint: "Pick a ticket first — type tickets."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
        - default: true
          target: landing
          guard_hint: "Ticket has no type set — re-pick from tickets so its type is recorded."
          effects:
            - set:
                last_error: |
                  The picked ticket has no type — the pipeline router can't determine which pipeline to use.

                  Suggestions:
                  - `tickets` — re-search and re-pick the ticket (type is recorded at pick time)

      # Escape hatches — same destinations as drive, named explicitly.
      go_bugfix:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set: { last_error: "" }
        - default: true
          target: landing
          guard_hint: "Pick a ticket first — type tickets."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the bugfix pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
      bugfix_report:
        - target: bf
          effects:
            - set:
                ticket_id: ""
                ticket_title: "{{ slots.title ?? 'Free-form bug report' }}"
                ticket_url: ""
                ticket_body: "{{ slots.complaint }}"
                ticket_type: "bug"
                ticket_source_mode: "freeform"
                ticket_source_ref: "operator complaint"
                thread: ""
                last_error: ""
      bugfix_link:
        - target: bf
          effects:
            - set:
                ticket_id: "linked-bug"
                ticket_title: "{{ slots.title ?? 'Remote bug link' }}"
                ticket_url: "{{ slots.url }}"
                ticket_body: |
                  {{ world.ticket_repo == '' ? 'Remote issue link: ' + slots.url + '\n\nConfigure the matching ticket provider for full issue body fetch; paste the issue body instead when provider access is unavailable.' : '' }}
                ticket_type: "bug"
                ticket_source_mode: "remote"
                ticket_source_ref: "{{ slots.url }}"
                thread: "{{ slots.url }}"
                last_error: ""
      bugfix_open_pr:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set:
                bugfix_destination: "open-pr"
                last_error: ""
        - default: true
          target: landing
          guard_hint: "Pick a ticket first — type tickets."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the bugfix pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
      bugfix_leave_worktree:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set:
                bugfix_destination: "leave-worktree"
                last_error: ""
        - default: true
          target: landing
          guard_hint: "Pick a ticket first — type tickets."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the bugfix pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
      bugfix_merge_local:
        - when: "world.ticket_id != ''"
          target: bf
          effects:
            - set:
                bugfix_destination: "local-merge"
                last_error: ""
        - default: true
          target: landing
          guard_hint: "Pick a ticket first — type tickets."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the bugfix pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
      oversight_gated:
        - target: .
          effects:
            - set:
                oversight_mode: "gated"
                judge_mode: "human"
                last_error: ""
      oversight_llm_review:
        - target: .
          effects:
            - set:
                oversight_mode: "llm-review"
                judge_mode: "llm_then_human"
                last_error: ""
      oversight_no_gate:
        - target: .
          effects:
            - set:
                oversight_mode: "no-gate"
                judge_mode: "human"
                last_error: ""
      go_implementation:
        - when: "world.ticket_id != ''"
          target: impl
          effects:
            - set: { last_error: "" }
        - default: true
          target: landing
          guard_hint: "Pick a ticket first — type tickets."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the implementation pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace
      go_cypilot:
        - when: "world.ticket_id != ''"
          target: cyp
          effects:
            - set: { last_error: "" }
        - default: true
          target: landing
          guard_hint: "Pick a ticket first — type tickets."
          effects:
            - set:
                last_error: |
                  No ticket selected — pick one before entering the cypilot pipeline.

                  Suggestions:
                  - `tickets` — search and pick a ticket
                  - `workspaces` — resume an in-progress workspace

      # decompose-vs-direct (proposal deliver-canonical-decomposition.md, task
      # B3): the operator-choice alternative to go_implementation, offered here
      # too so a proposal published earlier (design_file already set) can be
      # picked up for decomposition without re-visiting design_done. Gated on
      # design_file, not ticket_id — deliver's world_in: only needs the
      # published proposal path.
      go_deliver:
        - when: "world.design_file != ''"
          target: deliver
          effects:
            - set: { last_error: "" }
        - default: true
          target: landing
          guard_hint: "No published proposal to decompose — publish a design first."
          effects:
            - set:
                last_error: |
                  No published proposal to decompose.

                  Suggestions:
                  - `idea` — draft and publish a proposal, then decompose it

      go_fix_tests:
        - target: tests
          effects:
            - set:
                test_cmd:                   "{{ slots.test_cmd ?? world.test_cmd }}"
                quick_test_cmd:             "{{ slots.quick_test_cmd ?? world.quick_test_cmd }}"
                quick_test_timeout_seconds: "{{ slots.quick_test_timeout_seconds ?? world.quick_test_timeout_seconds }}"
                full_test_timeout_seconds:  "{{ slots.full_test_timeout_seconds ?? world.full_test_timeout_seconds }}"
                fix_tests_report_path: ""
                fix_tests_review: {}
                last_error: ""

      go_dogfood_marathon:
        - target: dogfood
          effects:
            - set:
                prev_state: "landing"
                last_error: ""

      go_gitops:
        - target: gitops
          effects:
            - set: { last_error: "" }

      go_pr_refinement:
        - when: "world.last_pr_url != '' || world.feature_branch != ''"
          target: pr
          effects:
            - set: { last_error: "" }
        - default: true
          target: landing
          guard_hint: "No open PR yet — drive a ticket through the pipeline first."
          effects:
            - set:
                last_error: |
                  No open PR yet — you need an active workspace with a pushed branch.

                  Suggestions:
                  - Pick a bug or feature ticket and `drive` it through the pipeline to the PR stage

      go_code_review_story:
        - target: rev

      # Demo-video loop — produce/refresh a tour video for a feature and gate
      # it with the kitsoki-ui-qa vision review. Enters the demovid import
      # compound; world_in: (app.yaml imports.demovid) projects the hub's
      # workdir / base_branch + the demo input keys into the loop. Additive —
      # placed after the other go_* / drive launch arcs, before the self-loop
      # navigation, preserving existing arc order.
      make_demo:
        - target: demovid
          effects:
            - set: { last_error: "" }

      # go_main / go_back / look now loop back to the workbench floor.
      go_main:
        - target: landing
      go_back:
        - target: landing
      look:
        - target: .
