# docs — STUB. Wave 3 wires `update_inline_docs` / `generate_docs`
# intents to LLM-driven doc-editing rooms.

states:

  docs:
    description: "Docs — write / edit documentation (coming soon)."
    # Flattened view (no extends/blocks) — `choice:` cannot live inside a
    # `blocks:` map (typed metadata is lost through the inheritance
    # pipeline; see docs/stories/choice-widget.md §3.1). The base.pongo
    # status/heading chrome is dropped on the standalone path.
    view:
      - banner:
          text:     "DOCS"
          subtitle: "write & edit documentation — coming in a later release"
          color:    "#6B7280"   # grey — not yet active
      - prose: "The docs workflow isn't wired up yet — it lands in a later release. Pick another action below, or head back to the workbench."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "go_back", intent: go_back, hint: "return to the previous room" }
            - { label: "go_main", intent: go_main, hint: "back to the engineer's day landing" }
            - { label: "look",    intent: look,    hint: "re-render" }
    relevant_world: []
    on:
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: landing
      look:
        - target: .
