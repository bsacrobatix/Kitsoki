# docs — STUB. Wave 3 wires `update_inline_docs` / `generate_docs`
# intents to LLM-driven doc-editing rooms.

states:

  docs:
    description: "Docs — write / edit documentation (Wave 3 stub)."
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Docs (Wave 3 stub)."
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "go_back"
                - label: "go_main"
                - label: "look"
    relevant_world: []
    on:
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: main
      look:
        - target: .
