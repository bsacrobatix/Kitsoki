# code_review — STUB room for Wave 3's code-review sub-story. Wave 2
# ships a placeholder that routes back to main; Wave 3 imports a real
# `stories/code-review/` here.

states:

  code_review:
    description: "Code review — review teammates' open PRs (Wave 3 stub)."
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Code review (Wave 3 stub)."
          - prose: >
              In Wave 3 this room imports stories/code-review/ which
              lists PRs assigned to me via iface.vcs.pr_status /
              iface.ticket.list_mine, walks through each diff, and posts
              review comments.
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "go_back"
                - label: "go_main"
                - label: "look"
    relevant_world: []
    on:
      go_back:
        - target: "{{ world.prev_state }}"
      go_main:
        - target: main
      look:
        - target: .
