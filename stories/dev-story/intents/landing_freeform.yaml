# landing_freeform — the workbench's free-text routing contract.
#
# Regression for .context/landing-onpath-offpath-bail.md slice C:
#   - affirmations / continuations ("ok go ahead", "do it") must route to
#     the `work` agent (landing's default_intent free-text sink), NOT to a
#     navigation example. The live bug: "ok go ahead" matched drive's bare
#     "go" example (stem subset) and bounced. "go" was removed from drive
#     and landing now declares default_intent: work.
#   - explicit drive verbs still route to `drive`.
#
# `explicit-drive-it` resolves in the deterministic bare-string tier, so it
# needs no recording and no LLM under `kitsoki test routing`.
#
# dwf3 routing triage (2026-07-06): the two affirmation fixtures below used
# to assert `intent: {name: landing_capture}` under `test routing`, but that
# tier is `orchestrator.Classify` — deterministic display/example match →
# semantic synonym/template → optional embedding (see
# internal/testrunner/routing.go's package doc). Classify NEVER resolves a
# state's `default_intent` sink or the app's `routing.free_form_fallback`;
# those are a LATER tier the live Turn pipeline applies only once Classify
# itself reports no match. So "ok go ahead" / "do it" correctly fail
# Classify with ok=false — the stale expectation was asserting a resolution
# Classify cannot produce, not a real misroute. `defers_to_interpreter: true`
# is the routing.go-documented shape for exactly this case (Classify
# declines; the later default_intent/free_form_fallback tier resolves it in
# the live pipeline — see `landing_write_mode_opt_in.yaml`'s flow fixture for
# that later-tier proof).

test_kind: intents
app: ../app.yaml
state: landing
defaults:
  runs: 1
  min_pass_rate: 1.0

fixtures:
  # Continuation → the workbench agent (default_intent: work) one tier below
  # Classify. Classify correctly declines (no-LLM tiers stop at "not a known
  # command"); the later default_intent sink is what actually resolves this
  # live, not something `test routing` can observe.
  - id: affirmation-ok-go-ahead
    defers_to_interpreter: true
    inputs:
      - "ok go ahead"

  - id: affirmation-do-it
    defers_to_interpreter: true
    inputs:
      - "do it"

  # Explicit drive verb still routes to the pipeline-drive intent.
  - id: explicit-drive-it
    intent:
      name: drive
    inputs:
      - "drive it"
