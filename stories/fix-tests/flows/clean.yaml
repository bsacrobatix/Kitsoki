# clean — the suite passes on the first (background) run; nothing to fix.
# idle --start--> starting --> running_executing; green --> review --> done_clean.
test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  test_cmd:   "make test"
  max_cycles: 3

host_handlers:
  host.run:
    by_call:
      run_initial:
        data: { exit_code: 0, ok: true, stdout: "ok\tall packages\n" }
        delay: "20ms"
  host.agent.decide:
    by_call:
      review-0:
        data:
          submitted:
            pass: true
            reason: "No diff to review and the command is green."
            functionality_preserved: true
            tests_not_weakened: true
            findings: []
            fixes: []
  host.inbox.add:
    data: { ok: true }

turns:
  - intent: { name: start }
    advance_clock: "500ms"
    expect_state: __exit__achieved
    expect_world:
      tests_passed: true
      outcome:      "clean"
      cycle:        0
      report_path:  ".artifacts/fix-tests/report-clean.md"
      review_ok:    true

expect_terminal: true
expect_no_errors: true
