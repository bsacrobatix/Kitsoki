# review_rejects_test_weakening — the command goes green after the first fix,
# but the review gate detects a weakened test and loops back. The second cycle
# preserves the test and passes review.
test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  test_cmd:   "make test"
  max_cycles: 3

host_handlers:
  host.run:
    by_call:
      run_initial:
        data: { exit_code: 1, ok: false, stdout: "--- FAIL: TestFoo\nFAIL\n" }
        delay: "10ms"
      verify_run:
        data: { exit_code: 0, ok: true, stdout: "ok\n" }
        delay: "10ms"
  host.agent.task:
    by_call:
      fix:
        delay: "10ms"
        data:
          submitted:
            summary_title:      "Adjust Add() behavior"
            summary_markdown:   "Updated the implementation after reviewing the failure and follow-up review feedback."
            files_changed:      ["internal/foo/foo.go", "internal/foo/foo_test.go"]
            fixed_tests:        ["TestFoo"]
            remaining_failures: []
            needs_decision:     false
            confidence:         0.8
  host.agent.decide:
    by_call:
      review-1:
        data:
          submitted:
            pass: false
            reason: "TestFoo was changed to stop asserting the edge case; restore meaningful coverage and fix the implementation instead."
            functionality_preserved: true
            tests_not_weakened: false
            findings: ["TestFoo no longer checks the original edge case."]
            fixes: ["Restore the edge-case assertion and make the implementation satisfy it."]
      review-2:
        data:
          submitted:
            pass: true
            reason: "The edge-case assertion remains and the implementation now satisfies it."
            functionality_preserved: true
            tests_not_weakened: true
            findings: []
            fixes: []
  host.inbox.add:
    data: { ok: true }

turns:
  - intent: { name: start }
    advance_clock: "5s"
    expect_state: __exit__achieved
    expect_world:
      tests_passed: true
      outcome:      "fixed"
      cycle:        2
      review_ok:    true
      report_path:  ".artifacts/fix-tests/report-fixed.md"

expect_terminal: true
expect_operation_policy: fix_tests
expect_operation_status: completed
expect_terminal_artifact: report_path
expect_no_errors: true
