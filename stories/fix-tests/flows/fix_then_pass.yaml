# fix_then_pass — first quick run red, one fix cycle, quick/full gates green.
# running_executing (exit 1) -> fixing_executing (needs_decision=false)
# -> verifying_executing (exit 0) -> full_verifying_executing (exit 0)
# -> done_clean. All background jobs; one advance_clock drains the whole chain.
test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  test_cmd:   "make test"
  max_cycles: 3

host_handlers:
  host.run:
    by_call:
      run_initial:
        data: { exit_code: 1, ok: false, stdout: "--- FAIL: TestFoo\nFAIL\n" }
        delay: "20ms"
      verify_run:
        data: { exit_code: 0, ok: true, stdout: "ok\n" }
        delay: "20ms"
      full_verify_run:
        data: { exit_code: 0, ok: true, stdout: "ok\tfull suite\n" }
        delay: "20ms"
  host.agent.task:
    by_call:
      fix:
        delay: "20ms"
        data:
          submitted:
            summary_title:      "Fix off-by-one in Add()"
            summary_markdown:   "TestFoo expected 2 but Add() returned 1; corrected the off-by-one."
            files_changed:      ["internal/foo/foo.go"]
            fixed_tests:        ["TestFoo"]
            remaining_failures: []
            needs_decision:     false
            confidence:         0.9
  host.agent.decide:
    by_call:
      review-1:
        data:
          submitted:
            pass: true
            reason: "The source fix is focused and no tests were weakened."
            functionality_preserved: true
            tests_not_weakened: true
            findings: []
            fixes: []
  host.inbox.add:
    data: { ok: true }

turns:
  - intent: { name: start }
    advance_clock: "2s"
    expect_state: __exit__achieved
    expect_world:
      tests_passed: true
      outcome:      "fixed"
      cycle:        1
      report_path:  ".artifacts/fix-tests/report-fixed.md"
      review_ok:    true

expect_terminal: true
expect_operation_policy: fix_tests
expect_operation_status: completed
expect_terminal_artifact: report_path
expect_no_errors: true
