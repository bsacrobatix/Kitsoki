intents:
  start:
    description: "Create a deterministic product-journey QA run bundle."
    examples: ["start", "create a product journey run", "begin qa run", "start scenarios=core-use-cases live_budget_minutes=10"]
    priority: 90
    slots:
      project: { type: string, required: false }
      persona: { type: string, required: false }
      seed: { type: string, required: false }
      scenarios: { type: string, required: false }
      live_budget_minutes: { type: int, required: false }
  matrix:
    description: "Create a deterministic 10-repo GitHub product-journey matrix."
    examples: ["create github matrix", "plan ten repo sweep", "emit matrix with target proof"]
    priority: 88
    slots:
      seed: { type: string, required: false }
      matrix_personas: { type: string, required: false }
      target_proof_file: { type: string, required: false }
  dogfood_smoke:
    description: "Run the deterministic no-LLM product-journey smoke from matrix through rollup and decks."
    examples: ["dogfood smoke", "run dogfood smoke", "prove artifact loop"]
    priority: 89
    slots:
      seed: { type: string, required: false }
  driver_replay_smoke:
    description: "Run a deterministic no-LLM one-scenario reusable-driver replay with cassette proof evidence."
    examples: ["driver replay smoke", "prove driver replay", "run cassette driver smoke"]
    priority: 88
    slots:
      seed: { type: string, required: false }
      scenario: { type: string, required: false }
      persona: { type: string, required: false }
  driver_replay_sweep:
    description: "Run deterministic no-LLM reusable-driver replays for every product-journey scenario."
    examples: ["driver replay sweep", "prove all driver replays", "run all cassette driver smokes"]
    priority: 87
    slots:
      seed: { type: string, required: false }
      persona: { type: string, required: false }
  validate_corpus:
    description: "Validate the reusable personas, scenarios, and GitHub target catalog."
    examples: ["validate corpus", "check persona scenario catalog", "preflight journey corpus"]
    priority: 88
  capture_preflight:
    description: "Run no-LLM capture-toolchain preflight checks before live persona evidence capture."
    examples: ["capture preflight", "check webshot capture", "preflight browser capture"]
    priority: 88
    slots:
      seed: { type: string, required: false }
  native_ghagent_smoke:
    description: "Run a no-LLM native gh-agent queue/drain smoke through kitsoki commands."
    examples: ["native ghagent smoke", "native gh-agent smoke", "prove gh-agent queue drain"]
    priority: 88
  autonomous_fix_smoke:
    description: "Run a no-LLM full autonomous issue filing and gh-agent fix smoke."
    examples: ["autonomous fix smoke", "prove autonomous issue to fix", "full autonomous fix smoke"]
    priority: 88
  persona_autofix_smoke:
    description: "Run a no-LLM persona replay to filed issue to gh-agent fix smoke."
    examples: ["persona autofix smoke", "prove persona qa autofix", "persona issue to fix smoke"]
    priority: 89
  autonomous_marathon_smoke:
    description: "Run a no-LLM core-use-case persona sweep through autonomous fix and derived stats."
    examples: ["autonomous marathon smoke", "prove persona qa marathon", "standing product qa smoke", "autonomous marathon smoke repeats=2"]
    priority: 89
    slots:
      repeats: { type: int, required: false }
  validate_marathon_smoke_ledger:
    description: "Validate a retained autonomous marathon smoke ledger through the story surface."
    examples: ["validate marathon smoke ledger", "check retained marathon ledger", "validate last marathon smoke", "validate marathon smoke ledger min_cycles=2"]
    priority: 88
    slots:
      marathon_smoke_ledger: { type: string, required: false }
      min_cycles: { type: int, required: false }
  autonomous_marathon:
    description: "Create or finalize a standing persona-QA marathon through autonomous fix, review, validation, weakness routing, and stats."
    examples: ["autonomous marathon", "start autonomous marathon scenarios=core-use-cases", "finalize autonomous marathon ticket_repo=bsacrobatix/Kitsoki"]
    priority: 90
    slots:
      project: { type: string, required: false }
      persona: { type: string, required: false }
      seed: { type: string, required: false }
      scenarios: { type: string, required: false }
      live_budget_minutes: { type: int, required: false }
      autonomous_driver_mode: { type: string, required: false }
      autonomous_driver_live_profile: { type: string, required: false }
      run_dir: { type: string, required: false }
      ticket_repo: { type: string, required: false }
      gh_agent_db: { type: string, required: false }
