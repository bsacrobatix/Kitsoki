app:
  id: product-journey-qa
  version: 0.1.0
  title: "Product journey QA"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.run
  - host.agent.task

agents:
  autonomous_driver:
    system_prompt: >-
      You are the reusable product-journey QA driver
      (.agents/agents/product-journey-qa-driver.md). Drive the generated
      product-journey run bundle through Kitsoki Studio MCP and visual MCP,
      capture evidence, record findings and driver-journal events through the
      product-journey story, then run the story-owned autonomous watchdog,
      autonomous_fix, review, validate, and stats gates when the run has
      credible issue findings. Do not call gh directly; the native
      product-journey story/gitops/gh-agent gates own all GitHub filing,
      fixing, evidence, close-out, and stats.
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Bash, mcp__kitsoki__studio_ping, mcp__kitsoki__studio_handles, mcp__kitsoki__session_new, mcp__kitsoki__session_attach, mcp__kitsoki__session_drive, mcp__kitsoki__session_submit, mcp__kitsoki__session_continue, mcp__kitsoki__session_answer, mcp__kitsoki__session_status, mcp__kitsoki__session_world, mcp__kitsoki__session_inspect, mcp__kitsoki__session_trace, mcp__kitsoki__session_close, mcp__kitsoki__render_tui, mcp__kitsoki__render_tui_png, mcp__kitsoki__render_web, mcp__kitsoki__visual_open, mcp__kitsoki__visual_observe, mcp__kitsoki__visual_act]
    effect: external

