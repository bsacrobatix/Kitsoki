states:
  idle:
    description: "Waiting to create a product-journey QA run bundle."
    relevant_world: [project, persona, seed, matrix_personas, target_proof_file, capture_preflight_status, capture_preflight_failed, corpus_validation_status, corpus_validation_errors, corpus_validation_warnings, native_ghagent_status, autonomous_fix_smoke_status, persona_autofix_smoke_status, autonomous_marathon_smoke_status, autonomous_marathon_smoke_project, autonomous_marathon_smoke_persona_count, autonomous_marathon_smoke_scenario_count, autonomous_marathon_smoke_run_count, autonomous_marathon_smoke_filed_issue_count, autonomous_marathon_smoke_done_count, autonomous_marathon_status, autonomous_marathon_report_path, autonomous_driver_mode, autonomous_driver_status, autonomous_driver_evidence_count, autonomous_control_status, autonomous_control_summary, autonomous_control_path, autonomous_gate_summary, independent_verify_status, independent_verify_summary, stats_gate_status, stats_gate_summary, stats_current_run_scanned, validation_status, validation_errors, validation_issue_summary, status]
    view:
      - banner:
          text: "PRODUCT JOURNEY QA"
          subtitle: "Create repeatable persona/scenario bundles for visual MCP and Kitsoki MCP evidence."
          color: "#7C3AED"
      - kv:
          pairs:
            Project: "{{ world.project }}"
            Persona: "{{ world.persona }}"
            Seed: "{{ world.seed }}"
            Matrix personas: "{{ world.matrix_personas }}"
            Target proof: '{{ world.target_proof_file|default:"(not refreshed)" }}'
            Capture preflight: '{{ world.capture_preflight_status|default:"(not checked)" }}'
            Corpus: '{{ world.corpus_validation_status|default:"(not checked)" }}'
            Native gh-agent: '{{ world.native_ghagent_status|default:"(not checked)" }}'
            Autonomous fix smoke: '{{ world.autonomous_fix_smoke_status|default:"(not checked)" }}'
            Persona autofix smoke: '{{ world.persona_autofix_smoke_status|default:"(not checked)" }}'
            Autonomous marathon smoke: '{{ world.autonomous_marathon_smoke_status|default:"(not checked)" }}'
            Marathon smoke coverage: '{{ world.autonomous_marathon_smoke_project|default:"(none)" }}; personas={{ world.autonomous_marathon_smoke_persona_count }}, scenarios={{ world.autonomous_marathon_smoke_scenario_count }}, runs={{ world.autonomous_marathon_smoke_run_count }}, filed={{ world.autonomous_marathon_smoke_filed_issue_count }}, fixed={{ world.autonomous_marathon_smoke_done_count }}'
            Autonomous marathon: '{{ world.autonomous_marathon_status|default:"(not started)" }}'
            Autonomous driver: '{{ world.autonomous_driver_mode|default:"pending" }} / {{ world.autonomous_driver_status|default:"(not run)" }}'
            Marathon control: '{{ world.autonomous_control_status|default:"(not armed)" }}: {{ world.autonomous_control_summary|default:"" }}'
            Control artifact: '{{ world.autonomous_control_path|default:"(not generated)" }}'
            Autonomous gates: '{{ world.autonomous_gate_summary|default:"(not run)" }}'
            Independent verify: '{{ world.independent_verify_status|default:"(not checked)" }}: {{ world.independent_verify_summary|default:"" }}'
            Stats gate: '{{ world.stats_gate_status|default:"(not checked)" }}: {{ world.stats_gate_summary|default:"" }}; current run scanned {{ world.stats_current_run_scanned|default:"unknown" }}'
            Validation: '{{ world.validation_status|default:"(not validated)" }}'
            Validation issues: '{{ world.validation_issue_summary|default:"(none)" }}'
            Status: "{{ world.status }}"
      - prose: "Create a no-LLM run bundle or a 10-repo GitHub matrix, then attach visual/MCP evidence as scenarios play out."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "start project=... persona=... seed=..."
              hint: "emit a run bundle under .artifacts/product-journey"
              intent: start
            - label: "matrix seed=... matrix_personas=primary"
              hint: "emit the 10-repo GitHub matrix under .artifacts/product-journey/matrices"
              intent: matrix
            - label: "dogfood_smoke seed=..."
              hint: "prove matrix, run, review, validation, rollup, and decks in one no-LLM loop"
              intent: dogfood_smoke
            - label: "driver_replay_smoke scenario=... persona=... seed=..."
              hint: "prove one reusable-driver scenario with cassette evidence and journal-linked refs"
              intent: driver_replay_smoke
            - label: "driver_replay_sweep persona=... seed=..."
              hint: "prove every reusable-driver scenario with cassette evidence and playback refs"
              intent: driver_replay_sweep
            - label: "validate_corpus"
              hint: "preflight personas, scenarios, quality gates, and the GitHub target catalog"
              intent: validate_corpus
            - label: "capture_preflight seed=..."
              hint: "prove webshot/browser capture works before spending a live run"
              intent: capture_preflight
            - label: "native_ghagent_smoke"
              hint: "prove product-journey fixes enqueue/drain through native gh-agent without GitHub comments"
              intent: native_ghagent_smoke
            - label: "autonomous_fix_smoke"
              hint: "prove persona findings file, queue, drain, review, and validate in one no-LLM loop"
              intent: autonomous_fix_smoke
            - label: "persona_autofix_smoke"
              hint: "prove persona replay findings enter the autonomous gitops issue-to-fix gate"
              intent: persona_autofix_smoke
            - label: "autonomous_marathon_smoke"
              hint: "prove every active persona can drive onboarding, PRD/design, and bugfix to autonomous fix and stats"
              intent: autonomous_marathon_smoke
            - label: "autonomous_marathon scenarios=core-use-cases"
              hint: "create a standing persona-QA run envelope; rerun from the run page to finalize"
              intent: autonomous_marathon
            - label: "refresh_targets seed=..."
              hint: "write a GitHub target-proof artifact for bug-count and popularity floors"
              intent: refresh_targets
            - label: "load run_dir=..."
              hint: "load an existing run bundle so a driver can attach evidence through this story"
              intent: load
            - label: "look"
              intent: look
    on:
      validate_corpus:
        - target: .
          effects:
            - set:
                status: "validating_corpus"
            - invoke: host.run
              id: validate_product_journey_corpus
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --validate-corpus
                  - --json-output
                cwd: "."
              bind:
                last_result: stdout_json
                corpus_validation_status: "stdout_json.status"
                corpus_validation_errors: "stdout_json.errors"
                corpus_validation_warnings: "stdout_json.warnings"
              on_error: idle
            - set:
                status: "corpus_validated"
      capture_preflight:
        - target: .
          effects:
            - set:
                seed: "{{ slots.seed ?? world.seed }}"
                capture_preflight_status: ""
                capture_preflight_failed: 0
                status: "capture_preflighting"
            - invoke: host.run
              id: capture_product_journey_preflight
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --capture-preflight
                  - --json-output
                  - --seed
                  - "{{ slots.seed ?? world.seed }}"
                cwd: "."
              bind:
                last_result: stdout_json
                capture_preflight_status: "stdout_json.status"
                capture_preflight_id: "stdout_json.preflight_id"
                capture_preflight_dir: "stdout_json.preflight_dir"
                capture_preflight_path: "stdout_json.preflight_path"
                capture_preflight_markdown_path: "stdout_json.markdown_path"
                capture_preflight_webshot_output: "stdout_json.webshot_output"
                capture_preflight_passed: "stdout_json.passed"
                capture_preflight_failed: "stdout_json.failed"
              on_error: idle
            - set:
                status: "capture_preflight_checked"
      native_ghagent_smoke:
        - target: .
          effects:
            - set:
                native_ghagent_status: ""
                native_ghagent_summary: ""
                native_ghagent_output: ""
                native_ghagent_exit_code: 0
                status: "native_ghagent_smoking"
            - invoke: host.run
              id: native_product_journey_ghagent_smoke
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --native-ghagent-smoke
                  - --json-output
                cwd: "."
              bind:
                last_result: stdout_json
                native_ghagent_status: "stdout_json.status"
                native_ghagent_summary: "stdout_json.summary"
                native_ghagent_exit_code: "stdout_json.exit_code"
                native_ghagent_output: "stdout_json.output"
              on_error: idle
            - set:
                status: "native_ghagent_smoke_checked"
      autonomous_fix_smoke:
        - target: .
          effects:
            - set:
                autonomous_fix_smoke_status: ""
                autonomous_fix_smoke_summary: ""
                autonomous_fix_smoke_output: ""
                autonomous_fix_smoke_exit_code: 0
                status: "autonomous_fix_smoking"
            - invoke: host.run
              id: autonomous_product_journey_fix_smoke
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --autonomous-fix-smoke
                  - --json-output
                cwd: "."
              bind:
                last_result: stdout_json
                autonomous_fix_smoke_status: "stdout_json.status"
                autonomous_fix_smoke_summary: "stdout_json.summary"
                autonomous_fix_smoke_exit_code: "stdout_json.exit_code"
                autonomous_fix_smoke_output: "stdout_json.output"
              on_error: idle
            - set:
                status: "autonomous_fix_smoke_checked"
      persona_autofix_smoke:
        - target: .
          effects:
            - set:
                persona_autofix_smoke_status: ""
                persona_autofix_smoke_summary: ""
                persona_autofix_smoke_output: ""
                persona_autofix_smoke_exit_code: 0
                status: "persona_autofix_smoking"
            - invoke: host.run
              id: persona_product_journey_autofix_smoke
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --persona-autofix-smoke
                  - --json-output
                cwd: "."
              bind:
                last_result: stdout_json
                persona_autofix_smoke_status: "stdout_json.status"
                persona_autofix_smoke_summary: "stdout_json.summary"
                persona_autofix_smoke_exit_code: "stdout_json.exit_code"
                persona_autofix_smoke_output: "stdout_json.output"
              on_error: idle
            - set:
                status: "persona_autofix_smoke_checked"
      autonomous_marathon_smoke:
        - target: .
          effects:
            - set:
                autonomous_marathon_smoke_status: ""
                autonomous_marathon_smoke_summary: ""
                autonomous_marathon_smoke_output: ""
                autonomous_marathon_smoke_exit_code: 0
                autonomous_marathon_smoke_project: ""
                autonomous_marathon_smoke_persona_count: 0
                autonomous_marathon_smoke_scenario_count: 0
                autonomous_marathon_smoke_run_count: 0
                autonomous_marathon_smoke_filed_issue_count: 0
                autonomous_marathon_smoke_done_count: 0
                status: "autonomous_marathon_smoking"
            - invoke: host.run
              id: autonomous_product_journey_marathon_smoke
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --autonomous-marathon-smoke
                  - --json-output
                cwd: "."
              bind:
                last_result: stdout_json
                autonomous_marathon_smoke_status: "stdout_json.status"
                autonomous_marathon_smoke_summary: "stdout_json.summary"
                autonomous_marathon_smoke_exit_code: "stdout_json.exit_code"
                autonomous_marathon_smoke_output: "stdout_json.output"
                autonomous_marathon_smoke_project: "stdout_json.project"
                autonomous_marathon_smoke_persona_count: "stdout_json.persona_count"
                autonomous_marathon_smoke_scenario_count: "stdout_json.scenario_count"
                autonomous_marathon_smoke_run_count: "stdout_json.run_count"
                autonomous_marathon_smoke_filed_issue_count: "stdout_json.filed_issue_count"
                autonomous_marathon_smoke_done_count: "stdout_json.gh_agent_done_count"
              on_error: idle
            - set:
                status: "autonomous_marathon_smoke_checked"
      autonomous_marathon:
        - when: "(slots.autonomous_driver_mode ?? 'pending') == 'replay' && (slots.ticket_repo == nil || slots.ticket_repo == '')"
          target: .
          effects:
            - set:
                project: "{{ slots.project ?? world.project }}"
                persona: "{{ slots.persona ?? world.persona }}"
                seed: "{{ slots.seed ?? world.seed }}"
                scenario_scope: "{{ slots.scenarios ?? world.scenario_scope }}"
                autonomous_marathon_status: "autonomous_marathon_invalid"
                autonomous_marathon_summary: "Replay autonomous marathon requires ticket_repo so credible findings can be filed with evidence before gh-agent repair."
                autonomous_driver_mode: "replay"
                autonomous_driver_status: "invalid"
                autonomous_driver_summary: "ticket_repo is required"
                autonomous_driver_evidence_count: 0
                autonomous_driver_issue_count: 0
                autonomous_fix_status: "not_run"
                autonomous_gate_summary: "filing=fail, gh_agent=fail, independent_verify=fail, review=not_run, validation=fail"
                independent_verify_status: "fail"
                independent_verify_summary: "ticket_repo is required"
                validation_status: "invalid"
                validation_errors: 1
                validation_warnings: 0
                validation_issue_summary: "ticket-repo-required"
                filing_summary: "ticket_repo is required for replay autonomous marathon"
                gh_agent_missing_evidence_summary: "ticket_repo is required"
                gh_agent_missing_verify_summary: "ticket_repo is required"
                status: "autonomous_marathon_invalid"
        - when: "(slots.autonomous_driver_mode ?? 'pending') == 'replay' && (slots.gh_agent_public_base_url == nil || slots.gh_agent_public_base_url == '')"
          target: .
          effects:
            - set:
                project: "{{ slots.project ?? world.project }}"
                persona: "{{ slots.persona ?? world.persona }}"
                seed: "{{ slots.seed ?? world.seed }}"
                scenario_scope: "{{ slots.scenarios ?? world.scenario_scope }}"
                autonomous_marathon_status: "autonomous_marathon_invalid"
                autonomous_marathon_summary: "Replay autonomous marathon requires gh_agent_public_base_url so gh-agent run evidence is reviewable."
                autonomous_driver_mode: "replay"
                autonomous_driver_status: "invalid"
                autonomous_driver_summary: "gh_agent_public_base_url is required"
                autonomous_driver_evidence_count: 0
                autonomous_driver_issue_count: 0
                autonomous_fix_status: "not_run"
                autonomous_gate_summary: "filing=not_run, gh_agent=fail, independent_verify=fail, review=not_run, validation=fail"
                independent_verify_status: "fail"
                independent_verify_summary: "gh_agent_public_base_url is required"
                validation_status: "invalid"
                validation_errors: 1
                validation_warnings: 0
                validation_issue_summary: "gh-agent-public-base-url"
                filing_summary: "gh_agent_public_base_url is required for replay autonomous marathon"
                gh_agent_missing_evidence_summary: "gh_agent_public_base_url is required"
                gh_agent_missing_verify_summary: "gh_agent_public_base_url is required"
                status: "autonomous_marathon_invalid"
        - when: "(slots.autonomous_driver_mode ?? 'pending') != 'replay' && (slots.live_budget_minutes ?? world.live_budget_minutes) > 0 && world.capture_preflight_status != 'passed'"
          target: .
          effects:
            - set:
                project: "{{ slots.project ?? world.project }}"
                persona: "{{ slots.persona ?? world.persona }}"
                seed: "{{ slots.seed ?? world.seed }}"
                scenario_scope: "{{ slots.scenarios ?? world.scenario_scope }}"
                live_budget_minutes: "{{ slots.live_budget_minutes ?? world.live_budget_minutes }}"
                autonomous_marathon_status: "autonomous_marathon_invalid"
                autonomous_marathon_summary: "Run capture_preflight successfully before creating a live-budgeted autonomous marathon."
                autonomous_driver_mode: "{{ slots.autonomous_driver_mode ?? 'pending' }}"
                autonomous_driver_status: "invalid"
                autonomous_driver_summary: "capture_preflight must pass before live-budgeted driver handoff"
                autonomous_driver_evidence_count: 0
                autonomous_driver_issue_count: 0
                autonomous_fix_status: "not_run"
                autonomous_gate_summary: "preflight=fail, filing=not_run, gh_agent=not_run, independent_verify=not_run, review=not_run, validation=fail"
                independent_verify_status: "not_run"
                independent_verify_summary: "capture_preflight must pass before live-budgeted autonomous marathon"
                validation_status: "invalid"
                validation_errors: 1
                validation_warnings: 0
                validation_issue_summary: "capture-preflight-required"
                review_status: "not_run"
                review_failed_count: 0
                review_backlog_summary: "Run capture_preflight and keep it passing before live persona evidence capture."
                status: "autonomous_marathon_invalid"
        - when: "(slots.autonomous_driver_mode ?? 'pending') != 'replay' && (slots.live_budget_minutes ?? world.live_budget_minutes) > 0 && (slots.ticket_repo == nil || slots.ticket_repo == '') && (world.ticket_repo == nil || world.ticket_repo == '')"
          target: .
          effects:
            - set:
                project: "{{ slots.project ?? world.project }}"
                persona: "{{ slots.persona ?? world.persona }}"
                seed: "{{ slots.seed ?? world.seed }}"
                scenario_scope: "{{ slots.scenarios ?? world.scenario_scope }}"
                live_budget_minutes: "{{ slots.live_budget_minutes ?? world.live_budget_minutes }}"
                autonomous_marathon_status: "autonomous_marathon_invalid"
                autonomous_marathon_summary: "Live-budgeted autonomous marathon requires ticket_repo before driver handoff."
                autonomous_driver_mode: "{{ slots.autonomous_driver_mode ?? 'pending' }}"
                autonomous_driver_status: "invalid"
                autonomous_driver_summary: "ticket_repo is required before live-budgeted driver handoff"
                autonomous_driver_evidence_count: 0
                autonomous_driver_issue_count: 0
                autonomous_fix_status: "not_run"
                autonomous_gate_summary: "preflight=pass, filing=fail, gh_agent=not_run, independent_verify=not_run, review=not_run, validation=fail"
                independent_verify_status: "not_run"
                independent_verify_summary: "ticket_repo must be configured before live persona evidence capture"
                validation_status: "invalid"
                validation_errors: 1
                validation_warnings: 0
                validation_issue_summary: "ticket-repo-required"
                review_status: "not_run"
                review_failed_count: 0
                review_backlog_summary: "Set ticket_repo so credible findings can be filed and fixed after capture."
                filing_summary: "ticket_repo is required before live-budgeted autonomous marathon"
                status: "autonomous_marathon_invalid"
        - when: "(slots.autonomous_driver_mode ?? 'pending') != 'replay' && (slots.live_budget_minutes ?? world.live_budget_minutes) > 0 && (slots.gh_agent_public_base_url == nil || slots.gh_agent_public_base_url == '') && (world.gh_agent_public_base_url == nil || world.gh_agent_public_base_url == '')"
          target: .
          effects:
            - set:
                project: "{{ slots.project ?? world.project }}"
                persona: "{{ slots.persona ?? world.persona }}"
                seed: "{{ slots.seed ?? world.seed }}"
                scenario_scope: "{{ slots.scenarios ?? world.scenario_scope }}"
                live_budget_minutes: "{{ slots.live_budget_minutes ?? world.live_budget_minutes }}"
                autonomous_marathon_status: "autonomous_marathon_invalid"
                autonomous_marathon_summary: "Live-budgeted autonomous marathon requires gh_agent_public_base_url before driver handoff."
                autonomous_driver_mode: "{{ slots.autonomous_driver_mode ?? 'pending' }}"
                autonomous_driver_status: "invalid"
                autonomous_driver_summary: "gh_agent_public_base_url is required before live-budgeted driver handoff"
                autonomous_driver_evidence_count: 0
                autonomous_driver_issue_count: 0
                autonomous_fix_status: "not_run"
                autonomous_gate_summary: "preflight=pass, filing=not_run, gh_agent=fail, independent_verify=not_run, review=not_run, validation=fail"
                independent_verify_status: "not_run"
                independent_verify_summary: "gh_agent_public_base_url must be configured before live persona evidence capture"
                validation_status: "invalid"
                validation_errors: 1
                validation_warnings: 0
                validation_issue_summary: "gh-agent-public-base-url"
                review_status: "not_run"
                review_failed_count: 0
                review_backlog_summary: "Set gh_agent_public_base_url so fix evidence run links are reviewable after capture."
                gh_agent_missing_evidence_summary: "gh_agent_public_base_url is required before live-budgeted autonomous marathon"
                gh_agent_missing_verify_summary: "gh_agent_public_base_url is required before live-budgeted autonomous marathon"
                status: "autonomous_marathon_invalid"
        - target: run_created
          effects:
            - set:
                project: "{{ slots.project ?? world.project }}"
                persona: "{{ slots.persona ?? world.persona }}"
                seed: "{{ slots.seed ?? world.seed }}"
                scenario_scope: "{{ slots.scenarios ?? world.scenario_scope }}"
                live_budget_minutes: "{{ slots.live_budget_minutes ?? world.live_budget_minutes }}"
                ticket_repo: "{{ slots.ticket_repo ?? world.ticket_repo }}"
                gh_agent_public_base_url: "{{ slots.gh_agent_public_base_url ?? world.gh_agent_public_base_url }}"
                last_result: {}
                autonomous_marathon_status: "running"
                autonomous_marathon_summary: ""
                autonomous_marathon_report_path: ""
                autonomous_control_path: ""
                autonomous_control_markdown_path: ""
                autonomous_control_status: ""
                autonomous_control_summary: ""
                independent_verify_status: ""
                independent_verify_summary: ""
                validation_status: ""
                validation_errors: 0
                validation_warnings: 0
                validation_issue_summary: ""
                status: "creating_autonomous_marathon"
            - invoke: host.run
              id: autonomous_product_journey_marathon_create
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --autonomous-marathon
                  - --json-output
                  - --report-invalid-autonomous-marathon
                  - --project
                  - "{{ slots.project ?? world.project }}"
                  - --persona
                  - "{{ slots.persona ?? world.persona }}"
                  - --seed
                  - "{{ slots.seed ?? world.seed }}"
                  - --scenarios
                  - "{{ slots.scenarios ?? world.scenario_scope }}"
                  - --live-budget-minutes
                  - "{{ slots.live_budget_minutes ?? world.live_budget_minutes }}"
                  - --autonomous-driver-mode
                  - "{{ slots.autonomous_driver_mode ?? 'pending' }}"
                  - --autonomous-cadence-hours
                  - "{{ slots.autonomous_cadence_hours ?? 24 }}"
                  - --autonomous-heartbeat-minutes
                  - "{{ slots.autonomous_heartbeat_minutes ?? 15 }}"
                  - --autonomous-watchdog-minutes
                  - "{{ slots.autonomous_watchdog_minutes ?? 45 }}"
                  - --ticket-repo
                  - "{{ slots.ticket_repo ?? world.ticket_repo }}"
                  - --gh-agent-db
                  - "{{ slots.gh_agent_db ?? '' }}"
                  - --gh-agent-story
                  - "{{ slots.gh_agent_story ?? 'stories/bugfix' }}"
                  - --gh-agent-public-base-url
                  - "{{ slots.gh_agent_public_base_url ?? world.gh_agent_public_base_url }}"
                  - --gh-agent-project-root
                  - "{{ slots.gh_agent_project_root ?? '' }}"
                  - --gh-agent-incident-repo
                  - "{{ slots.gh_agent_incident_repo ?? '' }}"
                  - --gh-agent-asset-dir
                  - "{{ slots.gh_agent_asset_dir ?? '' }}"
                  - --gh-agent-comment-mode
                  - "{{ slots.gh_agent_comment_mode ?? 'none' }}"
                  - --issue-state-file
                  - "{{ slots.issue_state_file ?? '' }}"
                  - --stats-root
                  - "{{ slots.stats_root ?? '' }}"
                  - --stats-output
                  - "{{ slots.stats_output ?? '' }}"
                cwd: "."
              bind:
                last_result: stdout_json
                status: "stdout_json.status"
                run_id: "stdout_json.run_id"
                run_dir: "stdout_json.run_dir"
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
                driver_plan_path: "stdout_json.driver_plan_path"
                driver_journal_path: "stdout_json.driver_journal_path"
                agent_brief_path: "stdout_json.agent_brief_path"
                driver_handoff_path: "stdout_json.driver_handoff_path"
                media_manifest_path: "stdout_json.media_manifest_path"
                scenario_outcomes_path: "stdout_json.scenario_outcomes_path"
                autonomous_marathon_status: "stdout_json.autonomous_marathon_status"
                autonomous_marathon_summary: "stdout_json.autonomous_marathon_summary"
                autonomous_marathon_report_path: "stdout_json.autonomous_marathon_report_path"
                autonomous_driver_mode: "stdout_json.autonomous_driver_mode"
                autonomous_driver_status: "stdout_json.autonomous_driver_status"
                autonomous_driver_summary: "stdout_json.autonomous_driver_summary"
                autonomous_driver_evidence_count: "stdout_json.autonomous_driver_evidence_count"
