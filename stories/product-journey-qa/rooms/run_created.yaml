states:
  run_created:
    description: "A product-journey QA run bundle exists; waiting for captured evidence."
    relevant_world: [project, persona, seed, scenario_scope, run_scenario_count, live_budget_minutes, run_id, run_dir, deck_path, execution_plan_path, driver_plan_path, driver_journal_path, agent_brief_path, driver_handoff_path, media_manifest_path, scenario_outcomes_path, persona_starting_surface, persona_first_question, persona_evidence_emphasis, persona_escalation_trigger, persona_finding_bias, proof_evidence_count, demo_evidence_count, finding_total_count, strength_count, weakness_count, weakness_route_count, weakness_route_summary, prd_design_intake_path, prd_design_intake_count, prd_design_intake_summary, issue_count, fix_count, blocked_count, missing_evidence_count, missing_proof_evidence_count, proof_minimum_evidence_count, minimum_evidence_count, missing_proof_summary, driver_contract_summary, next_driver_capture, next_driver_attach_command, next_driver_blocker_command, scenario, evidence_kind, evidence_path, evidence_source, finding_kind, finding_title, ticket_repo, filing_status, filing_dry_run, findings_filed_count, findings_skipped_count, findings_failed_count, findings_unfiled_count, filed_issue_summary, filing_summary, autonomous_marathon_status, autonomous_marathon_summary, autonomous_marathon_report_path, autonomous_driver_mode, autonomous_driver_status, autonomous_driver_summary, autonomous_driver_evidence_count, autonomous_driver_issue_count, autonomous_driver_dispatch_markdown_path, autonomous_driver_dispatch_trace, autonomous_control_status, autonomous_control_summary, autonomous_control_path, autonomous_control_markdown_path, autonomous_watchdog_status, autonomous_watchdog_summary, autonomous_watchdog_path, autonomous_watchdog_markdown_path, autonomous_watchdog_age_minutes, autonomous_fix_status, autonomous_fix_report_path, autonomous_gate_summary, independent_verify_status, independent_verify_summary, issue_closeout_status, issue_closeout_count, issue_closeout_summary, gh_agent_health_status, gh_agent_health_summary, gh_agent_readiness_status, gh_agent_readiness_summary, gh_agent_enqueue_status, gh_agent_enqueued_count, gh_agent_skipped_count, gh_agent_job_summary, gh_agent_claim_status, gh_agent_claim_count, gh_agent_claim_summary, gh_agent_drain_status, gh_agent_drained_count, gh_agent_done_count, gh_agent_failed_count, gh_agent_active_count, gh_agent_run_summary, gh_agent_fix_evidence_count, gh_agent_missing_evidence_count, gh_agent_triage_evidence_count, gh_agent_missing_triage_count, gh_agent_independent_verify_count, gh_agent_missing_verify_count, gh_agent_missing_run_url_count, gh_agent_fix_evidence_summary, gh_agent_missing_evidence_summary, gh_agent_triage_evidence_summary, gh_agent_missing_triage_summary, gh_agent_independent_verify_summary, gh_agent_missing_verify_summary, stats_status, stats_root, stats_output, stats_summary, issue_state_status, issue_state_output, issue_state_count, issue_state_summary, stats_gate_status, stats_gate_summary, stats_current_run_scanned, stats_runs_scanned, stats_found_count, stats_filed_count, stats_fixed_count, stats_reopened_count, stats_unknown_state_count, stats_similar_pair_count, driver_event_id, dispatch_mode, driver_status, driver_summary, review_status, review_summary, review_passed_count, review_failed_count, review_warning_count, review_total_count, review_backlog_summary, validation_status, validation_errors, validation_warnings, validation_issue_summary, status]
    on_enter:
      - when: "(world.autonomous_driver_mode == 'record' || world.autonomous_driver_mode == 'live') && world.autonomous_driver_status == 'ready_for_dispatch'"
        emit_intent: dispatch_driver
    view:
      - banner:
          text: "RUN CREATED"
          subtitle: "Attach evidence from visual MCP, studio MCP, oracle checks, or generated artifacts."
          color: "#2563EB"
      - kv:
          pairs:
            Run: '{{ world.run_id|default:"(pending)" }}'
            Project: "{{ world.project }}"
            Persona: "{{ world.persona }}"
            Scenario scope: '{{ world.scenario_scope|default:"all" }}'
            Scenario count: "{{ world.run_scenario_count }}"
            Live budget: "{{ world.live_budget_minutes }} min/scenario"
            Run dir: '{{ world.run_dir|default:"(pending)" }}'
            Deck: '{{ world.deck_path|default:"(pending)" }}'
            Execution plan: '{{ world.execution_plan_path|default:"(pending)" }}'
            Driver plan: '{{ world.driver_plan_path|default:"(pending)" }}'
            Driver journal: '{{ world.driver_journal_path|default:"(pending)" }}'
            Agent brief: '{{ world.agent_brief_path|default:"(pending)" }}'
            Driver handoff: '{{ world.driver_handoff_path|default:"(pending)" }}'
            Media manifest: '{{ world.media_manifest_path|default:"(pending)" }}'
            Scenario outcomes: '{{ world.scenario_outcomes_path|default:"(pending)" }}'
            Starting surface: '{{ world.persona_starting_surface|default:"(open agent brief)" }}'
            First question: '{{ world.persona_first_question|default:"(open agent brief)" }}'
            Evidence emphasis: '{{ world.persona_evidence_emphasis|default:"(open driver plan)" }}'
            Escalate when: '{{ world.persona_escalation_trigger|default:"(open driver plan)" }}'
            Finding bias: '{{ world.persona_finding_bias|default:"(open driver plan)" }}'
            Proof evidence: "{{ world.proof_evidence_count }} attached; minimum {{ world.proof_minimum_evidence_count }} / {{ world.minimum_evidence_count }}"
            Demo evidence: "{{ world.demo_evidence_count }}"
            Finding matrix: "{{ world.finding_total_count }} total; strength {{ world.strength_count }}, weakness {{ world.weakness_count }}, issue {{ world.issue_count }}, fix {{ world.fix_count }}, blocked {{ world.blocked_count }}"
            PRD intake: "{{ world.prd_design_intake_count }} routed; {{ world.prd_design_intake_summary }}"
            PRD intake artifact: '{{ world.prd_design_intake_path|default:"(not generated)" }}'
            Missing evidence: "{{ world.missing_evidence_count }}"
            Missing proof: "{{ world.missing_proof_evidence_count }}"
            Last evidence: '{{ world.scenario|default:"(none)" }} / {{ world.evidence_kind|default:"" }}'
            Last finding: '{{ world.finding_kind|default:"(none)" }} / {{ world.finding_title|default:"" }}'
            Ticket repo: '{{ world.ticket_repo|default:"(not set)" }}'
            Autonomous fix: '{{ world.autonomous_fix_status|default:"(not run)" }}'
            Autonomous report: '{{ world.autonomous_fix_report_path|default:"(not generated)" }}'
            Autonomous gates: '{{ world.autonomous_gate_summary|default:"(not run)" }}'
            Independent verify: '{{ world.independent_verify_status|default:"(not checked)" }}: {{ world.independent_verify_summary|default:"" }}'
            Issue close-out: '{{ world.issue_closeout_status|default:"(not run)" }}: closed {{ world.issue_closeout_count }}'
            Autonomous marathon: '{{ world.autonomous_marathon_status|default:"(not run)" }}'
            Marathon report: '{{ world.autonomous_marathon_report_path|default:"(not generated)" }}'
            Autonomous driver: '{{ world.autonomous_driver_mode|default:"pending" }} / {{ world.autonomous_driver_status|default:"(not run)" }}: evidence {{ world.autonomous_driver_evidence_count }}, issues {{ world.autonomous_driver_issue_count }}'
            Driver receipt: '{{ world.autonomous_driver_dispatch_markdown_path|default:"(not generated)" }}'
            Driver trace: '{{ world.autonomous_driver_dispatch_trace|default:"(not reported)" }}'
            Marathon control: '{{ world.autonomous_control_status|default:"(not armed)" }}: {{ world.autonomous_control_summary|default:"" }}'
            Control artifact: '{{ world.autonomous_control_path|default:"(not generated)" }}'
            Marathon watchdog: '{{ world.autonomous_watchdog_status|default:"(not checked)" }}: {{ world.autonomous_watchdog_summary|default:"" }}'
            Watchdog age: "{{ world.autonomous_watchdog_age_minutes }} min"
            Watchdog report: '{{ world.autonomous_watchdog_markdown_path|default:"(not generated)" }}'
            Issue filing: '{{ world.filing_status|default:"(not filed)" }}: filed {{ world.findings_filed_count }}, skipped {{ world.findings_skipped_count }}, failed {{ world.findings_failed_count }}, unfiled {{ world.findings_unfiled_count }}'
            GH-agent fixes: '{{ world.gh_agent_enqueue_status|default:"(not queued)" }}: queued {{ world.gh_agent_enqueued_count }}, skipped {{ world.gh_agent_skipped_count }}'
            GH-agent health: '{{ world.gh_agent_health_status|default:"(not checked)" }}: {{ world.gh_agent_health_summary|default:"" }}'
            GH-agent readiness: '{{ world.gh_agent_readiness_status|default:"(not checked)" }}: {{ world.gh_agent_readiness_summary|default:"" }}'
            GH-agent claims: '{{ world.gh_agent_claim_status|default:"(not claimed)" }}: claimed {{ world.gh_agent_claim_count }}'
            GH-agent jobs: '{{ world.gh_agent_job_summary|default:"(none)" }}'
            GH-agent drain: '{{ world.gh_agent_drain_status|default:"(not drained)" }}: drained {{ world.gh_agent_drained_count }}, done {{ world.gh_agent_done_count }}, failed {{ world.gh_agent_failed_count }}, active {{ world.gh_agent_active_count }}'
            GH-agent evidence: "{{ world.gh_agent_fix_evidence_count }} attached; {{ world.gh_agent_missing_evidence_count }} missing; triage {{ world.gh_agent_triage_evidence_count }} attached / {{ world.gh_agent_missing_triage_count }} missing; {{ world.gh_agent_independent_verify_count }} verified; {{ world.gh_agent_missing_verify_count }} missing verification; {{ world.gh_agent_missing_run_url_count }} missing run URLs"
            GH-agent triage: '{{ world.gh_agent_triage_evidence_summary|default:"(none)" }}'
            GH-agent runs: '{{ world.gh_agent_run_summary|default:"(none)" }}'
            Issue state: '{{ world.issue_state_status|default:"(cached/offline)" }}: {{ world.issue_state_count }} refreshed'
            Derived stats: '{{ world.stats_status|default:"(not derived)" }}: found {{ world.stats_found_count }}, filed {{ world.stats_filed_count }}, fixed {{ world.stats_fixed_count }}, reopened {{ world.stats_reopened_count }}, similar {{ world.stats_similar_pair_count }}'
            Stats gate: '{{ world.stats_gate_status|default:"(not checked)" }}: {{ world.stats_gate_summary|default:"" }}; current run scanned {{ world.stats_current_run_scanned|default:"unknown" }}'
            Stats runs: "{{ world.stats_runs_scanned }} scanned; unknown state {{ world.stats_unknown_state_count }}"
            Stats artifact: '{{ world.stats_output|default:"(not written)" }}'
            Issue state artifact: '{{ world.issue_state_output|default:"(not refreshed)" }}'
            Last driver event: '{{ world.driver_event_id|default:"(none)" }} / {{ world.driver_status|default:"" }}'
            Review: '{{ world.review_status|default:"(not reviewed)" }}'
            Review checks: "{{ world.review_passed_count }} / {{ world.review_total_count }} passed; {{ world.review_failed_count }} failed; {{ world.review_warning_count }} warnings"
            Validation: '{{ world.validation_status|default:"(not validated)" }}'
            Validation errors: "{{ world.validation_errors }}"
            Validation warnings: "{{ world.validation_warnings }}"
            Validation issues: '{{ world.validation_issue_summary|default:"(none)" }}'
            Status: "{{ world.status }}"
      - prose: '{{ world.missing_proof_summary|default:"Open driver-handoff.md for the Missing Proof Evidence backlog." }}'
      - prose: '{{ world.driver_contract_summary|default:"Use driver-plan.md for the scenario contract; loaded runs also expose last_result.driver_scenarios, last_result.missing_proof_evidence, and last_result.driver_final_gates." }}'
      - prose: '{{ world.next_driver_capture|default:"No next proof capture is queued; run review or open scenario-outcomes.md." }}'
      - prose: '{{ world.next_driver_attach_command|default:"No next proof attach command is queued." }}'
      - prose: '{{ world.next_driver_blocker_command|default:"No next proof blocker command is queued." }}'
      - prose: '{{ world.filing_summary|default:"Use autonomous_fix ticket_repo=owner/repo gh_agent_public_base_url=<url> for the full issue-to-fix loop; file_findings is only for preview/debug filing." }}'
      - prose: '{{ world.filed_issue_summary|default:"" }}'
      - prose: '{{ world.gh_agent_fix_evidence_summary|default:"GH-agent fix evidence assets appear here after autonomous_fix." }}'
      - prose: '{{ world.gh_agent_triage_evidence_summary|default:"GH-agent triage preflight assets appear here after autonomous_fix." }}'
      - prose: '{{ world.gh_agent_independent_verify_summary|default:"GH-agent independent verification assets appear here after autonomous_fix." }}'
      - prose: '{{ world.gh_agent_missing_evidence_summary|default:"" }}'
      - prose: '{{ world.gh_agent_missing_triage_summary|default:"" }}'
      - prose: '{{ world.gh_agent_missing_verify_summary|default:"" }}'
      - prose: '{{ world.issue_state_summary|default:"Use refresh_issue_state=true on stats to refresh GitHub issue state through native kitsoki gitops." }}'
      - prose: '{{ world.stats_summary|default:"Use stats to derive filed/fixed/reopened/similar issue counts from run bundles and cached issue state." }}'
      - prose: '{{ world.review_backlog_summary|default:"Run review to see actionable review checks." }}'
      - prose: '⚠ Action failed: {{ world.last_error }}'
        when: "world.last_error != ''"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "attach scenario=... evidence_kind=... evidence_path=..."
              hint: "mark one scenario evidence slot captured and regenerate the deck"
              intent: attach
            - label: "record finding_kind=... title=... summary=..."
              hint: "record a strength, weakness, issue, or fix for the review deck"
              intent: record
            - label: "blocker scenario=... title=... summary=..."
              hint: "mark a scenario attempted but blocked, with optional trace/frame evidence"
              intent: blocker
            - label: "driver_event scenario=... summary=..."
              hint: "append a reusable-driver attempt to driver-journal.md"
              intent: driver_event
            - label: "dispatch_driver"
              hint: "launch the story-owned record/live product-journey driver, then finalize through native gates"
              intent: dispatch_driver
            - label: "autonomous_fix ticket_repo=owner/repo gh_agent_public_base_url=<url>"
              hint: "file credible issues, drain gh-agent fixes, refresh review artifacts, and validate in one gate"
              intent: autonomous_fix
            - label: "autonomous_marathon ticket_repo=owner/repo gh_agent_public_base_url=<url>"
              hint: "finalize this run through autonomous fix, review, validation, weakness routing, and stats"
              intent: autonomous_marathon
            - label: "autonomous_watchdog"
              hint: "check marathon heartbeat and fail closed before spend when stale"
              intent: autonomous_watchdog
            - label: "file_findings ticket_repo=owner/repo mode=dry-run"
              hint: "preview issue filing; real filing/fixing goes through autonomous_fix"
              intent: file_findings
            - label: "stats"
              hint: "derive filed/fixed/reopened/similar issue counts from run bundles"
              intent: stats
            - label: "seed_demo"
              hint: "populate representative evidence and findings for deck review"
              intent: seed_demo
            - label: "handoff"
              hint: "refresh the reusable driver-agent handoff artifact without launching live LLM work"
              intent: handoff
            - label: "review"
              hint: "score whether the bundle is ready for human review"
              intent: review
            - label: "validate"
              hint: "check schema and cross-file consistency without rewriting artifacts"
              intent: validate
            - label: "accept"
              hint: "finish with the current run bundle"
              intent: accept
            - label: "quit"
              intent: quit
            - label: "look"
              intent: look
    on:
      dispatch_driver:
        - when: "!(world.autonomous_driver_mode == 'record' || world.autonomous_driver_mode == 'live') || world.autonomous_driver_status != 'ready_for_dispatch'"
          target: run_created
          effects:
            - set:
                autonomous_driver_summary: "No live or record driver is ready for dispatch."
                status: "driver_dispatch_not_ready"
        - target: run_created
          effects:
            - set:
                status: "dispatching_autonomous_driver"
            - invoke: host.agent.task
              id: autonomous_product_journey_driver
              with:
                agent: autonomous_driver
                acceptance:
                  schema: schemas/autonomous_driver_result.json
                context:
                  prompt: prompts/autonomous_driver.md
                  args:
                    run_dir: "{{ world.run_dir }}"
                    project: "{{ world.project }}"
                    persona: "{{ world.persona }}"
                    scenario_scope: "{{ world.scenario_scope }}"
                    autonomous_driver_mode: "{{ world.autonomous_driver_mode }}"
                    live_budget_minutes: "{{ world.live_budget_minutes }}"
                    ticket_repo: "{{ world.ticket_repo }}"
                    gh_agent_public_base_url: "{{ world.gh_agent_public_base_url }}"
                    autonomous_control_path: "{{ world.autonomous_control_path }}"
                    autonomous_marathon_report_path: "{{ world.autonomous_marathon_report_path }}"
              bind:
                autonomous_driver_dispatch_result: submitted
                autonomous_driver_status: submitted.status
                autonomous_driver_summary: submitted.summary
                autonomous_driver_evidence_count: submitted.evidence_count
                autonomous_driver_issue_count: submitted.issue_count
                autonomous_driver_dispatch_trace: submitted.trace
              on_error: driver_dispatch_failed
            - invoke: host.run
              id: record_autonomous_product_journey_driver_dispatch
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --record-autonomous-driver-dispatch
                  - --json-output
                  - --run-dir
                  - "{{ world.run_dir }}"
                  - --dispatch-mode
                  - "{{ world.autonomous_driver_mode }}"
                  - --dispatch-status
                  - "{{ world.autonomous_driver_status }}"
                  - --summary
                  - "{{ world.autonomous_driver_summary }}"
                  - --autonomous-driver-evidence-count
                  - "{{ world.autonomous_driver_evidence_count }}"
                  - --autonomous-driver-issue-count
                  - "{{ world.autonomous_driver_issue_count }}"
                  - --driver-trace
                  - "{{ world.autonomous_driver_dispatch_trace }}"
                cwd: "."
              bind:
                last_result: stdout_json
                autonomous_driver_dispatch_path: "stdout_json.autonomous_driver_dispatch_path"
                autonomous_driver_dispatch_markdown_path: "stdout_json.autonomous_driver_dispatch_markdown_path"
                autonomous_driver_dispatch_status: "stdout_json.autonomous_driver_dispatch_status"
                autonomous_driver_dispatch_summary: "stdout_json.autonomous_driver_dispatch_summary"
                autonomous_driver_dispatch_trace: "stdout_json.autonomous_driver_dispatch_trace"
              on_error: run_created
            - emit_intent: autonomous_marathon
      attach:
        - target: run_created
          guard_hint: "create a run before attaching evidence"
          effects:
            - set:
                scenario: "{{ slots.scenario }}"
                evidence_kind: "{{ slots.evidence_kind }}"
                evidence_path: "{{ slots.evidence_path }}"
                evidence_source: "{{ slots.source ?? '' }}"
                notes: "{{ slots.notes ?? '' }}"
                validation_status: ""
                validation_errors: 0
                validation_warnings: 0
                validation_issue_summary: ""
                status: "attaching"
            - invoke: host.run
              id: attach_product_journey_evidence
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --attach-evidence
                  - --json-output
                  - --run-dir
                  - "{{ world.run_dir }}"
                  - --scenario
                  - "{{ slots.scenario }}"
                  - --evidence-kind
                  - "{{ slots.evidence_kind }}"
                  - --evidence-path
                  - "{{ slots.evidence_path }}"
                  - --evidence-source
                  - "{{ slots.source ?? '' }}"
                  - --notes
                  - "{{ slots.notes ?? '' }}"
                cwd: "."
              bind:
                last_result: stdout_json
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
                driver_plan_path: "stdout_json.driver_plan_path"
                driver_journal_path: "stdout_json.driver_journal_path"
                agent_brief_path: "stdout_json.agent_brief_path"
                driver_handoff_path: "stdout_json.driver_handoff_path"
                media_manifest_path: "stdout_json.media_manifest_path"
                scenario_outcomes_path: "stdout_json.scenario_outcomes_path"
                persona_starting_surface: "stdout_json.persona_starting_surface"
                persona_first_question: "stdout_json.persona_first_question"
                persona_evidence_emphasis: "stdout_json.persona_evidence_emphasis"
                persona_escalation_trigger: "stdout_json.persona_escalation_trigger"
                persona_finding_bias: "stdout_json.persona_finding_bias"
                proof_evidence_count: "stdout_json.proof_evidence_count"
                demo_evidence_count: "stdout_json.demo_evidence_count"
                finding_total_count: "stdout_json.finding_total_count"
                strength_count: "stdout_json.strength_count"
                weakness_count: "stdout_json.weakness_count"
                weakness_route_count: "stdout_json.weakness_route_count"
                weakness_route_summary: "stdout_json.weakness_route_summary"
                prd_design_intake_path: "stdout_json.prd_design_intake_path"
                prd_design_intake_count: "stdout_json.prd_design_intake_count"
                prd_design_intake_summary: "stdout_json.prd_design_intake_summary"
                issue_count: "stdout_json.issue_count"
                fix_count: "stdout_json.fix_count"
                blocked_count: "stdout_json.blocked_count"
                missing_evidence_count: "stdout_json.missing_evidence_count"
                missing_proof_evidence_count: "stdout_json.missing_proof_evidence_count"
                proof_minimum_evidence_count: "stdout_json.proof_minimum_evidence_count"
                minimum_evidence_count: "stdout_json.minimum_evidence_count"
                missing_proof_summary: "stdout_json.missing_proof_summary"
                driver_contract_summary: "stdout_json.driver_contract_summary"
                next_driver_capture: "stdout_json.next_driver_capture"
                next_driver_attach_command: "stdout_json.next_driver_attach_command"
                next_driver_blocker_command: "stdout_json.next_driver_blocker_command"
                evidence_source: "stdout_json.evidence_source"
              on_error: run_created
            - set:
                status: "evidence_attached"
      record:
        - target: run_created
          effects:
            - set:
                finding_kind: "{{ slots.finding_kind }}"
                finding_title: "{{ slots.title }}"
                finding_summary: "{{ slots.summary }}"
                finding_severity: "{{ slots.severity ?? 'medium' }}"
                scenario: "{{ slots.scenario ?? world.scenario }}"
                evidence_path: "{{ slots.evidence_path ?? '' }}"
                validation_status: ""
                validation_errors: 0
                validation_warnings: 0
                validation_issue_summary: ""
                status: "recording_finding"
            - invoke: host.run
              id: record_product_journey_finding
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --record-finding
                  - --json-output
                  - --run-dir
                  - "{{ world.run_dir }}"
                  - --finding-kind
                  - "{{ slots.finding_kind }}"
                  - --title
                  - "{{ slots.title }}"
                  - --summary
                  - "{{ slots.summary }}"
                  - --scenario
                  - "{{ slots.scenario ?? '' }}"
                  - --severity
                  - "{{ slots.severity ?? 'medium' }}"
                  - --evidence-path
                  - "{{ slots.evidence_path ?? '' }}"
                cwd: "."
              bind:
                last_result: stdout_json
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
                driver_plan_path: "stdout_json.driver_plan_path"
                driver_journal_path: "stdout_json.driver_journal_path"
                agent_brief_path: "stdout_json.agent_brief_path"
                driver_handoff_path: "stdout_json.driver_handoff_path"
                media_manifest_path: "stdout_json.media_manifest_path"
                scenario_outcomes_path: "stdout_json.scenario_outcomes_path"
                persona_starting_surface: "stdout_json.persona_starting_surface"
                persona_first_question: "stdout_json.persona_first_question"
                persona_evidence_emphasis: "stdout_json.persona_evidence_emphasis"
                persona_escalation_trigger: "stdout_json.persona_escalation_trigger"
                persona_finding_bias: "stdout_json.persona_finding_bias"
                proof_evidence_count: "stdout_json.proof_evidence_count"
                demo_evidence_count: "stdout_json.demo_evidence_count"
                finding_total_count: "stdout_json.finding_total_count"
                strength_count: "stdout_json.strength_count"
                weakness_count: "stdout_json.weakness_count"
                weakness_route_count: "stdout_json.weakness_route_count"
                weakness_route_summary: "stdout_json.weakness_route_summary"
                prd_design_intake_path: "stdout_json.prd_design_intake_path"
                prd_design_intake_count: "stdout_json.prd_design_intake_count"
                prd_design_intake_summary: "stdout_json.prd_design_intake_summary"
                issue_count: "stdout_json.issue_count"
                fix_count: "stdout_json.fix_count"
                blocked_count: "stdout_json.blocked_count"
                missing_evidence_count: "stdout_json.missing_evidence_count"
                missing_proof_evidence_count: "stdout_json.missing_proof_evidence_count"
                proof_minimum_evidence_count: "stdout_json.proof_minimum_evidence_count"
                minimum_evidence_count: "stdout_json.minimum_evidence_count"
                missing_proof_summary: "stdout_json.missing_proof_summary"
                driver_contract_summary: "stdout_json.driver_contract_summary"
                next_driver_capture: "stdout_json.next_driver_capture"
                next_driver_attach_command: "stdout_json.next_driver_attach_command"
                next_driver_blocker_command: "stdout_json.next_driver_blocker_command"
              on_error: run_created
            - set:
                status: "finding_recorded"
      blocker:
        - target: run_created
          effects:
            - set:
                finding_kind: "issue"
                finding_title: "{{ slots.title }}"
                finding_summary: "{{ slots.summary }}"
