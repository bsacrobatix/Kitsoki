                ticket_repo: "{{ slots.ticket_repo }}"
                filing_dry_run: "{{ slots.mode ?? 'file' }}"
                validation_status: ""
                validation_errors: 0
                validation_warnings: 0
                validation_issue_summary: ""
                gh_agent_fix_evidence_count: 0
                gh_agent_missing_evidence_count: 0
                gh_agent_missing_run_url_count: 0
                gh_agent_fix_evidence_summary: ""
                gh_agent_missing_evidence_summary: ""
                status: "filing_findings"
