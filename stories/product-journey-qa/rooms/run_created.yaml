                  - --ticket-repo
                  - "{{ slots.ticket_repo }}"
                  - --filing-mode
                  - "{{ slots.mode ?? 'file' }}"
                  - --gh-agent-db
                  - "{{ slots.gh_agent_db ?? (world.run_dir + '/gh-agent-jobs.sqlite') }}"
                  - --gh-agent-story
                  - "{{ slots.gh_agent_story ?? 'stories/bugfix' }}"
                  - --gh-agent-drain
                  - --gh-agent-public-base-url
                  - "{{ slots.gh_agent_public_base_url ?? '' }}"
                  - --gh-agent-project-root
                  - "{{ slots.gh_agent_project_root ?? '' }}"
                  - --gh-agent-incident-repo
                  - "{{ slots.gh_agent_incident_repo ?? '' }}"
                  - --gh-agent-asset-dir
                  - "{{ slots.gh_agent_asset_dir ?? '' }}"
                  - --gh-agent-comment-mode
                  - "{{ slots.gh_agent_comment_mode ?? 'none' }}"
                cwd: "."
              bind:
                last_result: stdout_json
                filing_status: "stdout_json.status"
                filing_dry_run: "stdout_json.dry_run"
                findings_filed_count: "stdout_json.findings_filed_count"
                findings_skipped_count: "stdout_json.findings_skipped_count"
                findings_failed_count: "stdout_json.findings_failed_count"
                findings_unfiled_count: "stdout_json.findings_unfiled_count"
                filed_issue_summary: "stdout_json.filed_issue_summary"
                filing_summary: "stdout_json.filing_summary"
                gh_agent_enqueue_status: "stdout_json.gh_agent_enqueue_status"
                gh_agent_enqueued_count: "stdout_json.gh_agent_enqueued_count"
                gh_agent_skipped_count: "stdout_json.gh_agent_skipped_count"
                gh_agent_job_summary: "stdout_json.gh_agent_job_summary"
                gh_agent_drain_status: "stdout_json.gh_agent_drain_status"
                gh_agent_drained_count: "stdout_json.gh_agent_drained_count"
                gh_agent_done_count: "stdout_json.gh_agent_done_count"
                gh_agent_failed_count: "stdout_json.gh_agent_failed_count"
                gh_agent_active_count: "stdout_json.gh_agent_active_count"
                gh_agent_run_summary: "stdout_json.gh_agent_run_summary"
                gh_agent_fix_evidence_count: "stdout_json.gh_agent_fix_evidence_count"
                gh_agent_missing_evidence_count: "stdout_json.gh_agent_missing_evidence_count"
                gh_agent_missing_run_url_count: "stdout_json.gh_agent_missing_run_url_count"
                gh_agent_fix_evidence_summary: "stdout_json.gh_agent_fix_evidence_summary"
                gh_agent_missing_evidence_summary: "stdout_json.gh_agent_missing_evidence_summary"
                deck_path: "stdout_json.deck_path"
                execution_plan_path: "stdout_json.execution_plan_path"
