test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      capture_product_journey_preflight:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: passed
            preflight_id: preflight-live-driver
            preflight_dir: .artifacts/product-journey/preflights/preflight-live-driver
            preflight_path: .artifacts/product-journey/preflights/preflight-live-driver/preflight.json
            markdown_path: .artifacts/product-journey/preflights/preflight-live-driver/preflight.md
            webshot_output: .artifacts/product-journey/preflights/preflight-live-driver/webshot-smoke.png
            passed: 6
            failed: 0
      autonomous_product_journey_marathon:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: autonomous_marathon_invalid
            run_id: run-live-driver
            run_dir: .artifacts/product-journey/run-live-driver
            project: vscode
            persona: core-maintainer
            seed: live-driver
            deck_path: .artifacts/product-journey/run-live-driver/deck.slidey.json
            execution_plan_path: .artifacts/product-journey/run-live-driver/execution-plan.md
            driver_plan_path: .artifacts/product-journey/run-live-driver/driver-plan.md
            driver_journal_path: .artifacts/product-journey/run-live-driver/driver-journal.md
            agent_brief_path: .artifacts/product-journey/run-live-driver/agent-brief.md
            driver_handoff_path: .artifacts/product-journey/run-live-driver/driver-handoff.md
            media_manifest_path: .artifacts/product-journey/run-live-driver/media-manifest.json
            scenario_outcomes_path: .artifacts/product-journey/run-live-driver/scenario-outcomes.md
            autonomous_marathon_status: autonomous_marathon_invalid
            autonomous_marathon_summary: "autonomous_driver_mode=live is not story-dispatchable yet; use pending for a reviewable handoff or replay for a no-LLM autonomous proof."
            autonomous_marathon_report_path: .artifacts/product-journey/run-live-driver/autonomous-marathon-report.md
            autonomous_driver_mode: live
            autonomous_driver_status: invalid
            autonomous_driver_summary: "autonomous_driver_mode=live is not story-dispatchable yet; use pending for a reviewable handoff or replay for a no-LLM autonomous proof."
            autonomous_driver_evidence_count: 0
            autonomous_driver_issue_count: 0
            autonomous_control_status: not_run
            autonomous_control_path: ""
            autonomous_control_markdown_path: ""
            autonomous_fix_status: not_run
            autonomous_gate_summary: "driver=fail, filing=not_run, gh_agent=not_run, independent_verify=not_run, review=not_run, validation=fail"
            independent_verify_status: not_run
            independent_verify_summary: "autonomous_driver_mode=live is not story-dispatchable yet; use pending for a reviewable handoff or replay for a no-LLM autonomous proof."
            validation_status: invalid
            validation_errors: 1
            validation_warnings: 0
            validation_issue_summary: driver-dispatch-not-implemented
            review_status: not_run
            review_failed_count: 0
            live_budget_minutes: 6
            scenario_count: 1
            proof_evidence_count: 0
            demo_evidence_count: 0
            missing_proof_evidence_count: 5
            minimum_evidence_count: 5
            proof_minimum_evidence_count: 0

turns:
  - intent:
      name: capture_preflight
      slots:
        seed: live-driver
    expect_state: idle
    expect_world:
      status: capture_preflight_checked
      capture_preflight_status: passed
      capture_preflight_failed: 0
    expect_host_calls:
      - handler: host.run
        args: { call: capture_product_journey_preflight }

  - intent:
      name: autonomous_marathon
      slots:
        project: vscode
        persona: core-maintainer
        seed: live-driver
        scenarios: bugfix
        live_budget_minutes: 6
        autonomous_driver_mode: live
        ticket_repo: bsacrobatix/Kitsoki
        gh_agent_public_base_url: https://agent.example
    expect_state: run_created
    expect_world:
      status: autonomous_marathon_invalid
      autonomous_marathon_status: autonomous_marathon_invalid
      autonomous_driver_mode: live
      autonomous_driver_status: invalid
      autonomous_gate_summary: "driver=fail, filing=not_run, gh_agent=not_run, independent_verify=not_run, review=not_run, validation=fail"
      validation_status: invalid
      validation_errors: 1
      validation_issue_summary: driver-dispatch-not-implemented
      review_status: not_run
    expect_view_matches: "RUN CREATED[\\s\\S]*Autonomous marathon[\\s\\S]*autonomous_marathon_invalid[\\s\\S]*Autonomous driver[\\s\\S]*live / invalid[\\s\\S]*Validation issues[\\s\\S]*driver-dispatch-not-implemented"
    expect_host_calls:
      - handler: host.run
        args: { call: autonomous_product_journey_marathon }

expect_no_errors: true
