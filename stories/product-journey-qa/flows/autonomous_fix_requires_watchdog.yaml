test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      load_product_journey_run:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: run_loaded
            run_id: run-autofix-watchdog
            run_dir: .artifacts/product-journey/run-autofix-watchdog
            project: vscode
            persona: core-maintainer
            seed: autofix-watchdog
            deck_path: .artifacts/product-journey/run-autofix-watchdog/deck.slidey.json
            execution_plan_path: .artifacts/product-journey/run-autofix-watchdog/execution-plan.md
            driver_plan_path: .artifacts/product-journey/run-autofix-watchdog/driver-plan.md
            driver_journal_path: .artifacts/product-journey/run-autofix-watchdog/driver-journal.md
            agent_brief_path: .artifacts/product-journey/run-autofix-watchdog/agent-brief.md
            driver_handoff_path: .artifacts/product-journey/run-autofix-watchdog/driver-handoff.md
            media_manifest_path: .artifacts/product-journey/run-autofix-watchdog/media-manifest.json
            scenario_outcomes_path: .artifacts/product-journey/run-autofix-watchdog/scenario-outcomes.md
            finding_total_count: 1
            issue_count: 1
            proof_evidence_count: 3
            review_status: needs_evidence
      autonomous_product_journey_fix:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: autonomous_fix_invalid
            autonomous_fix_status: autonomous_fix_invalid
            autonomous_fix_report_path: .artifacts/product-journey/run-autofix-watchdog/autonomous-fix-report.md
            ticket_repo: bsacrobatix/Kitsoki
            filing_status: not_run
            filing_summary: "Autonomous watchdog failed before issue filing or gh-agent repair: missing autonomous-marathon-control.json; stop before spend"
            findings_filed_count: 0
            findings_skipped_count: 0
            findings_failed_count: 0
            findings_unfiled_count: 0
            autonomous_gate_summary: "watchdog=fail, filing=not_run, gh_agent=not_run, independent_verify=fail, review=not_run, validation=fail"
            autonomous_watchdog_status: autonomous_watchdog_blocked
            autonomous_watchdog_summary: "missing autonomous-marathon-control.json; stop before spend"
            autonomous_watchdog_path: .artifacts/product-journey/run-autofix-watchdog/autonomous-marathon-watchdog.json
            autonomous_watchdog_markdown_path: .artifacts/product-journey/run-autofix-watchdog/autonomous-marathon-watchdog.md
            autonomous_watchdog_age_minutes: 0
            independent_verify_status: fail
            independent_verify_summary: "Autonomous watchdog failed before issue filing or gh-agent repair: missing autonomous-marathon-control.json; stop before spend"
            issue_closeout_status: skipped
            issue_closeout_count: 0
            issue_closeout_summary: "Issue close-out skipped because one or more autonomous gates failed."
            gh_agent_enqueue_status: not_run
            gh_agent_enqueued_count: 0
            gh_agent_skipped_count: 0
            gh_agent_claim_status: not_run
            gh_agent_claim_count: 0
            gh_agent_drain_status: not_run
            gh_agent_drained_count: 0
            gh_agent_done_count: 0
            gh_agent_failed_count: 0
            gh_agent_active_count: 0
            gh_agent_fix_evidence_count: 0
            gh_agent_missing_evidence_count: 0
            gh_agent_triage_evidence_count: 0
            gh_agent_missing_triage_count: 0
            gh_agent_independent_verify_count: 0
            gh_agent_missing_verify_count: 0
            gh_agent_missing_run_url_count: 0
            gh_agent_fix_evidence_summary: ""
            gh_agent_missing_evidence_summary: "Autonomous watchdog failed before issue filing or gh-agent repair: missing autonomous-marathon-control.json; stop before spend"
            gh_agent_triage_evidence_summary: ""
            gh_agent_missing_triage_summary: "Autonomous watchdog failed before issue filing or gh-agent repair: missing autonomous-marathon-control.json; stop before spend"
            gh_agent_independent_verify_summary: ""
            gh_agent_missing_verify_summary: "Autonomous watchdog failed before issue filing or gh-agent repair: missing autonomous-marathon-control.json; stop before spend"
            review_status: not_run
            review_summary: "Autonomous watchdog failed before issue filing or gh-agent repair: missing autonomous-marathon-control.json; stop before spend"
            review_failed_count: 0
            validation_status: invalid
            validation_errors: 1
            validation_warnings: 0
            validation_issue_summary: autonomous-watchdog

turns:
  - intent:
      name: load
      slots:
        run_dir: .artifacts/product-journey/run-autofix-watchdog
    expect_state: run_created
    expect_world:
      status: run_loaded
      run_id: run-autofix-watchdog
      run_dir: .artifacts/product-journey/run-autofix-watchdog
    expect_host_calls:
      - handler: host.run
        args: { call: load_product_journey_run }

  - intent:
      name: autonomous_fix
      slots:
        ticket_repo: bsacrobatix/Kitsoki
        gh_agent_story: stories/bugfix
        gh_agent_public_base_url: https://agent.example
    expect_state: run_created
    expect_world:
      status: autonomous_fix_complete
      autonomous_fix_status: autonomous_fix_invalid
      autonomous_fix_report_path: .artifacts/product-journey/run-autofix-watchdog/autonomous-fix-report.md
      autonomous_gate_summary: "watchdog=fail, filing=not_run, gh_agent=not_run, independent_verify=fail, review=not_run, validation=fail"
      autonomous_watchdog_status: autonomous_watchdog_blocked
      filing_status: not_run
      gh_agent_enqueue_status: not_run
      gh_agent_drain_status: not_run
      independent_verify_status: fail
      independent_verify_summary: "Autonomous watchdog failed before issue filing or gh-agent repair: missing autonomous-marathon-control.json; stop before spend"
      review_status: not_run
      validation_status: invalid
      validation_errors: 1
      validation_issue_summary: autonomous-watchdog
    expect_view_matches: "RUN CREATED[\\s\\S]*Autonomous fix[\\s\\S]*autonomous_fix_invalid[\\s\\S]*Autonomous gates[\\s\\S]*watchdog=fail[\\s\\S]*Marathon watchdog[\\s\\S]*autonomous_watchdog_blocked[\\s\\S]*control.json[\\s\\S]*Issue filing[\\s\\S]*not_run[\\s\\S]*Validation issues[\\s\\S]*autonomous-watchdog"
    expect_host_calls:
      - handler: host.run
        args: { call: autonomous_product_journey_fix }

expect_no_errors: true
