test_kind: flow
app: ../app.yaml
initial_state: idle

initial_world:
  autonomous_marathon_smoke_report_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.json
  autonomous_marathon_smoke_report_markdown_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.md

host_handlers:
  host.run:
    by_call:
      validate_autonomous_marathon_smoke_ledger:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: valid
            summary: "valid: 5/5 flawless, filed=15, fixed=15, landed=15"
            ledger_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.json
            ledger_markdown_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.md
            errors: 0
            warnings: 0
            persona_count: 5
            scenario_count: 3
            run_count: 5
            expected_issue_count: 15
            filed_issue_count: 15
            gh_agent_done_count: 15
            gh_agent_integration_landing_count: 15
            flawless_run_count: 5
            success_rate: "5/5"

turns:
  - intent:
      name: validate_marathon_smoke_ledger
      slots: {}
    expect_state: idle
    expect_world:
      status: marathon_smoke_ledger_validated
      marathon_smoke_ledger_validation_status: valid
      marathon_smoke_ledger_validation_summary: "valid: 5/5 flawless, filed=15, fixed=15, landed=15"
      marathon_smoke_ledger_validation_errors: 0
      marathon_smoke_ledger_validation_warnings: 0
      marathon_smoke_ledger_validation_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.json
      marathon_smoke_ledger_validation_markdown_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.md
    expect_host_calls:
      - handler: host.run
        args: { call: validate_autonomous_marathon_smoke_ledger }
    expect_view_matches: "PRODUCT JOURNEY QA[\\s\\S]*Marathon smoke ledger[\\s\\S]*autonomous-marathon-smoke.md[\\s\\S]*Marathon ledger validation[\\s\\S]*valid: valid: 5/5 flawless[\\s\\S]*filed=15[\\s\\S]*fixed=15[\\s\\S]*landed=15[\\s\\S]*Marathon ledger validated[\\s\\S]*autonomous-marathon-smoke.json[\\s\\S]*Status[\\s\\S]*marathon_smoke_ledger_validated"

expect_no_errors: true
