test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      autonomous_product_journey_marathon_smoke:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: passed
            summary: core use-case autonomous product-QA marathon persona sweep passed
            exit_code: 0
            output: "ok: core-maintainer: run targets gears-rust with requested persona\nok: dependency-debugger: persona lens is preserved in driver and brief contracts\nok: docs-minded-contributor: credible issues were filed\nok: ide-first-engineer: gh-agent fixes drained with independent verification\nok: hobbyist-contributor: mechanical stats count found/filed/fixed\nok: sweep filed and fixed every core scenario issue\nPASS"

turns:
  - intent:
      name: autonomous_marathon_smoke
      slots: {}
    expect_state: idle
    expect_world:
      status: autonomous_marathon_smoke_checked
      autonomous_marathon_smoke_status: passed
      autonomous_marathon_smoke_summary: core use-case autonomous product-QA marathon persona sweep passed
      autonomous_marathon_smoke_exit_code: 0
    expect_host_calls:
      - handler: host.run
        args: { call: autonomous_product_journey_marathon_smoke }
    expect_view_matches: "PRODUCT JOURNEY QA[\\s\\S]*Autonomous marathon smoke[\\s\\S]*passed[\\s\\S]*Status[\\s\\S]*autonomous_marathon_smoke_checked"

expect_no_errors: true
