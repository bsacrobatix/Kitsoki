  host.agent.task:
    by_call:
      autonomous_product_journey_driver:
        data:
          ok: true
          submitted:
            status: captured
            summary: "Captured live persona proof, recorded one credible issue, and ran story-owned gates."
            evidence_count: 5
            issue_count: 1
            trace: .artifacts/product-journey/run-live-driver/driver-trace.jsonl

turns:
  - intent:
      name: capture_preflight
      slots:
        seed: live-driver
    expect_state: idle
    expect_world:
      status: capture_preflight_checked
      capture_preflight_status: passed
      capture_preflight_failed: 0
    expect_host_calls:
      - handler: host.run
        args: { call: capture_product_journey_preflight }

  - intent:
      name: autonomous_marathon
      slots:
        project: vscode
        persona: core-maintainer
        seed: live-driver
        scenarios: bugfix
        live_budget_minutes: 6
        autonomous_driver_mode: live
        ticket_repo: bsacrobatix/Kitsoki
        gh_agent_public_base_url: https://agent.example
    expect_state: run_created
    expect_world:
      status: autonomous_marathon_complete
      autonomous_marathon_status: autonomous_marathon_valid
      autonomous_driver_mode: live
      autonomous_driver_status: captured
      autonomous_driver_evidence_count: 5
      autonomous_driver_issue_count: 1
      autonomous_gate_summary: "watchdog=pass, filing=pass, gh_agent=pass, independent_verify=pass, review=pass, validation=pass"
      autonomous_driver_dispatch_trace: .artifacts/product-journey/run-live-driver/driver-trace.jsonl
      validation_status: valid
      validation_errors: 0
      review_status: pass
      stats_current_run_scanned: yes
    expect_view_matches: "RUN CREATED[\\s\\S]*Autonomous gates[\\s\\S]*watchdog=pass, filing=pass, gh_agent=pass,[\\s\\S]*independent_verify=pass, review=pass, validation=pass[\\s\\S]*Autonomous marathon[\\s\\S]*autonomous_marathon_valid[\\s\\S]*Autonomous driver[\\s\\S]*live / captured"
    expect_host_calls:
      - handler: host.run
        args: { call: autonomous_product_journey_marathon_create }
      - handler: host.agent.task
        args: { call: autonomous_product_journey_driver }
      - handler: host.run
        args: { call: autonomous_product_journey_marathon_finalize }

expect_no_errors: true
