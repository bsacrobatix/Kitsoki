turns:
  - intent:
      name: campaign_plan
      slots:
        project: gears-rust
        persona: workflow-author
        seed: universal-campaign
        live_budget_minutes: 0
    expect_state: run_created
    expect_world:
      status: run_created
      campaign_status: planning
      project: gears-rust
      persona: workflow-author
      seed: universal-campaign
      scenario_scope: docs-to-mcp-first-run,agent-launch-experience,remote-worker-campaign,campaign-rollup-review
      run_id: campaign-run-1
      run_scenario_count: 4
    expect_view_matches: "RUN CREATED[\\s\\S]*Campaign[\\s\\S]*planning[\\s\\S]*Scenario scope[\\s\\S]*docs-to-mcp-first-run[\\s\\S]*campaign-rollup-review[\\s\\S]*campaign_attach[\\s\\S]*campaign_issue_fix[\\s\\S]*campaign_deck_refresh"
    expect_host_calls:
      - handler: host.product_journey.run
        args: { call: emit_product_journey_run }

  - intent:
      name: campaign_attach
      slots:
        scenario: docs-to-mcp-first-run
        evidence_kind: browser_screenshot
        evidence_path: .artifacts/product-journey/campaign-run-1/evidence/docs-home.png
        source: retained
        notes: "Docs entrypoint screenshot."
    expect_state: run_created
    expect_world:
      status: campaign_evidence_attached
      campaign_status: evidence_attached
      scenario: docs-to-mcp-first-run
      evidence_kind: browser_screenshot
      evidence_source: retained
      proof_evidence_count: 1
      issue_count: 1
    expect_host_calls:
      - handler: host.product_journey.run
        args: { call: attach_product_journey_evidence }

  - intent:
      name: campaign_worker
      slots:
        backend: vm
        worker_id: qa-vm-1
        status: ready
        ready_status: pass
        ready_summary: "healthz ok; arena receipt available"
        budget_minutes: 15
        receipt_source: vm://qa-vm-1/campaign/campaign-run-1
        import_artifacts: .artifacts/product-journey/campaign-run-1/worker/receipt.json
        summary: "VM worker is ready for bounded campaign capture."
    expect_state: run_created
    expect_world:
      status: campaign_worker_recorded
      campaign_status: worker_receipt_recorded
      campaign_worker_backend: vm
      campaign_worker_id: qa-vm-1
      campaign_worker_status: ready
      campaign_worker_ready_status: pass
      campaign_worker_imported_artifact_count: 1
      campaign_worker_artifact_import_status: imported
      campaign_worker_receipt_markdown_path: .artifacts/product-journey/campaign-run-1/campaign-worker-receipt.md
    expect_view_matches: "RUN CREATED[\\s\\S]*Campaign worker[\\s\\S]*vm / qa-vm-1 / ready[\\s\\S]*Worker readiness[\\s\\S]*pass[\\s\\S]*Worker receipt[\\s\\S]*campaign-worker-[\\s\\S]*receipt\\.md"
    expect_host_calls:
      - handler: host.product_journey.run
        args: { call: record_campaign_worker_receipt }

  - intent:
      name: campaign_issue_fix
      slots:
        finding_sink: github
        ticket_repo: owner/repo
        gh_agent_public_base_url: https://agent.example
    expect_state: run_created
    expect_world:
      status: autonomous_fix_complete
      campaign_status: issue_fixing
      campaign_finding_sink: github
      filing_sink: github
      ticket_repo: owner/repo
      gh_agent_public_base_url: https://agent.example
      autonomous_fix_status: autonomous_fix_valid
      findings_filed_count: 1
      gh_agent_done_count: 1
      independent_verify_status: pass
      validation_status: valid
    expect_host_calls:
      - handler: host.product_journey.run
        args: { call: autonomous_product_journey_fix }

  - intent:
      name: campaign_stats
      slots:
        stats_root: .artifacts/product-journey
        stats_output: .artifacts/product-journey/campaign-run-1/campaign-stats.json
    expect_state: run_created
    expect_world:
      status: stats_derived
      campaign_status: refreshing_stats
      stats_status: stats_derived
      stats_found_count: 1
      stats_filed_count: 1
      stats_fixed_count: 1
    expect_host_calls:
      - handler: host.product_journey.run
        args: { call: derive_product_journey_stats }

  - intent:
      name: campaign_deck_refresh
    expect_state: run_created
    expect_world:
      status: reviewed
      campaign_status: refreshing_deck
      review_status: needs_evidence
      review_passed_count: 21
      review_failed_count: 2
      deck_path: .artifacts/product-journey/campaign-run-1/deck.slidey.json
    expect_view_matches: "RUN CREATED[\\s\\S]*Campaign[\\s\\S]*refreshing_deck[\\s\\S]*Deck[\\s\\S]*deck\\.slidey\\.json[\\s\\S]*Review checks[\\s\\S]*21 / 24 passed"
    expect_host_calls:
      - handler: host.product_journey.run
        args: { call: review_product_journey_run }

expect_no_errors: true
