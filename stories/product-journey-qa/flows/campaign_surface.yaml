            execution_plan_path: .artifacts/product-journey/campaign-run-1/execution-plan.md
            driver_plan_path: .artifacts/product-journey/campaign-run-1/driver-plan.md
            driver_journal_path: .artifacts/product-journey/campaign-run-1/driver-journal.md
            agent_brief_path: .artifacts/product-journey/campaign-run-1/agent-brief.md
