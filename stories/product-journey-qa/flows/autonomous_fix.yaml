turns:
  - intent:
      name: load
      slots:
        run_dir: .artifacts/product-journey/run-888
    expect_state: run_created
    expect_world:
      status: run_loaded
      run_id: run-888
      run_dir: .artifacts/product-journey/run-888
    expect_view_matches: "RUN CREATED[\\s\\S]*autonomous_fix ticket_repo=owner/repo gh_agent_public_base_url=<url>[\\s\\S]*file_findings ticket_repo=owner/repo"
    expect_host_calls:
      - handler: host.run
        args: { call: load_product_journey_run }

  - intent:
      name: autonomous_fix
      slots:
        ticket_repo: bsacrobatix/Kitsoki
        gh_agent_story: stories/bugfix
        gh_agent_public_base_url: https://agent.example
    expect_state: run_created
    expect_world:
      status: autonomous_fix_complete
      autonomous_fix_status: autonomous_fix_valid
      autonomous_fix_report_path: .artifacts/product-journey/run-888/autonomous-fix-report.md
      ticket_repo: bsacrobatix/Kitsoki
      filing_status: findings_filed
      findings_filed_count: 2
      findings_unfiled_count: 0
      gh_agent_enqueue_status: queued
      gh_agent_claim_status: claimed
      gh_agent_claim_count: 2
      gh_agent_drain_status: drained
      gh_agent_done_count: 2
      gh_agent_failed_count: 0
      gh_agent_fix_evidence_count: 4
      gh_agent_missing_evidence_count: 0
      gh_agent_triage_evidence_count: 2
      gh_agent_missing_triage_count: 0
      gh_agent_independent_verify_count: 2
      gh_agent_missing_verify_count: 0
      autonomous_gate_summary: "filing=pass, gh_agent=pass, review=pass, validation=pass"
      issue_closeout_status: closed
      issue_closeout_count: 2
      review_status: ready
      review_failed_count: 0
      validation_status: valid
      validation_errors: 0
    expect_view_matches: "RUN CREATED[\\s\\S]*Autonomous fix[\\s\\S]*autonomous_fix_valid[\\s\\S]*Autonomous report[\\s\\S]*autonomous-fix-report.md[\\s\\S]*Autonomous gates[\\s\\S]*filing=pass, gh_agent=pass, review=pass, validation=pass[\\s\\S]*Issue close-out[\\s\\S]*closed: closed 2[\\s\\S]*Issue filing[\\s\\S]*findings_filed: filed 2[\\s\\S]*GH-agent claims[\\s\\S]*claimed: claimed 2[\\s\\S]*GH-agent drain[\\s\\S]*drained: drained 2, done 2, failed 0, active 0[\\s\\S]*GH-agent evidence[\\s\\S]*4 attached; 0 missing; triage 2 attached / 0 missing[\\s\\S]*triage-verdict.md[\\s\\S]*Review checks[\\s\\S]*25 / 25 passed[\\s\\S]*Validation[\\s\\S]*valid"
    expect_host_calls:
      - handler: host.run
        args:
          call: autonomous_product_journey_fix
          cmd: go

expect_no_errors: true
