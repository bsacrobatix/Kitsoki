test_kind: flow
app: ../app.yaml
initial_state: idle

turns:
  - intent:
      name: autonomous_marathon
      slots:
        project: vscode
        persona: core-maintainer
        seed: live-driver-no-profile
        scenarios: bugfix
        live_budget_minutes: 6
        autonomous_driver_mode: live
        ticket_repo: bsacrobatix/Kitsoki
        gh_agent_public_base_url: https://agent.example
    expect_state: idle
    expect_world:
      status: autonomous_marathon_invalid
      autonomous_marathon_status: autonomous_marathon_invalid
      autonomous_marathon_summary: "Record/live autonomous marathon requires autonomous_driver_live_profile so replay misses cannot silently fall through to an ambient live backend."
      autonomous_driver_mode: live
      autonomous_driver_live_profile: ""
      autonomous_driver_status: invalid
      autonomous_driver_summary: "autonomous_driver_live_profile is required before record/live driver dispatch"
      live_budget_minutes: 6
      autonomous_fix_status: not_run
      autonomous_gate_summary: "driver=fail, live_auth=fail, filing=not_run, gh_agent=not_run, independent_verify=not_run, review=not_run, validation=fail"
      validation_status: invalid
      validation_errors: 1
      validation_issue_summary: live-profile-required
      review_status: not_run
    expect_view_matches: "PRODUCT JOURNEY QA[\\s\\S]*Autonomous marathon[\\s\\S]*autonomous_marathon_invalid[\\s\\S]*Autonomous driver[\\s\\S]*live / invalid[\\s\\S]*Driver live profile[\\s\\S]*\\(not set\\)[\\s\\S]*Validation issues[\\s\\S]*live-profile-required"
    expect_no_host_calls: [host.run, host.agent.task]

expect_no_errors: true
