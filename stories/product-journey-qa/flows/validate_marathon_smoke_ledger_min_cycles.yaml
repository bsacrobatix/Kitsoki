test_kind: flow
app: ../app.yaml
initial_state: idle

initial_world:
  autonomous_marathon_smoke_report_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.json
  autonomous_marathon_smoke_report_markdown_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.md

host_handlers:
  host.run:
    by_call:
      validate_autonomous_marathon_smoke_ledger:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: invalid
            summary: "invalid: 5/5 flawless, filed=15, fixed=15, landed=15"
            ledger_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.json
            ledger_markdown_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.md
            errors: 1
            warnings: 0
            cycle_count: 1
            min_cycle_count: 2
            persona_count: 5
            scenario_count: 3
            run_count: 5
            expected_issue_count: 15
            filed_issue_count: 15
            gh_agent_done_count: 15
            gh_agent_integration_landing_count: 15
            flawless_run_count: 5
            success_rate: "5/5"
            issues:
              - severity: error
                id: ledger-min-cycles
                message: Autonomous marathon smoke ledger does not meet the requested minimum cycle count
                detail: cycles=1, min=2

turns:
  - intent:
      name: validate_marathon_smoke_ledger
      slots:
        min_cycles: 2
    expect_state: idle
    expect_world:
      status: marathon_smoke_ledger_validated
      marathon_smoke_ledger_validation_status: invalid
      marathon_smoke_ledger_validation_summary: "invalid: 5/5 flawless, filed=15, fixed=15, landed=15"
      marathon_smoke_ledger_validation_errors: 1
      marathon_smoke_ledger_validation_warnings: 0
      marathon_smoke_ledger_validation_cycle_count: 1
      marathon_smoke_ledger_validation_min_cycle_count: 2
      marathon_smoke_ledger_validation_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.json
      marathon_smoke_ledger_validation_markdown_path: .artifacts/product-journey/marathon-smokes/fixture/autonomous-marathon-smoke.md
    expect_host_calls:
      - handler: host.run
        args: { call: validate_autonomous_marathon_smoke_ledger }
    expect_view_matches: "PRODUCT JOURNEY QA[\\s\\S]*Marathon smoke ledger[\\s\\S]*autonomous-marathon-smoke.md[\\s\\S]*Marathon ledger validation[\\s\\S]*invalid: invalid: 5/5 flawless[\\s\\S]*cycles=1, min=2[\\s\\S]*Marathon ledger validated[\\s\\S]*autonomous-marathon-smoke.json[\\s\\S]*Status[\\s\\S]*marathon_smoke_ledger_validated"

expect_no_errors: true
