            autonomous_gate_summary: "filing=not_run, gh_agent=not_run, review=not_run, validation=not_run"
            run_id: run-999
            run_dir: .artifacts/product-journey/run-999
            project: vscode
            persona: core-maintainer
            seed: marathon-demo
            deck_path: .artifacts/product-journey/run-999/deck.slidey.json
            execution_plan_path: .artifacts/product-journey/run-999/execution-plan.md
            driver_plan_path: .artifacts/product-journey/run-999/driver-plan.md
            driver_journal_path: .artifacts/product-journey/run-999/driver-journal.md
            agent_brief_path: .artifacts/product-journey/run-999/agent-brief.md
            driver_handoff_path: .artifacts/product-journey/run-999/driver-handoff.md
            media_manifest_path: .artifacts/product-journey/run-999/media-manifest.json
