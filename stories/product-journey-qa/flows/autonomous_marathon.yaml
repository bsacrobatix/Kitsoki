            next_driver_capture: "bugfix: capture trace_reference"
            next_driver_attach_command: "python3 tools/product-journey/run.py --attach-evidence --run-dir .artifacts/product-journey/run-999 --scenario bugfix --evidence-kind trace_reference --evidence-path <path>"
            next_driver_blocker_command: "python3 tools/product-journey/run.py --record-blocker --run-dir .artifacts/product-journey/run-999 --scenario bugfix --title <title> --summary <summary>"
