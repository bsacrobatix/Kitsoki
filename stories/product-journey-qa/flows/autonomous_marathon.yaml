                next_driver_capture: ""
                next_driver_attach_command: ""
                next_driver_blocker_command: ""

turns:
  - intent:
      name: autonomous_marathon
      slots:
        project: vscode
        persona: core-maintainer
        seed: marathon-demo
        scenarios: bugfix
        live_budget_minutes: 6
    expect_state: run_created
    expect_world:
      status: autonomous_marathon_ready
      run_id: run-999
      run_dir: .artifacts/product-journey/run-999
      autonomous_marathon_status: autonomous_marathon_ready_for_driver
      autonomous_marathon_report_path: .artifacts/product-journey/run-999/autonomous-marathon-report.md
      missing_proof_evidence_count: 3
    expect_view_matches: "RUN CREATED[\\s\\S]*Autonomous marathon[\\s\\S]*autonomous_marathon_ready_for_driver[\\s\\S]*Marathon report[\\s\\S]*autonomous-marathon[\\s\\S]*report.md"
    expect_host_calls:
      - handler: host.run
        args: { call: autonomous_product_journey_marathon }

  - intent:
      name: autonomous_marathon
      slots:
        ticket_repo: bsacrobatix/Kitsoki
        gh_agent_public_base_url: https://agent.example
        issue_state_file: .artifacts/product-journey/issues.json
    expect_state: run_created
    expect_world:
      status: autonomous_marathon_complete
      autonomous_marathon_status: autonomous_marathon_valid
      autonomous_fix_status: autonomous_fix_valid
      autonomous_gate_summary: "filing=pass, gh_agent=pass, review=pass, validation=pass"
      issue_closeout_status: closed
      issue_closeout_count: 1
      gh_agent_claim_status: claimed
      gh_agent_claim_count: 1
      stats_status: stats_derived
      stats_fixed_count: 1
      weakness_route_count: 1
      validation_status: valid
    expect_view_matches: "RUN CREATED[\\s\\S]*Autonomous gates[\\s\\S]*filing=pass, gh_agent=pass, review=pass, validation=pass[\\s\\S]*Issue close-out[\\s\\S]*closed: closed 1[\\s\\S]*Autonomous marathon[\\s\\S]*autonomous_marathon_valid[\\s\\S]*GH-agent claims[\\s\\S]*claimed: claimed 1[\\s\\S]*Derived stats[\\s\\S]*stats_derived: found 1, filed 1, fixed 1[\\s\\S]*Stats gate[\\s\\S]*pass: pass; current run scanned yes"
    expect_host_calls:
      - handler: host.run
        args: { call: autonomous_product_journey_marathon_finalize }

expect_no_errors: true
