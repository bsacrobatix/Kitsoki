                autonomous_fix_status: autonomous_fix_valid
                autonomous_fix_report_path: .artifacts/product-journey/run-999/autonomous-fix-report.md
                autonomous_gate_summary: "filing=pass, gh_agent=pass, review=pass, validation=pass"
                issue_closeout_status: closed
                issue_closeout_count: 1
                issue_closeout_summary: "Closed 1 fixed GitHub issue(s)."
                filing_status: findings_filed
                dry_run: "no"
                findings_filed_count: 1
                findings_skipped_count: 0
                findings_failed_count: 0
                findings_unfiled_count: 0
