test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      capture_product_journey_preflight:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: passed
            preflight_id: preflight-health
            preflight_dir: .artifacts/product-journey/preflights/preflight-health
            preflight_path: .artifacts/product-journey/preflights/preflight-health/preflight.json
            markdown_path: .artifacts/product-journey/preflights/preflight-health/preflight.md
            webshot_output: .artifacts/product-journey/preflights/preflight-health/webshot-smoke.png
            passed: 6
            failed: 0
      autonomous_product_journey_marathon:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: autonomous_marathon_invalid
            run_id: run-health
            run_dir: .artifacts/product-journey/run-health
            project: vscode
            persona: core-maintainer
            seed: live-health
            deck_path: .artifacts/product-journey/run-health/deck.slidey.json
            execution_plan_path: .artifacts/product-journey/run-health/execution-plan.md
            driver_plan_path: .artifacts/product-journey/run-health/driver-plan.md
            driver_journal_path: .artifacts/product-journey/run-health/driver-journal.md
            agent_brief_path: .artifacts/product-journey/run-health/agent-brief.md
            driver_handoff_path: .artifacts/product-journey/run-health/driver-handoff.md
            media_manifest_path: .artifacts/product-journey/run-health/media-manifest.json
            scenario_outcomes_path: .artifacts/product-journey/run-health/scenario-outcomes.md
            autonomous_marathon_status: autonomous_marathon_invalid
            autonomous_marathon_summary: "Hosted gh-agent health check failed before driver handoff: https://agent.example/healthz: expected HTTP 200 body ok, got HTTP 200 body 'not-ok'"
            autonomous_marathon_report_path: .artifacts/product-journey/run-health/autonomous-marathon-report.md
            autonomous_driver_mode: pending
            autonomous_driver_status: invalid
            autonomous_driver_summary: "Hosted gh-agent health check failed before driver handoff: https://agent.example/healthz: expected HTTP 200 body ok, got HTTP 200 body 'not-ok'"
            autonomous_driver_evidence_count: 0
            autonomous_driver_issue_count: 0
            autonomous_control_status: not_run
            autonomous_control_path: ""
            autonomous_control_markdown_path: ""
            autonomous_fix_status: not_run
            autonomous_gate_summary: "preflight=pass, filing=not_run, gh_agent=fail, independent_verify=not_run, review=not_run, validation=fail"
            independent_verify_status: not_run
            independent_verify_summary: "Hosted gh-agent health check failed before driver handoff: https://agent.example/healthz: expected HTTP 200 body ok, got HTTP 200 body 'not-ok'"
            gh_agent_health_status: fail
            gh_agent_health_summary: "https://agent.example/healthz: expected HTTP 200 body ok, got HTTP 200 body 'not-ok'"
            validation_status: invalid
            validation_errors: 1
            validation_warnings: 0
            validation_issue_summary: gh-agent-health
            review_status: not_run
            review_failed_count: 0
            live_budget_minutes: 6
            scenario_count: 1
            proof_evidence_count: 0
            demo_evidence_count: 0
            missing_proof_evidence_count: 3
            minimum_evidence_count: 3
            proof_minimum_evidence_count: 3

turns:
  - intent:
      name: capture_preflight
      slots:
        seed: live-health
    expect_state: idle
    expect_world:
      status: capture_preflight_checked
      capture_preflight_status: passed
      capture_preflight_failed: 0
    expect_host_calls:
      - handler: host.run
        args: { call: capture_product_journey_preflight }

  - intent:
      name: autonomous_marathon
      slots:
        project: vscode
        persona: core-maintainer
        seed: live-health
        scenarios: bugfix
        live_budget_minutes: 6
        ticket_repo: owner/repo
        gh_agent_public_base_url: https://agent.example
    expect_state: run_created
    expect_world:
      status: autonomous_marathon_invalid
      run_id: run-health
      autonomous_marathon_status: autonomous_marathon_invalid
      autonomous_driver_status: invalid
      autonomous_control_status: not_run
      gh_agent_health_status: fail
      validation_status: invalid
      validation_issue_summary: gh-agent-health
      autonomous_gate_summary: "preflight=pass, filing=not_run, gh_agent=fail, independent_verify=not_run, review=not_run, validation=fail"
    expect_view_matches: "RUN CREATED[\\s\\S]*Autonomous marathon[\\s\\S]*autonomous_marathon_invalid[\\s\\S]*GH-agent health[\\s\\S]*fail: https://agent.example/healthz[\\s\\S]*Validation issues[\\s\\S]*gh-agent-health"
    expect_host_calls:
      - handler: host.run
        args: { call: autonomous_product_journey_marathon }

expect_no_errors: true
