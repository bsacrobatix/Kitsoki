test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      load_product_journey_run:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: run_loaded
            run_id: run-777
            run_dir: .artifacts/product-journey/run-777
            project: vscode
            persona: ide-first-engineer
            seed: filing-demo
            issue_count: 2
            finding_total_count: 4

turns:
  - intent:
      name: load
      slots:
        run_dir: .artifacts/product-journey/run-777
    expect_state: run_created
    expect_host_calls:
      - handler: host.run
        args: { call: load_product_journey_run }

  - intent:
      name: file_findings
      slots:
        ticket_repo: bsacrobatix/Kitsoki
        gh_agent_story: stories/bugfix
    expect_state: run_created
    expect_world:
      status: findings_filing_invalid
      ticket_repo: bsacrobatix/Kitsoki
      filing_status: findings_filing_invalid
      filing_dry_run: file
      validation_status: invalid
      validation_errors: 1
      validation_issue_summary: gh-agent-public-base-url
      gh_agent_missing_run_url_count: 1
      gh_agent_missing_evidence_summary: "gh_agent_public_base_url is required"
    expect_view_matches: "RUN CREATED[\\s\\S]*Issue filing[\\s\\S]*findings_filing_invalid[\\s\\S]*Validation[\\s\\S]*invalid"
    expect_host_calls: []

expect_no_errors: true
