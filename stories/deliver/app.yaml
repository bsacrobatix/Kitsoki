# deliver — epic front-door of the delivery loop.
#
# Layering: deliver → fleet → ship-it (acyclic; deliver imports fleet which
# imports ship-it). deliver is the ONLY entry above fleet; fleet must never
# import deliver.
#
# Pipeline:
#   configure{epic_path}
#     └─ start ─▶ decompose (LLM: read epic, emit brief manifest YAML)
#                  ├─ on success ─▶ lint (deterministic DAG/uniqueness/completeness)
#                  │                 ├─ pass ─▶ review (adversarial feasibility/completeness)
#                  │                 │           ├─ accept ─▶ fleet (fan ship-it over every brief)
#                  │                 │           │             └─ @exit:done {delivery_summary}
#                  │                 │           └─ revise ─▶ decompose (budgeted refine)
#                  │                 └─ fail ─▶ decompose (budgeted refine)
#                  └─ on error  ─▶ @exit:needs-human {last_error}
#
# Every failure arc exits @exit:needs-human with a SPECIFIC non-blank last_error.
# The lint step is fully deterministic (no LLM): ids unique & non-empty, each
# brief has non-empty brief + gate_command, every dep references an existing id,
# no dependency cycle, at least one brief. The review step (host.agent.decide,
# schemas/review-decision.json) attacks what lint cannot: per-brief buildability
# and whether coverage_note actually covers the epic. Both refine edges
# (lint-fail and review-revise) share one refine_cycle/refine_budget counter;
# budget exhaustion exits @exit:needs-human instead of looping forever.

app:
  id: deliver
  version: 0.1.0
  title: "deliver — epic front-door of the delivery loop"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.run
  - host.starlark.run
  - host.decomposition.update
  - host.agent.task
  - host.agent.decide
  - host.artifacts_dir

world:
  epic_path:            { type: string, default: "" }   # path to the epic / proposal markdown
  decomposition_path:   { type: string, default: "" }   # output YAML the decomposer writes
  base_branch:          { type: string, default: "main" }
  main_worktree_path:   { type: string, default: "." }
  delivery_summary:     { type: string, default: "" }   # set by fleet on @exit:done
  last_error:           { type: string, default: "" }   # set by lint (bind) or engine (on_error)
  decomposition_briefs: { type: list,   default: [] }   # briefs returned by the decomposer agent
  lint_route:           { type: string, default: "" }   # "ok" | "fail" — lint script verdict
  coverage_note:        { type: string, default: "" }   # decomposer's completeness claim, attacked by review
  review_verdict:       { type: string, default: "" }   # "accept" | "revise" — adversarial reviewer's verdict
  review_reason:        { type: string, default: "" }
  review_questions:     { type: list,   default: [] }   # specific gaps to feed back on revise
  refine_feedback:      { type: string, default: "" }   # fed into the decomposer's prompt on a re-entry
  refine_cycle:         { type: int,    default: 0 }    # shared by the lint-fail and review-revise refine loops
  refine_budget:        { type: int,    default: 3 }
  # Managed re-decompose (B2c) — a prior decomposition.yaml routes through the
  # decompose-update transaction instead of a blind decomposer overwrite.
  decompose_route:          { type: string, default: "" }   # "" | "fresh" | "redecompose" — detect_prior_decomposition.star's verdict
  redecompose_checked:      { type: bool,   default: false } # detection runs at most once per run (see decompose.yaml)
  redecompose_delta_path:   { type: string, default: "" }   # delta document the decomposer authors
  redecompose_versions_dir: { type: string, default: "" }   # versioned prior-graph snapshots
  redecompose_event_log:    { type: string, default: "" }   # plan-evolution.jsonl
  redecompose_trigger:      { type: string, default: "" }   # the delta's one-line trigger, echoed by the decomposer's confirmation
  redecompose_added:        { type: list,   default: [] }   # brief ids the delta adds, echoed by the decomposer's confirmation
  redecompose_apply_ok:     { type: bool,   default: false } # native transaction verdict
  redecompose_apply_stdout: { type: string, default: "" }
  redecompose_apply_route:  { type: string, default: "" }   # "" | "ok" | "fail" — native transaction route

intents:
  start:
    description: "Provide the epic path and begin the delivery pipeline."
    examples: ["start", "begin", "deliver", "go"]
    priority: 85
    slots:
      epic_path: { type: string, required: false }
  decomposition_done:
    description: "(internal) decomposer succeeded → proceed to lint."
    examples: []
    priority: 1
  lint_passed:
    description: "(internal) lint passed → enter adversarial review."
    examples: []
    priority: 1
  lint_failed:
    description: "(internal) lint failed → budgeted refine loop back to decompose."
    examples: []
    priority: 1
  review_accepted:
    description: "(internal) adversarial review accepted the manifest → enter fleet fan-out."
    examples: []
    priority: 1
  review_revise:
    description: "(internal) adversarial review requested changes → budgeted refine loop back to decompose."
    examples: []
    priority: 1
  refine_budget_exhausted:
    description: "(internal) refine cycle budget exhausted → needs-human."
    examples: []
    priority: 1
  decompose_route_fresh:
    description: "(internal) no prior decomposition exists → proceed to a fresh decompose."
    examples: []
    priority: 1
  redecompose_needed:
    description: "(internal) a prior decomposition already exists → route to the managed-delta transaction."
    examples: []
    priority: 1
  redecompose_delta_authored:
    description: "(internal) the delta document was authored → apply it via the decompose-update transaction."
    examples: []
    priority: 1
  redecompose_applied:
    description: "(internal) the managed delta applied cleanly → proceed to lint."
    examples: []
    priority: 1
  redecompose_apply_failed:
    description: "(internal) the decompose-update transaction rejected the delta → needs-human."
    examples: []
    priority: 1
  bail:
    description: "(internal) error room auto-routes → @exit:needs-human."
    examples: []
    priority: 1
  look:
    description: "Re-render the current room."
    examples: ["look", "status"]
    priority: 5

agents:
  decomposer:
    system_prompt: "You are a delivery decomposer. Read the epic or proposal at the given path, break it into independently-shippable briefs each with a deterministic gate command, write the decomposition YAML to the given output path, and submit the structured manifest."
    model: claude-opus-4-8
    tools: [Read, Edit, Write]
  reviewer:
    system_prompt: "You are a skeptical decomposition reviewer. Attack per-brief buildability (self-contained, deps right, gate plausible) and cross-brief completeness (does coverage_note overclaim, any epic requirement uncovered, any file double-owned). Accept only when both hold up."
    model: claude-sonnet-4-6
    tools: [Read]

exits:
  done:        { requires: [delivery_summary] }
  needs-human: { requires: [last_error] }

root: configure

imports:
  # fleet — fan ship-it over every brief behind a merge-lock.
  # Entered at load (skips fleet's idle room; fleet's load on_enter parses
  # decomposition_path immediately). fleet's @exit:done carries fleet_summary
  # which we project up to delivery_summary.
  fleet:
    source: ../fleet
    entry: load
    world_in:
      decomposition_path: "{{ world.decomposition_path }}"
      base_branch:        "{{ world.base_branch }}"
      main_worktree_path: "{{ world.main_worktree_path }}"
    exits:
      done:
        to: "@exit:done"
        set:
          delivery_summary: "{{ world.fleet_summary }}"

include:
  - rooms/*.yaml
