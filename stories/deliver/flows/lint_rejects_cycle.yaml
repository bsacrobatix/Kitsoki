# lint_rejects_cycle — lint detects a dep cycle → budgeted refine loop back
# to decompose (NOT a hard exit — reshaped for B2b, proposal task 2.3), the
# refined manifest breaks the cycle, lint passes, review accepts, and the
# run lands in fleet.load.
#
# The real Starlark lint script reads the manifest from the sequential
# starlark_inspect_cassette reads below: first the cyclic slice-a/slice-b
# pair (fail), then the same pair with the cycle broken (pass).

test_kind: flow
app: ../app.yaml
initial_state: configure
initial_world:
  base_branch: main
  main_worktree_path: "."

host_cassette: ../cassettes/lint_cycle.cassette.yaml
starlark_inspect_cassette: ../cassettes/lint_cycle.inspect.yaml

turns:
  - intent:
      name: start
      slots:
        epic_path: "stories/deliver/testdata/fixture_epic.md"
    expect_state: fleet.load
    expect_world:
      lint_route:      "ok"
      refine_cycle:    1
      refine_feedback: "dependency cycle detected involving 'slice-a'"

expect_no_errors: true
