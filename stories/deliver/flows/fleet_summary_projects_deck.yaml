# fleet_summary_projects_deck — deliver projects fleet's deterministic report
# artifacts when the imported fleet exits done.

test_kind: flow
app: ../app.yaml
initial_state: fleet.summary
initial_world:
  fleet__decomposition_path: ".artifacts/deliver/decomposition.yaml"
  fleet__fleet_state_path: "/tmp/fleet-deliver-summary-test.json"
  fleet__shipped_count: 2
  fleet__parked_count: 0
  fleet__fleet_summary: "2 shipped, 0 parked."
  fleet__report_path: ".artifacts/fleet/test/report.md"
  fleet__report_summary_path: ".artifacts/fleet/test/summary.json"
  fleet__report_deck_path: ".artifacts/fleet/test/deck.slidey.json"
  fleet__fleet_briefs:
    - { id: one, brief: "first", gate_command: "true", status: shipped, last_error: "" }
    - { id: two, brief: "second", gate_command: "true", status: shipped, last_error: "" }

turns:
  - intent: { name: fleet__to_summary, slots: {} }
    expect_state: __exit__done
    expect_world:
      delivery_summary: "2 shipped, 0 parked."
      report_deck_path: ".artifacts/fleet/test/deck.slidey.json"

expect_terminal: true
expect_no_errors: true
