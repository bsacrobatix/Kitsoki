# decompose_happy — 3-brief manifest → lint passes → routes into fleet.load.
#
# The decomposer agent is mocked (no LLM), while deliver lint and fleet load run
# REAL Starlark against the inspect cassette below. We assert the story reaches
# fleet.load (the fleet import entry) and stop — fleet's own flows test fan-out.
#
# Full path: configure → start → decompose (agent mocked) → lint (Starlark)
#            → fleet.load (Starlark)

test_kind: flow
app: ../app.yaml
initial_state: configure
initial_world:
  base_branch: main
  main_worktree_path: "."

starlark_inspect_cassette: ../cassettes/decompose_happy.inspect.yaml

host_handlers:
  host.agent.task:
    by_call:
      decomposer:
        data:
          submitted:
            briefs:
              - id: health-model
                brief: "Add HealthStatus struct in internal/health/ with Status and Version fields. Gate: go test ./internal/health/..."
                gate_command: "go test ./internal/health/..."
                deps: []
              - id: health-handler
                brief: "Add GET /health handler serialising HealthStatus to JSON. Gate: go test ./internal/handler/..."
                gate_command: "go test ./internal/handler/..."
                deps: [health-model]
              - id: health-route
                brief: "Register the health handler in the router and smoke-test /health. Gate: go test ./internal/router/..."
                gate_command: "go test ./internal/router/..."
                deps: [health-handler]

turns:
  - intent:
      name: start
      slots:
        epic_path: "stories/deliver/testdata/fixture_epic.md"
    expect_state: fleet.load
    expect_world:
      epic_path:          "stories/deliver/testdata/fixture_epic.md"
      decomposition_path: ".artifacts/deliver/decomposition.yaml"

expect_no_errors: true
