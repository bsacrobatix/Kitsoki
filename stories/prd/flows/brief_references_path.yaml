# brief_references_path — brief → references → drafting → @exit:done.
#
# Covers the two new confirm-gated rooms with a flow that asserts the
# references CONTENT. It starts at `brief` (idea + transcript seeded), so
# the ONLY on_enter decide in the run is the references room's researcher
# — the shared host.oracle.decide stub can therefore return the reference
# list shape without colliding with clarifying's questions shape (which is
# covered by happy_path / multi_round). host.artifacts_dir is stubbed; the
# stub returns one path for every write, so we assert the DISPATCH (the
# thread arg) rather than per-thread paths.

test_kind: flow
app: ../app.yaml
initial_state: brief
initial_world:
  idea:              "A CLI for X that helps developers do Y."
  workdir:           "."
  output_path:       ".artifacts/prd.md"
  judge_mode:        "human"
  clarification_log: "── Round 1 ──\nQuestions: {\"questions\":[{\"id\":\"q1\",\"question\":\"Who is the primary user?\"}]}\nAnswers: platform developers\n\n"

host_handlers:
  # The references room's researcher — the only decide in this run.
  host.oracle.decide:
    data:
      ok: true
      submitted:
        items:
          - { path: "docs/architecture/auth.md", sections: "Token model", rationale: "the PRD must honour the existing token lifecycle" }
          - { path: "docs/api/rate-limits.md",   sections: "§3.2",        rationale: "rate-limit contract the feature lives under" }
  host.artifacts_dir:
    data: { ok: true, path: ".artifacts/out.md", message_id: "out#1" }
  host.oracle.task:
    data:
      ok: true
      submitted:
        title:               "PRD: Example CLI"
        summary_markdown:    "## PRD: Example CLI\n\nA sufficiently long summary body to satisfy the schema minimum length for the prd_artifact summary_markdown field, covering problem, users, goals, and metrics."
        file_path:           ".artifacts/prd.md"
        confidence:          0.84
        needs_clarification: false
        follow_up_questions: []

turns:
  # Confirm the brief → references. Entering references runs the
  # researcher (stubbed) → the reference list is bound into world and
  # persisted via host.artifacts_dir (thread prd_references).
  - intent: { name: confirm, slots: {} }
    expect_state: references
    expect_host_calls:
      - handler: host.artifacts_dir
        args: { thread: "prd_references" }
    expect_world:
      references_path: ".artifacts/out.md"
      references:
        items:
          - { path: "docs/architecture/auth.md", sections: "Token model", rationale: "the PRD must honour the existing token lifecycle" }
          - { path: "docs/api/rate-limits.md",   sections: "§3.2",        rationale: "rate-limit contract the feature lives under" }

  # Confirm references → drafting; the author writes the PRD (stubbed).
  - intent: { name: confirm, slots: {} }
    expect_state: drafting
    expect_world:
      prd_artifact:
        title:               "PRD: Example CLI"
        summary_markdown:    "## PRD: Example CLI\n\nA sufficiently long summary body to satisfy the schema minimum length for the prd_artifact summary_markdown field, covering problem, users, goals, and metrics."
        file_path:           ".artifacts/prd.md"
        confidence:          0.84
        needs_clarification: false
        follow_up_questions: []

  # Accept → @exit:done.
  - intent: { name: accept, slots: {} }
    expect_state: __exit__done
    expect_world:
      status: "done"

expect_terminal: true
expect_no_errors: true
