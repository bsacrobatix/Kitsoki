# publish_to_durable — accept PUBLISHES the PRD out of the per-PRD workspace
# into its durable home (Gap #4).
#
# A focused fixture for the publish-on-accept half of the workspace work:
# it seeds drafting directly (a workspace already minted at the search gate)
# so the ONLY moving part is the accept arc's host.starlark.run(prd_publish.star)
# call. The real script copies 004-prd.md to <publish_durable_path>/<slug>.md
# and returns {"prd_file": ...}. In this automated fixture the durable home is
# under /tmp so flow tests never write tracked or review-artifact docs.
#
# Intent-only (no LLM): the author task is stubbed; publish runs the real
# Starlark helper against an inspect cassette. Companion to slug_collision.yaml
# (the uniquify half).

test_kind: flow
app: ../app.yaml
initial_state: drafting
initial_world:
  idea:                 "A CLI for X that helps developers do Y."
  workdir:              "."
  judge_mode:           "human"
  publish_durable_path: "/tmp/kitsoki-prd-fixtures"
  # The workspace minted at the search gate (this flow enters at drafting).
  prd_slug:             "example-cli"
  prd_workspace:        ".artifacts/prd/example-cli"

starlark_inspect_cassette: ../cassettes/publish_example_cli_workspace.inspect.yaml

host_handlers:
  host.agent.task:
    data:
      ok: true
      submitted:
        title:               "PRD: Example CLI"
        summary_markdown:    "## PRD: Example CLI\n\nA sufficiently long summary body to satisfy the schema minimum length for the prd_artifact summary_markdown field, covering problem, users, goals, and metrics."
        file_path:           ".artifacts/prd/example-cli/004-prd.md"
        confidence:          0.84
        needs_clarification: false
        follow_up_questions: []
turns:
  # accept → publish moves the draft to the durable home and binds prd_file,
  # then @exit:done.
  - intent: { name: accept, slots: {} }
    expect_state: __exit__done
    expect_world:
      status:   "done"
      prd_file: "/tmp/kitsoki-prd-fixtures/example-cli.md"
    expect_host_calls:
      - handler: host.starlark.run
        args: { call: "publish" }

expect_terminal: true
expect_no_errors: true
