# references — curate the doc reference list, then confirm.
#
# on_enter runs the `researcher` (host.oracle.decide) which reads the idea
# and the clarification transcript and searches the working dir's
# DOCUMENTATION — not source code; this is a PRD — for prior art,
# constraints, and standards the PRD must honour, returning
# { items: [{ path, sections, rationale }] }. An empty list is valid.
#
# The list is also persisted to {{ workdir }}/.artifacts/prd_references.md
# (host.artifacts_dir, mode: replace for on_enter idempotency, same as the
# brief room). The bound world.references is handed to the author in
# drafting so the PRD is written against the cited sections.
#
# Two on_enter host calls, both share host.oracle.decide with clarifying's
# analyst — in flow fixtures the two decide invocations are disambiguated
# by the per-invoke stub id (the by-id host-stub mechanism); do NOT reach
# for a different oracle verb to give the stub a distinct name.
#
# Two re-run actions, both self-transitions that re-fire on_enter
# (budget-capped by references_budget): `refine` revises the CURRENT list
# in place (references_revise=true → the researcher builds on
# current_references per the operator's add/drop/re-scope instruction),
# while `regenerate` searches fresh (references_revise=false). A `choice:`
# selector is fine — this is a checkpoint room, not a free-text loop.

states:

  references:
    description: "Curate the existing docs the PRD should build on; confirm to write the PRD."
    view:
      - banner:
          text:     "REFERENCES"
          subtitle: "Existing docs the PRD must build on — sections + why"
          color:    "#F59E0B"   # amber — gathering
      - prose: "cycle {{ world.cycle }} · references round {{ world.references_cycle }} · judge {{ world.judge_mode }}"
      # Saved-file path on its own prominent line — open/edit on disk directly.
      - prose: 'Reference list saved to  {{ world.references_path|default:"(writing .artifacts/prd_references.md…)" }}'
      - kv:
          pairs:
            Idea:     '{{ world.idea|default:"(none)"|truncatechars:80 }}'
            Upstream: '{{ world.upstream_paths|default:"(none)" }}'
      - heading: "References found"
      # forloop.Counter numbers the list; §sections only when present; the
      # rationale wraps. {% empty %} covers the legitimate "nothing to cite"
      # result so the list never renders blank.
      - code: |
          {% for r in world.references.items %}{{ forloop.Counter }}. {{ r.path }}{% if r.sections %} §{{ r.sections }}{% endif %}
             why: {{ r.rationale|default:"(no rationale given)"|wordwrap:110 }}
          {% empty %}(none found — refine to add specific docs, regenerate to search again, or restart from clarifying to sharpen the inputs){% endfor %}
      - prose: "These are the existing documents the PRD will build on. **confirm** to write the PRD, **refine** to adjust this list (add / drop / re-scope), **regenerate** to search fresh, or **restart from clarifying** to change the inputs."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "confirm"
              hint:   "references are right — write the PRD"
              intent: confirm
            - label:  "refine"
              hint:   "adjust THIS list — add a doc, drop one, re-scope a section (say what to change)"
              intent: refine
              param:
                slot:        feedback
                type:        string
                placeholder: "e.g. drop the rate-limit doc; also cite docs/auth.md §Tokens"
                required:    true
            - label:  "regenerate"
              hint:   "discard the list and search the docs fresh (optionally steer)"
              intent: regenerate
              param:
                slot:        feedback
                type:        string
                placeholder: "what to look for"
                required:    false
            - label:  "clarify"
              hint:   "answer more / refine the questions — KEEPS your answers so far"
              intent: clarify
            - label:  "restart from clarifying"
              hint:   "discard the clarification record and re-question from scratch"
              intent: restart_from
              slots:  { stage: clarifying }
            - label:  "quit"
              hint:   "abandon PRD authoring"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [idea, upstream_paths, workdir, references, references_path, references_cycle, references_budget, references_revise, clarification_log, refine_feedback, cycle, judge_mode]
    on_enter:
      # Curate the reference list. working_dir pins the researcher's
      # Read/Grep/Glob to the operator's tree; its tool calls land as
      # oracle.tool_call trace events. refine_feedback carries the
      # operator's instruction; revise distinguishes a `refine` (revise the
      # current list in place — current_references is the starting point)
      # from a fresh `regenerate` search (current_references is reference
      # only). See prompts/references.md.
      - invoke: host.oracle.decide
        id: references_research
        with:
          agent: researcher
          prompt_path: prompts/references.md
          schema: schemas/references.json
          working_dir: "{{ world.workdir }}"
          args:
            idea:                "{{ world.idea }}"
            clarification_log:   "{{ world.clarification_log }}"
            upstream_paths:      "{{ world.upstream_paths }}"
            feedback:            "{{ world.refine_feedback }}"
            revise:              "{{ world.references_revise }}"
            current_references:  "{{ world.references }}"
        bind:
          references: submitted
        on_error: idle

      # Persist the curated list. A BARE `{{ world.references }}` resolves
      # to the typed object, which host.artifacts_dir pretty-prints as JSON
      # (the documented map/slice coercion) — a faithful, readable record.
      # mode: replace keeps on_enter idempotent across re-fires.
      - invoke: host.artifacts_dir
        with:
          artifacts_root: "{{ world.workdir }}/.artifacts"
          thread:         "prd_references"
          mode:           "replace"
          title:          "PRD References"
          body:           "{{ world.references }}"
        bind:
          references_path: "path"
    on:
      # Confirmed — write the PRD. Clear refine_feedback + the revise flag so
      # a reference instruction doesn't bleed into the author as draft
      # steering, and a later re-entry starts clean.
      confirm:
        - target: drafting
          effects:
            - set:
                refine_feedback:   ""
                references_revise: false

      # Refine the CURRENT list in place: keep what applies, apply the
      # operator's add/drop/re-scope instruction. revise=true tells the
      # researcher (prompts/references.md) to build on current_references
      # rather than search fresh. Budget-capped like regenerate.
      refine:
        - when: "world.references_cycle >= world.references_budget"
          target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "references_budget_exhausted"
                status:         "abandoned"
        - target: references
          effects:
            - set:
                refine_feedback:   "{{ slots.feedback }}"
                references_revise: true
                references_cycle:  "{{ world.references_cycle + 1 }}"
                cycle:             "{{ world.cycle + 1 }}"

      # Re-search the docs FRESH (revise=false). Budget gate bails instead of
      # looping forever; otherwise self-transition re-fires on_enter.
      regenerate:
        - when: "world.references_cycle >= world.references_budget"
          target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "references_budget_exhausted"
                status:         "abandoned"
        - target: references
          effects:
            - set:
                refine_feedback:   "{{ slots.feedback ?? '' }}"
                references_revise: false
                references_cycle:  "{{ world.references_cycle + 1 }}"
                cycle:             "{{ world.cycle + 1 }}"

      # Extend, not redo: go back to clarifying for another round while
      # PRESERVING clarification_log; only this round's working answer state
      # is cleared. The non-destructive counterpart to `restart_from
      # clarifying` below (same shape as the drafting room's `clarify`).
      clarify:
        - target: clarifying
          effects:
            - set:
                refine_feedback:       ""
                clarification_answers: ""
                answered_count:        0
                answered_ids:          ""

      # Inputs are wrong — go re-question (discards the clarification record).
      restart_from:
        - when: "slots.stage == 'idle'"
          target: idle
          effects:
            - set:
                clarification_log:     ""
                clarification_answers: ""
                answered_count:        0
                answered_ids:          ""
                refine_feedback:       ""
                clarifying_cycle:      0
                references_cycle:      0
                drafting_cycle:        0
                cycle:                 0
        - target: clarifying
          effects:
            - set:
                clarification_log:     ""
                clarification_answers: ""
                answered_count:        0
                answered_ids:          ""
                refine_feedback:       ""
                clarifying_cycle:      0
                references_cycle:      0
                cycle:                 0

      quit:
        - target: "@exit:abandoned"
          effects:
            - set:
                abandon_reason: "abandoned_at_references"
                status:         "abandoned"
      look:
        - target: .
