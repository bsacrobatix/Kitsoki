app:
  id: model-task-engineering
  version: 0.1.0
  title: "Model task engineering"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.run
  - host.starlark.run

world:
  bench_manifest: { type: string, default: "stories/deliver/agent-bench/decompose_glm.yaml" }
  case_id:        { type: string, default: "" }
  trace_path:     { type: string, default: "" }
  output_dir:     { type: string, default: ".artifacts/model-task-engineering" }

  report_json:     { type: string, default: "" }
  report_markdown: { type: string, default: "" }
  report_deck:     { type: string, default: "" }
  score_status:    { type: string, default: "" }
  score_summary:   { type: string, default: "" }
  score_error:     { type: string, default: "" }
  score_stdout:    { type: string, default: "" }

  campaign_study: { type: string, default: "tools/arena/specs/bugfix-task-optimization-v1.yaml" }
  campaign_output_dir: { type: string, default: ".artifacts/task-optimization" }
  campaign_repeat_phase: { type: string, default: "screening" }
  campaign_root: { type: string, default: "" }
  campaign_plan: { type: string, default: "" }
  campaign_markdown: { type: string, default: "" }
  campaign_deck: { type: string, default: "" }
  campaign_arm_receipt: { type: string, default: "" }
  campaign_status: { type: string, default: "" }
  campaign_error: { type: string, default: "" }

intents:
  score:
    description: "Score the configured trace and produce review artifacts."
    examples: ["score", "run score", "evaluate this trace"]
    priority: 90
    slots:
      bench_manifest: { type: string, required: false }
      case_id:        { type: string, required: false }
      trace_path:     { type: string, required: false }
      output_dir:     { type: string, required: false }
  rescore:
    description: "Clear current score artifacts and run the score again."
    examples: ["rescore", "score again"]
    priority: 80
  campaign_review:
    description: "Materialize an offline Arena campaign plan and Slidey review deck."
    examples: ["review campaign", "plan campaign", "campaign review"]
    priority: 85
    slots:
      study: { type: string, required: false }
      output_dir: { type: string, required: false }
      repeat_phase: { type: string, required: false }
  campaign_arm:
    description: "Record explicit no-dispatch campaign arming intent after review."
    examples: ["arm campaign", "authorize campaign arm"]
    priority: 84
    slots:
      study: { type: string, required: false }
      output_dir: { type: string, required: false }
      repeat_phase: { type: string, required: false }
  done:
    description: "Accept the scored evidence and finish."
    examples: ["done", "finish"]
    priority: 60
  quit:
    description: "Abandon the model task engineering run."
    examples: ["quit", "abort"]
    priority: 50
  look:
    description: "Re-render the current view."
    examples: ["look", "refresh", "?"]
    priority: 10

exits:
  done:
    description: "The trace was scored and artifacts were produced."
    requires: [report_json, report_markdown, report_deck]
  campaign_done:
    description: "The offline campaign plan and review deck were produced."
    requires: [campaign_plan, campaign_markdown, campaign_deck]
  abandoned:
    description: "The operator stopped before accepting the scored evidence."

root: configure

include:
  - rooms/*.yaml
