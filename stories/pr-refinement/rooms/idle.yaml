# idle — standalone-only entry. When a parent story imports
# pr-refinement with `entry: open_pr`, this room is bypassed entirely
# (the importer drills straight into `open_pr`).
#
# For standalone runs (`kitsoki run stories/pr-refinement/app.yaml`)
# and for flow fixtures, the operator types `open` (or `start`) to
# fire `open_pr.on_enter` which actually opens the PR via the iface
# bindings. Without this room, a flow fixture's initial-state seed
# bypasses on_enter entirely (`seedInitialState` writes a
# TransitionApplied event but does not re-run the target state's
# on_enter chain), so the pr_id / pr_url bindings would never fire.

states:

  idle:
    description: "pr-refinement parked. Waiting for `open` to start."
    view: |
      pr-refinement — idle.

      Ticket:         {{ world.ticket_id }} {{ world.ticket_title }}
      Workspace:      {{ world.workdir }}
      Feature branch: {{ world.feature_branch }}
      Judge mode:     {{ world.judge_mode }}

      Actions: open, quit, look.
    relevant_world: [ticket_id, ticket_title, workdir, feature_branch, judge_mode]
    on:
      open:
        - target: open_pr
      proceed:
        - target: open_pr
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
