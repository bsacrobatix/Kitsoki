# review_task — phase 1 of the implementation pipeline.
#
# Fetches the task ticket via iface.ticket.get and the LLM produces a
# `task_summary_artifact` (schemas/task_summary_artifact.json): a
# concise normalisation of the task into "what to build" + acceptance
# criteria + scope. The checkpoint gates whether the operator agrees
# with the understanding before any code is written.
#
# Flattened away from `extends: "base"` (choice-widget proposal §4.5 /
# §8): a `choice:` element cannot live inside `blocks:`. The base.pongo
# status line is inlined as the leading prose element.

states:

  # Surfaced failure state for review_task_executing's iface.ticket.get call
  # (see the on_error comment there). `start` re-enters review_task_executing
  # to retry — e.g. after an operator/parent story fixes ticket_id or provisions
  # the missing ticket record; `quit` abandons like every other room here.
  review_task_ticket_error:
    description: "Could not fetch the ticket — the pipeline cannot proceed without it."
    view:
      - banner:
          text:     "⚠ TICKET FETCH FAILED"
          subtitle: "Fix the ticket source, then retry"
          color:    "#DC2626"
      - heading: "Ticket fetch failed"
      - prose: "{{ world.last_error|default:'(no error detail)' }}"
      - kv:
          pairs:
            Ticket: '{{ world.ticket_id|default:"(none)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "start", intent: start, hint: "retry fetching the ticket" }
            - { label: "quit",  intent: quit,  hint: "abandon the pipeline" }
            - { label: "look",  intent: look,  hint: "re-render" }
    relevant_world: [ticket_id, last_error]
    on:
      start:
        - target: review_task_executing
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  review_task_executing:
    description: "Reviewing the task and drafting a task-summary artifact."
    view:
      - banner:
          text:     "🔎 REVIEWING TASK"
          subtitle: "Agent is reading the ticket and preparing a short checkpoint"
          color:    "#0EA5E9"
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.workdir|default:"(no workspace)" }}  ·  {{ world.feature_branch|default:"(no branch)" }}  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - kv:
          pairs:
            Ticket:  "{{ world.ticket_id }} — {{ world.ticket_title }}"
            Summary: '{{ world.task_summary_artifact.summary_title|default:"agent working..." }}'
            Status:  "running"
      - template: |
          **Full output is kept out of the checkpoint.** The artifact link appears as soon as the agent returns.
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "proceed", intent: proceed, hint: "deliver the task summary to the checkpoint", when: "world.judge_mode != 'human'" }
            - label:  "restart_from"
              intent: restart_from
              hint:   "bounce back to an earlier stage"
              param:
                slot:        stage
                type:        string
                placeholder: "e.g. review_task"
            - { label: "quit", intent: quit, hint: "abandon the pipeline" }
            - { label: "look", intent: look, hint: "re-render" }
    relevant_world: [ticket_id, ticket_title, ticket_body, task_summary_artifact, cycle]
    on_enter:
      # Fetch the ticket. The default host.local_files.ticket binding
      # is the prefix-fallback handler; cyber-repo's parent rebinds
      # iface.ticket → host.jira. We bind the body so the LLM has
      # something to chew on.
      - invoke: iface.ticket.get
        with:
          id:   "{{ world.ticket_id }}"
          repo: "{{ world.ticket_repo }}"
          root: "{{ world.tickets_root }}"
        bind:
          ticket_body:  body
          ticket_title: title
          ticket_url:   url
        # Genuine failure (empty/unknown ticket_id, missing record) — NOT the
        # idempotent-reentry guard pattern idle.yaml's provisioning uses.
        # Routing to idle here used to silently swallow it: idle's view has no
        # ticket-fetch-failure affordance, so a headless driver bounced
        # idle → review_task_executing → idle forever with no visible reason
        # (G3 — errors must surface). review_task_ticket_error shows
        # world.last_error (the engine-set failing-call message) and gives the
        # operator/driver an explicit retry/quit choice instead.
        on_error: review_task_ticket_error
      # Produce the structured task summary.
      # once: skip the regenerate when task_summary_artifact is already
      # bound (reload / self-re-entry safe). Every arc that re-enters
      # review_task_executing for a FRESH run clears the bind below.
      - invoke: host.agent.decide
        once: true
        with:
          prompt: prompts/review_task_executing.md
          schema: schemas/task_summary_artifact.json
          args:
            ticket_id:        "{{ world.ticket_id }}"
            ticket_title:     "{{ world.ticket_title }}"
            ticket_body:      "{{ world.ticket_body }}"
            workdir:          "{{ world.workdir }}"
            refine_feedback:  "{{ world.refine_feedback }}"
            cycle:            "{{ world.cycle }}"
        bind:
          task_summary_artifact: submitted
        on_error: idle
      - invoke: host.artifacts_dir
        id: task_summary_artifact_file
        with:
          thread: "implementation_{{ world.ticket_id }}_01_task_summary.md"
          title:  "Task summary: {{ world.ticket_id }}"
          body:   "{{ world.task_summary_artifact.summary_markdown }}"
          mode:   replace
        bind:
          task_summary_artifact_path: path
        on_error: idle
      - invoke: host.artifacts_dir
        id: implementation_progress_file
        with:
          thread: "implementation_{{ world.ticket_id }}_progress.yaml"
          body: |
            ticket_id: "{{ world.ticket_id }}"
            phase: review_task
            state: ready_for_operator
            cycle: {{ world.cycle }}
            artifacts:
              task_summary: "{{ world.task_summary_artifact_path }}"
              code: "{{ world.code_artifact_path }}"
              test: "{{ world.test_artifact_path }}"
              review: "{{ world.review_artifact_path }}"
            next_action: accept_or_refine
          mode: replace
        bind:
          implementation_progress_artifact_path: path
        on_error: idle
      - when: "world.judge_mode == 'human' && world.task_summary_artifact_path != ''"
        emit_intent: proceed
    on:
      proceed:
        - target: review_task_awaiting_reply
      restart_from:
        - target: review_task_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback }}"
                cycle: 0
                # Clear the once: cache so the task summary regenerates.
                task_summary_artifact: {}
                task_summary_artifact_path: ""
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .

  # Canonical §6 checkpoint shape.
  review_task_awaiting_reply:
    description: "Task summary posted; awaiting verdict."
    view:
      - banner:
          text:     "✅ TASK SUMMARY READY"
          subtitle: "Review the short summary; open the artifact for details"
          color:    "#16A34A"
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.workdir|default:"(no workspace)" }}  ·  {{ world.feature_branch|default:"(no branch)" }}  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - kv:
          pairs:
            Ticket:   "{{ world.ticket_id }} — {{ world.ticket_title }}"
            Summary:  '{{ world.task_summary_artifact.summary_title|default:"(missing title)" }}'
            Artifact: '{{ world.task_summary_artifact_path|default:"(not written)" }}'
            Progress: '{{ world.implementation_progress_artifact_path|default:"(not written)" }}'
      - when: "(world.llm_verdict.verdict ?? '') != ''"
        kv:
          pairs:
            Verdict:    '{{ world.llm_verdict.verdict }}'
            Confidence: '{{ world.llm_verdict.confidence|floatformat:2 }}'
            Reason:     '{{ world.llm_verdict.reason }}'
      - template: |
          **{{ world.task_summary_artifact.summary_title|default:"Task summary" }}**

          {{ world.task_summary_artifact.scope|default:"Review the linked artifact before accepting." }}
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "accept", intent: accept, hint: "advance to write_code" }
            - label:  "refine"
              intent: refine
              hint:   "re-draft the task summary with feedback"
              param:
                slot:        feedback
                type:        string
                placeholder: "what to change"
            - label:  "restart_from"
              intent: restart_from
              hint:   "bounce back to an earlier stage"
              param:
                slot:        stage
                type:        string
                placeholder: "e.g. review_task"
            - { label: "quit", intent: quit, hint: "abandon the pipeline" }
            - { label: "look", intent: look, hint: "re-render" }
    relevant_world: [judge_mode, ticket_id, task_summary_artifact, llm_verdict, cycle]
    on_enter:
      - invoke: iface.transport.post
        with:
          thread:    "{{ world.thread }}"
          title:     "Task summary: {{ world.ticket_id }}"
          body: |
            Task summary ready: {{ world.task_summary_artifact.summary_title }}

            Full artifact: {{ world.task_summary_artifact_path }}
            Progress: {{ world.implementation_progress_artifact_path }}
          phase_id:  "review_task_{{ world.ticket_id }}_{{ world.cycle }}"
      - invoke: host.inbox.add
        with:
          kind:    checkpoint
          title:   "Task summary: {{ world.ticket_id }}"
          thread:  "{{ world.thread }}"
          state:   review_task_awaiting_reply
          body:    "Task summary ready: {{ world.task_summary_artifact.summary_title }}\n\nFull artifact: {{ world.task_summary_artifact_path }}\nProgress: {{ world.implementation_progress_artifact_path }}"
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        with:
          prompt: prompts/judge_review_task.md
          schema: schemas/judge_verdict.json
          args:
            ticket_id:       "{{ world.ticket_id }}"
            artifact_title:  "{{ world.task_summary_artifact.summary_title }}"
            artifact_body:   "{{ world.task_summary_artifact.summary_markdown }}"
        bind:
          llm_verdict: submitted
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        - target: write_code_executing
          effects:
            - set:
                last_reply_author: "{{ slots.author ?? 'human' }}"
                refine_feedback:   ""
                cycle:             0
                # Advancing to write_code_executing for a fresh run — clear
                # its once: cache so the code artifact regenerates.
                code_artifact:     {}
                code_artifact_path: ""
      refine:
        - target: review_task_executing
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                cycle:           "{{ world.cycle + 1 }}"
                # Clear the once: cache so the task summary regenerates.
                task_summary_artifact: {}
                task_summary_artifact_path: ""
      restart_from:
        - target: review_task_executing
          effects:
            - set:
                restart_from_stage: "{{ slots.stage ?? 'review_task' }}"
                cycle:              0
                # Clear the once: cache so the task summary regenerates.
                task_summary_artifact: {}
                task_summary_artifact_path: ""
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
