# idle — entry room. The `start` intent boots the pipeline; `quit`
# exits via @exit:abandoned. Threads straight into review_task on
# `start`.
#
# Flattened away from `extends: "base"` because the choice widget
# cannot live inside `blocks:` (choice-widget proposal §4.5 / §8).
# The base.pongo status line is inlined as the first prose element so
# the standalone render still carries the ticket / workspace / branch
# context.

states:

  idle:
    description: "Implementation pipeline parked. Waiting for start."
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.workdir|default:"(no workspace)" }}  ·  {{ world.feature_branch|default:"(no branch)" }}  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "Implementation pipeline parked"
      - kv:
          pairs:
            Ticket:    '{{ world.ticket_id|default:"(none)" }} {{ world.ticket_title }}'
            Workspace: '{{ world.workspace_id|default:"(none)" }}'
            Judge:     "{{ world.judge_mode }}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - { label: "start", intent: start, hint: "boot the pipeline (enters review_task)" }
            - { label: "quit",  intent: quit,  hint: "abandon the pipeline" }
            - { label: "look",  intent: look,  hint: "re-render" }
    relevant_world: [ticket_id, ticket_title, judge_mode, workspace_id]
    # Provision the managed workspace on entry — mirrors bugfix/rooms/idle.yaml.
    # The impl pipeline writes code, commits, and opens a PR against
    # world.workdir; entry paths that don't pre-seed it (dev-story's
    # `drive` / `go_implementation` / design_done `implement`) used to
    # land here with workdir="" and run the whole pipeline against the
    # repo root with no branch — the agent saw an empty workdir and got
    # "confused". Flow fixtures seed initial_state=idle (which bypasses
    # on_enter) so they keep observing the parked state; live entry now
    # gets a real workspace. Guarded by impl_provision_attempted so an
    # on_error bounce or re-entry doesn't double-provision.
    on_enter:
      # Step 0: derive a default reporting thread from ticket_id when the caller
      # didn't supply one — mirrors stories/bugfix/rooms/idle.yaml's Step 0. A
      # headless drive (goal-seeker/punch-list) hands over only ticket_id (+
      # ticket_title/tickets_root); every checkpoint room's `iface.transport.post`
      # (host.append_to_file behind it) HARD-FAILS on an empty thread ("thread
      # argument is required") with no on_error, which otherwise strands the
      # pipeline at the very first checkpoint (review_task_awaiting_reply).
      # `issues/tasks/<ticket_id>.md` mirrors bugfix's `issues/bugs/<ticket_id>.md`
      # convention; host.append_to_file self-bootstraps the file on first write.
      - when: "world.ticket_id != '' && world.thread == '' && !world.impl_provision_attempted"
        set:
          thread: "issues/tasks/{{ world.ticket_id }}.md"
      # Step 1: derive workspace identity from ticket_id (only when the
      # parent hasn't already projected a workdir in via world_in:).
      - when: "world.ticket_id != '' && world.workdir == '' && !world.impl_provision_attempted"
        set:
          # Append world.session_id so two concurrent sessions on the SAME
          # ticket resolve to DISTINCT workdir/branch/workspace ids — otherwise
          # they share one checkout and a destructive git op in one clobbers
          # the other's WIP (bug9glm2). Mirrors stories/bugfix/rooms/idle.yaml.
          workspace_id:   "impl-{{ world.ticket_id }}-{{ world.session_id }}"
          feature_branch: "feature/{{ world.ticket_id }}-{{ world.session_id }}"
          workdir:        ".capsules/workspaces/impl-{{ world.ticket_id }}-{{ world.session_id }}"
      # Step 2: create the clone-backed capsule workspace on disk. `id:` pins
      # the workspace identity so a later workspace.sync (keyed on the id)
      # finds the directory that the scripted provider made.
      - when: "world.ticket_id != '' && world.feature_branch != '' && world.workdir != '' && !world.impl_provision_attempted"
        invoke: iface.workspace.create
        with:
          id:         "{{ world.workspace_id }}"
          definition: "development"
          name:       "{{ world.feature_branch }}"
          base:       "{{ world.base_branch }}"
        bind:
          workdir:        path
          feature_branch: branch
        on_error: idle
      # Step 3: auto-start once provisioned. Mirrors stories/bugfix/rooms/
      # idle.yaml's own autostart (its Step 3) — a headless dispatcher
      # (goal-seeker/punch-list) that seeds ticket_id (via initial_world OR
      # the work_ticket NL extraction below) has already decided to start;
      # forcing a SECOND explicit `start` intent out of a driver whose only
      # reliable channel is one prompt turn is exactly the gap that stranded
      # a live drive at idle with nothing landed. emit_intent is queued and
      # dispatched after this effect chain completes, so the flag-set step
      # below still runs first.
      - when: "world.ticket_id != '' && !world.impl_provision_attempted"
        emit_intent: start
      # Step 4: pin "we provisioned once" so any re-entry skips the chain.
      - when: "world.ticket_id != '' && !world.impl_provision_attempted"
        set:
          impl_provision_attempted: true
    on:
      start:
        - target: review_task_executing
      # NL ticket-id handoff — see the work_ticket intent doc in ../app.yaml.
      # Re-targets idle EXPLICITLY (not `.`) so on_enter re-fires with
      # ticket_id now set, falling into the same provisioning + autostart
      # chain above that the structured-initial_world path already uses.
      work_ticket:
        - target: idle
          effects:
            - set:
                ticket_id:    "{{ slots.ticket_id }}"
                ticket_title: "{{ slots.ticket_title ?? world.ticket_title }}"
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
