# checking_render_failure — deterministic classifier for host.slidey.render
# failures. Only deck-shaped validation/render errors enter the repair-agent
# loop; external Node/slidey/toolchain failures go straight to reviewing so the
# operator sees the real problem without spending an LLM turn.

states:

  checking_render_failure:
    description: "Classifying the render failure before deciding whether auto-repair is safe."
    relevant_world: [deck, last_error, render_error_kind, render_error_repairable]
    view:
      - heading: "Slidey deck editor · checking render failure"
      - kv:
          pairs:
            Deck: '{{ world.deck.spec_path|default:"(pending)" }}'
            Error: '{{ world.last_error|default:"(none)" }}'
      - prose: "Checking whether the render error is a deck-spec problem or an external renderer/toolchain problem."
    on_enter:
      - emit_intent: render_error_classified
    on:
      render_error_classified:
        - when: "hasPrefix(lower(world.last_error), 'host.slidey.render: validation exec:') || hasPrefix(lower(world.last_error), 'host.slidey.render: render exec:') || len(split(lower(world.last_error), 'slidey not found')) > 1 || len(split(lower(world.last_error), 'node_modules/')) > 1 || len(split(lower(world.last_error), 'referenceerror:')) > 1 || len(split(lower(world.last_error), 'require is not defined')) > 1 || len(split(lower(world.last_error), 'cannot find module')) > 1 || len(split(lower(world.last_error), 'error [err_require_esm]')) > 1 || len(split(lower(world.last_error), 'node.js v')) > 1"
          target: reviewing
          effects:
            - set:
                render_error_repairable: false
                render_error_kind: toolchain
                render_error_summary: "renderer/toolchain failure; skip deck auto-repair"
        - when: "hasPrefix(lower(world.last_error), 'host.slidey.render: spec validation failed:')"
          target: fixing_render
          effects:
            - set:
                render_error_repairable: true
                render_error_kind: deck_validation
                render_error_summary: "deck validation failed; auto-repair is allowed"
        - when: "hasPrefix(lower(world.last_error), 'host.slidey.render: render exited')"
          target: fixing_render
          effects:
            - set:
                render_error_repairable: true
                render_error_kind: deck_render
                render_error_summary: "deck render failed; auto-repair is allowed"
        - target: reviewing
          effects:
            - set:
                render_error_repairable: false
                render_error_kind: unknown
                render_error_summary: "render failure is not known to be deck-repairable"
      look:
        - target: .
