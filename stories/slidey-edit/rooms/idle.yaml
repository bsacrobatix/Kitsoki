# idle — choose whether to create a fresh deck or edit an existing deck spec.
#
# The baked world points at the pre-rendered explainer deck so `kitsoki tour`/web
# can still drive straight in. `start` creates a fresh draft. `edit_existing`
# resolves the operator-supplied spec path in a deterministic loading room before
# rendering, so the render state sees the concrete deck path.

states:

  idle:
    description: "Slidey deck editor. Start a new deck or edit an existing deck, then render and review."
    relevant_world: [deck, source_deck, cycle]
    view:
      - heading: "Slidey deck editor"
      - prose: "Nothing's been rendered yet. Start a new deck from scratch, or point at an existing slidey JSON spec to edit. Either way you'll render it to a static HTML deck, then annotate the rendered frame and refine the exact scene you pointed at."
      - kv:
          pairs:
            Sample deck:    '{{ world.deck.spec_path|default:"(none)" }}'
            Existing deck:  '{{ world.source_deck.spec_path|default:"(not selected)" }}'
            Sample summary: '{{ world.deck.summary|default:"(pending)" }}'
      - heading: "Actions"
      - list:
          items:
            - label: "start"
              hint:  "draft a new deck and advance to render"
            - label: "edit_existing spec_path=…"
              hint:  "edit an existing slidey JSON spec"
            - label: "quit"
              hint:  "abandon the editor"
            - label: "look"
    on:
      start:
        # The web compose box dispatches typed text as `start` with the text in
        # `feedback`. If that text is an "edit <deck>" instruction, divert to the
        # edit-existing path (resolve_deck strips the verb + resolves the name).
        # An "edit <deck>" instruction selects an EXISTING deck. It works in the
        # web viewer, so it must just work when loaded: render the existing spec
        # IN PLACE (its own dir is the workspace, so sibling assets resolve) and
        # go straight to the spatial-oracle review. NO authoring agent runs —
        # there is nothing to author until the operator gives feedback.
        - when: "hasPrefix(lower(trim(slots.feedback ?? '')), 'edit') || hasPrefix(lower(trim(slots.feedback ?? '')), 'revise ') || hasPrefix(lower(trim(slots.feedback ?? '')), 'open ')"
          target: preparing_workspace
          effects:
            - set:
                pending_deck_spec_path: "{{ slots.feedback }}"
                pending_deck_summary: ""
                draft_feedback: ""   # the verb-laden text was a deck selector, not edit direction
                render_retries: 0
                render_error_repairable: false
                render_error_kind: ""
                render_error_summary: ""
        # An existing deck is already loaded (operator ran edit_existing / an
        # "edit <deck>" instruction earlier). Plain `start` should render that
        # existing spec directly so review/feedback can begin — NOT re-author it
        # from scratch through the drafter. Promote source_deck → deck and skip
        # drafting straight to rendering.
        - when: "(world.source_deck.spec_path ?? '') != ''"
          target: preparing_workspace
          effects:
            - set:
                pending_deck_spec_path: "{{ world.source_deck.spec_path }}"
                pending_deck_summary: "{{ world.source_deck.summary }}"
                draft_feedback: ""
                render_retries: 0   # fresh render — reset the auto-fix budget
                render_error_repairable: false
                render_error_kind: ""
                render_error_summary: ""
        - target: preparing_workspace
          effects:
            - set:
                draft_feedback: "{{ slots.feedback ?? '' }}"
                pending_deck_spec_path: ""
                pending_deck_summary: ""
                workspace: "{{ world.decks_dir }}"
                # Clear the deck so drafting's once: author pass runs fresh
                # (the baked default seeds idle's view; start re-authors).
                deck: {}
                source_deck: {}
                render_retries: 0   # fresh deck — reset the auto-fix budget
                render_error_repairable: false
                render_error_kind: ""
                render_error_summary: ""
      edit_existing:
        # An existing deck renders IN PLACE and goes straight to review — no
        # authoring agent. The deck already exists and works in the web viewer;
        # loading it must not re-author 36 scenes or strip its assets.
        - target: preparing_workspace
          effects:
            - set:
                pending_deck_spec_path: "{{ slots.spec_path }}"
                pending_deck_summary: "{{ slots.summary ?? '' }}"
                draft_feedback: "{{ slots.feedback ?? '' }}"
                render_retries: 0   # fresh deck — reset the auto-fix budget
                render_error_repairable: false
                render_error_kind: ""
                render_error_summary: ""
      quit:
        - target: "@exit:abandoned"
          effects:
            - set: { abandon_reason: "abandoned_at_idle" }
      look:
        - target: .
