# render_autofix — render_deck fails → visible troubleshooting checkpoint →
# explicit troubleshoot runs one repair attempt and re-renders. If rendering
# still fails, the story returns to troubleshooting instead of silently burning
# the full retry budget in one turn.
#
# render_deck is stubbed to ERROR on every call, so two explicit troubleshoot
# turns spend the repair budget one visible step at a time; a final troubleshoot
# gives up and returns to reviewing with the renderer error surfaced.

test_kind: flow
app: ../app.yaml
initial_state: drafting
initial_world:
  workspace: "stories/slidey-edit/baked"
  deck: { spec_path: "stories/slidey-edit/baked/deck.json", summary: "deck under test" }
  addressed: { items: [] }
  refine_budget: 6
  render_retry_budget: 2

host_handlers:
  host.slidey.render:
    by_call:
      render_deck:
        error: "host.slidey.render: spec validation failed: bad scene"

  host.agent.task:
    by_call:
      fix_render:
        data:
          ok: true
          submitted:
            spec_path: "stories/slidey-edit/baked/deck.json"
            summary: "Repaired the malformed scene."

  host.starlark.run:
    by_call:
      seed_annotation:
        data:
          annotation:
            anchor:
              kind: "semantic_element"
              semantic_element: { plugin: "slidey", ref: "1/card_0", bbox: [140, 518, 535, 114] }
              label: "Scene 1 · card 0"
            instruction: "Make the card stand out."
            frame_handle: ""

turns:
  # accept → rendering(error) → visible troubleshooting checkpoint. No agent yet.
  - intent: { name: accept, slots: {} }
    expect_state: checking_render_failure
    expect_world:
      deck_handle: ""
      render_retries: 0
      render_error_kind: ""
    expect_no_host_calls: [host.agent.task]

  # First explicit troubleshoot runs one repair attempt, then render fails again
  # and lands back in troubleshooting.
  - intent: { name: troubleshoot, slots: {} }
    expect_state: checking_render_failure
    expect_world:
      deck_handle: ""
      render_retries: 1
      render_error_kind: ""
      deck:
        spec_path: "stories/slidey-edit/baked/deck.json"
        summary: "Repaired the malformed scene."
    expect_host_calls:
      - handler: host.agent.task
        args: { call: "fix_render" }

  # Second explicit troubleshoot spends the second repair attempt.
  - intent: { name: troubleshoot, slots: {} }
    expect_state: checking_render_failure
    expect_world:
      deck_handle: ""
      render_retries: 2
      render_error_kind: ""
    expect_host_calls:
      - handler: host.agent.task
        args: { call: "fix_render" }

  # Budget exhausted; no third repair agent dispatch.
  - intent: { name: troubleshoot, slots: {} }
    expect_state: reviewing
    expect_world:
      deck_handle: ""
      render_retries: 2
      render_error_kind: deck_validation
    expect_no_host_calls: [host.agent.task]

expect_terminal: false
