# render_output_enoent_no_agent — Slidey bundled successfully but failed to
# write the output HTML because the staging checkout was refreshed under a live
# server and the output directory was briefly missing. This is renderer
# filesystem/toolchain trouble, not a deck defect; troubleshooting must not run
# the deck repair agent.

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  decks_dir: "docs/decks"
  addressed: { items: [] }
  refine_budget: 6
  render_retry_budget: 2

host_handlers:
  # host.agent.task intentionally ABSENT — renderer filesystem failures must not
  # invoke the deck repair agent.

  host.slidey.render:
    by_call:
      render_deck:
        error: |
          host.slidey.render: render exited 1: [build-single] building web bundle (SLIDEY_TARGET=webfile)…
          vite v5.4.21 building for production...
          ✓ built in 5.96s

          node:fs:2406
              return binding.writeFileUtf8(
                             ^

          Error: ENOENT: no such file or directory, open '/Users/Brad.Smith/code/kitsoki/.capsules/staging/local/docs/decks/kitsoki-pitch.slidey.html'
              at writeFileSync (node:fs:2406:20)
              at file:///Users/Brad.Smith/code/studio-slidey/web/build-single.mjs:139:1

          Node.js v26.3.1

turns:
  - intent:
      name: start
      slots:
        feedback: "edit kitsoki-pitch"
    expect_state: checking_render_failure
    expect_world:
      deck:
        spec_path: "docs/decks/kitsoki-pitch.slidey.json"
        summary: "Existing slidey deck"
        workspace_spec_path: "kitsoki-pitch.slidey.json"
      workspace: "docs/decks"
      deck_handle: ""
      render_retries: 0
      render_error_kind: ""
    expect_host_calls:
      - handler: host.starlark.run
        args: { call: "resolve_deck" }
      - handler: host.slidey.render
        args: { call: "render_deck", spec_path: "docs/decks/kitsoki-pitch.slidey.json" }
    expect_no_host_calls: [host.agent.task]

  - intent:
      name: troubleshoot
      slots: {}
    expect_state: checking_render_failure
    expect_world:
      deck_handle: ""
      render_retries: 0
      render_error_repairable: false
      render_error_kind: toolchain
    expect_no_host_calls: [host.agent.task]

expect_terminal: false
expect_no_host_calls: [host.agent.task]
expect_no_errors: true
