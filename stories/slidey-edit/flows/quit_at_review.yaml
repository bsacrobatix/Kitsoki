# quit_at_review — abandon from reviewing → @exit:abandoned (standalone terminal).

test_kind: flow
app: ../app.yaml
initial_state: reviewing
initial_world:
  workspace: "stories/slidey-edit/baked"
  deck: { spec_path: "stories/slidey-edit/baked/deck.json", summary: "deck" }
  deck_handle: "slidey-edit#1"
  addressed: { items: [] }

host_handlers:
  host.starlark.run:
    by_call:
      seed_annotation:
        data:
          annotation:
            anchor: { kind: "semantic_element", source_ref: { kind: "slidey", spec_path: "x", scene_id: "the-loop", element_id: "loop-callout" }, label: "callout" }
            instruction: "tweak"
            frame_handle: "slidey-edit#1"

turns:
  - intent: { name: quit, slots: {} }
    expect_world:
      abandon_reason: "abandoned_at_reviewing"

expect_terminal: true
expect_no_errors: true
