# ── deep: 6+ ft. ferry / wait are the safe methods ────────────────────
test_kind: intents
app: oregon-trail
state: river_crossing.deep
defaults:
  runs: 5
  min_pass_rate: 0.8
  temperature: 0.2

fixtures:

  - id: ferry-bare-deep
    intent: { name: propose_crossing, slots: { method: ferry } }
    inputs:
      - "ferry"
      - "hire a ferryman"

  - id: wait-for-water-drop
    intent: { name: propose_crossing, slots: { method: wait } }
    inputs:
      - "wait for the water to drop"
