# worktree_list — audit and classify existing worktrees.

states:

  worktree_list:
    description: "List and classify existing worktrees. Prune stale refs or remove specific worktrees."
    relevant_world: [worktree_list, integration_branch, working_dir]
    view:
      - heading: "Worktrees"
      - template: '{{ world.worktree_list.report|default:"(none — no worktrees found)" }}'
      - prose: "Last operation failed: {{ world.last_op_output }}"
        when: "world.last_op_ok == false"
      - prose: "Pruned stale refs."
        when: "world.last_op_outcome == 'pruned'"
      - prose: "Worktree removed: {{ world.last_op_output }}"
        when: "world.last_op_outcome == 'removed'"
      - prose: "Refusing to remove worktree because its branch is not merged: {{ world.last_op_output }}"
        when: "world.last_op_outcome == 'unmerged_branch'"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "prune"
              hint:  "git worktree prune (clear stale refs)"
              intent: prune
            - label: "remove_worktree path=<path>"
              hint:  "remove a specific worktree (keep branch)"
              intent: remove_worktree
              param:
                slot:        path
                type:        string
                placeholder: ".worktrees/feat-x"
                required:    false
            - label: "remove_all path=<path>"
              hint:  "remove worktree and delete its branch"
              intent: remove_all
              param:
                slot:        path
                type:        string
                placeholder: ".worktrees/feat-x"
                required:    false
            - label: "back"
              hint:  "return to hub"
              intent: back
            - label: "look"
              intent: look
    on_enter:
      - invoke: host.run
        id: list_worktrees
        with:
          cmd: bash
          args:
            - "-c"
            - |
              set -e
              export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
              INTEGRATION="{{ world.integration_branch }}"
              REPORT=""
              while IFS= read -r line; do
                if [[ "$line" == worktree\ * ]]; then
                  WT="${line#worktree }"
                  BR=""
                  HEAD=""
                elif [[ "$line" == branch\ * ]]; then
                  BR="${line#branch refs/heads/}"
                elif [[ "$line" == HEAD\ * ]]; then
                  HEAD="${line#HEAD }"
                elif [[ -z "$line" ]] && [[ -n "$WT" ]]; then
                  if [ -z "$BR" ]; then
                    CLASS="(bare)"
                  elif [ "$BR" = "$INTEGRATION" ]; then
                    CLASS="integration"
                  else
                    UNIQUE=$(git rev-list --count "${INTEGRATION}..${HEAD}" 2>/dev/null || echo "?")
                    DIRTY=$(git -C "$WT" status --porcelain 2>/dev/null | grep -c . || true)
                    AGENT=""
                    if [[ "$WT" == */.worktrees/agent-* ]]; then
                      AGENT="(agent wt)"
                    fi
                    if [ "$UNIQUE" = "0" ]; then
                      CLASS="clean-merged"
                    elif [ "$DIRTY" -gt 0 ]; then
                      CLASS="dirty ($UNIQUE unique commits)"
                    else
                      CLASS="has-unique-commits ($UNIQUE)"
                    fi
                    [ -n "$AGENT" ] && CLASS="$CLASS $AGENT"
                  fi
                  REPORT="${REPORT}${WT} [${BR:-bare}] ${CLASS}\n"
                  WT=""
                fi
              done < <(git worktree list --porcelain 2>/dev/null; echo "")
              jq -n --arg report "$(printf "%b" "$REPORT")" '{report:$report}'
          cwd: "{{ world.working_dir }}"
        bind:
          worktree_list: "stdout_json"
        on_error: worktree_list
    on:
      prune:
        - target: worktree_list
          effects:
            - invoke: host.run
              id: prune_worktrees
              with:
                cmd: git
                args: ["worktree", "prune"]
                cwd: "{{ world.working_dir }}"
              bind:
                last_op_output: stdout
                last_op_ok:     ok
              on_error: worktree_list
            - set:
                worktree_list:   {}
                last_op_outcome: "pruned"
      remove_worktree:
        - target: worktree_list
          effects:
            - invoke: host.run
              id: remove_wt_only
              with:
                cmd: bash
                args:
                  - "-c"
                  - |
                    set -e
                    export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
                    WT="$1"
                    if [ -z "$WT" ]; then
                      jq -n '{ok:false,outcome:"",output:"no worktree path provided"}'
                      exit 0
                    fi
                    OUT=$(git worktree remove "$WT" 2>&1) || {
                      jq -n --arg out "$OUT" '{ok:false,outcome:"",output:$out}'
                      exit 0
                    }
                    git worktree prune 2>/dev/null || true
                    jq -n --arg out "$OUT" --arg wt "$WT" '{ok:true,outcome:"removed",output:("Removed worktree "+$wt)}'
                  - "kitsoki-remove-worktree"
                  - "{{ slots.path }}"
                cwd: "{{ world.working_dir }}"
              bind:
                last_op_output:  "stdout_json.output"
                last_op_ok:      "stdout_json.ok"
                last_op_outcome: "stdout_json.outcome"
              on_error: worktree_list
            - set:
                worktree_list:   {}
      remove_all:
        - target: worktree_list
          effects:
            - invoke: host.run
              id: remove_wt_and_branch
              with:
                cmd: bash
                args:
                  - "-c"
                  - |
                    set -e
                    export NO_COLOR=1 GIT_TERMINAL_PROMPT=0 GIT_PAGER=cat
                    WT="$1"
                    INTEGRATION="$2"
                    if [ -z "$WT" ]; then
                      jq -n '{ok:false,outcome:"",output:"no worktree path provided"}'
                      exit 0
                    fi
                    BR=$(git worktree list --porcelain 2>/dev/null | awk -v wt="$WT" '
                      $0 == "worktree " wt {found=1; next}
                      found && /^branch / {sub(/^branch refs\/heads\//, ""); print; exit}
                      found && /^$/ {found=0}
                    ')
                    if [ -n "$BR" ] && [ "$BR" != "HEAD" ]; then
                      if ! git merge-base --is-ancestor "$BR" "$INTEGRATION" 2>/dev/null; then
                        jq -n --arg br "$BR" --arg int "$INTEGRATION" \
                          '{ok:false,outcome:"unmerged_branch",output:("branch "+$br+" is not merged into "+$int+"; worktree was not removed")}'
                        exit 0
                      fi
                    fi
                    OUT=$(git worktree remove "$WT" 2>&1) || {
                      jq -n --arg out "$OUT" '{ok:false,outcome:"",output:$out}'
                      exit 0
                    }
                    BR_STATE="kept"
                    if [ -n "$BR" ] && [ "$BR" != "HEAD" ]; then
                      DEL_OUT=$(git branch -d "$BR" 2>&1) || {
                        jq -n --arg out "$DEL_OUT" --arg br "$BR" \
                          '{ok:false,outcome:"",output:("worktree removed, but branch "+$br+" delete failed: "+$out)}'
                        exit 0
                      }
                      BR_STATE="deleted"
                    fi
                    git worktree prune 2>/dev/null || true
                    jq -n --arg wt "$WT" --arg br "$BR" --arg st "$BR_STATE" \
                      '{ok:true,outcome:"removed",output:("Removed worktree "+$wt+"; branch "+$br+" "+$st)}'
                  - "kitsoki-remove-all"
                  - "{{ slots.path }}"
                  - "{{ world.integration_branch }}"
                cwd: "{{ world.working_dir }}"
              bind:
                last_op_output:  "stdout_json.output"
                last_op_ok:      "stdout_json.ok"
                last_op_outcome: "stdout_json.outcome"
              on_error: worktree_list
            - set:
                worktree_list:   {}
      back:
        - when: "world.on_integration == true"
          target: main_ops
        - target: branch_ops
      look:
        - target: .
