# conflict_escalate_then_guide — conflict (resolved=false) → guide "keep ours" → conflict (resolved=true) → branch_ops.
# guide re-enters conflict (fires on_enter) with new guidance.
# Asserts: conflict_intent_guidance cleared after resolve.

test_kind: flow
app: ../app.yaml
initial_state: conflict
initial_world:
  integration_branch:       main
  current_branch:           feat/x
  on_integration:           false
  working_dir:              "."
  conflict_origin:          rebase
  conflict_files:           "internal/foo.go "
  conflict_verdict:         { resolved: false, confidence: 0.45, unresolvable_files: ["internal/foo.go"], resolution_summary: "Could not resolve.", reason: "Incompatible interface changes." }
  conflict_intent_guidance: ""
  build_check_cmd:          "echo 'build ok'"
  rebase_done:              false

host_handlers:
  host.run:
    by_call:
      # gather_conflict_files runs after guide clears conflict_files
      gather_conflict_files:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            conflict_files: "internal/foo.go "
            gosum_only:     false
            conflict_scan_done: true
      rebase_continue_cmd:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            output:       "Successfully rebased."
            ok:           true
            new_conflict: false
      build_check_after_rebase:
        data:
          ok:        true
          exit_code: 0
          stdout:    "build ok"
  host.agent.task:
    data:
      ok: true
      submitted:
        resolved:           true
        confidence:         0.88
        unresolvable_files: []
        resolution_summary: "Kept our version as instructed by operator."
        reason:             null

turns:
  - intent: { name: guide, slots: { intent: "keep ours" } }
    expect_state: conflict

  - intent: { name: conflict_ready, slots: {} }
    expect_state: branch_ops
    expect_world:
      rebase_done:              true
      conflict_intent_guidance: ""
      conflict_files:           ""

expect_no_errors: true
