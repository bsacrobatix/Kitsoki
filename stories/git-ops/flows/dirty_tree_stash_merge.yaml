# dirty_tree_stash_merge — merge_into_main when target tree is dirty.
# Regression: git-ops must refuse the merge instead of using the shared stash
# stack. Linked worktrees share refs/stash; auto-stashing here can interleave
# unrelated operator WIP and lose work.

test_kind: flow
app: ../app.yaml
initial_state: branch_ops
initial_world:
  integration_branch: main
  current_branch:     feat/x
  on_integration:     false
  working_dir:        "."
  main_worktree_path: "."
  rebase_done:        true
  rebase_base_sha:    ""
  build_check_disabled: true

host_handlers:
  host.run:
    by_call:
      refresh_branch:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             feat/x
            main_worktree_path: "."
            worktree_list:      { raw: "" }
            commits_ahead:      2
            commits_behind:     0
            has_uncommitted:    false
            no_common_ancestor: false
      merge_exec:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            outcome:           dirty_target
            descendant_ok:     true
            merge_in_progress: false
            last_op_ok:        false
            last_op_output:    " M docs/notes.md"
            stash_ref:         ""
            rebase_done:       false

turns:
  - intent: { name: merge_into_main, slots: {} }
    expect_state: merge_into_main
    expect_world:
      last_op_outcome: dirty_target
      last_op_ok:      false
      stash_ref:       ""

expect_no_errors: true
