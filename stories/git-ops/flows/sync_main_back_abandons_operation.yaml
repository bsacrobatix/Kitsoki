# sync_main_back_abandons_operation - leaving sync_main via back discards
# operation-local sync_* scratch instead of leaking it into durable world.

test_kind: flow
app: ../app.yaml
initial_state: main_ops
initial_world:
  integration_branch: main
  current_branch:     main
  on_integration:     true
  working_dir:        "."
  main_worktree_path: "."

host_handlers:
  host.run:
    by_call:
      refresh_main:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            branch:             main
            main_worktree_path: "."
            worktree_list:      { raw: "" }
            commits_ahead:      0
            commits_behind:     0
            has_uncommitted:    false
            merge_in_progress:  false
            no_common_ancestor: false
            upstream_tracking:  false
      sync_main_exec:
        data:
          ok:        true
          exit_code: 0
          stdout_json:
            outcome:  prepared
            branch:   sync/main-origin-main-20260704T010203Z
            worktree: /repo/.worktrees/sync-main-origin-main-20260704T010203Z
            output:   "Integration branch: sync/main-origin-main-20260704T010203Z\nIntegration worktree: /repo/.worktrees/sync-main-origin-main-20260704T010203Z"
            ok:       true

turns:
  - intent: { name: sync_main, slots: { remote: origin } }
    expect_state: sync_main
    expect_events:
      - kind: operation.started
        effect: { operation_id: gitops.sync_main }
      - kind: world.update
        effect: { operation_id: gitops.sync_main, operation_local: true }
    expect_world:
      sync_remote: origin
      sync_result:
        outcome:  prepared
        branch:   sync/main-origin-main-20260704T010203Z
        worktree: /repo/.worktrees/sync-main-origin-main-20260704T010203Z
        output:   "Integration branch: sync/main-origin-main-20260704T010203Z\nIntegration worktree: /repo/.worktrees/sync-main-origin-main-20260704T010203Z"
        ok:       true
  - intent: { name: back }
    expect_state: main_ops
    expect_events:
      - kind: operation.abandoned
        effect: { operation_id: gitops.sync_main, reason: exit }
    expect_world:
      sync_remote: origin
      sync_remote_branch: main
      sync_name: ""
      sync_continue_branch: ""
      sync_auto_resolve: false
      sync_result: {}

expect_no_errors: true
