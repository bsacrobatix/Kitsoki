# scoring — DETERMINISTIC (no LLM). Roll up the per-cell verdicts the harness
# wrote (results/cells/*.json) into a by-candidate summary via host.run →
# `bench.py summarize` (free). We call the script; we never reimplement scoring.
# `once: true` keyed on summary → reload-safe.
states:
  scoring:
    description: "Rolling up the cell verdicts into a summary (host.run → bench.py summarize)."
    relevant_world: [summary, summary_path, harness_dir]
    view:
      - heading: "Bake-off · scoring"
      - kv:
          pairs:
            Summary: '{{ world.summary_path|default:"(summarizing…)" }}'
            Cells:   "{{ world.summary.cells|length }}"
      - prose: "bench.py summarize rolls the per-cell verdicts up by candidate (solved / partial / failed + solve_rate). Deterministic — no LLM."
    on_enter:
      - invoke: host.run
        id: summarize
        once: true
        with:
          cmd: python3
          args:
            - "bench.py"
            - "summarize"
            - "--project"
            - "{{ world.project }}"
          cwd: "{{ world.harness_dir }}"
        bind:
          summary:      stdout_json
          summary_path: stdout_json.summary_path
        on_error: running
      - when: "world.summary.rollup != nil"
        emit_intent: accept
    on:
      accept:
        - target: reporting
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
