# running — ORCHESTRATION STUB (thin; delegates to the harness). The cost-bearing
# per-cell drive is the ONLY piece that spends money and is run MANUALLY, never in
# CI/auto (AGENTS.md no-LLM rule). Each cell is:
#
#   tools/bugfix-bakeoff/external/drive_cell.sh \
#       --project <project> --bug <bug> --candidate <candidate> --score
#
# which prepares the baseline worktree, drives the kitsoki bugfix pipeline LIVE
# under the candidate's harness profile (the worker model), grades the fix against
# the hidden oracle, and writes .artifacts/external-bakeoff/results/cells/
# <project>-<bug>-<candidate>-kitsoki.json by default.
#
# This room TRACKS the roster + progress; on accept it advances to scoring, where
# the harness's FREE bench.py summarize rolls up whatever cells the manual run
# produced. It does NOT fabricate cell results.
states:
  running:
    description: "Tracking the cell roster (cost-bearing cells run manually via drive_cell.sh)."
    relevant_world: [project, repo_dir, cells, cells_total, cells_ran, harness_dir, results_dir]
    view:
      - heading: "Bake-off · running (cell roster)"
      - kv:
          pairs:
            Total:   "{{ world.cells_total }}"
            Ran:     "{{ world.cells_ran }}"
            Harness: "{{ world.harness_dir }}"
            Results: "{{ world.results_dir }}"
      - prose: "Each cell is run manually: `drive_cell.sh --project {{ world.project }} --bug <bug> --candidate <candidate> {% if world.repo_dir != \"\" %}--repo-dir {{ world.repo_dir }} {% endif %}--score` (the only cost-bearing step — it drives the live worker model). Accept once the cell verdicts are written to the results directory."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "accept"
              hint:   "advance to scoring (summarize the cell verdicts)"
              intent: accept
            - label:  "quit"
              hint:   "abandon"
              intent: quit
    on_enter:
      - set:
          cells_ran: "{{ len(world.cells.items) }}"
    on:
      accept:
        - target: scoring
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
