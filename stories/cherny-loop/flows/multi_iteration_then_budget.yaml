# Drives the loop across FOUR iterations with a gate that keeps failing, proving
# each iteration advances and carries the failure forward, then terminates at the
# iteration ceiling. This is the "show/track each loop instance" path end-to-end.
test_kind: flow
app: ../app.yaml
initial_state: iterating
initial_world:
  goal_text:        "Make the unit tests pass"
  gate_mode:        "script"
  gate_command:     "go test ./..."
  iteration:        1
  iteration_budget: 4

host_handlers:
  host.run:           { data: { ok: false, exit_code: 1, stdout: "FAIL: 1 test failing" } }
  host.oracle.task:   { data: { submitted: { summary: "another attempt" } } }
  host.artifacts_dir: { data: { ok: true } }

turns:
  # Iteration 1 fails → loop → maker runs iteration 2.
  - intent: { name: evaluate, slots: {} }
    expect_state: iterating
    expect_world:
      iteration:         2
      last_gate_failure: "FAIL: 1 test failing"
  # Iteration 2 fails → iteration 3.
  - intent: { name: evaluate, slots: {} }
    expect_state: iterating
    expect_world:
      iteration: 3
  # Iteration 3 fails → iteration 4.
  - intent: { name: evaluate, slots: {} }
    expect_state: iterating
    expect_world:
      iteration: 4
  # Iteration 4 fails AND hits the ceiling (4 >= 4) → exhausted.
  - intent: { name: evaluate, slots: {} }
    expect_state: __exit__exhausted
    expect_world:
      terminal_reason: "iteration_budget"

expect_terminal: true
