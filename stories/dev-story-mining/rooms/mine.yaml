# mine — phase 2/6. Run intent-mining over planned transcript sources.
#
# on_enter runs the `miner` persona (agentic: it drives the session-mining
# kit and reads the emitted reports), binding `mine_artifact`. `once: true`
# makes it reload-safe — the stored artifact re-renders without re-running
# the expensive mining pass; the refine / restart arms clear the bind to
# force a fresh run. Judge polymorphism (human | llm | llm_then_human)
# follows stories/bugfix exactly.

states:

  mine:
    description: "Mine planned transcript sources; produce the automation brief for review."
    view:
      - banner:
          text:     "MINE"
          subtitle: "Phase 2 / 6  ·  intent/idea mining over prepared sources"
          color:    "#06B6D4"
      - prose: "{{ world.job }} · cycle {{ world.cycle }} · judge {{ world.judge_mode }} · sources {{ world.transcript_sources }}"
      - kv:
          pairs:
            Brief:    '{{ world.mine_artifact.brief_path|default:"(pending)" }}'
            Intents:  '{{ world.mine_artifact.intent_count|default:"(pending)" }}'
            Split:    '🟢 {{ world.mine_artifact.deterministic|default:"–" }} · 🟡 {{ world.mine_artifact.agent_gated|default:"–" }} · 🔴 {{ world.mine_artifact.irreducible|default:"–" }}'
      - heading: "Brief"
      - code: '{{ world.mine_artifact.summary_markdown|default:"(pending — miner has not returned yet)" }}'
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "continue"
              hint:   "accept the brief and map it against Kitsoki"
              intent: accept
            - label:  "refine"
              hint:   "re-mine with feedback (e.g. widen the sample)"
              intent: refine
              param: { slot: feedback, type: string, placeholder: "what to redo", required: false }
            - label:  "quit"
              hint:   "abandon the loop"
              intent: quit
            - label:  "look"
              hint:   "re-render"
              intent: look
    relevant_world: [job, source_plan_artifact, transcript_sources, project_dir, codex_sessions_dir, min_intents, judge_mode, judge_confidence_threshold, mine_artifact, llm_verdict, refine_feedback, cycle]
    on_enter:
      - invoke: host.agent.task
        once: true
        with:
          agent: miner
          acceptance:
            schema: schemas/mine_artifact.json
          context:
            prompt: prompts/mine_executing.md
            args:
              job:             "{{ world.job }}"
              project_dir:     "{{ world.project_dir }}"
              codex_sessions_dir: "{{ world.codex_sessions_dir }}"
              source_plan:     "{{ world.source_plan_artifact }}"
              transcript_sources: "{{ world.transcript_sources }}"
              automation_goal: "{{ world.automation_goal }}"
              refine_feedback: "{{ world.refine_feedback }}"
        bind:
          mine_artifact: submitted
        on_error: idle
      - when: "world.judge_mode == 'llm' || world.judge_mode == 'llm_then_human'"
        invoke: host.agent.decide
        with:
          agent: judge
          prompt: prompts/judge_generic.md
          schema: schemas/judge_verdict.json
          args:
            phase:          "mine"
            artifact_title: "{{ world.mine_artifact.brief_path }}"
            artifact_body:  "{{ world.mine_artifact.summary_markdown }}"
            criterion:      "The brief has at least {{ world.min_intents }} intents from the prepared Claude/Codex source plan, reports unavailable Codex signals honestly, and highlights missed Kitsoki usage opportunities."
            threshold:      "{{ world.judge_confidence_threshold }}"
        bind:
          llm_verdict: submitted
      - when: |
          world.judge_mode != 'human' &&
          world.llm_verdict.confidence >= world.judge_confidence_threshold &&
          world.llm_verdict.verdict != 'uncertain' &&
          world.llm_verdict.intent != 'uncertain'
        emit_intent: "{{ world.llm_verdict.intent }}"
        slots:
          feedback: "{{ world.llm_verdict.reason }}"
    on:
      accept:
        - target: map
          effects:
            - say: "Brief accepted ({{ world.mine_artifact.intent_count }} intents) — mapping opportunities against {{ world.stories_dir }}."
            - set: { refine_feedback: "", cycle: 0 }
      refine:
        - when: "world.mine_cycle >= world.mine_budget"
          target: "@exit:abandoned"
          effects:
            - set: { abandon_reason: "mine_cycle_budget_exhausted", status: "abandoned" }
        - target: mine
          effects:
            - set:
                refine_feedback: "{{ slots.feedback ?? world.llm_verdict.reason }}"
                mine_cycle:      "{{ world.mine_cycle + 1 }}"
                cycle:           "{{ world.cycle + 1 }}"
                mine_artifact:   {}
      restart_from:
        - target: prepare
          effects:
            - set: { refine_feedback: "", mine_cycle: 0, prepare_cycle: 0, cycle: 0, source_plan_artifact: {}, source_summary_markdown: "", mine_artifact: {} }
      quit:
        - target: "@exit:abandoned"
          effects:
            - set: { abandon_reason: "quit_at_mine", status: "abandoned" }
      look:
        - target: .
