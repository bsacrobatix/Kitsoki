# run-as-user-setup - macOS delegated agent user setup.
#
# This story is intentionally no-LLM and non-privileged. It generates the local
# config, wrapper, sudoers, capsule-assignment, and validation commands an
# operator reviews and runs outside the agent sandbox.

app:
  id: run-as-user-setup
  version: 0.1.0
  title: "Run-as-user setup"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.starlark.run

world:
  platform:       { type: string, default: "darwin" }
  operator_user:  { type: string, default: "" }
  agent_user:     { type: string, default: "kitsoki-agent" }
  group_name:     { type: string, default: "kitsoki_agents" }
  capsule_root:   { type: string, default: "/Users/Shared/kitsoki/capsules" }
  wrapper_bin:    { type: string, default: "/Users/Shared/kitsoki/agent-bin" }
  protected_root: { type: string, default: "." }
  codex_bin:      { type: string, default: "/opt/homebrew/bin/codex" }
  claude_bin:     { type: string, default: "/opt/homebrew/bin/claude" }
  sample_capsule: { type: string, default: "room-123-dev" }

  setup_summary:       { type: string, default: "" }
  config_snippet:      { type: string, default: "" }
  account_steps:       { type: string, default: "" }
  group_commands:      { type: string, default: "" }
  wrapper_commands:    { type: string, default: "" }
  sudoers_snippet:     { type: string, default: "" }
  assignment_commands: { type: string, default: "" }
  validation_commands: { type: string, default: "" }
  receipt_markdown:    { type: string, default: "" }
  security_notes:      { type: string, default: "" }
  status:              { type: string, default: "not planned" }
  last_error:          { type: string, default: "" }

intents:
  plan:
    description: "Generate a local run_as_user setup plan from the current values."
    examples: ["plan", "generate setup", "show setup"]
    priority: 90
  configure:
    description: "Update setup values, then regenerate the plan."
    examples:
      - "configure agent_user=kitsoki-agent"
      - "configure operator_user=Brad.Smith capsule_root=/Users/Shared/kitsoki/capsules"
    priority: 85
    slots:
      platform:       { type: string, required: false }
      operator_user:  { type: string, required: false }
      agent_user:     { type: string, required: false }
      group_name:     { type: string, required: false }
      capsule_root:   { type: string, required: false }
      wrapper_bin:    { type: string, required: false }
      protected_root: { type: string, required: false }
      codex_bin:      { type: string, required: false }
      claude_bin:     { type: string, required: false }
      sample_capsule: { type: string, required: false }
  validated:
    description: "Mark the delegated-user setup validated after running the probes."
    examples: ["validated", "probes passed", "done"]
    priority: 80
  back:
    description: "Return to the configuration screen."
    examples: ["back", "edit"]
    priority: 40
  quit:
    description: "Leave the setup story."
    examples: ["quit", "exit"]
    priority: 30
  look:
    description: "Re-render the current room."
    examples: ["look"]
    priority: 10

root: lobby

include:
  - rooms/*.yaml

