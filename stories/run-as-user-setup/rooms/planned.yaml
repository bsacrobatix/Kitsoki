states:
  planned:
    description: "Review run-as-user setup plan"
    relevant_world: [operator_user, agent_user, group_name, capsule_root, wrapper_bin, protected_root, setup_summary, status]
    on_enter:
      - invoke: host.starlark.run
        id: plan_run_as_user_setup
        with:
          script: scripts/plan_setup.star
          inputs:
            platform: "{{ world.platform }}"
            operator_user: "{{ world.operator_user }}"
            agent_user: "{{ world.agent_user }}"
            group_name: "{{ world.group_name }}"
            capsule_root: "{{ world.capsule_root }}"
            wrapper_bin: "{{ world.wrapper_bin }}"
            protected_root: "{{ world.protected_root }}"
            codex_bin: "{{ world.codex_bin }}"
            claude_bin: "{{ world.claude_bin }}"
            sample_capsule: "{{ world.sample_capsule }}"
        bind:
          setup_summary: setup_summary
          config_snippet: config_snippet
          account_steps: account_steps
          group_commands: group_commands
          wrapper_commands: wrapper_commands
          sudoers_snippet: sudoers_snippet
          assignment_commands: assignment_commands
          validation_commands: validation_commands
          receipt_markdown: receipt_markdown
          security_notes: security_notes
        once: true
        on_error: failed
      - set:
          status: "planned"
    view:
      extends: "base"
      blocks:
        body:
          - prose: "{{ world.setup_summary|default:'(pending)' }}"
          - heading: ".kitsoki.local.yaml"
          - code: "{{ world.config_snippet|default:'(pending)' }}"
          - heading: "Account setup"
          - code: "{{ world.account_steps|default:'(pending)' }}"
          - heading: "Group and capsule parent"
          - code: "{{ world.group_commands|default:'(pending)' }}"
          - heading: "Backend wrappers"
          - code: "{{ world.wrapper_commands|default:'(pending)' }}"
          - heading: "sudoers"
          - code: "{{ world.sudoers_snippet|default:'(pending)' }}"
          - heading: "Assign one capsule"
          - code: "{{ world.assignment_commands|default:'(pending)' }}"
          - heading: "Validation probes"
          - code: "{{ world.validation_commands|default:'(pending)' }}"
          - heading: "Security notes"
          - code: "{{ world.security_notes|default:'(pending)' }}"
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "plan"
                  hint: "generate or regenerate the setup plan"
                - label: "apply"
                  hint: "run the setup now with non-interactive sudo"
                - label: "accept"
                  hint: "apply the reviewed setup"
                - label: "validated"
                  hint: "mark ready after applying the setup outside this story"
                - label: "configure operator_user=<name> ..."
                  hint: "revise any setup value and regenerate"
                - label: "back"
                  hint: "return to the setup values"
                - label: "quit"
                  hint: "leave"
                - label: "look"
        footer:
          - prose: "The apply path uses non-interactive sudo. If sudo needs a password or an agent CLI needs a login, the story stops with the command output instead of prompting invisibly."
    on:
      accept:
        - when: "world.setup_summary == ''"
          target: planned
          effects:
            - invoke: host.starlark.run
              id: plan_run_as_user_setup_accept
              with:
                script: scripts/plan_setup.star
                inputs:
                  platform: "{{ world.platform }}"
                  operator_user: "{{ world.operator_user }}"
                  agent_user: "{{ world.agent_user }}"
                  group_name: "{{ world.group_name }}"
                  capsule_root: "{{ world.capsule_root }}"
                  wrapper_bin: "{{ world.wrapper_bin }}"
                  protected_root: "{{ world.protected_root }}"
                  codex_bin: "{{ world.codex_bin }}"
                  claude_bin: "{{ world.claude_bin }}"
                  sample_capsule: "{{ world.sample_capsule }}"
              bind:
                setup_summary: setup_summary
                config_snippet: config_snippet
                account_steps: account_steps
                group_commands: group_commands
                wrapper_commands: wrapper_commands
                sudoers_snippet: sudoers_snippet
                assignment_commands: assignment_commands
                validation_commands: validation_commands
                receipt_markdown: receipt_markdown
                security_notes: security_notes
              on_error: failed
            - set:
                status: "planned"
        - target: applying
          effects:
            - set:
                apply_ok: false
                apply_exit_code: -1
                apply_output: ""
                last_error: ""
                status: "applying"
      apply:
        - target: applying
          effects:
            - set:
                apply_ok: false
                apply_exit_code: -1
                apply_output: ""
                last_error: ""
                status: "applying"
      validated:
        - when: "world.setup_summary == ''"
          target: planned
          effects:
            - invoke: host.starlark.run
              id: plan_run_as_user_setup_validated
              with:
                script: scripts/plan_setup.star
                inputs:
                  platform: "{{ world.platform }}"
                  operator_user: "{{ world.operator_user }}"
                  agent_user: "{{ world.agent_user }}"
                  group_name: "{{ world.group_name }}"
                  capsule_root: "{{ world.capsule_root }}"
                  wrapper_bin: "{{ world.wrapper_bin }}"
                  protected_root: "{{ world.protected_root }}"
                  codex_bin: "{{ world.codex_bin }}"
                  claude_bin: "{{ world.claude_bin }}"
                  sample_capsule: "{{ world.sample_capsule }}"
              bind:
                setup_summary: setup_summary
                config_snippet: config_snippet
                account_steps: account_steps
                group_commands: group_commands
                wrapper_commands: wrapper_commands
                sudoers_snippet: sudoers_snippet
                assignment_commands: assignment_commands
                validation_commands: validation_commands
                receipt_markdown: receipt_markdown
                security_notes: security_notes
              on_error: failed
            - set:
                status: "planned"
        - target: ready
          effects:
            - set:
                status: "validated"
      configure:
        - target: planned
          effects:
            - set:
                platform: "{{ slots.platform ?? world.platform }}"
                operator_user: "{{ slots.operator_user ?? world.operator_user }}"
                agent_user: "{{ slots.agent_user ?? world.agent_user }}"
                group_name: "{{ slots.group_name ?? world.group_name }}"
                capsule_root: "{{ slots.capsule_root ?? world.capsule_root }}"
                wrapper_bin: "{{ slots.wrapper_bin ?? world.wrapper_bin }}"
                protected_root: "{{ slots.protected_root ?? world.protected_root }}"
                codex_bin: "{{ slots.codex_bin ?? world.codex_bin }}"
                claude_bin: "{{ slots.claude_bin ?? world.claude_bin }}"
                sample_capsule: "{{ slots.sample_capsule ?? world.sample_capsule }}"
                setup_summary: ""
                config_snippet: ""
                account_steps: ""
                group_commands: ""
                wrapper_commands: ""
                sudoers_snippet: ""
                assignment_commands: ""
                validation_commands: ""
                receipt_markdown: ""
                security_notes: ""
                apply_ok: false
                apply_exit_code: -1
                apply_output: ""
                last_error: ""
                status: "planning"
      plan:
        - target: planned
          effects:
            - set:
                setup_summary: ""
                config_snippet: ""
                account_steps: ""
                group_commands: ""
                wrapper_commands: ""
                sudoers_snippet: ""
                assignment_commands: ""
                validation_commands: ""
                receipt_markdown: ""
                security_notes: ""
                apply_ok: false
                apply_exit_code: -1
                apply_output: ""
                last_error: ""
                status: "planning"
      back:
        - target: lobby
      look:
        - target: .
      quit:
        - target: ended

  applying:
    description: "Applying run-as-user setup"
    relevant_world: [agent_user, capsule_root, wrapper_bin, protected_root, apply_ok, apply_exit_code, apply_output, status]
    on_enter:
      - when: "world.setup_summary == ''"
        invoke: host.starlark.run
        id: plan_run_as_user_setup_before_apply
        with:
          script: scripts/plan_setup.star
          inputs:
            platform: "{{ world.platform }}"
            operator_user: "{{ world.operator_user }}"
            agent_user: "{{ world.agent_user }}"
            group_name: "{{ world.group_name }}"
            capsule_root: "{{ world.capsule_root }}"
            wrapper_bin: "{{ world.wrapper_bin }}"
            protected_root: "{{ world.protected_root }}"
            codex_bin: "{{ world.codex_bin }}"
            claude_bin: "{{ world.claude_bin }}"
            sample_capsule: "{{ world.sample_capsule }}"
        bind:
          setup_summary: setup_summary
          config_snippet: config_snippet
          account_steps: account_steps
          group_commands: group_commands
          wrapper_commands: wrapper_commands
          sudoers_snippet: sudoers_snippet
          assignment_commands: assignment_commands
          validation_commands: validation_commands
          receipt_markdown: receipt_markdown
          security_notes: security_notes
        on_error: failed
      - invoke: host.run
        id: apply_run_as_user_setup
        with:
          cmd: bash
          args:
            - -c
            - |
              set -eu

              platform=$1
              operator_user=$2
              agent_user=$3
              group_name=$4
              capsule_root=$5
              wrapper_bin=$6
              protected_root=$7
              codex_bin=$8
              claude_bin=$9
              sample_capsule=${10}

              log() {
                printf '%s\n' "$*"
              }

              die() {
                log "ERROR: $*"
                exit 1
              }

              need() {
                command -v "$1" >/dev/null 2>&1 || die "missing required command: $1"
              }

              sq() {
                printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\\\\''/g")"
              }

              join_path() {
                left=${1%/}
                right=${2#/}
                printf '%s/%s' "$left" "$right"
              }

              [ "$platform" = "darwin" ] || die "run-as-user apply currently supports darwin only; got $platform"
              [ -n "$agent_user" ] || die "agent_user is required"
              [ -n "$group_name" ] || die "group_name is required"
              [ -n "$capsule_root" ] || die "capsule_root is required"
              [ -n "$wrapper_bin" ] || die "wrapper_bin is required"
              [ -n "$protected_root" ] || die "protected_root is required"
              [ -n "$codex_bin" ] || die "codex_bin is required"
              [ -n "$claude_bin" ] || die "claude_bin is required"
              [ -n "$sample_capsule" ] || die "sample_capsule is required"

              if [ -z "$operator_user" ]; then
                operator_user=$(id -un)
              fi

              need sudo
              need dscl
              need dseditgroup
              need awk
              need sed
              need install
              need visudo
              need kitsoki

              sudo -n true >/dev/null 2>&1 || die "non-interactive sudo is not available. Run 'sudo -v' in the terminal that launched Kitsoki, then retry apply."

              if ! id -u "$agent_user" >/dev/null 2>&1; then
                log "creating non-admin delegated account $agent_user"
                next_uid=$(dscl . -list /Users UniqueID | awk '$2 >= 501 && $2 < 60000 { if ($2 > max) max = $2 } END { if (max == 0) print 502; else print max + 1 }')
                sudo -n dscl . -create "/Users/$agent_user"
                sudo -n dscl . -create "/Users/$agent_user" UserShell /bin/zsh
                sudo -n dscl . -create "/Users/$agent_user" RealName "Kitsoki Agent"
                sudo -n dscl . -create "/Users/$agent_user" UniqueID "$next_uid"
                sudo -n dscl . -create "/Users/$agent_user" PrimaryGroupID 20
                sudo -n dscl . -create "/Users/$agent_user" NFSHomeDirectory "/Users/$agent_user"
                sudo -n createhomedir -c -u "$agent_user" >/dev/null 2>&1 || true
              else
                log "delegated account $agent_user already exists"
              fi

              sudo -n dseditgroup -o create "$group_name" >/dev/null 2>&1 || true
              sudo -n dseditgroup -o edit -a "$agent_user" -t user "$group_name"
              sudo -n mkdir -p "$capsule_root" "$wrapper_bin"
              sudo -n chown "root:$group_name" "$capsule_root"
              sudo -n chmod 0710 "$capsule_root"

              sudo -n tee "$wrapper_bin/codex" >/dev/null <<SH
              #!/bin/sh
              umask 0002
              exec /usr/bin/sudo -n -H -u $(sq "$agent_user") $(sq "$codex_bin") "\$@"
              SH
              sudo -n tee "$wrapper_bin/claude" >/dev/null <<SH
              #!/bin/sh
              umask 0002
              exec /usr/bin/sudo -n -H -u $(sq "$agent_user") $(sq "$claude_bin") "\$@"
              SH
              sudo -n chmod 0755 "$wrapper_bin/codex" "$wrapper_bin/claude"

              sudoers_tmp=$(mktemp)
              trap 'rm -f "$sudoers_tmp"' EXIT
              cat >"$sudoers_tmp" <<EOF
              # Managed by kitsoki run-as-user-setup.
              Cmnd_Alias KITSOKI_AGENT_CLIS = $codex_bin, $claude_bin
              $operator_user ALL=($agent_user) NOPASSWD: KITSOKI_AGENT_CLIS
              EOF
              sudo -n visudo -cf "$sudoers_tmp" >/dev/null
              sudo -n install -m 0440 -o root -g wheel "$sudoers_tmp" /private/etc/sudoers.d/kitsoki-agent
              sudo -n visudo -cf /private/etc/sudoers.d/kitsoki-agent >/dev/null

              sample_path=$(join_path "$capsule_root" "$sample_capsule")
              if [ ! -e "$sample_path" ]; then
                kitsoki capsule open clean-repo --dest "$sample_path"
              else
                log "sample capsule $sample_path already exists"
              fi
              sudo -n chgrp -R "$group_name" "$sample_path"
              sudo -n chmod -R ug+rwX,o-rwx "$sample_path"
              sudo -n find "$sample_path" -type d -exec chmod g+s {} +

              sudo -n -H -u "$agent_user" touch "$(join_path "$sample_path" .agent-write-ok)"
              protected_probe=$(join_path "$protected_root" .agent-should-fail)
              if sudo -n -H -u "$agent_user" touch "$protected_probe" 2>/dev/null; then
                rm -f "$protected_probe" 2>/dev/null || true
                die "delegated account can write protected root $protected_root"
              fi

              PATH="$wrapper_bin:$PATH" command -v codex >/dev/null || die "codex wrapper is not resolvable"
              PATH="$wrapper_bin:$PATH" command -v claude >/dev/null || die "claude wrapper is not resolvable"
              PATH="$wrapper_bin:$PATH" codex --version >/dev/null || die "codex wrapper failed"
              PATH="$wrapper_bin:$PATH" claude --version >/dev/null || die "claude wrapper failed"

              log "ok: delegated account, wrappers, sudoers, capsule permissions, and write-deny probe passed"
            - run-as-user-setup
            - "{{ world.platform }}"
            - "{{ world.operator_user }}"
            - "{{ world.agent_user }}"
            - "{{ world.group_name }}"
            - "{{ world.capsule_root }}"
            - "{{ world.wrapper_bin }}"
            - "{{ world.protected_root }}"
            - "{{ world.codex_bin }}"
            - "{{ world.claude_bin }}"
            - "{{ world.sample_capsule }}"
          cwd: "."
          timeout: 180s
          fail_on_error: false
        bind:
          apply_ok: ok
          apply_exit_code: exit_code
          apply_output: stdout
        on_error: apply_failed
      - when: "world.apply_exit_code != -1"
        emit_intent: apply_finished
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Applying the delegated-user setup with non-interactive sudo."
          - heading: "Output"
          - code: "{{ world.apply_output|default:'(pending)' }}"
        choices:
          - list:
              items:
                - label: "look"
                - label: "back"
                  hint: "review the plan"
                - label: "quit"
                  hint: "leave"
    on:
      apply_finished:
        - when: "world.apply_ok == true"
          target: ready
          effects:
            - set:
                status: "applied"
        - target: apply_failed
          effects:
            - set:
                status: "apply failed"
                last_error: "run-as-user setup apply failed with exit {{ world.apply_exit_code }}\n{{ world.apply_output }}"
      back:
        - target: planned
      look:
        - target: .
      quit:
        - target: ended

  apply_failed:
    description: "Run-as-user setup apply failed"
    relevant_world: [apply_exit_code, apply_output, last_error]
    view:
      extends: "base"
      blocks:
        body:
          - prose: "The automated apply step stopped before marking the setup ready."
          - heading: "Command output"
          - code: "{{ world.last_error|default:'(none)' }}"
        choices:
          - list:
              items:
                - label: "apply"
                  hint: "retry the automated setup"
                - label: "validated"
                  hint: "mark ready after resolving the boundary outside the story"
                - label: "back"
                  hint: "review the plan"
                - label: "quit"
                  hint: "leave"
                - label: "look"
    on:
      apply:
        - target: applying
          effects:
            - set:
                apply_ok: false
                apply_exit_code: -1
                apply_output: ""
                last_error: ""
                status: "applying"
      validated:
        - target: ready
          effects:
            - set:
                status: "validated"
      back:
        - target: planned
      look:
        - target: .
      quit:
        - target: ended

  failed:
    description: "Setup plan failed"
    relevant_world: [last_error]
    view:
      extends: "base"
      blocks:
        body:
          - prose: "The deterministic setup planner failed."
          - heading: "Error"
          - code: "{{ world.last_error|default:'(none)' }}"
        choices:
          - list:
              items:
                - label: "back"
                  hint: "return to the setup values"
                - label: "quit"
                  hint: "leave"
    on:
      back:
        - target: lobby
          effects:
            - set:
                last_error: ""
                status: "not planned"
      quit:
        - target: ended

  ready:
    description: "Run-as-user setup ready"
    relevant_world: [agent_user, capsule_root, receipt_markdown, apply_output, status]
    view:
      extends: "base"
      blocks:
        body:
          - prose: "The setup is ready. Keep the receipt with your machine-local notes and make sure Kitsoki is started with the wrapper directory first in PATH until first-class run_as_user launch support lands."
          - heading: "Receipt"
          - code: "{{ world.receipt_markdown|default:'(pending)' }}"
          - heading: "Apply output"
            when: "world.apply_output != ''"
          - code: "{{ world.apply_output }}"
            when: "world.apply_output != ''"
        choices:
          - list:
              items:
                - label: "back"
                  hint: "review the plan"
                - label: "quit"
                  hint: "leave"
                - label: "look"
    on:
      back:
        - target: planned
      look:
        - target: .
      quit:
        - target: ended

  ended:
    terminal: true
    description: "Closed"
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Done."
