states:
  lobby:
    description: "Run-as-user setup"
    relevant_world: [platform, operator_user, agent_user, group_name, capsule_root, wrapper_bin, protected_root]
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Prepare macOS local-user delegation for coding-agent launches. The story does not run sudo or mutate accounts; it generates reviewed commands and validation probes for the operator-owned harness to run outside the agent sandbox."
          - heading: "Current values"
          - kv:
              pairs:
                Platform: "{{ world.platform }}"
                Operator user: "{{ world.operator_user|default:'(set with configure operator_user=...)' }}"
                Agent user: "{{ world.agent_user }}"
                Agent group: "{{ world.group_name }}"
                Capsule root: "{{ world.capsule_root }}"
                Wrapper bin: "{{ world.wrapper_bin }}"
                Protected root: "{{ world.protected_root }}"
                Codex binary: "{{ world.codex_bin }}"
                Claude binary: "{{ world.claude_bin }}"
          - heading: "Boundary"
          - list:
              items:
                - label: "agent_launch_policy"
                  hint: "rejects unsafe launch locations before the backend starts"
                - label: "run_as_user delegation"
                  hint: "runs codex/claude as the delegated macOS account"
                - label: "ACL probes"
                  hint: "prove the delegated account can write an assigned capsule and cannot write the protected checkout"
        choices:
          - heading: "Actions"
          - list:
              items:
                - label: "plan"
                  hint: "generate config, wrappers, sudoers, assignment, and validation commands"
                - label: "configure operator_user=<name> agent_user=<name> capsule_root=<path>"
                  hint: "update any setup value and regenerate"
                - label: "quit"
                  hint: "leave the setup story"
                - label: "look"
    on:
      plan:
        - target: planned
          effects:
            - set:
                setup_summary: ""
                config_snippet: ""
                account_steps: ""
                group_commands: ""
                wrapper_commands: ""
                sudoers_snippet: ""
                assignment_commands: ""
                validation_commands: ""
                receipt_markdown: ""
                security_notes: ""
                last_error: ""
                status: "planning"
      configure:
        - target: planned
          effects:
            - set:
                platform: "{{ slots.platform ?? world.platform }}"
                operator_user: "{{ slots.operator_user ?? world.operator_user }}"
                agent_user: "{{ slots.agent_user ?? world.agent_user }}"
                group_name: "{{ slots.group_name ?? world.group_name }}"
                capsule_root: "{{ slots.capsule_root ?? world.capsule_root }}"
                wrapper_bin: "{{ slots.wrapper_bin ?? world.wrapper_bin }}"
                protected_root: "{{ slots.protected_root ?? world.protected_root }}"
                codex_bin: "{{ slots.codex_bin ?? world.codex_bin }}"
                claude_bin: "{{ slots.claude_bin ?? world.claude_bin }}"
                sample_capsule: "{{ slots.sample_capsule ?? world.sample_capsule }}"
                setup_summary: ""
                config_snippet: ""
                account_steps: ""
                group_commands: ""
                wrapper_commands: ""
                sudoers_snippet: ""
                assignment_commands: ""
                validation_commands: ""
                receipt_markdown: ""
                security_notes: ""
                last_error: ""
                status: "planning"
      look:
        - target: .
      quit:
        - target: ended

