app: { id: corpus-forge, version: 0.1.0, title: "Corpus forge", author: Kitsoki, license: CC0 }
hosts: [host.run]
world:
  source_manifest: { type: string, default: "tools/arena/corpus/cost-bench.manifest.yaml" }
  output_manifest: { type: string, default: ".artifacts/corpus-forge/corpus.yaml" }
  validation_path: { type: string, default: ".artifacts/corpus-forge/validation.json" }
  selection_id: { type: string, default: "local-corpus-forge" }
  task_limit: { type: int, default: 5 }
  selected_ids: { type: string, default: "" }
  validation: { type: object, default: {} }
intents:
  start: { description: "Select an evidence-backed corpus.", examples: [start], priority: 90 }
  accept: { description: "Continue.", examples: [accept], priority: 80 }
  quit: { description: "Stop.", examples: [quit], priority: 50 }
  look: { description: "Refresh.", examples: [look], priority: 10 }
exits: { done: { requires: [validation] }, abandoned: {} }
root: idle
include: [rooms/*.yaml]
