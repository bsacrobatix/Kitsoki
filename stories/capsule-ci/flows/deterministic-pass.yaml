test_kind: flow
app: capsule-ci
initial_state: idle
initial_world:
  ci_job_id: job-fixture
  ci_pipeline: change
  ci_source: { digest: sha256:source }
  ci_environment: { digest: sha256:environment }
  ci_trigger:
    story_digest: sha256:story
    envelope_digest: sha256:envelope
host_cassette: cassettes/project-checks-pass.cassette.yaml
turns:
  - intent: { name: run, slots: {} }
    expect_state: project_checks
    expect_world:
      ci_verdict:
        schema: capsule-ci-verdict/v1
        pipeline: change
        outcome: passed
        summary: "Project test and build commands passed."
        checks:
          - id: test
            kind: deterministic
            outcome: passed
            evidence: [capsule-ci:project-profile:test]
          - id: build
            kind: deterministic
            outcome: passed
            evidence: [capsule-ci:project-profile:build]
        promotion_eligible: true
        source_digest: sha256:source
        story_digest: sha256:story
        environment_digest: sha256:environment
        envelope_digest: sha256:envelope
expect_no_errors: true
