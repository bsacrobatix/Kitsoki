# ci-status — fetch a PR's CI check results + failing logs via the gh CLI.
#
# Diagnostic companion to stories/open-pr: after a PR is opened, this pulls
# `gh pr checks` (the per-check pass/fail summary) and `gh run view --log-failed`
# (the failing job log tail) so a driver can see WHY CI is red without leaving
# the studio. No LLM — pure host.run. Read the result with session.world
# (checks_summary / failed_log).

app:
  id: ci-status
  version: 0.1.0
  title: "CI status"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.run

world:
  repo:           { type: string, default: "" }     # owner/name; "" ⇒ gh infers from cwd's remote
  pr_number:      { type: string, default: "" }      # PR to read checks for
  branch:         { type: string, default: "" }      # branch whose latest run's failing log to pull
  worktree_path:  { type: string, default: "." }     # cwd for gh (a checkout of the repo)
  checks_summary: { type: string, default: "" }      # `gh pr checks` output
  failed_log:     { type: string, default: "" }      # `gh run view --log-failed` tail
  ci_conclusion:  { type: string, default: "" }      # latest run conclusion (success|failure|…)
  run_exit:       { type: string, default: "" }
  run_stdout:     { type: string, default: "" }
  last_error:     { type: string, default: "" }
  status:         { type: string, default: "open" }

intents:
  check:
    description: "Fetch the PR's CI checks and failing logs."
    examples: [check, "ci status", "why did ci fail", "check ci"]
    priority: 90
  quit:
    description: "Done."
    examples: [quit, done, close]
    priority: 50
  look:
    description: "Re-render."
    examples: [look]
    priority: 10

exits:
  abandoned:
    description: "Operator done."

root: idle

include:
  - rooms/*.yaml
