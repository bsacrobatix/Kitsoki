test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  workdir: "."
  surfaces: "tui,web,vscode"
  output_root: ".artifacts/harness-parity-qa"
  markdown_path: ".context/harness-parity-qa.md"
  visual_policy: "deterministic"

host_handlers:
  host.run:
    by_call:
      parity_provider_stream:
        data:
          ok: true
          exit_code: 0
          stdout: "ok host parity\n"
      parity_tui_activity:
        data:
          ok: true
          exit_code: 0
          stdout: "ok tui parity\n"
      parity_web_activity:
        data:
          ok: true
          exit_code: 0
          stdout: "ok web parity\n"
      parity_vscode_surface:
        data:
          ok: true
          exit_code: 0
          stdout: "ok vscode parity\n"
  host.starlark.run:
    by_call:
      parity_report:
        data:
          parity_result:
            passed: true
            status: complete
            surfaces: ["tui", "web", "vscode"]
            output_root: ".artifacts/harness-parity-qa"
            markdown_path: ".context/harness-parity-qa.md"
            summary_path: ".artifacts/harness-parity-qa/summary.json"
            summary_markdown: "Deterministic harness parity gate is defined for tui, web, vscode."
            checks:
              - id: provider-stream-normalization
                kind: go-test
                command: "go test ./internal/host -run TestAgentStream_HarnessParityThinkingAndToolUse"
                contract: "Claude and Codex stream fixtures normalize to the same ordered thinking/tool activity feed."
                status: passed
                exit_code: 0
                output_tail: "ok host parity"
            visual_gate:
              policy: deterministic
              automated: false
              reason: "Vision review is intentionally gated."

turns:
  - intent:
      name: start
      slots:
        question: "Prove Claude and Codex activity streams render the same."
    expect_state: running
    expect_world:
      status: ready
    expect_host_calls:
      - handler: host.run
        args: { call: parity_provider_stream }
      - handler: host.run
        args: { call: parity_tui_activity }
      - handler: host.run
        args: { call: parity_web_activity }
      - handler: host.run
        args: { call: parity_vscode_surface }
      - handler: host.starlark.run
        args: { call: parity_report }

  - intent: { name: accept, slots: {} }
    expect_state: done
    expect_world:
      status: done

expect_no_errors: true
