# bugfix — general-purpose, provider-neutral bug-fix pipeline.
#
# Wave 1 / Slice α (see docs/proposals/notes/dev-story-implementation-contract.md):
# the 7 visible rooms (idle → reproducing → proposing → implementing → testing
# → reviewing → validating → done) collapse the focused-engineering's 14-phase pipeline
# into one state machine. Each room has an `_executing` substate that drives
# the LLM call producing the artifact, and (for checkpointed rooms) an
# `_awaiting_reply` substate that posts the artifact, mirrors it to the local
# inbox, optionally runs an LLM-judge, and waits for accept / refine /
# restart_from / quit.
#
# # One YAML, three modes — judge polymorphism
#
# A single `world.judge_mode` flag selects who answers at every checkpoint:
#
#   human          — wait for an explicit human reply intent (no LLM call)
#   llm            — run the LLM-judge; if confident, the LLM's reply is
#                    captured into world.llm_verdict for an operator-driven
#                    follow-up; if not confident, the state holds (operator
#                    sweep). [strict mode for batch overnight runs]
#   llm_then_human — run the LLM-judge; if confident, capture verdict; if not
#                    confident, fall through to the human reply path.
#                    [recommended autonomous default]
#
# The same YAML drives all three. Only one host call is gated by `when:` per
# checkpoint — no fork in the state graph.
#
# # What is NOT here (Wave 2):
#   - the pr-refinement tail import is now OPT-IN (bugfix_exit=open-PR-merge,
#     WS-C C3 — see the `imports.pr` block below): `done`'s accept arc composes
#     it in-process and can reach @exit:merged standalone. The default
#     (open-PR) still hands off `@exit:done` to a parent that imports
#     pr-refinement itself (dev-story's `pr` alias), unchanged.
#   - cycle budgets, `restart_from_stage` plumbing, `quick_fix` / `skip_to_pr`
#     shortcut intents
#   - actual provider implementations for ticket / vcs / ci / workspace —
#     Slice β ships the handlers; this story references them by name only
#   - automatic intent emission from a confident LLM verdict (the contract's
#     `emit_intent:` effect is not yet supported by the runtime — see the
#     final report; for now an authorised human / operator types the verdict's
#     intent. The verdict text lives in world.llm_verdict.reason for review.)

app:
  id: bugfix
  version: 0.1.0
  title: "Bug-fix pipeline"
  author: "Kitsoki"
  license: "CC0"

# Host allow-list. The six iface defaults below register implicitly through
# resolveAllInterfaces — every `iface.<name>.<op>` site is union'd into hosts
# as `<binding>.<op>` at load time. Bare host calls listed explicitly because
# they are not wrapped by an iface.
hosts:
  - host.inbox.add
  - host.agent.ask
  - host.agent.decide
  - host.agent.task
  # host.agent.codeact — triaging's bounded read-only code-act loop (inspect
  # tree + git history, emit a schema-gated triage_verdict). See
  # stories/bugfix/rooms/triaging.yaml.
  - host.agent.codeact
  # Review-diff: open the committed fix (feature_branch vs base_branch) in the
  # operator's editor (with a captured accept/reject verdict) or a view-only
  # system difftool. The reviewing room's `review_externally` arc drives it; the
  # verdict routes advance/redo. See docs/architecture/hosts.md#hostdiffopen.
  - host.diff.open
  # host.run — the pre-fix regression gate (testing room) + the ship-it tail's
  # integrate/verify/cleanup host.run sites (imported as `tail`).
  - host.run
  # Deterministic acceptance-contract checker for strict callers. It compares
  # public requirement IDs against the testing artifact; it never reads a
  # benchmark oracle or asks an LLM to grade itself.
  - host.starlark.run
  # Editor awareness (WS-C C3, docs/proposals/ide-integration.md follow-up 3):
  # the validating room pulls REAL diagnostics from an attached `/ide` editor
  # as extra evidence for the verify gate. "Not-connected is a value" — no
  # live link (every flow/cassette/headless run) returns a typed
  # {connected:false, diagnostics:[]}, never an error, so this degrades
  # honestly rather than needing a fallback host. See rooms/validating.yaml.
  - host.ide.get_diagnostics
  # Standalone GitHub ticket close-out: when world.ticket_repo is set the done
  # room comments/closes the GitHub issue directly instead of falling back to
  # the local-files default ticket provider.
  - host.gh.ticket.get
  - host.gh.ticket.comment
  - host.gh.ticket.transition
  # The ship-it tail import declares these; unioned at load so the imported
  # integrate/verify/cleanup rooms resolve their host bindings.
  - host.capsule_workspace
  - host.artifacts_dir

# Persona table (agent-split proposal §3.5).
#
# Each persona declares the model, tool surface, and blast-radius
# classification for one class of LLM work. The verb at every call site
# is chosen to match the persona's declared surface:
#
#   ask     — read-only inspection; returns prose or typed JSON
#   decide  — LLM reasoning verdict; schema mandatory; read-only tools
#   task    — agentic; may mutate files; external_side_effect declared
#
# Personas used in this story:
#
#   reproducer       task    phase_1 (reproducing artifact)
#   proposer         ask     phase_2 (fix proposal), phase_7 (close-out)
#   implementer      task    phase_3 (applying the fix)
#   test_author      task    phase_4 (testing + test-writing)
#   validator        task    phase_6 (full-env validation)
#   judge_<phase>    decide  every inter-phase gate
agents:
  reproducer:
    system_prompt: "You are a bug reproduction analyst. Read the codebase, reproduce the reported bug, identify the affected components, and produce a structured reproduction artifact. External-write policy: do not create, comment on, close, transition, or otherwise mutate external tickets, GitHub issues, GitHub PRs, or remote services; do not use raw gh or other GitHub CLIs. Return artifacts only; the story done-room owns ticket comments and close-out through native host.gh.ticket/kitsoki gitops orchestration."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Bash]
    bash_profile: read-only

  # triager — triage-only mode. Read-only assessment of whether the reported
  # bug STILL EXISTS in the current working tree, emitting a standardized
  # verdict (ALREADY-FIXED | STILL-LIVE | PARTIAL | UNCLEAR) with concrete code
  # evidence. No worktree, no fix, no judge — the verdict IS the deliverable.
  triager:
    system_prompt: "You are a bug triage analyst. Read the reported bug, then inspect the current codebase (the cited files/functions, the Suggested-fix section, and any regression test) to determine whether the defect still exists in the working tree. Emit a standardized triage verdict citing concrete code evidence (file:line, function name, or a regression test) — never prose alone. External-write policy: do not create, comment on, close, transition, or otherwise mutate external tickets, GitHub issues, GitHub PRs, or remote services; do not use raw gh or other GitHub CLIs. Return artifacts only; the story done-room owns ticket comments and close-out through native host.gh.ticket/kitsoki gitops orchestration."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Bash]
    bash_profile: read-only

  proposer:
    system_prompt: "You are a senior engineer performing code analysis. Read the codebase, analyse the reproduction evidence, and produce a structured fix proposal or close-out summary. External-write policy: do not create, comment on, close, transition, or otherwise mutate external tickets, GitHub issues, GitHub PRs, or remote services; do not use raw gh or other GitHub CLIs. Return artifacts only; the story done-room owns ticket comments and close-out through native host.gh.ticket/kitsoki gitops orchestration."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Bash]
    bash_profile: read-only

  implementer:
    system_prompt: "You are a software engineer applying a proposed fix. Read the proposal artifact, locate the affected files, and apply the minimal correct edit to fix the bug. External-write policy: do not create, comment on, close, transition, or otherwise mutate external tickets, GitHub issues, GitHub PRs, or remote services; do not use raw gh or other GitHub CLIs. Return artifacts only; the story done-room owns ticket comments and close-out through native host.gh.ticket/kitsoki gitops orchestration."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Edit, Write, Bash]
    bash_profile: read-only

  test_author:
    system_prompt: "You are a software engineer reviewing test coverage and authoring regression tests. Read the applied fix, run the tests, and produce a structured test-review artifact. External-write policy: do not create, comment on, close, transition, or otherwise mutate external tickets, GitHub issues, GitHub PRs, or remote services; do not use raw gh or other GitHub CLIs. Return artifacts only; the story done-room owns ticket comments and close-out through native host.gh.ticket/kitsoki gitops orchestration."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Edit, Write, Bash]
    bash_profile: read-only

  validator:
    system_prompt: "You are a validation engineer verifying a fix in a full environment. Build the project, run tests, check the fix applies, and produce a structured validation artifact. External-write policy: do not create, comment on, close, transition, or otherwise mutate external tickets, GitHub issues, GitHub PRs, or remote services; do not use raw gh or other GitHub CLIs. Return artifacts only; the story done-room owns ticket comments and close-out through native host.gh.ticket/kitsoki gitops orchestration."
    model: claude-sonnet-4-6
    tools: [Read, Grep, Glob, Bash]
    bash_profile: read-only

  judge:
    system_prompt: "You are a quality gate. Evaluate the provided artifact against the stated criteria and emit a structured verdict: accept, refine, or uncertain. External-write policy: do not create, comment on, close, transition, or otherwise mutate external tickets, GitHub issues, GitHub PRs, or remote services; do not use raw gh or other GitHub CLIs. Return artifacts only; the story done-room owns ticket comments and close-out through native host.gh.ticket/kitsoki gitops orchestration."
    model: claude-sonnet-4-6
    tools: []

operations:
  bugfix_full:
    title: "Fix bug (gated)"
    mode: interactive
    execution_mode: staged
    stop_on: [needs-human, uncertain, gate-failed, host-error, conflict, budget-exhausted, policy-denied]
    pause_on: [operator-ask, protected-branch-approval]
    terminal_artifact: done_artifact
    phase_summary:
      from: [reproduction_artifact, proposal_artifact, implement_artifact, testing_artifact, review_artifact, validation_artifact, done_artifact]
  bugfix_full_llm_review:
    title: "Fix bug (LLM review)"
    mode: autonomous
    execution_mode: one-shot
    run_in_background: true
    stop_on: [needs-human, uncertain, gate-failed, host-error, conflict, budget-exhausted, policy-denied]
    pause_on: [operator-ask, protected-branch-approval]
    terminal_artifact: done_artifact
    phase_summary:
      from: [reproduction_artifact, proposal_artifact, implement_artifact, testing_artifact, review_artifact, validation_artifact, done_artifact]
  bugfix_full_no_gate:
    title: "Fix bug (no gate)"
    mode: autonomous
    execution_mode: one-shot
    run_in_background: true
    stop_on: [needs-human, uncertain, gate-failed, host-error, conflict, budget-exhausted, policy-denied]
    pause_on: [operator-ask, protected-branch-approval]
    terminal_artifact: done_artifact
    phase_summary:
      from: [reproduction_artifact, proposal_artifact, implement_artifact, testing_artifact, review_artifact, validation_artifact, done_artifact]
  bugfix_quick:
    title: "Quick bug fix (gated)"
    mode: interactive
    execution_mode: staged
    stop_on: [needs-human, uncertain, gate-failed, host-error, conflict, budget-exhausted, policy-denied]
    pause_on: [operator-ask]
    terminal_artifact: done_artifact
    phase_summary:
      from: [reproduction_artifact, proposal_artifact, implement_artifact, testing_artifact, done_artifact]
  bugfix_quick_llm_review:
    title: "Quick bug fix (LLM review)"
    mode: autonomous
    execution_mode: one-shot
    run_in_background: true
    stop_on: [needs-human, uncertain, gate-failed, host-error, conflict, budget-exhausted, policy-denied]
    pause_on: [operator-ask]
    terminal_artifact: done_artifact
    phase_summary:
      from: [reproduction_artifact, proposal_artifact, implement_artifact, testing_artifact, done_artifact]
  bugfix_quick_no_gate:
    title: "Quick bug fix (no gate)"
    mode: autonomous
    execution_mode: one-shot
    run_in_background: true
    stop_on: [needs-human, uncertain, gate-failed, host-error, conflict, budget-exhausted, policy-denied]
    pause_on: [operator-ask]
    terminal_artifact: done_artifact
    phase_summary:
      from: [reproduction_artifact, proposal_artifact, implement_artifact, testing_artifact, done_artifact]
  bugfix_triage:
    title: "Triage bug (gated)"
    mode: interactive
    execution_mode: staged
    stop_on: [needs-human, uncertain, gate-failed, host-error, budget-exhausted, policy-denied]
    pause_on: [operator-ask]
    terminal_artifact: triage_verdict
    phase_summary:
      from: [triage_verdict]
  bugfix_triage_llm_review:
    title: "Triage bug (LLM review)"
    mode: autonomous
    execution_mode: one-shot
    run_in_background: true
    stop_on: [needs-human, uncertain, gate-failed, host-error, budget-exhausted, policy-denied]
    pause_on: [operator-ask]
    terminal_artifact: triage_verdict
    phase_summary:
      from: [triage_verdict]
  bugfix_triage_no_gate:
    title: "Triage bug (no gate)"
    mode: autonomous
    execution_mode: one-shot
    run_in_background: true
    stop_on: [needs-human, uncertain, gate-failed, host-error, budget-exhausted, policy-denied]
    pause_on: [operator-ask]
    terminal_artifact: triage_verdict
    phase_summary:
      from: [triage_verdict]

# Six host_interfaces — the provider-neutral surfaces every parent story
# binds to a concrete handler at import time. Operation names + I/O shapes
# are fixed by the contract; only the `default:` may be rebound.
host_interfaces:

  # 2.1 ticket — issue tracker (file / GitHub Issues / Jira).
  ticket:
    description: "Issue tracker abstraction (file / GitHub Issues / Jira)."
    operations:
      search:
        input:  { query: string, limit: int }
        output: { tickets: list }
      get:
        input:  { id: string }
        output: { id: string, title: string, body: string, status: string,
                  priority: string, assignee: string, url: string, comments: list,
                  repro_command: string }
      comment:
        input:  { id: string, body: string, thread: string }
        output: { ok: bool, comment_id: string }
      transition:
        input:  { id: string, to: string }
        output: { ok: bool }
      list_mine:
        input:  { filter: string }
        output: { tickets: list }
    default: host.local_files.ticket

  # 2.2 vcs — version control + PR host (git / GitHub / Bitbucket).
  vcs:
    description: "Branch / commit / PR abstraction (git / GitHub / Bitbucket)."
    operations:
      branch:
        input:  { workdir: string, name: string, base: string }
        output: { ok: bool, branch: string }
      diff:
        input:  { workdir: string }
        output: { diff: string, files: list }
      commit:
        # stage_all: when true the handler runs `git add -A` first, so NEW
        # untracked files (e.g. a test the test_author wrote) AND deletions
        # are captured — `files:` and the `-a` fallback both miss untracked.
        # The testing room sets this so a test-phase edit can never be
        # stranded uncommitted (the lost-work split). See git_vcs.go.
        input:  { workdir: string, message: string, files: list, stage_all: bool }
        output: { ok: bool, sha: string }
      push:
        input:  { workdir: string, remote: string }
        output: { ok: bool, url: string }
      open_pr:
        input:  { workdir: string, title: string, body: string, base: string }
        output: { ok: bool, url: string, pr_id: string }
      pr_status:
        input:  { pr_id: string }
        output: { state: string, checks: list, comments: list }
      pr_comment:
        input:  { pr_id: string, body: string }
        output: { ok: bool }
    default: host.git

  # 2.3 ci — build & test runner (local make / go test, GitHub Actions, Jenkins).
  ci:
    description: "Build/test runner (local make/go test, GitHub Actions, Jenkins)."
    operations:
      run_tests:
        input:  { workdir: string, target: string }
        output: { ok: bool, passed: int, failed: int, log: string, junit: string }
      build:
        input:  { workdir: string, target: string }
        output: { ok: bool, log: string }
      remote_status:
        input:  { pr_id: string }
        output: { state: string, checks: list }
    default: host.local

  # 2.4 workspace — per-task isolated workspace (scripted clone capsule by default).
  workspace:
    description: "Working-copy manager. Prefer checked-in Capsule definitions; legacy bindings may still consume name/base."
    operations:
      list:
        input:  {}
        output: { workspaces: list }
      get:
        input:  { id: string }
        output: { id: string, path: string, branch: string, dirty: bool }
      create:
        # `id` is the workspace identity; `definition` names the checked-in
        # Capsule definition. `name`/`base` remain transitionally present for
        # legacy bindings. Capsule bindings return the authoritative branch.
        input:  { id: string, definition: string, name: string, base: string, session_id: string }
        output: { ok: bool, path: string, branch: string }
      sync:
        input:  { id: string }
        output: { ok: bool, log: string }
    default: host.capsule_workspace

  # 2.5 transport — out-of-band channel for checkpoint artifacts. For
  # kitsoki-dev this is `host.append_to_file` (appends a comment block to the
  # local bug file); focused-engineering's parent story will rebind to
  # `host.jira_comment`. host.stdout (no-op) is available for tests that
  # don't care about the side effect.
  transport:
    description: "Out-of-band channel for posting proposals, checkpoints, status."
    operations:
      post:
        input:  { thread: string, body: string }
        output: { ok: bool, message_id: string }
    default: host.append_to_file

# World — Wave 1 keys (contract §4). Provider handlers populate these via
# `bind:` projections inside rooms; checkpoint judges read them via
# `relevant_world:`.
world:
  # ── Identity / ticket ──────────────────────────────────────────────────
  ticket_id:        { type: string, default: "" }
  ticket_title:     { type: string, default: "" }
  ticket_status:    { type: string, default: "" }
  ticket_url:       { type: string, default: "" }
  ticket_repo:      { type: string, default: "" }   # owner/repo for GitHub issue close-out; empty keeps local ticket provider
  ticket_source_mode: { type: string, default: "local" } # local | remote | freeform; triage prompt contract
  ticket_source_ref:  { type: string, default: "" }      # local path, remote issue URL/ref, or free-form complaint label
  ticket_body:        { type: string, default: "" }      # remote issue body, pre-read local issue body, or free-form complaint
  thread:           { type: string, default: "" }
  allowed_authors:  { type: string, default: "" }   # CSV — list not yet a first-class scalar type

  # ── Audit/reporting ──────────────────────────────────────────────────
  # Optional caller-provided reporting refs. Local and headless remote drivers
  # can seed these with a trace path/URL and an artifact bundle/report path/URL;
  # done.accept publishes them in a parseable kitsoki-bugfix-audit issue block.
  # Empty refs degrade to the engine-owned session_id in the close-out comment.
  audit_actor:      { type: string, default: "kitsoki" }
  audit_mode:       { type: string, default: "autonomous" }
  run_trace_ref:    { type: string, default: "" }
  run_artifacts_ref: { type: string, default: "" }

  # ── Workspace ─────────────────────────────────────────────────────────
  workspace_id:     { type: string, default: "" }
  workdir:          { type: string, default: "" }
  # base_branch defaults to "main" so bf.idle's auto-create has a
  # sane root for the workspace provider's create operation.
  # Parent stories that work off a different long-lived branch
  # (release/* etc.) override via world_in or by setting the key
  # explicitly before transitioning into bf.
  base_branch:      { type: string, default: "main" }
  # base_commit pins the workspace CUT-POINT to a specific committish. When
  # empty the workspace is cut from base_branch. Distinct from base_branch on
  # purpose: base_branch is also the PR target, whereas base_commit is
  # "reproduce/fix AGAINST this exact commit" — e.g. a bug's pre-fix baseline
  # SHA in a bake-off cell. Set it (not base_branch) when driving against a
  # detached baseline.
  base_commit:      { type: string, default: "" }
  feature_branch:   { type: string, default: "" }

  # ── Pipeline control ──────────────────────────────────────────────────
  bugfix_mode:      { type: string, default: "full" }            # full | quick
  # Implementation action surface. agent_task is the existing open coding-agent
  # path; codeact swaps only the mutating implementing-room step to
  # host.agent.codeact so benchmark runners can isolate the action surface.
  implementation_mode: { type: string, default: "agent_task" }    # agent_task | codeact
  codeact_implement_steps: { type: list, default: [] }
  # Filled only when the optional implementation plan is present. Legacy callers
  # leave these empty and retain the established action surfaces.
  compiled_implementation_plan: { type: list, default: [] }
  implementation_capability_manifest: { type: object, default: {} }
  # Autostart pre-flight triage (default ON). Before spending the maker
  # pipeline on an autostarted ticket, run the read-only triager once against
  # the freshly-cut worktree: ALREADY-FIXED short-circuits to @exit:triaged
  # (no reproducer/judge/maker budget spent on a bug that no longer exists);
  # any other verdict (STILL-LIVE | PARTIAL | UNCLEAR) proceeds into
  # reproducing with the verdict posted as a checkpoint — the deterministic
  # repro RED-gate remains the authoritative arbiter for UNCLEAR. Applies
  # only to the idle AUTOSTART path (headless / marathon / parent-story
  # handoffs); an operator explicitly typing start / full_pipeline /
  # quick_fix has already chosen to run the pipeline and skips it. Callers
  # with a known-live bug (e.g. bench cells pinned to a pre-fix baseline)
  # seed auto_triage: false to skip the redundant spend.
  auto_triage:      { type: bool, default: true }

  # ── Exit slot (slice 4 — bugfix convergence) ───────────────────────────
  # The bug-fix pipeline ends one of two ways:
  #
  #   direct-ship — compose the ship-it tail (integrate → re-verify the
  #                 regression gate on the MERGED commit → cleanup) and land
  #                 the fix on LOCAL main. @exit:shipped on green; @exit:needs-human
  #                 on any integrate/verify/cleanup failure OR a regression gate
  #                 that was never RED pre-fix. This is the self-hosting loop.
  #   open-PR     — today's behaviour: walk reviewing → validating → done and hand
  #                 the close-out artifact to pr-refinement (parent stories lift
  #                 @exit:done). For human-review flows.
  #   open-PR-merge — opt-in tail (WS-C C3): same as open-PR through `done`, but
  #                 done's accept arc composes the IMPORTED pr-refinement pipeline
  #                 in-process (open → CI-watch → merge) instead of firing
  #                 @exit:done — so a standalone "fix a bug" run can reach
  #                 @exit:merged with NO parent story required. @exit:done stays
  #                 the default for every existing caller that doesn't opt in.
  #
  # Default direct-ship for the self-hosting loop. Parent stories that want the
  # PR-handoff tail (dev-story, gears-bugfix) project bugfix_exit: open-PR via
  # world_in. See stories/bugfix/README.md (the exit slot + RED→GREEN gate).
  bugfix_exit:      { type: string, default: "direct-ship" }     # direct-ship | open-PR | open-PR-merge

  # ── RED→GREEN regression gate (slice 4) ────────────────────────────────
  # The bugfix-specific discipline ship-it does NOT cover: the regression test
  # must FAIL before the fix and PASS after. The testing room runs the gate on
  # the PRE-FIX snapshot and records whether it was RED there (regression_red_pre_fix);
  # the shared ship-it verify room re-runs the SAME gate on the MERGED commit and
  # records GREEN (verify_ok). A fix whose regression test was never RED pre-fix
  # (a characterization test), or isn't GREEN on merged main, routes to
  # @exit:needs-human — never @exit:shipped. See stories/bugfix/README.md.
  gate_command:           { type: string, default: "" }    # the deterministic regression gate (re-run on merged commit)
  # default_landing_gate — the gate the delivery tail re-runs on the MERGED commit
  # when the ticket carries NO repro_command (gate_command empty). Landing should
  # never ship blind: even without a bug-specific regression test we re-prove the
  # build + suite pass on main. Instances retarget it (kitsoki-dev pins the story
  # flow suite for story fixes; a Rust repo pins cargo). The never-RED trap is
  # enforced ONLY when a real regression gate (gate_command) was configured.
  default_landing_gate:   { type: string, default: "go build ./... && go test ./..." }
  # landing_gate — what the tail actually re-verifies: the regression gate when a
  # repro_command is present, else default_landing_gate. Computed in the testing
  # room's direct-ship landing arm and projected into the tail's gate_command.
  landing_gate:           { type: string, default: "" }
  regression_red_pre_fix: { type: bool,   default: false } # the gate FAILED on the pre-fix snapshot (RED)
  regression_pre_fix_log: { type: string, default: "" }    # the pre-fix gate's output tail (audit)
  regression_gate_checked: { type: bool,  default: false } # the pre-fix gate actually ran (vs skipped)

  # ── Repro RED-gate (reproducing room) ──────────────────────────────────
  # The bugfix-repro-gate slice: a ticket can carry a `repro_command:`
  # frontmatter field, projected into world.gate_command at ticket-load. The
  # `reproducing` room runs it RED-first on the unchanged (pre-fix) worktree
  # BEFORE the LLM reproducer — non-zero exit (RED, bug reproduces) → proceed
  # to proposing; zero exit (GREEN, cannot reproduce) → @exit:not-reproducible.
  # `repro_checked` latches the one-shot run (mirrors regression_gate_checked).
  # Empty gate_command ⇒ the gate is skipped ⇒ current LLM-only reproducing
  # behaviour (backward compatible). See docs/stories/bugfix.md.
  repro_checked:          { type: bool,   default: false } # the pre-fix repro gate ran in reproducing
  # repro_committed — latches the synthesised-gate commit. When a ticket carries
  # NO repro_command (gate_command empty), the reproducing room commits the LLM
  # reproducer's authored RED test as a DISCRETE pre-fix commit and derives
  # gate_command from the artifact's repro_command, so the testing room's HEAD~1
  # RED gate + the ship guard work exactly as they do for a ticket-supplied
  # repro_command. This is what lets a bare bug report (no repro_command) still
  # reach @exit:shipped autonomously. See flows/bugfix_synthesizes_gate_and_ships.yaml.
  repro_committed:        { type: bool,   default: false }

  # ── GREEN→RED→GREEN deterministic reproduce gate (reproducing room) ──────
  # Proves the GREEN(baseline)→RED(reproducer) legs DETERMINISTICALLY, off the
  # reproducer's OWN authored test (repro_command + repro_test_paths) and the
  # project test_cmd — no pre-supplied oracle, so it is leak-safe in a bake-off.
  # Runs after the reproducer agent, before the LLM judge. It proves GREEN→RED
  # before the LLM assesses test QUALITY/APPLICABILITY. A baseline that is
  # already RED is a contaminated workspace/calibration input and exits once;
  # it must never trigger an identical reproducer retry. The GREEN(fix) leg is
  # proven later in testing. Empty test_cmd ⇒ the deterministic gate degrades to
  # LLM-only (logged, never silent). See
  # .context/green-red-green-repro-gate.md and flows/bugfix_green_red_green_gate.yaml.
  repro_baseline_green:   { type: bool,   default: false } # test_cmd was GREEN with the reproducer's test removed
  repro_test_red:         { type: bool,   default: false } # repro_command exits non-zero WITH the test present (RED)
  repro_gate_ran:         { type: bool,   default: false } # the deterministic gate actually ran (latch / vs skipped)
  repro_gate_ok:          { type: bool,   default: false } # baseline_green && test_red — GREEN→RED proven
  repro_gate_summary:     { type: string, default: "" }    # one-line human verdict (posted + rendered)
  repro_gate_log:         { type: string, default: "" }    # captured output tail (audit)

  # ── Lost-work guard (clean-tree invariant) ──────────────────────────────
  # The maker rooms mutate the worktree (implementer writes the fix,
  # test_author writes/repairs tests). Every such edit MUST land in a commit
  # before an exit — `git rebase`/`merge` move only committed content, so an
  # uncommitted/untracked file would ship an empty or partial shell while the
  # working tree (which the gates read) looks green. The `done` room re-reads
  # `git status --porcelain` and routes a dirty tree to @exit:needs-human
  # rather than @exit:done — the open-PR analogue of the integrate room's
  # existing direct-ship guard (delivery-tail/rooms/integrate.yaml).
  worktree_dirty:        { type: bool,   default: false }  # done's git-status check found uncommitted/untracked work
  worktree_dirty_files:  { type: string, default: "" }     # the porcelain listing (carried into last_error)

  # ── CI command profile (provider-neutral retargeting) ───────────────────
  # The ci interface defaults to host.local, whose run_tests/build default to
  # `go test ./...` / `go build ./...`. An instance targeting a non-Go repo
  # (e.g. the gears-rust Rust workspace) sets these so the testing / validating
  # rooms forward them to host.local's `test_cmd` / `build_cmd` args. Empty
  # (the default) preserves the Go behaviour — host.local's splitOverride
  # treats "" as "use the built-in default", so Go stories are unaffected.
  # See internal/host/local_ci.go (splitOverride) + docs/architecture/hosts.md.
  test_cmd:         { type: string, default: "" }   # e.g. "cargo test -p cf-gears-toolkit config"
  build_cmd:        { type: string, default: "" }   # e.g. "cargo build -p cf-gears-toolkit"

  # bf_autostart_attempted gates bf.idle's on_enter setup+autostart
  # chain so it fires exactly once per session per ticket. Without
  # this, an on_error bounce back to idle would re-fire the chain
  # against a stale workspace (the loop the dogfood walkthrough hit
  # on 2026-05-18 — see rooms/idle.yaml's on_enter comment).
  bf_autostart_attempted: { type: bool, default: false }
  # Explicit opt-in for a caller-prepared workspace identity: when true, idle
  # keeps a seeded workspace_id / feature_branch / workdir and never derives or
  # creates a replacement workspace, including after a refinement re-entry.
  # Auditable and default-off: a headless caller must SAY it prepared the
  # checkout; silently seeded identities still get re-derived into
  # .capsules/workspaces/bf-*. Autostart's other steps (thread derivation, start) run
  # normally — unlike bf_autostart_attempted, this only affects workspace identity.
  workspace_prepared:     { type: bool, default: false }
  # User-facing oversight policy. judge_mode remains the compatibility switch
  # consumed by existing checkpoint rooms; oversight_mode selects operation
  # posture at launch.
  oversight_mode:   { type: string, default: "" }                # "" = infer from judge_mode; gated | llm-review | no-gate
  judge_mode:       { type: string, default: "human" }           # human | llm | llm_then_human
  judge_confidence_threshold: { type: float, default: 0.8 }

  # Active human-escalation on low-value work. Default false preserves the
  # supervised behavior (uncertain HOLDS for an operator sweep; budget exhaustion
  # ABANDONS). When true, the proposing/reproducing gates quit EARLY to
  # @exit:needs-human with a structured `needs_human_reason` instead of
  # refine-looping into the expensive implement→test→review path or steamrolling
  # a low-confidence verdict. Autonomous drivers (bench-bugfix, drive_cell) set
  # true; the TUI / kitsoki-dev leave it false. See .context/bugfix-early-escalation.md.
  escalate_low_value: { type: bool, default: false }
  # A proposed fix below this self-reported confidence is "low value" → escalate
  # before spending implement/test/review budget (only when escalate_low_value).
  proposer_confidence_floor: { type: float, default: 0.5 }
  # The question handed to the human on an escalation exit (carried in last_error).
  needs_human_reason: { type: string, default: "" }

  # Global cycle counter — tracks total refinements across the run. Per-phase
  # counters (below) drive the L2 budget gates; this scalar is a coarse
  # convenience for views / audit.
  cycle:            { type: int,    default: 0 }

  # ── L2 cycle budgets — per-checkpoint refine counters + budgets ──────
  #
  # Wave 3 / Phase 4 — port of the focused-engineering bugfix's L2 cycle-budget
  # pattern (HALLY-MIGRATION §2.6). Each checkpointed room maintains its
  # own `<phase>_cycle` counter; when `refine` fires the counter increments
  # and the room re-executes. When the counter hits `<phase>_budget` the
  # refine arc redirects to `@exit:abandoned` with `abandon_reason:
  # <phase>_cycle_budget_exhausted` — the operator gets one bail-out
  # instead of an infinite loop.
  #
  # Budgets default to 3 (matches focused-engineering's L2 retry caps); operators
  # can override per-session by setting `<phase>_budget` in initial_world.
  # `cycle_budget` is the documented global default — kept here for parity
  # with the proposal §4.2 vocabulary but not currently used directly by
  # any arc (each phase reads its own `_budget` key).
  reproducing_cycle:    { type: int, default: 0 }
  proposing_cycle:      { type: int, default: 0 }
  implementing_cycle:   { type: int, default: 0 }
  testing_cycle:        { type: int, default: 0 }
  reviewing_cycle:      { type: int, default: 0 }
  validating_cycle:     { type: int, default: 0 }
  done_cycle:           { type: int, default: 0 }
  cycle_budget:         { type: int, default: 3 }   # documented global default
  reproducing_budget:   { type: int, default: 3 }
  proposing_budget:     { type: int, default: 3 }
  implementing_budget:  { type: int, default: 3 }
  testing_budget:       { type: int, default: 3 }
  reviewing_budget:     { type: int, default: 3 }
  validating_budget:    { type: int, default: 3 }
  done_budget:          { type: int, default: 3 }

  # Audit counter — incremented every time a `jump_to` arc fires. A non-zero
  # value at @exit:done means the pipeline skipped phases; parent stories /
  # post-mortems read this to know that, e.g., the testing phase didn't run.
  unsafe_jumps_made:   { type: int, default: 0 }

  last_reply_author:   { type: string, default: "" }
  refine_feedback:     { type: string, default: "" }
  jump_to:             { type: string, default: "" }
  restart_from_stage:  { type: string, default: "" }
  abandon_reason:      { type: string, default: "" }

  # ── Per-room artifacts (objects; each holds {summary_title, summary_markdown, …}) ─
  triage_verdict:            { type: object, default: {} }  # triage-only mode: standardized verdict (schemas/triage_verdict.json)
  reproduction_artifact:     { type: object, default: {} }
  propose_fix_artifact:      { type: object, default: {} }
  implement_artifact:        { type: object, default: {} }  # implementing agent output (files_changed, applied, blockers)
  implement_review_artifact: { type: object, default: {} }  # testing-room artifact (yes, the name predates the implement_artifact split)
  # Optional caller-authored, public acceptance contract. Strict benchmark and
  # MCP callers supply requirement IDs here; ordinary bugfix remains compatible
  # with the empty default.
  acceptance_contract:       { type: list, default: [] }
  acceptance_gate:           { type: object, default: {} }
  # Public baseline for strict acceptance path checks. The paired calibration
  # runner supplies this task-visible revision; blank callers fall back to the
  # discrete fix commit range in testing.yaml.
  acceptance_base_sha:       { type: string, default: "" }
  acceptance_changed_paths:  { type: string, default: "" }
  # Unified=0 committed diff for public source-evidence clauses. It never
  # contains a benchmark oracle; callers may only require strings stated in
  # their public ticket/contract.
  acceptance_changed_diff:   { type: string, default: "" }
  validate_artifact:         { type: object, default: {} }
  done_artifact:             { type: object, default: {} }
  fixed_in_commit:           { type: string, default: "" }  # short HEAD at close-out; posted to the issue before resolving

  # ── Judge state ───────────────────────────────────────────────────────
  llm_verdict:      { type: object, default: {} }   # { intent, reason, confidence, verdict }

  # ── PR (populated by pr-refinement in Wave 2; held here for round-trip) ─
  pr_id:            { type: string, default: "" }
  pr_url:           { type: string, default: "" }
  ci_state:         { type: string, default: "" }
  ci_log:           { type: string, default: "" }  # last CI run log; scratch

  # ── CI-watch/merge tail handoff (opt-in — bugfix_exit=open-PR-merge) ────
  # done's accept arc (when bugfix_exit=open-PR-merge) sets pr_title/pr_body
  # from the just-produced done_artifact, then enters the imported `pr`
  # compound (../pr-refinement) at open_pr; its world_in: projects these +
  # workdir/feature_branch/base_branch/judge_mode into the child. merge_sha
  # is lifted back from the child's @exit:merged. See rooms/done.yaml.
  pr_title:         { type: string, default: "" }
  pr_body:          { type: string, default: "" }
  merge_strategy:   { type: string, default: "squash" }  # squash | merge | rebase — forwarded to pr-refinement
  merge_sha:        { type: string, default: "" }        # the merged commit sha, lifted from the pr child on @exit:merged

  # ── Editor awareness (validating room, WS-C C3) ─────────────────────────
  # host.ide.get_diagnostics's whole Result.Data envelope + a convenience
  # flattened list, so the validator's prompt AND the room's view can weigh
  # real editor diagnostics as evidence. connected:false (no `/ide` link —
  # the default for every flow/cassette/headless run) is a HONEST value, not
  # an error: the view renders it explicitly rather than hiding the gap.
  ide_diagnostics_result: { type: object, default: {} }  # {connected, diagnostics}
  ide_diagnostics:        { type: list,   default: [] }  # world.ide_diagnostics_result.diagnostics, flattened

  # ── Review-diff (host.diff.open) — populated by reviewing_external ────────
  review_verdict:       { type: string, default: "" }   # "accept" | "reject" | "" (no verdict)
  review_surface:       { type: string, default: "" }   # "ide" | "difftool:<name>" | "none"
  review_reviewed:      { type: bool,   default: false } # did any surface actually show the diff?
  review_changed_files: { type: list,   default: [] }    # paths handed to the diff surface

  # ── ship-it tail handoff (slice 4 — direct-ship) ─────────────────────
  # The maker→tail seam, identical to cherny-loop's @exit:achieved handoff that
  # ship-it's `integrate` room reads. bugfix's implementing/testing rooms leave
  # the worktree + branch populated; the ship-it tail import projects these into
  # the tail's own world (worktree_path / workspace_branch / gate_command).
  worktree_path:    { type: string, default: "" }   # the bugfix worktree (== workdir); set when entering the tail
  shipped_sha:      { type: string, default: "" }   # the merged commit, set after a green re-verify
  last_error:       { type: string, default: "" }   # the real failure on any needs-human arc

  # ── Story-level "done" sink for standalone runs ──────────────────────
  status:           { type: string, default: "open" }

# Intent vocabulary. Per-room arcs use these names. Slot shapes:
#   refine.feedback          — operator note explaining what to redo
#   restart_from.stage       — name of a prior room to re-enter
#   quit                     — no slots
intents:
  start:
    description: "Begin the pipeline from idle."
    examples: [start, "begin", "kick off"]
    priority: 90
  # NL ticket-id handoff for idle, when world.ticket_id is still empty. A
  # headless dispatcher (goal-seeker/punch-list) whose maker doesn't reliably
  # pass `initial_world` to session.new instead drives this as its first
  # turn text — see stories/goal-seeker/scripts/gs_manifest.star and
  # stories/punch-list/prompts/drive_item.md. Only "work ticket …" is
  # declared (not a bare "ticket …" template): idle's own `change_ticket`
  # intent declares "tickets" as a bare synonym, and a bare-string match
  # ALWAYS outranks a template match regardless of intent (see
  # internal/semroute doc.go "confidence bands") — a template on "ticket
  # {ticket_id}" would lose to change_ticket for any input containing
  # "ticket(s)" and silently drop the id. "work" collides with nothing
  # declared on idle. The `titled` anchor is required: {ticket_id} is a
  # trailing capture and without a literal after it, it would swallow the
  # rest of the utterance (title + brief) instead of just the id.
  work_ticket:
    description: "State which ticket to work when none is loaded yet (NL ticket-id handoff from a headless driver)."
    synonyms:
      - "work ticket {ticket_id}"
      - "work ticket {ticket_id} titled {ticket_title}"
    priority: 89
    slots:
      ticket_id:    { type: string, required: true }
      ticket_title: { type: string, required: false }
  # Free-form complaint handoff for standalone/headless bugfix starts where no
  # filed ticket exists yet. The story synthesizes a session-scoped ticket_id in
  # idle.on_enter, carries the complaint as ticket_body, and lets the existing
  # pre-flight triage + reproducer go as far as the evidence allows.
  work_complaint:
    description: "Start the bug-fix pipeline from a free-form bug complaint when no filed ticket exists yet."
    synonyms:
      - "fix bug {complaint}"
      - "debug bug {complaint}"
      - "bug report {complaint}"
      - "user complaint {complaint}"
      - "work complaint {complaint}"
    priority: 88
    slots:
      complaint:    { type: string, required: true }
      ticket_title: { type: string, required: false }
  accept:
    description: "Accept the current room's artifact and advance to the next phase. Posts the artifact to the transport as a side-effect."
    examples: ["continue", "proceed", "accept", "next", "deliver", "approve", "lgtm", "ship it", "ok"]
    priority: 85
  refine:
    description: "Refine the current checkpoint; re-execute with feedback."
    examples: [refine, "rework", "redo"]
    priority: 70
    slots:
      # required: true so a synonym hit on the lead verb ("refine ...")
      # forces the semantic router to fall through to the LLM router
      # (via orchestrator.RequiresUnfilledSlot). Otherwise the
      # bare-string matcher would auto-dispatch `refine` with empty
      # slots, and the trailing free-form feedback the operator typed
      # — "refine don't keep priority" — would be dropped on the
      # floor. See the 2026-05-20 dogfood trace at
      # /tmp/kitsoki-dogfood-trace.jsonl:859 for the regression.
      feedback: { type: string, required: true }
  restart_from:
    description: "Restart from a named prior stage (resets that phase's cycle counter)."
    examples: [restart_from, "restart"]
    priority: 60
    slots:
      stage: { type: string, required: false }
  jump_to:
    description: "Jump forward to a later phase, skipping intermediate work. Increments world.unsafe_jumps_made."
    examples: [jump_to, "jump"]
    priority: 55
    slots:
      stage: { type: string, required: false }
  # ── Interactive shortcuts (proposal §4.2). The three modes set
  # world.bugfix_mode then advance directly into the appropriate _executing
  # state. quick_fix collapses the pipeline to reproducing → proposing →
  # implementing → testing → done (reviewing + validating skipped).
  # skip_to_pr jumps straight into validating with restart_from_stage set
  # so a parent (or post-validate review) can later wire back. ─────────
  quick_fix:
    description: "Shortcut from idle: walk reproducing → proposing → implementing → testing → done (skip reviewing + validating)."
    examples: [quick_fix, "quick", "one shot"]
    priority: 75
  skip_to_pr:
    description: "Shortcut from idle: skip reproducing/proposing/implementing/testing/reviewing, jump straight into validating."
    examples: [skip_to_pr, "to pr", "skip ahead"]
    priority: 75
  full_pipeline:
    description: "Default — walk all phases. Set bugfix_mode=full and start from reproducing."
    examples: [full_pipeline, "full", "all phases"]
    priority: 75
  oversight_gated:
    description: "Use human checkpoints for bugfix phases."
    examples: ["use gated oversight", "human gated mode", "make this gated"]
    priority: 74
  oversight_llm_review:
    description: "Use LLM checkpoint review and fall back to human review when uncertain."
    examples: ["use llm review", "llm review mode", "let the llm review gates"]
    priority: 74
  oversight_no_gate:
    description: "Use autonomous operation driving without LLM checkpoint review."
    examples: ["use no gate mode", "no-gate mode", "run without review gates"]
    priority: 74
  # Triage-only: a read-only verdict on whether the bug still exists in the
  # current tree (no worktree, no fix). Cheap pre-flight before committing the
  # full maker pipeline to a ticket. Terminal: @exit:triaged carrying the verdict.
  triage:
    description: "Triage-only: assess whether the bug still exists in the current tree and emit a standardized verdict (ALREADY-FIXED | STILL-LIVE | PARTIAL | UNCLEAR). No fix pipeline."
    examples: [triage, "assess", "is it still a bug", "verdict only", "just triage"]
    priority: 75
  # ── Autostart pre-flight triage (world.auto_triage). Internal guarded emit
  # from idle's autostart chain: enters the triaging room WITHOUT pinning
  # bugfix_mode=triage, so triaging's accept knows to continue into
  # reproducing (or short-circuit to @exit:triaged on ALREADY-FIXED) instead
  # of always terminating. Never typed. ──────────────────────────────────────
  preflight_triage:
    description: "(internal) autostart pre-flight: run read-only triage before spending the maker pipeline; keeps bugfix_mode so accept routes back into the pipeline."
    examples: []
    priority: 1
  change_ticket:
    description: "From idle: hand control back to the parent's ticket picker so the operator can choose a (different) ticket before starting."
    examples: [change_ticket, "pick ticket", "find ticket", "tickets"]
    priority: 65
  quit:
    description: "Abandon the pipeline."
    examples: [quit, "abort", "bail"]
    priority: 50
  look:
    description: "Re-render the current view."
    examples: [look, "what now?"]
    priority: 10
  # ── Review-diff (reviewing room). review_externally is operator-chosen;
  # review_rejected / review_inconclusive are emitted by reviewing_external
  # from the host.diff.open verdict (never typed). ─────────────────────────
  review_externally:
    description: "Open the fix's diff in the editor / system diff viewer and capture the verdict."
    examples: [review_externally, "review the diff", "open the diff", "review in editor"]
    priority: 65
  review_rejected:
    description: "The operator rejected the diff at the external review surface — bounce back to implementing."
    examples: [review_rejected]
    priority: 1
  review_inconclusive:
    description: "The diff surface produced no accept/reject (view-only difftool, or none available) — fall back to the inline review choice."
    examples: [review_inconclusive]
    priority: 1
  # ── direct-ship routing (slice 4). Internal guarded emits from testing's
  # accept arc: ship_direct enters the ship-it tail import; gate_not_red routes
  # to @exit:needs-human when the regression test was never RED pre-fix. ──────
  ship_direct:
    description: "(internal) regression test was RED pre-fix → enter the ship-it tail (integrate → re-verify → cleanup)."
    examples: []
    priority: 1
  gate_not_red:
    description: "(internal) the regression gate was never RED on the pre-fix snapshot (a characterization test) → needs-human, never shipped."
    examples: []
    priority: 1
  # ── repro RED-gate routing (reproducing room). Internal guarded emit: the
  # repro_command was GREEN on the unchanged worktree → the bug cannot be
  # reproduced → route to @exit:not-reproducible (needs-human). ──────────────
  not_reproducible:
    description: "(internal) the repro_command passed (GREEN) on the unchanged worktree → the bug does not currently reproduce → needs-human, never fixed."
    examples: []
    priority: 1
  # ── active early-escalation (escalate_low_value). An internal guarded emit:
  # a low-confidence proposal, an uncertain judge, an un-armed repro gate, or an
  # exhausted budget routes to @exit:needs-human with a structured question
  # instead of grinding/abandoning. Carries needs_human_reason. ───────────────
  escalate_human:
    description: "(internal) low-value/low-confidence work detected with escalate_low_value on → quit early to needs-human with a question."
    examples: []
    priority: 1

# Intents exposed to importing parent stories. Wave 2 (dev-story hub)
# `intents.import: [start, proceed, accept, refine, restart_from, quit]`
# lifts these into the parent's bare intent table so an operator can
# drive the imported pipeline without typing the `bf__` prefix.
exports:
  intents: [start, work_complaint, accept, refine, restart_from, jump_to, quick_fix, skip_to_pr, full_pipeline, oversight_gated, oversight_llm_review, oversight_no_gate, triage, change_ticket, quit, look, escalate_human]

# Named return points. A parent story (dev-story / kitsoki-dev / cyber-devstory)
# maps each to one of its own states. Standalone load synthesises
# `__exit__done` and `__exit__abandoned` terminals.
exits:
  done:
    description: "Pipeline succeeded (open-PR exit); ready to hand off to pr-refinement."
    requires: [done_artifact]
  abandoned:
    description: "User or LLM bailed."
  pick_ticket:
    description: "Operator wants to (re-)pick a ticket. Parent should route back to its ticket picker; no abandonment, no artifact required."
  # ── triage-only exit ─────────────────────────────────────────────────────
  triaged:
    description: "Triage-only mode produced a standardized verdict on whether the bug still exists. Carries world.triage_verdict; no fix was attempted."
    requires: [triage_verdict]
  # ── direct-ship exits (slice 4) — the shared ship-it tail terminals ──────
  shipped:
    description: "direct-ship: the fix integrated to local main, the regression gate re-verified GREEN on the merged commit, worktree cleaned up."
    requires: [shipped_sha]
  needs-human:
    description: "direct-ship: an integrate/verify/cleanup failure, or a regression gate that was never RED pre-fix or isn't GREEN on merged main. Carries the real error."
    requires: [last_error]
  # ── repro RED-gate exit (reproducing room) ───────────────────────────────
  not-reproducible:
    description: "The ticket's repro_command passed (GREEN) on the unchanged worktree — the bug does not currently reproduce. Needs a human to confirm wontfix / cannot-reproduce or supply a sharper repro. Carries the gate's output as last_error."
    requires: [last_error]
  # ── CI-watch/merge tail exit (opt-in — bugfix_exit=open-PR-merge) ────────
  merged:
    description: "open-PR-merge: the imported pr-refinement tail opened the PR, watched CI, and merged it. Carries pr_url + merge_sha."
    requires: [pr_url]

# ── The shared ship-it tail (slice 4 — compose, don't reinvent) ──────────
#
# direct-ship composes ship-it's integrate → verify → cleanup → report tail
# instead of bugfix's weaker validating → PR-handoff. The tail is IMPORTED, not
# copied: ship-it's `integrate` room (lost-work-safe rebase onto CURRENT main +
# build-check + merge), its `verify` room (re-run the IDENTICAL regression gate
# on the MERGED commit), and its `cleanup` room are reused verbatim. The maker
# rooms (reproducing → proposing → implementing → testing) feed the tail at
# `integrate` exactly as cherny-loop's @exit:achieved feeds ship-it — the same
# worktree_path / workspace_branch handoff seam.
#
# Entered at `integrate` (NOT ship-it's `configure` root), so the cherny-loop
# maker ship-it would otherwise run is bypassed — bugfix IS the maker here. The
# regression gate's RED-pre-fix half is recorded by bugfix's `testing` room
# (regression_red_pre_fix); the GREEN-post-fix half is the tail's `verify`.
imports:
  tail:
    source: ../delivery-tail
    entry: integrate
    # Project bugfix's maker handoff → the delivery-tail's world. gate_command is
    # the regression gate (same command verify re-runs on the merged commit);
    # workspace_branch/worktree_path are the maker's worktree; main_worktree_path
    # is "." (the integration tree, where integrate/verify/cleanup run).
    world_in:
      # The tail re-verifies landing_gate on the merged commit: the regression
      # gate when the ticket had a repro_command, else default_landing_gate.
      gate_command:       "{{ world.landing_gate }}"
      workspace_id:       "{{ world.workspace_id }}"
      workspace_branch:   "{{ world.feature_branch }}"
      worktree_path:      "{{ world.worktree_path }}"
      base_branch:        "{{ world.base_branch }}"
      main_worktree_path: "."
      brief:              "{{ world.ticket_id }} — {{ world.ticket_title }}"
    exits:
      # ship-it's @exit:shipped → bugfix @exit:shipped, carrying the merged sha up.
      shipped:
        to: "@exit:shipped"
        set:
          shipped_sha: "{{ world.tail__shipped_sha }}"
          status:      "shipped"
      # ship-it's @exit:needs-human → bugfix @exit:needs-human, carrying the error.
      needs-human:
        to: "@exit:needs-human"
        set:
          last_error: "{{ world.tail__last_error }}"
          status:     "needs-human"

  # ── The opt-in CI-watch/merge tail (WS-C C3 — compose, don't reinvent) ──
  #
  # bugfix_exit=open-PR-merge (default stays open-PR / direct-ship for every
  # existing caller). `done`'s accept arc, instead of firing @exit:done, sets
  # pr_title/pr_body from the just-produced done_artifact and enters this
  # import — the SAME pr-refinement sub-story dev-story imports as `pr`
  # (stories/pr-refinement/), reused verbatim: open_pr → ci_monitoring →
  # (diagnose/resolve_comments on red or pushback) → merge → @exit:merged.
  # This lets a standalone `kitsoki run stories/bugfix/app.yaml` reach a real
  # MERGED terminal with no parent hub required.
  pr:
    source: ../pr-refinement
    entry: open_pr   # bypass pr-refinement's standalone-only idle state —
                     # done's accept hands off straight to the open_pr room.
    world_in:
      ticket_id:       "{{ world.ticket_id }}"
      ticket_title:    "{{ world.ticket_title }}"
      thread:          "{{ world.thread }}"
      workspace_id:    "{{ world.workspace_id }}"
      workdir:         "{{ world.workdir }}"
      base_branch:     "{{ world.base_branch }}"
      feature_branch:  "{{ world.feature_branch }}"
      pr_title:        "{{ world.pr_title }}"
      pr_body:         "{{ world.pr_body }}"
      judge_mode:      "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      merge_strategy:  "{{ world.merge_strategy }}"

    # Lift pr-unique intents into bugfix's bare intent table. Overlapping
    # names (accept, refine, quit, look, proceed) stay prefixed — they
    # collide with bugfix's own bare intents of the same name (same
    # collision dev-story's `pr` import already documents).
    intents:
      import: [open, monitor, retry, resolve, merge_now]

    exits:
      merged:
        to: "@exit:merged"
        set:
          pr_url:    "{{ world.pr__pr_url }}"
          merge_sha: "{{ world.pr__merge_sha }}"
          status:    "merged"
      abandoned:
        to: "@exit:needs-human"
        set:
          status:     "needs-human"
          last_error: "{{ world.pr__refine_feedback }}"
      # pr-refinement declares this for a future re-review loop (dev-story's
      # comment: "Wave 3 may use it"); this opt-in tail has no room to resume
      # monitoring from, so land honestly at needs-human rather than silently
      # treating unresolved pushback as merged.
      pushback_resolved:
        to: "@exit:needs-human"
        set:
          status:     "needs-human"
          last_error: "PR review pushback addressed but the opt-in CI-watch/merge tail has no room to resume monitoring — drive stories/pr-refinement directly (or dev-story's `pr` import) to finish the merge."

# Root state — the operator-controlled entry point. Children fold this into
# `bf` (or similar alias) and `entry: idle` enters here.
root: idle

# Rooms live in rooms/*.yaml. One file per visible room.
include:
  - rooms/*.yaml
