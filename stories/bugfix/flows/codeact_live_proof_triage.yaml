# Generated by `kitsoki trace to-flow` from a real LIVE codeact drive (session
# 38964436-6531-41dc-b627-313d002894c1, see .context/codeact-dogfood-findings.md)
# — the s4 regression artifact proving agent.codeact end-to-end: a live
# host.agent.codeact call on stories/bugfix's triaging room, including a real
# schema-rejected done() self-correcting into a schema-valid one.
#
# Turns are one-per-machine.transition (intent + resolved slots, verbatim).
# No expect_state/expect_world is emitted: a trace recorded against an older
# story may route differently against the current one; strict expectations
# would hard-fail on the first drift. Host/agent responses replay from the
# sibling cassette in trace order.
#
# initial_world is hand-patched from the trace's pre-turn-0 world.update events
# — `kitsoki trace to-flow` does not currently capture a session_new InitialWorld
# seed into initial_world: (a real tool gap for MCP-driven sessions; logged in
# .context/codeact-dogfood-findings.md). Without it idle's autostart guards
# (world.bugfix_mode == 'triage' etc.) never fire and turn 1 fails closed.
test_kind: flow
app: stories/bugfix/app.yaml
host_cassette: codeact_live_proof_triage.cassette.yaml
initial_state: idle
initial_world:
  workdir: "."
  bugfix_mode: "triage"
  judge_mode: "llm"
  ticket_id: "codeact-live-proof-demo"
  ticket_title: "internal/host/agent_codeact.go's AgentCodeactHandler used to ignore the schema: arg"
  ticket_body: >
    Historically host.agent.codeact accepted a schema: argument per its doc
    comment but never wired it into codeact.Params.Schema, so a
    schema-invalid done() payload was never rejected. Confirm whether this
    has since been fixed in the current tree (check
    internal/host/agent_codeact.go for whether codeact.Params.Schema is
    populated from a compiled JSON schema) and cite the file/line evidence.
turns:
- intent:
    name: triage
    # Note: the room reaches @exit:triaged synchronously within THIS turn (idle's
    # autostart -> triaging on_enter's host.agent.codeact -> auto-fired `accept`
    # since judge_mode != human) — the trace's second recorded transition was this
    # same internal auto-fire, not a distinct user turn, so it's dropped here
    # rather than replayed as a second (now invalid, already-terminal) intent.

expect_terminal: true
expect_operation_policy: bugfix_triage
expect_operation_status: completed
expect_terminal_artifact: triage_verdict
expect_no_errors: true
