# refine_once_then_accept — judge_mode=human, the operator refines the
# reproducing artifact once with feedback, then accepts on the re-run.
# Proves:
#   - refine intent transitions back to <phase>_executing (not idle)
#   - world.refine_feedback carries the operator's note into the next
#     prompt invocation
#   - world.cycle increments

test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  ticket_id:        "TKT-005"
  thread:          "TKT-005"
  judge_mode:      "human"

host_handlers:
  host.append_to_file:
    data: { ok: true, message_id: "msg-1" }
  host.inbox.add:
    data: { ok: true, id: "ib-1" }
  host.git_worktree:
    data: { ok: true, log: "" }
  host.git:
    data: { ok: true, sha: "abc123", diff: "" }
  host.local:
    data: { ok: true, log: "PASS", passed: 1, failed: 0 }
  host.oracle.ask_with_mcp:
    data:
      ok: true
      submitted:
        summary_title:    "Reproducer"
        summary_markdown: "A stub reproduction artifact."
        bug_verified:     true
        involved_components: [{ name: "tui" }]
        fix_description:  "Fix the thing in a sufficiently detailed way that the LLM-judge will accept it."
        root_cause:       "Off-by-one in the renderer; the listener observes the stale count."
        affected_files:   ["internal/tui/foo.go"]
        confidence:       0.85
        reasoning:        "Trace shows the off-by-one; well-trodden territory."
        status:           "passed"
        tests_run:        { passed: 1, failed: 0, log: "PASS" }
        outcome:          "pass"
        lessons:
          - { category: "stub", description: "A flow stub with enough body to satisfy the schemas loosely.", severity: "low" }

turns:
  - intent: { name: start, slots: {} }
    expect_state: reproducing_executing
  - intent: { name: proceed, slots: {} }
    expect_state: reproducing_awaiting_reply
    expect_world:
      cycle: 0
      refine_feedback: ""

  # Operator refines with feedback. The state arc fires:
  #   target: reproducing_executing
  #   effects: set refine_feedback, cycle++
  - intent:
      name: refine
      slots: { feedback: "Need a deterministic test, not a shell trace." }
    expect_state: reproducing_executing
    expect_world:
      cycle:           1
      refine_feedback: "Need a deterministic test, not a shell trace."

  # Re-execute and advance through the rest of the pipeline.
  - intent: { name: proceed, slots: {} }
    expect_state: reproducing_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: proposing_executing
    expect_world:
      cycle:           0   # accept resets cycle on next-room transition
      refine_feedback: ""
  - intent: { name: proceed, slots: {} }
    expect_state: proposing_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: implementing_executing
  - intent: { name: proceed, slots: {} }
    expect_state: testing_executing
  - intent: { name: proceed, slots: {} }
    expect_state: testing_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: reviewing_executing
  - intent: { name: proceed, slots: {} }
    expect_state: validating_executing
  - intent: { name: proceed, slots: {} }
    expect_state: validating_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: done_executing
  - intent: { name: proceed, slots: {} }
    expect_state: done_awaiting_reply
  - intent: { name: accept, slots: {} }
    expect_state: __exit__done
    expect_world: { status: "fixed" }

expect_terminal: true
expect_no_errors: true
