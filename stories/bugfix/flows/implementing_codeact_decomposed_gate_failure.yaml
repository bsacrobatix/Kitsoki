# A failed deterministic item gate returns to the SAME item once, preserving
# its narrow grant and surfacing the failure as compact refine feedback.

test_kind: flow
app: ../app.yaml
initial_state: implementing
initial_world:
  ticket_id: TKT-DECOMPOSED-GATE
  ticket_title: Gate retry is bounded
  thread: TKT-DECOMPOSED-GATE
  workdir: .
  feature_branch: paired-task-codeact-decomposed-gate
  implementation_mode: codeact_decomposed
  judge_mode: human
  propose_fix_artifact: { summary_title: Retry one selected item }
  compiled_implementation_plan:
    - id: only-item
      depends_on: []
      objective: Make the focused repair.
      evidence_refs: ["reproduction: focused failure"]
      read_paths: [README.md]
      write_paths: [README.md]
      invariants: [Other documentation remains unchanged.]
      acceptance_commands: [false]
      acceptance_command: (false)
      acceptance_gate_command: 'set +e; (false); rc=$?; printf "{\\"ok\\":false,\\"exit_code\\":1}\\n"; exit 0'
      expected_artifacts: [README.md]
      max_steps: 2
      fallback_reason_allowlist: []
      capabilities:
        world: read
        fs: { read: [README.md], write: [README.md], max_bytes: 65536 }
        vcs: read

host_handlers:
  host.agent.codeact:
    data:
      terminated: done
      payload:
        summary_title: Attempted README item
        summary_markdown: The item was edited but its focused gate remains red.
        files_changed: [README.md]
        applied: true
      steps: [{ observation: { changed: README.md } }]
  host.run:
    data:
      ok: true
      exit_code: 0
      stdout_json: { ok: false, exit_code: 1 }
  host.git:
    data: { ok: true, sha: decomposed456, diff: README.md }

turns:
  - intent: { name: refine, slots: { feedback: start the strict item } }
    expect_state: implementing
  - intent: { name: accept, slots: {} }
    expect_state: implementation_gating
  - intent: { name: accept, slots: {} }
    expect_state: implementing
    expect_world:
      decomposed_implementation_index: 0
      decomposed_gate_attempt: 1
  - intent: { name: accept, slots: {} }
    expect_state: implementation_gating
  - intent: { name: accept, slots: {} }
    expect_state: "__exit__needs-human"

expect_no_errors: true
