# triage_gears_rust — WS-E-ish acid test: a REAL recorded triage of a real
# gears-rust GitHub issue (constructorfabric/gears-rust#4115, "Gear/plugin
# config can't be overridden via env vars in Kubernetes (dash in gear name vs
# C_IDENTIFIER)") through the bugfix `triage` intent (bugfix_mode=triage,
# read-only, no worktree) — `kitsoki session new/submit`, live harness (a real
# subscription-backed Claude `host.agent.codeact` triager call against the
# ticket body, no repo checkout touched). Generated by `kitsoki trace to-flow`
# from that recorded session trace, then hand-patched per the
# `codeact_live_proof_triage.yaml` precedent:
#
#   - initial_world is hand-patched from the trace's pre-turn-0
#     session.new InitialWorld (see calls.json alongside the trace) —
#     `kitsoki trace to-flow` does not capture that seed into initial_world:
#     (the same tool gap `codeact_live_proof_triage.yaml` documents). Without
#     it idle's triage autostart guards never fire and turn 1 fails closed.
#     `workdir` is rewritten from the recording's scratchpad clone path to
#     "." — triage is read-only against the ticket body already supplied
#     inline (ticket_source_mode=remote), so it never touches the checkout
#     (see stories/bugfix/rooms/idle.yaml's triage-mode workdir exception and
#     the sibling `triage_remote_source_body.yaml` /
#     `triage_github_issue_prefetch.yaml` fixtures, which use the same "."
#     convention for remote-sourced tickets).
#   - only the `triage` turn is replayed. The trace's second recorded
#     transition (`accept`, `triaging` -> `__exit__triaged`) is the room's own
#     internal auto-fire (judge_mode != human), not a distinct driven turn —
#     same turn number (0) as `triage` in the trace — so replaying it as a
#     second turn hits an already-terminal state (`INTENT_NOT_ALLOWED_IN_STATE`,
#     exactly the stray rejected tail turn the live recording also hit when a
#     third `triage` call landed after `__exit__triaged`). Dropped here rather
#     than replayed, per the `codeact_live_proof_triage.yaml` precedent.
#
# What it proves: a real GitHub-issue-sourced gears-rust bug triaged read-only
# to a STILL-LIVE verdict (env-var override silently dropped for any
# kebab-case gear name — POSIX C_IDENTIFIER forbids the hyphen the config key
# needs) with cited evidence, then posted to the transport — replays green,
# no-LLM, via `kitsoki test flows`. This is the TRIAGE leg only: it proves
# fix-bug's read-only pre-flight on a real external ticket, not an end-to-end
# fix/PR on gears-rust (no worktree, no maker/implementer rooms exercised).
test_kind: flow
app: ../app.yaml
host_cassette: triage_gears_rust.cassette.yaml
initial_state: idle
initial_world:
  ticket_id: "4115"
  ticket_title: "Gear/plugin config can't be overridden via env vars in Kubernetes (dash in gear name vs C_IDENTIFIER)"
  ticket_url: "https://github.com/constructorfabric/gears-rust/issues/4115"
  ticket_repo: "constructorfabric/gears-rust"
  ticket_source_mode: "remote"
  ticket_source_ref: "github:constructorfabric/gears-rust#4115"
  ticket_body: >
    AppConfig::load_layered lets any config value be overridden by an env var
    through the figment Env::prefixed("APP__").split("__") layer
    (libs/toolkit/src/bootstrap/config/mod.rs:321-325). This works app-wide,
    including for gear/plugin config under gears.<gear-name>.config.<field>.

    It works bad in k8s for any gear whose name contains a dash (which is all
    of them). k8s validates env[].name as a C_IDENTIFIER
    ([A-Za-z_][A-Za-z0-9_]*), so a variable name containing a dash is
    rejected by the API server. Since figment maps the env var name to the
    config key verbatim (only lowercasing and splitting __ into nesting
    levels), the gear-name segment must literally contain the dash to match
    the gears map key — which k8s won't allow.

    Proposed fix: in AppConfig::load_layered, customize the Env provider so
    that, for keys under the gears branch, underscores in the gear-name
    segment are translated to dashes. Only the segment immediately following
    gears (the gear name) is remapped; other segments (nested field names,
    vendor.<name>) are left untouched.

    Acceptance criteria: APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__VENDOR
    overrides gears.static-authz-plugin.config.vendor; the existing dash form
    still works; nested underscore field names and vendor.<name> overrides
    are unaffected.
  thread: "4115"
  workdir: "."
  bugfix_mode: "triage"
  judge_mode: "llm_then_human"
  base_branch: "main"

turns:
  # triage → idle's triage autostart -> triaging.on_enter's host.agent.codeact
  # binds the STILL-LIVE verdict -> auto-fired `accept` (judge_mode != human)
  # -> posts to transport -> @exit:triaged, all synchronously within this turn.
  - intent: { name: triage, slots: {} }
    expect_state: __exit__triaged
    expect_world:
      bugfix_mode: triage
      status: triaged
    expect_world_final:
      status: triaged

expect_terminal: true
expect_no_errors: true
