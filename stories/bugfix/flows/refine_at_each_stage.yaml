# refine_at_each_stage — port of cyber-repo's refine.yaml.
#
# At each checkpoint state, `refine: <feedback>` routes back to the
# phase's _executing state with refine_feedback set and the per-phase
# cycle counter incremented.
#
# A regression that drops the `set: { refine_feedback }` effect or
# fails to increment the right counter must fail this flow.
#
# Coverage: reproducing, proposing, testing, validating, done.

test_kind: flow
app: ../app.yaml
initial_state: reproducing_awaiting_reply
initial_world:
  ticket_id:  "TKT-700"
  thread:     "TKT-700"
  judge_mode: "human"

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "" } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.oracle.ask_with_mcp:
    data:
      ok: true
      submitted: { summary_title: "stub", summary_markdown: "stub" }

turns:
  - intent: { name: refine, slots: { feedback: "please also check the /bc route" } }
    expect_state: reproducing_executing
    expect_world:
      refine_feedback:   "please also check the /bc route"
      reproducing_cycle: 1
      cycle:             1

expect_no_errors: true

