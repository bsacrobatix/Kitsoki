# An unsupported (for this item) typed reason must not activate the fallback.

test_kind: flow
app: ../app.yaml
initial_state: implementing
initial_world:
  ticket_id: TKT-DECOMPOSED-NO-FALLBACK
  ticket_title: Reject unlisted fallback reason
  thread: TKT-DECOMPOSED-NO-FALLBACK
  workdir: .
  feature_branch: paired-task-codeact-decomposed-no-fallback
  implementation_mode: codeact_decomposed_fallback
  judge_mode: human
  propose_fix_artifact: { summary_title: Do not broaden an item }
  compiled_implementation_plan:
    - id: only-item
      depends_on: []
      objective: Make the focused repair.
      evidence_refs: ["reproduction: focused failure"]
      read_paths: [README.md]
      write_paths: [README.md]
      invariants: [Other documentation remains unchanged.]
      acceptance_commands: [test -f README.md]
      acceptance_command: (test -f README.md)
      acceptance_gate_command: 'set +e; (test -f README.md); rc=$?; printf "{\\"ok\\":true,\\"exit_code\\":0}\\n"; exit 0'
      expected_artifacts: [README.md]
      max_steps: 2
      fallback_reason_allowlist: [capability_missing]
      capabilities:
        world: read
        fs: { read: [README.md], write: [README.md], max_bytes: 65536 }
        vcs: read
  implement_artifact:
    summary_title: Not decomposable under this item
    summary_markdown: This reason was not declared as an allowed retry.
    files_changed: [README.md]
    applied: false
    blockers: [No matching allowlist entry.]
    fallback_reason: task_not_decomposable

host_handlers:
  host.git:
    data: { ok: true, sha: nofallback123, diff: README.md }

turns:
  - intent: { name: accept, slots: {} }
    expect_state: "__exit__needs-human"
    expect_world:
      decomposed_fallback_attempt: 0
      decomposed_fallback_reason: ""

expect_no_errors: true
