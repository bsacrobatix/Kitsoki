# idle — entry room. cypilot waterfall parked. `begin` boots into prd_executing.
#
# Per proposal §6.4 / §5.5, the cypilot story is autonomous-only for v1:
# `world.judge_mode` defaults to `llm_then_human` (the LLM-judge runs the
# artifact through `cpt analyze`; if the report is clean it auto-accepts,
# otherwise falls through to a human). The interactive operator's job is
# really only to set the ticket_id / feature_slug at idle and pick up at
# `_awaiting_reply` checkpoints when the LLM bails.

states:

  idle:
    description: "cypilot waterfall parked. Waiting for begin."
    # Flattened from extends:"base" + blocks: because choice-widget
    # proposal §4.5 / §8 forbids `choice:` inside blocks. Status line and
    # body inlined as sibling typed elements (mirrors stories/robbery).
    view:
      - prose: '{{ world.ticket_id|default:"(no ticket)" }}  ·  {{ world.feature_slug|default:"(no feature)" }} ({{ world.feature_index }}/{{ world.feature_count }})  ·  cycle {{ world.cycle }}  ·  judge {{ world.judge_mode }}'
      - heading: "{{ state.description }}"
      - kv:
          pairs:
            Ticket:         '{{ world.ticket_id|default:"(none)" }} {{ world.ticket_title }}'
            "Feature slug": '{{ world.feature_slug|default:"(pending — set from ticket on begin)" }}'
            Workspace:      '{{ world.workdir|default:"(none)" }}'
            Judge:          "{{ world.judge_mode }}"
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label:  "begin"
              hint:   "kick off the PRD draft"
              intent: begin
            - label:  "quit"
              hint:   "abandon the pipeline"
              intent: quit
            - label:  "look"
              intent: look
    relevant_world: [ticket_id, ticket_title, feature_slug, judge_mode, workdir]
    on:
      begin:
        - target: prd_executing
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
