    by_call:
      punch_load:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            state_path: ".artifacts/punch-list/drive_timeout.state.json"
            item_count: "1"
            error: ""
            items:
              - { id: validate-punch-list, title: "Validate the punch-list story", story: "stories/punch-list/app.yaml", mode: drive, profile: codex-native, model: gpt-5.5, implementation_story: "", status: pending, require_trace_model: true, verify: [ { kind: story_validate, story: "stories/punch-list/app.yaml" } ], trace_path: ".artifacts/punch-list/traces/validate-punch-list.jsonl" }
      punch_board-0-:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            items: []
            results: { items: [] }
            next_item: { id: validate-punch-list, title: "Validate the punch-list story", story: "stories/punch-list/app.yaml", mode: drive, profile: codex-native, model: gpt-5.5, implementation_story: "", require_trace_model: true, verify: [ { kind: story_validate, story: "stories/punch-list/app.yaml" } ], trace_path: ".artifacts/punch-list/traces/validate-punch-list.jsonl" }
            next_item_id: validate-punch-list
            route: dispatch
            has_pending: true
            processed_count: 0
            passed_count: 0
            partial_count: 0
            failed_count: 0
            skipped_count: 0
            pending_count: 1
            count_summary: "Processed 0 | Passed 0 | Partial 0 | Failed 0 | Skipped 0 | Pending 1"
      punch_policy-validate-punch-list:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            policy_result: { status: ok, message: "profile/model/verifier policy passed" }
            error: ""
  host.starlark.run:
    by_call:
      punch_load:
        data:
          manifest_path: "stories/punch-list/testdata/two_items.yaml"
          state_path: ".artifacts/punch-list/drive_timeout.state.json"
          item_count: "1"
          error: ""
          items:
            - { id: validate-punch-list, title: "Validate the punch-list story", story: "stories/punch-list/app.yaml", mode: drive, profile: codex-native, model: gpt-5.5, implementation_story: "", status: pending, require_trace_model: true, verify: [ { kind: story_validate, story: "stories/punch-list/app.yaml" } ], trace_path: ".artifacts/punch-list/traces/validate-punch-list.jsonl" }
      punch_board-0-:
        data:
          items: []
          results:
            items: []
          next_item:
            id: validate-punch-list
            title: Validate the punch-list story
            story: stories/punch-list/app.yaml
            mode: drive
            profile: codex-native
            model: gpt-5.5
            implementation_story: ''
            require_trace_model: true
            verify:
            - kind: story_validate
              story: stories/punch-list/app.yaml
            trace_path: ".artifacts/punch-list/traces/validate-punch-list.jsonl"
          next_item_id: validate-punch-list
          route: dispatch
          has_pending: true
          processed_count: 0
          passed_count: 0
          partial_count: 0
          failed_count: 0
          skipped_count: 0
          pending_count: 1
          count_summary: Processed 0 | Passed 0 | Partial 0 | Failed 0 | Skipped 0 | Pending
