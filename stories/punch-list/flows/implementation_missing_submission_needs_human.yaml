test_kind: flow
app: ../app.yaml
initial_state: idle
initial_world:
  manifest_path: "stories/punch-list/testdata/two_items.yaml"

host_handlers:
  host.starlark.run:
    by_call:
      punch_load:
        data:
          manifest_path: "stories/punch-list/testdata/two_items.yaml"
          state_path: ".artifacts/punch-list/implementation_missing_submission.state.json"
          item_count: "1"
          error: ""
          items:
            - { id: validate-punch-list, title: "Validate the punch-list story", story: "stories/punch-list/app.yaml", mode: drive, profile: codex-native, model: gpt-5.5, implementation_story: "stories/cherny-loop/app.yaml", status: pending, require_trace_model: true, verify: [ { kind: story_validate, story: "stories/punch-list/app.yaml" } ], trace_path: ".artifacts/punch-list/traces/validate-punch-list.jsonl", implementation_trace_path: ".artifacts/punch-list/traces/validate-punch-list-implementation.jsonl" }
      punch_board-0-:
        data:
          items: []
          results:
            items: []
          next_item:
            id: validate-punch-list
            title: Validate the punch-list story
            story: stories/punch-list/app.yaml
            mode: drive
            profile: codex-native
            model: gpt-5.5
            implementation_story: stories/cherny-loop/app.yaml
            require_trace_model: true
            verify:
            - kind: story_validate
              story: stories/punch-list/app.yaml
            trace_path: ".artifacts/punch-list/traces/validate-punch-list.jsonl"
            implementation_trace_path: ".artifacts/punch-list/traces/validate-punch-list-implementation.jsonl"
          next_item_id: validate-punch-list
          route: dispatch
          has_pending: true
          processed_count: 0
          passed_count: 0
          partial_count: 0
          failed_count: 0
          skipped_count: 0
          pending_count: 1
          count_summary: Processed 0 | Passed 0 | Partial 0 | Failed 0 | Skipped 0 | Pending 1
      punch_policy-validate-punch-list:
        data:
          policy_result: { status: ok, message: "profile/model/verifier policy passed" }
          error: ""
  host.agent.task:
    by_call:
      punch_drive-validate-punch-list:
        delay: "20ms"
        data:
          ok: true
          submitted: { status: passed, story: "stories/punch-list/app.yaml", trace_path: ".artifacts/punch-list/traces/validate-punch-list.jsonl", model: gpt-5.5, profile: codex-native, findings: [], summary: "loaded and observed" }
      punch_implementation-validate-punch-list:
        delay: "20ms"
        data:
          ok: true

turns:
  - intent: { name: start, slots: {} }
    expect_state: load
  - intent: { name: start_first, slots: {} }
    expect_state: drive
  - intent: { name: look, slots: {} }
    advance_clock: "2s"
    expect_state: needs_human
    expect_world:
      last_error: "Implementation ended failed for validate-punch-list: Agent job completed without a submitted handoff."

expect_terminal: false
expect_no_errors: true
