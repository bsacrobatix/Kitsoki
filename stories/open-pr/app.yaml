# open-pr — package, push, and open a pull request from a feature/bug branch.
#
# The missing delivery seam (see constructorfabric/Kitsoki#36): the bugfix
# open-PR exit lands a fix on a local worktree branch but the studio had no way
# to PUBLISH it — `issue.create` files issues, not PRs, and there is no
# `vcs.push` / `pr.create` tool. This story closes that loop entirely in YAML +
# `host.run` (git + the `gh` CLI), no LLM, no new engine code. It is drivable
# standalone (seed the branch/repo/title/body in initial_world, submit `open`)
# and importable as a tail by bugfix's open-PR exit later (same handoff seam as
# ../delivery-tail).
#
# Deterministic + provider-neutral: `prepare` standardizes the branch/package
# contract (feature/bug description, product-site changes, demo source, rendered
# local MP4 under .artifacts), then `publishing` pushes the branch and runs
# `gh pr create`. Auth/remote are the operator's environment (the `gh` CLI's own
# auth, e.g. the bsacrobatix test App); missing evidence, a bad branch name, a
# missing remote, or unauthenticated gh surfaces as needs-human, never silent
# success.

app:
  id: open-pr
  version: 0.1.0
  title: "Open a pull request"
  author: "Kitsoki"
  license: "CC0"

hosts:
  - host.run

world:
  repo:          { type: string, default: "" }     # owner/name; "" ⇒ gh infers from the pushed remote
  head_branch:   { type: string, default: "" }     # the branch to PR (must exist in worktree_path)
  branch_kind:   { type: string, default: "" }     # feature | bug | "" (inferred from head_branch)
  base_branch:   { type: string, default: "main" } # PR target
  remote:        { type: string, default: "origin" } # git remote to push the branch to
  worktree_path: { type: string, default: "." }    # where the branch lives (the maker worktree)
  title:         { type: string, default: "" }
  body:          { type: string, default: "" }
  feature_description: { type: string, default: "" } # human-facing feature/bug description for PR body
  product_site_paths:  { type: string, default: "" } # newline/comma separated source paths, e.g. features/foo.yaml
  product_feature_id:  { type: string, default: "" } # optional FEATURE id for make demo-feature
  demo_source_path:    { type: string, default: "" } # committed source/spec used to render the demo
  demo_artifact_dir:   { type: string, default: "" } # defaults to .artifacts/<feature id or branch slug>
  demo_render_command: { type: string, default: "" } # optional; defaults to make demo-feature FEATURE=<id>
  pr_package_path:     { type: string, default: "" } # .context/open-pr/<branch>.md generated by prepare
  prepare_outcome:     { type: string, default: "" } # prepared | invalid | render_failed | no_demo | error
  demo_video_path:     { type: string, default: "" } # rendered MP4 found under demo_artifact_dir
  draft:         { type: bool,   default: false }
  pr_url:        { type: string, default: "" }
  pr_number:     { type: string, default: "" }
  open_outcome:  { type: string, default: "" }     # opened | push_failed | pr_failed | error
  run_exit:      { type: string, default: "" }     # raw host.run exit marker (empty pre-bind)
  run_stdout:    { type: string, default: "" }
  last_error:    { type: string, default: "" }
  status:        { type: string, default: "open" }

intents:
  open:
    description: "Package the PR evidence, push the head branch, and open the pull request."
    examples: [open, "open pr", "open the pr", "push and pr", "raise a pr"]
    priority: 90
  prepared:
    description: "(internal) PR package was generated and local evidence is present."
    priority: 1
  prepare_failed:
    description: "(internal) required PR package evidence is missing or invalid."
    priority: 1
  opened:
    description: "(internal) the PR was opened — emitted from the host.run outcome."
    priority: 1
  open_failed:
    description: "(internal) the push or the PR creation failed."
    priority: 1
  open_aborted:
    description: "(internal) the host.run produced no parseable result."
    priority: 1
  quit:
    description: "Abandon without opening a PR."
    examples: [quit, abort, cancel]
    priority: 50
  look:
    description: "Re-render the current view."
    examples: [look, "what now?"]
    priority: 10

exports:
  intents: [open, quit, look]

exits:
  opened:
    description: "The PR was opened; pr_url carries the URL."
    requires: [pr_url]
  needs-human:
    description: "Push or PR creation failed (or produced no result); last_error carries the real git/gh output."
    requires: [last_error]
  abandoned:
    description: "Operator bailed before opening a PR."

root: idle

include:
  - rooms/*.yaml
