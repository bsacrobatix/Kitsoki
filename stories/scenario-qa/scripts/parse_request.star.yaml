inputs:
  request:                     { type: string, required: true }
  default_transport:           { type: string, required: false }
  default_persona:             { type: string, required: false }
  default_target:              { type: string, required: false }
  default_seed:                { type: string, required: false }
  default_profile:             { type: string, required: false }
  default_live_budget_minutes: { type: int, required: false }

outputs:
  scenario_ref:         { type: string }
  scenario_description: { type: string }
  transport_arg:        { type: string }
  persona:              { type: string }
  target:               { type: string }
  seed:                 { type: string }
  live_profile:         { type: string }
  live_budget_minutes:  { type: int }
  mode:                 { type: string }
  request_status:       { type: object }
