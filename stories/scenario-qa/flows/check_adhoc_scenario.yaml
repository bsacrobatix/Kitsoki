# check_adhoc_scenario — a free-text `description` (no catalog scenario id)
# resolves to mode=adhoc: `plan` still calls run.py (against the generic
# "bugfix" carrier scenario so project/persona resolution and the transport
# leg skeleton are real), then plan_legs drafts an ad-hoc scenario entry and
# splices it onto those carrier legs. Exercises the same room wiring as
# check_single_transport.yaml with mode=adhoc instead of catalog.

test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      emit_scenario_qa_run:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            run_id: scenario-qa-run-adhoc
            run_dir: /repo/.artifacts/product-journey/scenario-qa-run-adhoc
            driver_plan_path: /repo/.artifacts/product-journey/scenario-qa-run-adhoc/driver-plan.md
            execution_plan_path: /repo/.artifacts/product-journey/scenario-qa-run-adhoc/execution-plan.md
            agent_brief_path: /repo/.artifacts/product-journey/scenario-qa-run-adhoc/agent-brief.md
      build_scenario_qa_deck:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: scenario_qa_deck_built
            run_dir: /repo/.artifacts/product-journey/scenario-qa-run-adhoc
            deck_path: /repo/.artifacts/product-journey/scenario-qa-run-adhoc/deck.slidey.json
            leg_count: 1
            pass_count: 1
            fail_count: 0
            degraded_count: 0
            summary: "1 / 1 transport legs passed."

  host.starlark.run:
    by_call:
      plan_legs:
        data:
          legs:
            items:
              - leg_id: "adhoc-open-the-onboarding-tour::tui"
                scenario: "adhoc-open-the-onboarding-tour"
                label: "open the onboarding tour and confirm the first step renders"
                transport: "tui"
                visual_surface: "tui"
                evidence_dir: "evidence/adhoc-open-the-onboarding-tour/tui"
                primary_story: "stories/dev-story/app.yaml"
                success_criteria:
                  - "The described behavior is observable on the requested transport(s)."
          leg_count: 1
          driver_agent: ".agents/agents/product-journey-qa-driver.md"
          run_dir_rel: ".artifacts/product-journey/scenario-qa-run-adhoc"
          plan_status: { resolved: true }
      pick_leg:
        data:
          current_leg:
            leg_id: "adhoc-open-the-onboarding-tour::tui"
            scenario: "adhoc-open-the-onboarding-tour"
            transport: "tui"
          current_leg_id: "adhoc-open-the-onboarding-tour::tui"
      record_leg_result:
        data:
          leg_results:
            items:
              - leg_id: "adhoc-open-the-onboarding-tour::tui"
                scenario: "adhoc-open-the-onboarding-tour"
                transport: "tui"
                driver_status: "captured"
                verdict: "pass"
                verdict_summary: "Onboarding tour's first step renders."
          pass_count: 1
          fail_count: 0
          degraded_count: 0
      build_report:
        data:
          report_path: ".artifacts/product-journey/scenario-qa-run-adhoc/report.md"
          report_summary: "1 / 1 transport legs passed."

  host.agent.task:
    by_call:
      drive_leg:
        data:
          ok: true
          submitted:
            status: "captured"
            evidence_refs: ["frame-1"]
            summary: "Captured the onboarding tour's first step."
      judge_leg:
        data:
          ok: true
          submitted:
            verdict: "pass"
            summary: "Onboarding tour's first step renders."

turns:
  - intent:
      name: check
      slots:
        description: "open the onboarding tour and confirm the first step renders"
        transport: tui
        seed: story-flow-adhoc
    expect_state: report
    expect_world:
      mode: adhoc
      run_id: scenario-qa-run-adhoc
      leg_count: 1
      pass_count: 1
      report_summary: "1 / 1 transport legs passed."
      deck_path: "/repo/.artifacts/product-journey/scenario-qa-run-adhoc/deck.slidey.json"
    expect_host_calls:
      - handler: host.run
        args: { call: emit_scenario_qa_run }
      - handler: host.starlark.run
        args: { call: plan_legs }
      - handler: host.agent.task
        args: { call: drive_leg }
      - handler: host.agent.task
        args: { call: judge_leg }
      - handler: host.starlark.run
        args: { call: build_report }
      - handler: host.run
        args: { call: build_scenario_qa_deck }
    expect_view_matches: "SCENARIO QA REPORT[\\s\\S]*1 / 1 transport legs passed[\\s\\S]*adhoc-open-the-onboarding-tour"

expect_no_errors: true
