test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      preview_transport_suite:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            schema: kitsoki/persona-qa-transport-suite/v1
            status: ready
            summary:
              scenario_count: 1
              requested_transports: [tui, web, vscode, cli]
              transport_count: 4
              leg_count: 4
              skipped_count: 0
            legs:
              - { leg_id: "bugfix::tui", scenario: bugfix, transport: tui }
              - { leg_id: "bugfix::web", scenario: bugfix, transport: web }
              - { leg_id: "bugfix::vscode", scenario: bugfix, transport: vscode }
              - { leg_id: "bugfix::cli", scenario: bugfix, transport: cli }

turns:
  - intent:
      name: preview
      slots:
        scenario: bugfix
        transport: all
    expect_state: idle
    expect_world:
      scenario_ref: bugfix
      transport_arg: all
      suite_status: ready
      suite_leg_count: 4
      suite_skipped_count: 0
      run_id: ""
      run_dir: ""
      last_error: ""
      status: preview_ready
    expect_host_calls:
      - handler: host.run
        args:
          call: preview_transport_suite
          cmd: python3
          args:
            - tools/product-journey/run.py
            - --transport-suite
            - --scenarios
            - bugfix
            - --transport
            - all
            - --json-output
          cwd: "."
    expect_no_host_calls: [host.agent.task, host.starlark.run]
    expect_view_matches: "Transport suite:[\\s\\S]*ready; legs=4, skipped=0"

expect_no_errors: true
