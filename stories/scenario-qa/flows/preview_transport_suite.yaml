test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.product_journey.run:
    by_call:
      preview_transport_suite:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            schema: kitsoki/persona-qa-transport-suite/v1
            status: ready
            summary:
              scenario_count: 1
              requested_transports: [tui, web, vscode, cli]
              transport_count: 4
              leg_count: 4
              skipped_count: 0
            scenarios:
              - scenario: bugfix
                label: Bug fix workflow
                task: Reproduce a reported product bug, capture evidence, and verify whether the fix path is clear.
                applicable_transports: [tui, web, vscode, cli]
                skipped_transports: []
            legs:
              - leg_id: "bugfix::tui"
                scenario: bugfix
                transport: tui
                transport_label: TUI
                visual_surface: tui
                evidence_contract: { evidence_kind: rendered_tui_frame, level: frame-level, primary_tool: render.tui_png }
              - leg_id: "bugfix::web"
                scenario: bugfix
                transport: web
                transport_label: Web
                visual_surface: web
                evidence_contract: { evidence_kind: browser_screenshot, level: frame-level, primary_tool: visual.snapshot }
              - leg_id: "bugfix::vscode"
                scenario: bugfix
                transport: vscode
                transport_label: VS Code bridge
                visual_surface: vscode
                evidence_contract: { evidence_kind: screenshot_or_tui_png, level: bridge-level, primary_tool: "visual.open (kind=vscode)" }
              - leg_id: "bugfix::cli"
                scenario: bugfix
                transport: cli
                transport_label: CLI
                visual_surface: cli
                evidence_contract: { evidence_kind: command_output, level: terminal-level, primary_tool: "command transcript" }

turns:
  - intent:
      name: preview
      slots:
        scenario: bugfix
        transport: all
    expect_state: idle
    expect_world:
      scenario_ref: bugfix
      transport_arg: all
      suite_status: ready
      suite_leg_count: 4
      suite_skipped_count: 0
      suite_summary: "Preview ready: 4 transport checks for Bug fix workflow (`bugfix`). No run bundle or capture has been created."
      run_id: ""
      run_dir: ""
      last_error: ""
      status: preview_ready
    expect_host_calls:
      - handler: host.product_journey.run
        args:
          call: preview_transport_suite
          args:
            - --transport-suite
            - --scenarios
            - bugfix
            - --transport
            - all
            - --live-profile
            - ""
            - --json-output
          cwd: "."
      - handler: host.starlark.run
        args:
          call: summarize_transport_suite
    expect_no_host_calls: [host.agent.task]
    expect_view_matches: "Preview:[\\s\\S]*Preview ready: 4 transport checks[\\s\\S]*Previewed transport checks[\\s\\S]*Bug fix workflow[\\s\\S]*Transport checks:[\\s\\S]*TUI[\\s\\S]*CLI"

expect_no_errors: true
