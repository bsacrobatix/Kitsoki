# persona_qa_demo — no-LLM fixture for the Persona QA feature tour.
#
# It combines the side-effect-free preview and the all-transports check into one
# deterministic run so the web demo can show the complete operator workflow:
# preview -> check -> next leg -> next leg -> next leg -> report.

test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      preview_transport_suite:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            schema: kitsoki/persona-qa-transport-suite/v1
            status: ready
            summary:
              scenario_count: 1
              requested_transports: [tui, web, vscode, cli]
              transport_count: 4
              leg_count: 4
              skipped_count: 0
            legs:
              - { leg_id: "bugfix::tui", scenario: bugfix, transport: tui }
              - { leg_id: "bugfix::web", scenario: bugfix, transport: web }
              - { leg_id: "bugfix::vscode", scenario: bugfix, transport: vscode }
              - { leg_id: "bugfix::cli", scenario: bugfix, transport: cli }
      emit_scenario_qa_run:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            run_id: scenario-qa-demo-run
            run_dir: /repo/.artifacts/product-journey/scenario-qa-demo-run
            driver_plan_path: /repo/.artifacts/product-journey/scenario-qa-demo-run/driver-plan.md
            execution_plan_path: /repo/.artifacts/product-journey/scenario-qa-demo-run/execution-plan.md
            agent_brief_path: /repo/.artifacts/product-journey/scenario-qa-demo-run/agent-brief.md
      build_scenario_qa_deck:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: scenario_qa_deck_built
            run_dir: /repo/.artifacts/product-journey/scenario-qa-demo-run
            deck_path: /repo/.artifacts/product-journey/scenario-qa-demo-run/deck.slidey.json
            leg_count: 4
            pass_count: 3
            fail_count: 0
            degraded_count: 1
            summary: "3 / 4 transport legs passed, 1 degraded-evidence."

  host.starlark.run:
    by_call:
      plan_legs:
        data:
          legs:
            items:
              - leg_id: "bugfix::tui"
                scenario: "bugfix"
                transport: "tui"
                visual_surface: "tui"
                evidence_dir: "evidence/gears-rust--core-maintainer/bugfix"
                transport_evidence_contract:
                  primary_tool: "render.tui_png"
                  evidence_kind: "rendered_tui_frame"
                  level: "frame-level"
              - leg_id: "bugfix::web"
                scenario: "bugfix"
                transport: "web"
                visual_surface: "web"
                evidence_dir: "evidence/gears-rust--core-maintainer/bugfix"
                transport_evidence_contract:
                  primary_tool: "visual.snapshot"
                  evidence_kind: "browser_screenshot"
                  level: "frame-level"
              - leg_id: "bugfix::vscode"
                scenario: "bugfix"
                transport: "vscode"
                visual_surface: "vscode"
                evidence_dir: "evidence/gears-rust--core-maintainer/bugfix"
                transport_evidence_contract:
                  primary_tool: "visual.open (kind=vscode)"
                  evidence_kind: "screenshot_or_tui_png"
                  level: "bridge-level"
              - leg_id: "bugfix::cli"
                scenario: "bugfix"
                transport: "cli"
                visual_surface: "cli"
                evidence_dir: "evidence/gears-rust--core-maintainer/bugfix"
                transport_evidence_contract:
                  primary_tool: "command transcript"
                  evidence_kind: "command_output"
                  level: "terminal-level"
          leg_count: 4
          driver_agent: ".agents/agents/product-journey-qa-driver.md"
          run_dir_rel: ".artifacts/product-journey/scenario-qa-demo-run"
          plan_status: { resolved: true }
      pick_leg:
        data:
          current_leg:
            leg_id: "bugfix::tui"
            scenario: "bugfix"
            transport: "tui"
            visual_surface: "tui"
          current_leg_id: "bugfix::tui"
          current_leg_json: '{"leg_id":"bugfix::tui","scenario":"bugfix","transport":"tui","visual_surface":"tui"}'
      record_leg_result:
        data:
          leg_results:
            items:
              - { leg_id: "bugfix::tui", scenario: "bugfix", transport: "tui", evidence_level: "frame-level", driver_status: "captured", verdict: "pass", verdict_summary: "TUI frame confirms the fix." }
              - { leg_id: "bugfix::web", scenario: "bugfix", transport: "web", evidence_level: "frame-level", driver_status: "captured", verdict: "pass", verdict_summary: "Browser screenshot confirms the fix." }
              - { leg_id: "bugfix::vscode", scenario: "bugfix", transport: "vscode", evidence_level: "bridge-level", driver_status: "degraded-evidence", verdict: "degraded-evidence", verdict_summary: "VS Code bridge returned degraded JSON evidence." }
              - { leg_id: "bugfix::cli", scenario: "bugfix", transport: "cli", evidence_level: "terminal-level", driver_status: "captured", verdict: "pass", verdict_summary: "Command transcript captured." }
          pass_count: 3
          fail_count: 0
          degraded_count: 1
      build_report:
        data:
          report_path: ".artifacts/product-journey/scenario-qa-demo-run/report.md"
          report_summary: "3 / 4 transport legs passed, 1 degraded-evidence."

  host.agent.task:
    by_call:
      drive_leg:
        data:
          ok: true
          submitted:
            status: "captured"
            evidence_refs: ["evidence-1"]
            frames_dir: "evidence/gears-rust--core-maintainer/bugfix"
            summary: "Captured evidence for this transport leg."
      judge_leg:
        data:
          ok: true
          submitted:
            verdict: "pass"
            summary: "Evidence supports the scenario."
            cited_frames: ["frame-1.png"]

turns:
  - intent:
      name: preview
      slots:
        scenario: bugfix
        transport: all
    expect_state: idle
    expect_world:
      scenario_ref: bugfix
      transport_arg: all
      suite_status: ready
      suite_leg_count: 4
      suite_skipped_count: 0
      run_id: ""
      status: preview_ready
    expect_host_calls:
      - handler: host.run
        args: { call: preview_transport_suite }
    expect_no_host_calls: [host.agent.task, host.starlark.run]
    expect_view_matches: "Transport suite:[\\s\\S]*ready; legs=4, skipped=0"

  - intent:
      name: check
      slots:
        scenario: bugfix
        transport: all
        persona: core-maintainer
        target: gears-rust
        seed: story-flow-demo
    expect_state: recording
    expect_world:
      mode: catalog
      run_id: scenario-qa-demo-run
      leg_count: 4
      leg_index: 0
    expect_host_calls:
      - handler: host.run
        args: { call: emit_scenario_qa_run }
      - handler: host.starlark.run
        args: { call: plan_legs }
      - handler: host.agent.task
        args: { call: drive_leg }
      - handler: host.agent.task
        args: { call: judge_leg }
      - handler: host.starlark.run
        args: { call: record_leg_result }
    expect_view_matches: "recording[\\s\\S]*next leg"

  - intent: { name: next_leg, slots: {} }
    expect_state: recording
    expect_world:
      leg_index: 1
      leg_count: 4

  - intent: { name: next_leg, slots: {} }
    expect_state: recording
    expect_world:
      leg_index: 2
      leg_count: 4

  - intent: { name: next_leg, slots: {} }
    expect_state: report
    expect_world:
      leg_index: 3
      leg_count: 4
      report_path: ".artifacts/product-journey/scenario-qa-demo-run/report.md"
      report_summary: "3 / 4 transport legs passed, 1 degraded-evidence."
      deck_path: "/repo/.artifacts/product-journey/scenario-qa-demo-run/deck.slidey.json"
    expect_host_calls:
      - handler: host.starlark.run
        args: { call: build_report }
      - handler: host.run
        args: { call: build_scenario_qa_deck }
    expect_view_matches: "SCENARIO QA REPORT[\\s\\S]*3 / 4 transport legs passed, 1 degraded-evidence[\\s\\S]*vscode / bugfix[\\s\\S]*\\[bridge-level\\][\\s\\S]*cli / bugfix[\\s\\S]*\\[terminal-level\\]"

expect_no_errors: true
