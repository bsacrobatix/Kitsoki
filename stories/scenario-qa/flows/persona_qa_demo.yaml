# persona_qa_demo — no-LLM fixture for the Persona QA feature tour.
#
# The operator story is intentionally real-world: a QA engineer/developer wants
# to check whether required-input affordances are clear in both the web UI and
# the TUI. The fixture stubs the expensive host/agent work, but leaves the story
# Starlark helpers real so parsing, ad-hoc preview text, leg selection, result
# accumulation, and report.md writing follow the production path.

test_kind: flow
app: ../app.yaml
initial_state: idle

host_handlers:
  host.run:
    by_call:
      preview_transport_suite:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            schema: kitsoki/persona-qa-transport-suite/v1
            status: ready
            summary:
              scenario_count: 1
              requested_transports: [web, tui]
              transport_count: 2
              leg_count: 2
              skipped_count: 0
            scenarios:
              - scenario: required-input-affordance
                label: Required input affordance
                task: Check that QA engineers and developers can provide required input, understand the planned transport checks, and interpret the final report.
                applicable_transports: [web, tui]
                skipped_transports: []
            legs:
              - leg_id: "required-input-affordance::web"
                scenario: required-input-affordance
                transport: web
                transport_label: Web
                visual_surface: web
                evidence_contract: { evidence_kind: browser_screenshot, level: frame-level, primary_tool: visual.snapshot }
              - leg_id: "required-input-affordance::tui"
                scenario: required-input-affordance
                transport: tui
                transport_label: TUI
                visual_surface: tui
                evidence_contract: { evidence_kind: rendered_tui_frame, level: frame-level, primary_tool: render.tui_png }
      emit_scenario_qa_run:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            run_id: scenario-qa-affordance-demo-run
            run_dir: /repo/.artifacts/product-journey/scenario-qa-affordance-demo-run
            driver_plan_path: /repo/.artifacts/product-journey/scenario-qa-affordance-demo-run/driver-plan.md
            execution_plan_path: /repo/.artifacts/product-journey/scenario-qa-affordance-demo-run/execution-plan.md
            agent_brief_path: /repo/.artifacts/product-journey/scenario-qa-affordance-demo-run/agent-brief.md
            driver_plan:
              driver_agent: ".agents/agents/product-journey-qa-driver.md"
              scenarios:
                - leg_id: "required-input-affordance::web"
                  scenario: required-input-affordance
                  label: Required input affordance
                  task: Check that QA engineers and developers can provide required input, understand the planned transport checks, and interpret the final report.
                  transport: web
                  visual_surface: web
                  evidence_dir: "evidence/required-input-affordance/web"
                  primary_story: "stories/operator-ask/app.yaml"
                  success_criteria:
                    - The operator can enter the plain-language request.
                    - The preview explains what will be checked before capture.
                    - The report shows per-transport verdicts and replay artifacts.
                    - The report screen has a main-room return action.
                  transport_evidence_contract:
                    primary_tool: "visual.snapshot"
                    evidence_kind: "browser_screenshot"
                    level: "frame-level"
                  playback_path: "clips/web-required-input.rrweb.json"
                  playback_caption: "Web session replay shows scenario entry, plan preview, two transport checks, summary report, and main-room return."
                - leg_id: "required-input-affordance::tui"
                  scenario: required-input-affordance
                  label: Required input affordance
                  task: Check that QA engineers and developers can provide required input, understand the planned transport checks, and interpret the final report.
                  transport: tui
                  visual_surface: tui
                  evidence_dir: "evidence/required-input-affordance/tui"
                  primary_story: "stories/operator-ask/app.yaml"
                  success_criteria:
                    - The operator can enter the same plain-language request in the terminal.
                    - The preview explains what will be checked before capture.
                    - The report shows per-transport verdicts and replay artifacts.
                    - The report screen has a main-room return action.
                  transport_evidence_contract:
                    primary_tool: "render.tui_png"
                    evidence_kind: "rendered_tui_frame"
                    level: "frame-level"
                  playback_path: "clips/tui-required-input.rrweb.json"
                  playback_caption: "TUI session replay shows scenario entry, plan preview, two transport checks, summary report, and main-room return through the real TUI bridge."
      build_scenario_qa_deck:
        data:
          ok: true
          exit_code: 0
          stdout_json:
            status: scenario_qa_deck_built
            run_dir: /repo/.artifacts/product-journey/scenario-qa-affordance-demo-run
            deck_path: /repo/.artifacts/product-journey/scenario-qa-affordance-demo-run/deck.slidey.json
            leg_count: 2
            pass_count: 2
            fail_count: 0
            degraded_count: 0
            summary: "2 / 2 transport checks passed."

  host.agent.task:
    by_call:
      drive_leg:
        data:
          ok: true
          submitted:
            status: "captured"
            evidence_refs: ["frame-required-input.png"]
            frames_dir: "evidence/required-input-affordance"
            summary: "Captured the required-input affordance for this transport check."
      judge_leg:
        data:
          ok: true
          submitted:
            verdict: "pass"
            summary: "Captured evidence shows the required-input request entry, preview plan, final report, replay artifact links, and main-room return action."
            cited_frames: ["frame-required-input.png"]

turns:
  - intent:
      name: preview_request
      slots:
        request: "preview required user input affordance as a QA engineer and developer transport=web,tui target=kitsoki seed=affordance-demo"
    expect_state: idle
    expect_world:
      mode: adhoc
      scenario_ref: ""
      scenario_description: "required user input affordance as a QA engineer and developer"
      transport_arg: web,tui
      target: kitsoki
      suite_status: ready
      suite_leg_count: 2
      suite_skipped_count: 0
      suite_summary: "Preview ready: 2 transport checks for required user input affordance as a QA engineer and developer. No run bundle or capture has been created."
      run_id: ""
      status: preview_ready
    expect_host_calls:
      - handler: host.starlark.run
        args: { call: parse_check_request }
      - handler: host.run
        args: { call: preview_transport_suite }
      - handler: host.starlark.run
        args: { call: summarize_transport_suite }
    expect_no_host_calls: [host.agent.task]
    expect_view_matches: "Preview:[\\s\\S]*Preview ready: 2 transport checks[\\s\\S]*Last run:[\\s\\S]*\\(none yet\\)[\\s\\S]*Previewed transport checks[\\s\\S]*required user input affordance as a QA engineer and developer[\\s\\S]*Goal: Check that the requested behavior is usable[\\s\\S]*Transport checks:[\\s\\S]*Web[\\s\\S]*TUI"

  - intent:
      name: check_request
      slots:
        request: "required user input affordance as a QA engineer and developer transport=web,tui target=kitsoki seed=affordance-demo"
    expect_state: recording
    expect_world:
      mode: adhoc
      scenario_description: "required user input affordance as a QA engineer and developer"
      run_id: scenario-qa-affordance-demo-run
      leg_count: 2
      leg_index: 0
      pass_count: 1
      degraded_count: 0
    expect_host_calls:
      - handler: host.starlark.run
        args: { call: parse_check_request }
      - handler: host.run
        args: { call: emit_scenario_qa_run }
      - handler: host.starlark.run
        args: { call: plan_legs }
      - handler: host.starlark.run
        args: { call: pick_leg }
      - handler: host.agent.task
        args: { call: drive_leg }
      - handler: host.starlark.run
        args: { call: prepare_judge }
      - handler: host.agent.task
        args: { call: judge_leg }
      - handler: host.starlark.run
        args: { call: record_leg_result }
    expect_view_matches: "recording[\\s\\S]*Transport check:[\\s\\S]*1 of 2[\\s\\S]*Driver status:[\\s\\S]*captured[\\s\\S]*Pass:[\\s\\S]*1[\\s\\S]*next transport"

  - intent: { name: next_leg, slots: {} }
    expect_state: report
    expect_world:
      leg_index: 1
      leg_count: 2
      pass_count: 2
      fail_count: 0
      degraded_count: 0
      report_path: "/repo/.artifacts/product-journey/scenario-qa-affordance-demo-run/report.md"
      report_summary: "2 / 2 transport checks passed."
      deck_path: "/repo/.artifacts/product-journey/scenario-qa-affordance-demo-run/deck.slidey.json"
    expect_host_calls:
      - handler: host.starlark.run
        args: { call: pick_leg }
      - handler: host.agent.task
        args: { call: drive_leg }
      - handler: host.starlark.run
        args: { call: prepare_judge }
      - handler: host.agent.task
        args: { call: judge_leg }
      - handler: host.starlark.run
        args: { call: record_leg_result }
      - handler: host.starlark.run
        args: { call: build_report }
      - handler: host.run
        args: { call: build_scenario_qa_deck }
    expect_view_matches: "SCENARIO QA REPORT[\\s\\S]*Result:[\\s\\S]*2 / 2 transport checks passed[\\s\\S]*Pass:[\\s\\S]*2[\\s\\S]*Summary report:[\\s\\S]*report.md[\\s\\S]*Review deck:[\\s\\S]*deck.slidey.json[\\s\\S]*web \\[frame-level\\] verdict=pass[\\s\\S]*tui \\[frame-level\\] verdict=pass[\\s\\S]*main room"

  - intent: { name: main_room, slots: {} }
    expect_state: idle
    expect_world:
      run_id: scenario-qa-affordance-demo-run
      report_path: "/repo/.artifacts/product-journey/scenario-qa-affordance-demo-run/report.md"
      status: idle
    expect_view_matches: "SCENARIO QA[\\s\\S]*Last run[\\s\\S]*scenario-qa-affordance-demo-run[\\s\\S]*report"

expect_no_errors: true
