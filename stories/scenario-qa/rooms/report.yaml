# report — fold every recorded leg's driver+judge outcome (world.leg_results)
# into report.md AND deck.slidey.json under the run dir: the ONE per-transport
# verdict table (VS Code legs labeled "bridge-level", never editor-level).
# report.md is folded in Starlark (scripts/build_report.star); deck.slidey.json
# is folded by tools/product-journey/run.py's --scenario-qa-report subcommand,
# which reuses this module's existing Slidey deck-shape validator. Re-runs on
# every entry (including the operator-typable "report" intent), so both
# artifacts always reflect the current session's leg_results, never stale.

states:

  report:
    description: "Folded the per-transport verdict table into report.md."
    relevant_world: [run_id, run_dir, scenario_ref, scenario_description, leg_results, pass_count, fail_count, degraded_count, report_path, report_summary, deck_path, last_error, status]
    default_intent: check_request
    view:
      - banner:
          text: "SCENARIO QA REPORT"
          subtitle: "{{ world.report_summary }}"
          color: "#059669"
      - kv:
          pairs:
            Run: "{{ world.run_id }}"
            Result: "{{ world.report_summary }}"
      - kv:
          pairs:
            Scenario: "{{ world.scenario_ref }}"
        when: "world.scenario_ref != ''"
      - kv:
          pairs:
            Scenario: "{{ world.scenario_description }}"
        when: "world.scenario_ref == '' && world.scenario_description != ''"
      - heading: "Result"
      - kv:
          pairs:
            Outcome: "{{ world.report_summary }}"
            Pass: "{{ world.pass_count }}"
            Fail: "{{ world.fail_count }}"
            Degraded: "{{ world.degraded_count }}"
      - heading: "Artifacts"
      - kv:
          pairs:
            Summary report: '{{ world.report_path|default:"(building…)" }}'
            Review deck: '{{ world.deck_path|default:"(building…)" }}'
      - prose: "A dispatch along the way failed and was recorded honestly rather than silently retried: {{ world.last_error }}"
        when: "world.last_error != ''"
      - heading: "Transport verdicts"
      - code: |
          {% for leg in world.leg_results.items %}
          - {{ leg.transport }} [{{ leg.evidence_level }}{% if leg.natural_utterance_count %}; natural_prompts={{ leg.natural_utterance_count }}{% endif %}] verdict={{ leg.verdict }} driver={{ leg.driver_status }}{% if leg.playback_path %} playback={{ leg.playback_path }}{% endif %}
          {% endfor %}
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "main room"
              hint: "return to the Scenario QA start screen"
              intent: main_room
            - label: "check a new request"
              hint: "plain prose plus optional qualifiers"
              intent: check_request
              param:
                slot: request
                type: string
                placeholder: "e.g. settings validation persists transport=web"
                required: true
            - label: "report"
              hint: "rebuild report.md"
              intent: report
            - label: "status"
              intent: status
            - label: "look"
              intent: look
    on_enter:
      - invoke: host.starlark.run
        id: build_report
        with:
          script: scripts/build_report.star
          capabilities:
            fs:
              write: ["**"]
          inputs:
            run_id: "{{ world.run_id }}"
            run_dir: "{{ world.run_dir_rel }}"
            scenario_ref: "{{ world.scenario_ref }}"
            scenario_description: "{{ world.scenario_description }}"
            leg_results: "{{ world.leg_results }}"
        bind:
          report_path: report_path
          report_summary: report_summary
        on_error: idle
      # report.md is folded in Starlark (above); deck.slidey.json is folded by
      # tools/product-journey/run.py's --scenario-qa-report subcommand instead
      # — it reuses this module's existing Slidey deck-shape validator rather
      # than reimplementing scene-shape rules here. leg_results is templated
      # in directly (map -> compact JSON splice, reference.md:255-256) so no
      # intermediate file/`|json` filter is needed.
      - invoke: host.run
        id: build_scenario_qa_deck
        with:
          cmd: python3
          args:
            - tools/product-journey/run.py
            - --scenario-qa-report
            - --json-output
            - --run-dir
            - "{{ world.run_dir }}"
            - --scenario
            - "{{ world.scenario_ref }}"
            - --scenario-description
            - "{{ world.scenario_description }}"
            - --leg-results-json
            - "{{ world.leg_results }}"
          cwd: "."
        bind:
          deck_path: "stdout_json.deck_path"
        on_error: .
    on:
      check_request:
        - when: "(slots.request ?? '') == ''"
          target: .
          effects:
            - set:
                last_error: "check needs a scenario request."
        - target: plan
          effects:
            - set:
                last_error: ""
                suite_summary: ""
                suite_plan: ""
                status: "parsing_request"
            - invoke: host.starlark.run
              id: parse_check_request
              with:
                script: scripts/parse_request.star
                inputs:
                  request: "{{ slots.request }}"
                  default_transport: "{{ world.transport_arg }}"
                  default_persona: "{{ world.persona }}"
                  default_target: "{{ world.target }}"
                  default_seed: "{{ world.seed }}"
                  default_profile: "{{ world.live_profile }}"
                  default_live_budget_minutes: "{{ world.live_budget_minutes }}"
              bind:
                scenario_ref: scenario_ref
                scenario_description: scenario_description
                transport_arg: transport_arg
                persona: persona
                target: target
                seed: seed
                live_profile: live_profile
                live_budget_minutes: live_budget_minutes
                mode: mode
                request_status: request_status
              on_error: idle
            - set:
                status: "planning"
                leg_index: 0
                leg_count: 0
                legs: {}
                plan_status: {}
                current_leg: {}
                current_leg_id: ""
                drive_result: {}
                judge_result: {}
                leg_results: { items: [] }
                pass_count: 0
                fail_count: 0
                degraded_count: 0
      check:
        - when: "(slots.scenario ?? '') == '' && (slots.description ?? '') == ''"
          target: .
          effects:
            - set:
                last_error: "check needs a scenario id or a free-text description."
        - target: plan
          effects:
            - set:
                scenario_ref: "{{ join(split((slots.scenario ?? ''), ' '), '-') }}"
                scenario_description: "{{ slots.description ?? '' }}"
                transport_arg: "{{ slots.transport ?? world.transport_arg }}"
                persona: "{{ join(split((slots.persona ?? world.persona), ' '), '-') }}"
                target: "{{ join(split((slots.target ?? world.target), ' '), '-') }}"
                seed: "{{ slots.seed ?? world.seed }}"
                live_profile: "{{ slots.profile ?? world.live_profile }}"
                live_budget_minutes: "{{ slots.live_budget_minutes ?? world.live_budget_minutes }}"
                mode: "{{ (slots.description ?? '') != '' ? 'adhoc' : 'catalog' }}"
                last_error: ""
                suite_summary: ""
                suite_plan: ""
                status: "planning"
                leg_index: 0
                leg_count: 0
                legs: {}
                plan_status: {}
                current_leg: {}
                current_leg_id: ""
                drive_result: {}
                judge_result: {}
                leg_results: { items: [] }
                pass_count: 0
                fail_count: 0
                degraded_count: 0
      report:
        - target: report
      main_room:
        - target: idle
          effects:
            - set:
                last_error: ""
                status: "idle"
      status:
        - target: .
      look:
        - target: .
