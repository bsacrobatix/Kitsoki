states:

  idle:
    description: "Waiting to check a scenario across one or more transports."
    relevant_world: [scenario_ref, scenario_description, transport_arg, persona, target, seed, pause, suite_status, suite_leg_count, suite_skipped_count, suite_summary, suite_plan, run_id, run_dir, last_error, status]
    default_intent: check_request
    view:
      - banner:
          text: "SCENARIO QA"
          subtitle: "Check a scenario across TUI / web / VS Code / CLI transports."
          color: "#0EA5E9"
      - kv:
          pairs:
            Scenario: '{{ world.scenario_ref|default:"(none)" }}'
            Description: '{{ world.scenario_description|default:"(none)" }}'
            Transport: "{{ world.transport_arg }}"
            Persona: '{{ world.persona|default:"(default)" }}'
            Target: '{{ world.target|default:"(default)" }}'
            Pause mode: '{{ world.pause|default:"auto" }}'
            Preview: '{{ world.suite_summary|default:"(not previewed)" }}'
            Last run: '{{ world.run_id|default:"(none yet)" }}'
            Capsule workspace: '{{ world.scenario_workspace_root|default:"(none yet)" }}'
            Status: "{{ world.status }}"
      - heading: "Previewed transport checks"
        when: "world.suite_plan != ''"
      - code: "{{ world.suite_plan }}"
        when: "world.suite_plan != ''"
      - prose: "{{ world.last_error }}"
        when: "world.last_error != ''"
      - prose: "Describe the behavior to check. Add qualifiers such as transport=all|tui|web|vscode|cli, persona=<id>, target=<project>, seed=<id>, profile=<profile>, or pause=each-leg (default pause=auto drains every transport leg into one report; pause=each-leg pauses for an explicit \"next transport\" per leg). Use scenario=<id> only when you want a catalog scenario instead of an ad-hoc behavior check."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "check a scenario request"
              hint: "plain prose or key=value qualifiers"
              intent: check_request
              param:
                slot: request
                type: string
                placeholder: "e.g. settings validation persists transport=web"
                required: true
            - label: "preview transport checks"
              hint: "dry-run a plain-language request; no run created"
              intent: preview_request
              param:
                slot: request
                type: string
                placeholder: "e.g. required user input affordance transport=web,tui"
                required: true
            - label: "report"
              hint: "(re)build report.md for the last run, if any"
              intent: report
              when: "world.run_dir != ''"
            - label: "status"
              intent: status
            - label: "look"
              intent: look
    on_enter:
      # Surface a bounce back to idle from any later room (a failed host.run /
      # host.starlark.run invoke redirects here) — never a silent bounce. The
      # status value named by whichever room bounced gives the operator a hint
      # at where it failed without needing the trace.
      - when: "world.last_error == '' && world.status != 'idle'"
        set:
          last_error: "Bounced back to idle from '{{ world.status }}' — check the trace for the host-call error, then try again."
          status: "idle"
    on:
      check_request:
        - when: "(slots.request ?? '') == ''"
          target: .
          effects:
            - set:
                last_error: "check needs a scenario request."
        - when: "hasPrefix(lower(trim(slots.request ?? '')), 'preview ') || lower(trim(slots.request ?? '')) == 'preview'"
          target: .
          effects:
            - emit_intent: preview_request
              slots:
                request: "{{ slots.request }}"
        - target: plan
          effects:
            - set:
                last_error: ""
                suite_summary: ""
                suite_plan: ""
                status: "parsing_request"
            - invoke: host.starlark.run
              id: parse_check_request
              with:
                script: scripts/parse_request.star
                inputs:
                  request: "{{ slots.request }}"
                  default_transport: "{{ world.transport_arg }}"
                  default_persona: "{{ world.persona }}"
                  default_target: "{{ world.target }}"
                  default_seed: "{{ world.seed }}"
                  default_profile: "{{ world.live_profile }}"
                  default_live_budget_minutes: "{{ world.live_budget_minutes }}"
                  default_pause: "{{ world.pause }}"
              bind:
                scenario_ref: scenario_ref
                scenario_description: scenario_description
                transport_arg: transport_arg
                persona: persona
                target: target
                seed: seed
                live_profile: live_profile
                live_budget_minutes: live_budget_minutes
                pause: pause
                mode: mode
                request_status: request_status
              on_error: idle
            - set:
                status: "planning"
                leg_index: 0
                leg_count: 0
                legs: {}
                plan_status: {}
                current_leg: {}
                current_leg_id: ""
                drive_result: {}
                judge_result: {}
                leg_results: { items: [] }
                live_authorization_summary: []
                scenario_workspace: {}
                scenario_workspace_root: ""
                scenario_workspace_id: ""
                pass_count: 0
                fail_count: 0
                degraded_count: 0
      check:
        - when: "(slots.scenario ?? '') == '' && (slots.description ?? '') == ''"
          target: .
          effects:
            - set:
                last_error: "check needs a scenario id or a free-text description."
        - target: plan
          effects:
            - set:
                scenario_ref: "{{ join(split((slots.scenario ?? ''), ' '), '-') }}"
                scenario_description: "{{ slots.description ?? '' }}"
                transport_arg: "{{ slots.transport ?? world.transport_arg }}"
                persona: "{{ join(split((slots.persona ?? world.persona), ' '), '-') }}"
                target: "{{ join(split((slots.target ?? world.target), ' '), '-') }}"
                seed: "{{ slots.seed ?? world.seed }}"
                live_profile: "{{ slots.profile ?? world.live_profile }}"
                live_budget_minutes: "{{ slots.live_budget_minutes ?? world.live_budget_minutes }}"
                pause: "{{ slots.pause ?? world.pause }}"
                mode: "{{ (slots.description ?? '') != '' ? 'adhoc' : 'catalog' }}"
                last_error: ""
                suite_summary: ""
                suite_plan: ""
                status: "planning"
                leg_index: 0
                leg_count: 0
                legs: {}
                plan_status: {}
                current_leg: {}
                current_leg_id: ""
                drive_result: {}
                judge_result: {}
                leg_results: { items: [] }
                live_authorization_summary: []
                scenario_workspace: {}
                scenario_workspace_root: ""
                scenario_workspace_id: ""
                pass_count: 0
                fail_count: 0
                degraded_count: 0
      preview:
        - when: "(slots.scenario ?? '') == ''"
          target: .
          effects:
            - set:
                last_error: "preview needs a scenario id."
        - target: .
          effects:
            - set:
                scenario_ref: "{{ join(split((slots.scenario ?? world.scenario_ref), ' '), '-') }}"
                scenario_description: ""
                transport_arg: "{{ slots.transport ?? world.transport_arg }}"
                mode: "catalog"
                suite_status: ""
                suite_leg_count: 0
                suite_skipped_count: 0
                suite_summary: ""
                suite_plan: ""
                transport_suite: {}
                last_error: ""
                status: "previewing"
            - invoke: host.run
              id: preview_transport_suite
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --transport-suite
                  - --scenarios
                  - "{{ join(split((slots.scenario ?? world.scenario_ref), ' '), '-') }}"
                  - --transport
                  - "{{ slots.transport ?? world.transport_arg }}"
                  - --json-output
                cwd: "."
                fail_on_error: true
              bind:
                last_result: stdout_json
                transport_suite: stdout_json
                suite_status: "stdout_json.status"
                suite_leg_count: "stdout_json.summary.leg_count"
                suite_skipped_count: "stdout_json.summary.skipped_count"
              on_error: idle
            - invoke: host.starlark.run
              id: summarize_transport_suite
              with:
                script: scripts/summarize_transport_suite.star
                inputs:
                  suite: "{{ world.transport_suite }}"
                  scenario_ref: "{{ world.scenario_ref }}"
                  scenario_description: "{{ world.scenario_description }}"
                  mode: "{{ world.mode }}"
                  transport: "{{ world.transport_arg }}"
              bind:
                suite_summary: suite_summary
                suite_plan: suite_plan
              on_error: idle
            - set:
                status: "preview_ready"
      preview_request:
        - when: "(slots.request ?? '') == ''"
          target: .
          effects:
            - set:
                last_error: "preview needs a scenario request."
        - target: .
          effects:
            - set:
                last_error: ""
                suite_status: ""
                suite_leg_count: 0
                suite_skipped_count: 0
                suite_summary: ""
                suite_plan: ""
                transport_suite: {}
                status: "parsing_preview"
            - invoke: host.starlark.run
              id: parse_check_request
              with:
                script: scripts/parse_request.star
                inputs:
                  request: "{{ slots.request }}"
                  default_transport: "{{ world.transport_arg }}"
                  default_persona: "{{ world.persona }}"
                  default_target: "{{ world.target }}"
                  default_seed: "{{ world.seed }}"
                  default_profile: "{{ world.live_profile }}"
                  default_live_budget_minutes: "{{ world.live_budget_minutes }}"
                  default_pause: "{{ world.pause }}"
              bind:
                scenario_ref: scenario_ref
                scenario_description: scenario_description
                transport_arg: transport_arg
                persona: persona
                target: target
                seed: seed
                live_profile: live_profile
                live_budget_minutes: live_budget_minutes
                pause: pause
                mode: mode
                request_status: request_status
              on_error: idle
            - set:
                status: "previewing"
            - invoke: host.run
              id: preview_transport_suite
              with:
                cmd: python3
                args:
                  - tools/product-journey/run.py
                  - --transport-suite
                  - --scenarios
                  - "{{ world.mode == 'adhoc' ? 'bugfix' : world.scenario_ref }}"
                  - --transport
                  - "{{ world.transport_arg }}"
                  - --json-output
                cwd: "."
                fail_on_error: true
              bind:
                last_result: stdout_json
                transport_suite: stdout_json
                suite_status: "stdout_json.status"
                suite_leg_count: "stdout_json.summary.leg_count"
                suite_skipped_count: "stdout_json.summary.skipped_count"
              on_error: idle
            - invoke: host.starlark.run
              id: summarize_transport_suite
              with:
                script: scripts/summarize_transport_suite.star
                inputs:
                  suite: "{{ world.transport_suite }}"
                  scenario_ref: "{{ world.scenario_ref }}"
                  scenario_description: "{{ world.scenario_description }}"
                  mode: "{{ world.mode }}"
                  transport: "{{ world.transport_arg }}"
              bind:
                suite_summary: suite_summary
                suite_plan: suite_plan
              on_error: idle
            - set:
                status: "preview_ready"
      report:
        - when: "world.run_dir_rel == ''"
          target: .
          effects:
            - set:
                last_error: "No run to report yet — run check first."
        - target: report
          effects:
            - set:
                status: "reporting"
      status:
        - target: .
      look:
        - target: .
