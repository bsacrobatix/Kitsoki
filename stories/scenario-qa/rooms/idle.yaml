states:

  idle:
    description: "Waiting to check a scenario across one or more transports."
    relevant_world: [scenario_ref, scenario_description, transport_arg, persona, target, seed, run_id, run_dir, last_error, status]
    view:
      - banner:
          text: "SCENARIO QA"
          subtitle: "Check a scenario across TUI / web / VS Code transports."
          color: "#0EA5E9"
      - kv:
          pairs:
            Scenario: '{{ world.scenario_ref|default:"(none)" }}'
            Description: '{{ world.scenario_description|default:"(none)" }}'
            Transport: "{{ world.transport_arg }}"
            Persona: '{{ world.persona|default:"(default)" }}'
            Target: '{{ world.target|default:"(default)" }}'
            Last run: '{{ world.run_id|default:"(none yet)" }}'
            Status: "{{ world.status }}"
      - prose: "{{ world.last_error }}"
        when: "world.last_error != ''"
      - prose: "Check a scenario by catalog id (scenario=bugfix) or a free-text description (description=\"...\"), on one or more transports (transport=tui|web|vscode|all, default tui)."
      - choice:
          mode: single
          prompt: "Actions"
          items:
            - label: "check scenario=... transport=..."
              hint: "check a catalog scenario across the requested transport(s)"
              intent: check
            - label: 'check description="..." transport=...'
              hint: "draft an ad-hoc scenario from a free-text description and check it"
              intent: check
            - label: "report"
              hint: "(re)build report.md for the last run, if any"
              intent: report
              when: "world.run_dir != ''"
            - label: "status"
              intent: status
            - label: "look"
              intent: look
    on_enter:
      # Surface a bounce back to idle from any later room (a failed host.run /
      # host.starlark.run invoke redirects here) — never a silent bounce. The
      # status value named by whichever room bounced gives the operator a hint
      # at where it failed without needing the trace.
      - when: "world.last_error == '' && world.status != 'idle'"
        set:
          last_error: "Bounced back to idle from '{{ world.status }}' — check the trace for the host-call error, then try again."
          status: "idle"
    on:
      check:
        - when: "(slots.scenario ?? '') == '' && (slots.description ?? '') == ''"
          target: .
          effects:
            - set:
                last_error: "check needs scenario=<catalog-id> or description=\"<free text>\"."
        - target: plan
          effects:
            - set:
                scenario_ref: "{{ slots.scenario ?? '' }}"
                scenario_description: "{{ slots.description ?? '' }}"
                transport_arg: "{{ slots.transport ?? world.transport_arg }}"
                persona: "{{ slots.persona ?? world.persona }}"
                target: "{{ slots.target ?? world.target }}"
                seed: "{{ slots.seed ?? world.seed }}"
                mode: "{{ (slots.description ?? '') != '' ? 'adhoc' : 'catalog' }}"
                last_error: ""
                status: "planning"
                leg_index: 0
                leg_count: 0
                legs: {}
                leg_results: { items: [] }
                pass_count: 0
                fail_count: 0
                degraded_count: 0
      report:
        - when: "world.run_dir_rel == ''"
          target: .
          effects:
            - set:
                last_error: "No run to report yet — run check first."
        - target: report
          effects:
            - set:
                status: "reporting"
      status:
        - target: .
      look:
        - target: .
