# parallel — P2.10 "parallel legs via arena": hand the resolved transport legs
# to arena's persona-QA fan-out instead of Kitsoki's own one-leg-per-turn
# execute -> judge -> recording loop. Reached only when `check ...
# parallel=true` (world.parallel == "true"); the DEFAULT check path
# (world.parallel == "false") is unchanged -- parallel is opt-in, not a
# replacement for the serial loop (see plan.yaml's routing guard).
#
# The seam: ONE host.run call fans the resolved legs out to
# tools/arena/scripts/run_scenario_qa_legs_parallel.py, which drives every leg
# CONCURRENTLY through the deterministic, no-LLM persona-QA replay-smoke path
# (tools/persona_qa/kit.py) and folds each leg's CompletionState -- the SAME
# contract tools/arena/arena/plugins/persona_qa.py scores containerized
# arena cells from -- into the drive_result/judge_result shape
# schemas/{drive_leg_result,judge_leg_result}.json already declare (see
# tools/persona_qa/completion.py::to_scenario_qa_leg_result). The SAME
# scripts/record_leg_result.star this story's serial loop uses then folds
# every leg's result into world.leg_results in ONE batch call (its additive
# `legs_batch:` input), so report.md / deck.slidey.json are generated by the
# exact same code whether the legs were driven serially or in parallel.
#
# Fail-closed semantics are inherited, not reimplemented: every leg still
# carries the SAME leg.needs_live_hint / leg.live_authorization_note
# plan_legs.star already computed (issue group B / bug #105), and
# record_leg_result.star's existing _cause()/_lacks_evidence() logic still
# runs unchanged against these arena-sourced drive_result/judge_result pairs
# -- a leg that needed live authorization and got none is reported exactly as
# honestly here as it is in the serial path. This path never opens a live
# agent session at all (see run_scenario_qa_legs_parallel.py's own docstring
# for the transport-blind scope note) -- it is exercisable with zero LLM
# spend by construction, with no separate gate needed.

states:

  parallel:
    description: "Fanning the resolved transport checks out to arena's persona-qa job type and folding the results back."
    relevant_world: [run_id, run_dir, leg_count, legs, target, persona, live_profile, leg_results, pass_count, fail_count, degraded_count, live_authorization_summary, last_error, status]
    view:
      - heading: "Scenario QA · parallel"
      - kv:
          pairs:
            Run: "{{ world.run_id }}"
            Transport checks: "{{ world.leg_count }}"
            Mode: "parallel (arena persona-qa, no-LLM replay proof)"
      - prose: "Driving every resolved transport check concurrently through arena's persona-qa job type instead of one leg per turn. This is transport-blind cassette/replay proof -- see tools/arena/scripts/run_scenario_qa_legs_parallel.py for the scope note."
      - heading: "Live authorization notes"
        when: "len(world.live_authorization_summary) > 0"
      - code: |
          {% for note in world.live_authorization_summary %}
          - {{ note }}
          {% endfor %}
        when: "len(world.live_authorization_summary) > 0"
    on_enter:
      - invoke: host.run
        id: run_arena_persona_qa_legs
        with:
          cmd: python3
          args:
            - tools/arena/scripts/run_scenario_qa_legs_parallel.py
            - --legs-json
            - "{{ world.legs }}"
            - --project
            - "{{ world.target != '' ? world.target : 'gears-rust' }}"
            - --persona
            - "{{ world.persona }}"
            - --concurrency
            - "4"
            - --json-output
          cwd: "."
          fail_on_error: true
        bind:
          last_result: stdout_json
          parallel_records: "stdout_json.records"
        on_error: idle
      - invoke: host.starlark.run
        id: record_leg_result
        with:
          script: scripts/record_leg_result.star
          inputs:
            legs_batch: "{{ world.parallel_records }}"
            live_profile: "{{ world.live_profile }}"
        bind:
          leg_results: leg_results
          pass_count: pass_count
          fail_count: fail_count
          degraded_count: degraded_count
          record_status: record_status
        on_error: report
      # record_status.resolved (a dedicated marker, NOT leg_results directly
      # -- see record_leg_result.star's comment) errors pre-bind exactly like
      # plan_status does in plan.yaml, so this guard correctly defers until
      # record_leg_result's bind lands instead of deciding immediately
      # against the stale pre-invoke leg_results snapshot (world.leg_results
      # already defaults to a non-empty `{items: []}`, so a guard reading it
      # directly would NOT error and would fire too early).
      - when: "world.record_status.resolved == true"
        set:
          status: "reporting"
        emit_intent: legs_drained
    on:
      legs_drained:
        - target: report
      status:
        - target: .
      look:
        - target: .
