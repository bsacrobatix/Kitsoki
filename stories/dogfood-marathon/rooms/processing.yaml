# processing — the per-case DISPATCHER + checkpoint. The marathon re-enters here
# once per case; the operator advances the loop one case per turn with `next_case`
# (the same operator-driven cadence the dogfood-marathon skill describes — you
# answer each case's checkpoints as an honest operator). One case per turn also
# keeps each turn's internal emit chain under the engine's emit-depth cap
# (EmitIntentMaxDepth) — a whole backlog can't auto-run in a single turn.
#
# Loop shape (mirrors stories/bugfix's guarded-emit gate + stories/slidey-edit's
# cycle/budget cap):
#
#   on entry (checkpoint): show the tally; if drained → `next_case` aggregates.
#   next_case:
#     if case_index >= |backlog|  OR  cases_processed >= case_budget:
#         → aggregating                         (the loop guard, committed world)
#     else:
#         → picking_case (pick current_case = backlog.items[case_index]) → triaging
#
# Each per-case room (picking_case → triaging → driving → recording) auto-emits the
# next internal intent; recording's `record_done` increments case_index +
# cases_processed and returns to THIS checkpoint. The budget cap guarantees the
# loop terminates even if case_index plumbing ever regressed.

states:

  processing:
    description: "Per-case checkpoint — advance to the next case or drain to the report."
    relevant_world: [backlog, case_index, case_budget, cases_processed, current_case, results, exceptions, journal_path, journal_status]
    view:
      - heading: "Dogfood marathon · processing"
      - kv:
          pairs:
            Backlog:   '{{ world.backlog.items|length }}'
            At case:   '{{ world.case_index }}'
            Processed: '{{ world.cases_processed }}'
            Recorded:  '{{ world.results.items|length }}'
            Exceptions: '{{ world.exceptions.items|length }}'
            Budget:    '{{ world.case_budget }}'
            Journal:   '{{ world.journal_path|default:"(pending)" }}'
            Checkpoint: '{{ world.journal_status|default:"—" }}'
      - prose: "Walking the backlog one case at a time: triage → drive the inner pipeline → independently verify → record. `next_case` to process the next case (or roll up the run when the backlog is drained)."
      - heading: "Actions"
      - list:
          items:
            - label: "next_case"
              hint:  "process the next case (or aggregate when drained)"
            - label: "look"
              hint:  "re-render the tally"
            - label: "quit"
              hint:  "abandon the marathon"
    on:
      next_case:
        # Loop guard on COMMITTED world: drained (index past the backlog) OR
        # budget hit → aggregate.
        - when: "world.case_index >= len(world.backlog.items) || world.cases_processed >= world.case_budget"
          target: aggregating
        # Otherwise select the case in a dedicated room. Transition-effect host
        # calls do not publish their binds before the target state's on_enter,
        # so the picked case must settle before triaging reads current_case_json.
        - target: picking_case
          effects:
            - set:
                current_case:      {}
                current_case_id:   ""
                current_case_json: "{}"
                triage_verdict: {}
                drive_result:   {}
                verify_result:  {}
      quit:
        - target: "@exit:abandoned"
          effects:
            - set: { abandon_reason: "abandoned_at_processing" }
      look:
        - target: .
