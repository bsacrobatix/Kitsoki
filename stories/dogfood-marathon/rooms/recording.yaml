# recording — independently verify, append the current case result, and persist.
#
# The verify and journal writes intentionally happen in this room. Keeping them
# in separate auto-emitted states made one bug exceed the orchestrator's
# post-bind settlement cap (pick → triage → drive → verify → record →
# checkpoint). This room still performs the independent verify before recording;
# it just avoids extra state hops for deterministic bookkeeping.

states:

  recording:
    description: "Verifying and recording the current case's outcome."
    relevant_world: [current_case, triage_verdict, drive_result, verify_result, results, last_result, exceptions, record_status]
    view:
      - heading: "Dogfood marathon · recording"
      - kv:
          pairs:
            Case:       '{{ world.current_case.id }}'
            Verdict:    '{{ world.triage_verdict.verdict|default:"—" }}'
            Exit:       '{{ world.drive_result.exit|default:"—" }}'
            Verify:     '{{ world.verify_result.status|default:"—" }}'
            Recorded:   '{{ world.results.items|length }}'
            Exceptions: '{{ world.exceptions.items|length }}'
            Status:     '{{ world.record_status|default:"(recording…)" }}'
      - prose: "Appending the case outcome before the durable checkpoint is written."
    on_enter:
      - invoke: host.starlark.run
        id: verify_case
        with:
          script: scripts/verify_case.star
          inputs:
            case:         "{{ world.current_case }}"
            drive_result: "{{ world.drive_result }}"
        bind:
          verify_result: verify_result
        on_error: exception_review
      - invoke: host.starlark.run
        id: record_case
        with:
          script: scripts/record_case.star
          inputs:
            case:             "{{ world.current_case }}"
            triage_verdict:   "{{ world.triage_verdict }}"
            drive_result:     "{{ world.drive_result }}"
            verify_result:    "{{ world.verify_result }}"
            exception_policy: "{{ world.exception_policy }}"
        bind:
          results:           results
          last_result:       last_result
          findings:          findings
          exceptions:        exceptions
          exception_pending: exception_pending
          exception_summary: exception_summary
          record_status:     record_status
        on_error: exception_review
      - invoke: host.starlark.run
        id: persist_journal
        with:
          script: scripts/persist_journal.star
          capabilities:
            fs:
              write: [".artifacts/dogfood-marathon/**"]
          inputs:
            stage:                 "recorded"
            run_id:                "{{ world.run_id }}"
            run_dir:               "{{ world.run_dir }}"
            journal_path:          "{{ world.journal_path }}"
            journal_markdown_path: "{{ world.journal_markdown_path }}"
            backlog:               "{{ world.backlog }}"
            results:               "{{ world.results }}"
            findings:              "{{ world.findings }}"
            exceptions:            "{{ world.exceptions }}"
            current_case:          "{{ world.current_case }}"
            case_index:            "{{ world.case_index }}"
            cases_processed:       "{{ world.cases_processed }}"
        bind:
          run_id:                run_id
          run_dir:               run_dir
          journal_path:          journal_path
          journal_markdown_path: journal_markdown_path
          journal_status:        journal_status
          journal_summary:       journal_summary
          last_checkpoint:       last_checkpoint
        on_error: exception_review
      - emit_intent: exception_raised
        when: "world.last_checkpoint == 'recorded' && world.record_status == 'recorded' && world.exception_pending != '' && world.exception_policy == 'ask-serious'"
      - emit_intent: record_done
        when: "world.last_checkpoint == 'recorded' && world.record_status == 'recorded' && (world.exception_pending == '' || world.exception_policy != 'ask-serious')"
    on:
      exception_raised:
        - target: exception_review
      record_done:
        - target: processing
          effects:
            - set:
                case_index:        "{{ world.case_index + 1 }}"
                cases_processed:   "{{ world.cases_processed + 1 }}"
                current_case:      {}
                current_case_id:   ""
                current_case_json: "{}"
                triage_verdict:    {}
                drive_result:      {}
                verify_result:     {}
                record_status:     ""
                exception_pending: ""
                exception_summary: ""
                exception_answer:  ""
      look:
        - target: .
