# picking_case — select backlog.items[case_index] before agent rooms read it.
#
# This is intentionally its own state. A transition-effect invoke that both
# picks a case and targets triaging can race the target room's on_enter; the
# agent prompt then sees the default "{}" case_json. Keeping selection in
# on_enter lets the bind settle before `case_picked` enters triaging.

states:

  picking_case:
    description: "Selecting the next backlog case."
    relevant_world: [backlog, case_index, cases_processed, case_budget, current_case, current_case_json]
    view:
      - heading: "Dogfood marathon · picking case"
      - kv:
          pairs:
            Backlog:   '{{ world.backlog.items|length }}'
            At case:   '{{ world.case_index }}'
            Processed: '{{ world.cases_processed }}'
            Selected:  '{{ world.current_case_id|default:"(selecting…)" }}'
      - prose: "Selecting the case record that will be triaged and driven next."
    on_enter:
      - invoke: host.starlark.run
        id: pick_case
        with:
          script: scripts/pick_case.star
          inputs:
            backlog:         "{{ world.backlog }}"
            case_index:      "{{ world.case_index }}"
            cases_processed: "{{ world.cases_processed }}"
            case_budget:     "{{ world.case_budget }}"
        bind:
          current_case:      current_case
          current_case_id:   current_case_id
          current_case_json: current_case_json
        on_error: processing
      - emit_intent: case_picked
        when: "world.current_case_id != '' && world.current_case_json != '' && world.current_case_json != '{}'"
    on:
      case_picked:
        - target: triaging
      look:
        - target: .
