# picking_case — select backlog.items[case_index] before agent rooms read it.
#
# This is intentionally its own state and runs as a background completion. The
# autonomous loop often enters this state from another background on_complete
# target; that path does not re-run emit_intent after synchronous host binds.
# A background completion gives current_case_json a committed boundary before
# triaging reads it.

states:

  picking_case:
    description: "Selecting the next backlog case."
    relevant_world: [backlog, case_index, cases_processed, case_budget, current_case, current_case_json, pick_job_id]
    view:
      - heading: "Marathon · picking case"
      - kv:
          pairs:
            Backlog:   '{{ world.backlog.items|length }}'
            At case:   '{{ world.case_index }}'
            Processed: '{{ world.cases_processed }}'
            Selected:  '{{ world.current_case_id|default:"(selecting…)" }}'
            Job:       '{{ world.pick_job_id|default:"(starting)" }}'
      - prose: "Selecting the case record that will be triaged and driven next."
    on_enter:
      - invoke: host.starlark.run
        id: pick_case
        when: "world.pick_job_id == '' && world.current_case_id == ''"
        background: true
        with:
          script: scripts/pick_case.star
          inputs:
            backlog:         "{{ world.backlog }}"
            case_index:      "{{ world.case_index }}"
            cases_processed: "{{ world.cases_processed }}"
            case_budget:     "{{ world.case_budget }}"
        bind:
          pick_job_id: job_id
        on_complete:
          - set:
              current_case:      "{{ world.last_job_result.current_case }}"
              current_case_id:   "{{ world.last_job_result.current_case_id }}"
              current_case_json: "{{ world.last_job_result.current_case_json }}"
              pick_job_id:      ""
          - when: "world.current_case_id != '' && world.current_case_json != '' && world.current_case_json != '{}'"
            target: triaging
        on_error: processing
    on:
      case_picked:
        - target: triaging
      look:
        - target: .
