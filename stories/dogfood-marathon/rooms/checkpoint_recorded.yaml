# checkpoint_recorded — write the durable checkpoint from committed world state,
# then route to exception review or the next case via guarded emit_intent.

states:

  checkpoint_recorded:
    description: "Writing the post-record checkpoint."
    relevant_world: [current_case, results, exceptions, exception_pending, journal_path, last_checkpoint]
    view:
      - heading: "Dogfood marathon · checkpoint"
      - kv:
          pairs:
            Case:       '{{ world.current_case.id|default:"—" }}'
            Recorded:   '{{ world.results.items|length }}'
            Exceptions: '{{ world.exceptions.items|length }}'
            Pending:    '{{ world.exception_pending|default:"—" }}'
            Journal:    '{{ world.journal_path|default:"(pending)" }}'
            Checkpoint: '{{ world.last_checkpoint|default:"(writing…)" }}'
      - prose: "Persisting the recorded case before the loop advances."
    on_enter:
      - invoke: host.starlark.run
        id: persist_journal
        with:
          script: scripts/persist_journal.star
          capabilities:
            fs:
              write: [".artifacts/dogfood-marathon/**"]
          inputs:
            stage:                 "recorded"
            run_id:                "{{ world.run_id }}"
            run_dir:               "{{ world.run_dir }}"
            journal_path:          "{{ world.journal_path }}"
            journal_markdown_path: "{{ world.journal_markdown_path }}"
            backlog:               "{{ world.backlog }}"
            results:               "{{ world.results }}"
            findings:              "{{ world.findings }}"
            exceptions:            "{{ world.exceptions }}"
            current_case:          "{{ world.current_case }}"
            case_index:            "{{ world.case_index }}"
            cases_processed:       "{{ world.cases_processed }}"
        bind:
          run_id:                run_id
          run_dir:               run_dir
          journal_path:          journal_path
          journal_markdown_path: journal_markdown_path
          journal_status:        journal_status
          journal_summary:       journal_summary
          last_checkpoint:       last_checkpoint
        on_error: exception_review
      - emit_intent: exception_raised
        when: "world.last_checkpoint == 'recorded' && world.record_status == 'recorded' && world.exception_pending != '' && world.exception_policy == 'ask-serious'"
      - emit_intent: record_done
        when: "world.last_checkpoint == 'recorded' && world.record_status == 'recorded' && (world.exception_pending == '' || world.exception_policy != 'ask-serious')"
    on:
      exception_raised:
        - target: exception_review
      record_done:
        - target: processing
          effects:
            - set:
                case_index:        "{{ world.case_index + 1 }}"
                cases_processed:   "{{ world.cases_processed + 1 }}"
                current_case:      {}
                current_case_id:   ""
                current_case_json: "{}"
                triage_verdict:    {}
                drive_result:      {}
                verify_result:     {}
                record_status:     ""
                exception_pending: ""
                exception_summary: ""
                exception_answer:  ""
      look:
        - target: .
