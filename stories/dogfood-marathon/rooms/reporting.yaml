# reporting — build and materialize the slidey deck SPEC from results + rollup.
# Deterministic. host.starlark.run (build_deck.star) emits a standardized Slidey
# JSON body plus a content-derived artifact path; host.artifacts_dir writes that
# body under .artifacts/dogfood-marathon/<suffix>/deck.slidey.json. The slideshow
# room renders that materialized spec. The spec is built ONLY from journaled run
# data — the deck never shows a fabricated outcome.

states:

  reporting:
    description: "Building the slidey report deck spec from the run data (deterministic)."
    relevant_world: [results, rollup, deck_spec, deck_spec_path]
    view:
      - heading: "Dogfood marathon · reporting"
      - kv:
          pairs:
            Cases: '{{ world.results.items|length }}'
            Spec:  '{{ world.deck_spec_path|default:"(building…)" }}'
      - prose: "Composing the marathon-report deck: outcomes · effectiveness · time · cost · what-was-fixed · what-worked · what-didn't. The spec is rendered next."
    on_enter:
      - invoke: host.starlark.run
        id: build_deck
        once: true
        with:
          script: scripts/build_deck.star
          inputs:
            results:  "{{ world.results }}"
            rollup:   "{{ world.rollup }}"
            findings: "{{ world.findings }}"
            out_path: ""
        bind:
          deck_spec: deck_spec
        on_error: reporting
      - invoke: host.artifacts_dir
        id: write_deck
        once: true
        with:
          thread: "{{ world.deck_spec.artifact_thread }}"
          body: "{{ world.deck_spec.body }}"
          mode: replace
          artifacts_root: ".artifacts"
        bind:
          deck_spec_path: path
        on_error: reporting
      - when: "world.deck_spec_path != ''"
        emit_intent: reported
    on:
      reported:
        - target: slideshow
      look:
        - target: .
