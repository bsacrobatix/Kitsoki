# driving — drive the inner kitsoki pipeline LIVE over the current case. Tracked.
#
# DELEGATION (the heart of the dogfood method): a real marathon drives the inner
# pipeline through the kitsoki-mcp-driver agent — session_new harness:live, an
# explicit profile: (the maker model), an explicit trace: path (else the trace
# lands in a random temp file and the cost/token evidence is lost — SKILL.md
# gotcha #12), base = the case's baseline SHA (gotcha #11), a scoped test_cmd
# (gotcha #13), and a FRESH per-case worktree (never shared — gotcha #1). Here
# that whole live drive is modeled as ONE host.agent.task (driver persona) that
# returns the pipeline's terminal exit + the worktree/branch + the trace path for
# cost/token accounting. Under flow/no-LLM tests it is stubbed by id.
#
# CRITICAL HONESTY CONTROL: the drive result is NOT the grade. The driver does not
# self-grade — the recording room runs the operator's OWN oracle on the produced
# worktree and gates on that (SKILL.md: "never trust the maker's self-report").

states:

  driving:
    description: "Driving the inner pipeline live over the current case (tracked)."
    relevant_world: [current_case, inner_pipeline, profile, model, run_dir, journal_path, drive_result]
    view:
      - heading: "Dogfood marathon · driving"
      - kv:
          pairs:
            Case:     '{{ world.current_case.id }}'
            Pipeline: '{{ world.inner_pipeline }}'
            Profile:  '{{ world.profile }}'
            Model:    '{{ world.model }}'
            Exit:     '{{ world.drive_result.exit|default:"(driving…)" }}'
            Trace:    '{{ world.drive_result.trace|default:"—" }}'
            Run dir:  '{{ world.run_dir|default:"(derived)" }}'
      - prose: "Driving the inner pipeline to its terminal exit. The exit, worktree/branch, and trace are captured for the independent verify and cost/token accounting — the maker's self-report is NOT the grade."
    on_enter:
      - invoke: host.agent.task
        id: drive_case
        with:
          agent: driver
          acceptance:
            schema: schemas/drive_result.json
          # Prompt variables MUST live under context.args and be referenced
          # as {{ args.<key> }} — the prompt renderer only exposes the args
          # namespace; keys directly under context: silently render as empty.
          context:
            prompt: prompts/drive_case.md
            args:
              case_json:       "{{ world.current_case_json }}"
              inner_pipeline:  "{{ world.inner_pipeline }}"
              profile:         "{{ world.profile }}"
              model:           "{{ world.model }}"
              baseline_policy: "{{ world.baseline_policy }}"
              run_id:          "{{ world.run_id }}"
              run_dir:         "{{ world.run_dir }}"
              journal_path:    "{{ world.journal_path }}"
        bind:
          drive_result: submitted
        on_error: recording   # a dead/failed driver can still have landed edits — verify anyway
      - when: "(world.drive_result.exit ?? '') != ''"
        emit_intent: drive_done
    on:
      drive_done:
        - target: recording
      look:
        - target: .
