# intake — load the backlog of cases from the configured source. Deterministic.
#
# host.starlark.run (load_backlog.star) reads the backlog source (a dir of tickets
# / bugs) and projects a normalized {items:[{id,title,baseline,repro_command}]}.
# Under flow tests the call is stubbed by id so the backlog is seeded directly.
# Once the backlog is bound, route into the per-case dispatcher.

states:

  intake:
    description: "Loading the backlog of cases to process (deterministic)."
    relevant_world: [backlog_sources, backlog, backlog_limit, inner_pipeline, run_id, journal_path, loaded_journal]
    view:
      - heading: "Dogfood marathon · intake"
      - kv:
          pairs:
            Sources: '{{ world.backlog_sources }}'
            Loaded:  '{{ world.backlog.items|length }}'
            Limit:   '{{ world.backlog_limit }}'
            Run id:  '{{ world.run_id }}'
            Journal: '{{ world.journal_path|default:"(pending)" }}'
            Resume:  '{{ world.loaded_journal }}'
      - prose: "Loading the backlog. Each case carries its id, title, baseline (the buggy state the inner pipeline reproduces against), and any repro_command."
    on_enter:
      - invoke: host.starlark.run
        id: load_backlog
        with:
          script: scripts/load_backlog.star
          capabilities:
            fs:
              read: ["**", ".artifacts/**"]
              write: [".artifacts/dogfood-marathon/**"]
            github:
              issues: read
          inputs:
            source:         "{{ world.backlog_sources != '' ? world.backlog_sources : world.backlog_source }}"
            limit:          "{{ world.backlog_limit }}"
            baseline_policy: "{{ world.baseline_policy }}"
            run_id:         "{{ world.run_id }}"
            run_dir:        "{{ world.run_dir }}"
            journal_path:   "{{ world.journal_path }}"
            resume:         "{{ world.resume_from_journal }}"
        bind:
          backlog:               backlog
          run_id:                run_id
          run_dir:               run_dir
          journal_path:          journal_path
          journal_markdown_path: journal_markdown_path
          results:               results
          last_result:           last_result
          findings:              findings
          exceptions:            exceptions
          case_index:            case_index
          cases_processed:       cases_processed
          loaded_journal:        loaded_journal
          journal_status:        journal_status
          journal_summary:       journal_summary
          last_checkpoint:       last_checkpoint
        on_error: idle
      - invoke: host.starlark.run
        id: persist_journal
        with:
          script: scripts/persist_journal.star
          capabilities:
            fs:
              write: [".artifacts/dogfood-marathon/**"]
          inputs:
            stage:                 "intake"
            run_id:                "{{ world.run_id }}"
            run_dir:               "{{ world.run_dir }}"
            journal_path:          "{{ world.journal_path }}"
            journal_markdown_path: "{{ world.journal_markdown_path }}"
            backlog:               "{{ world.backlog }}"
            results:               "{{ world.results }}"
            findings:              "{{ world.findings }}"
            exceptions:            "{{ world.exceptions }}"
            current_case:          "{{ world.current_case }}"
            case_index:            "{{ world.case_index }}"
            cases_processed:       "{{ world.cases_processed }}"
        bind:
          run_id:                run_id
          run_dir:               run_dir
          journal_path:          journal_path
          journal_markdown_path: journal_markdown_path
          journal_status:        journal_status
          journal_summary:       journal_summary
          last_checkpoint:       last_checkpoint
        on_error: idle
      # Route unconditionally into the per-case dispatcher (processing). The
      # dispatcher's pick_case handles an EMPTY backlog (it returns no case →
      # backlog_drained → aggregating), so intake needs no fragile length guard
      # here — the drain decision lives in one place (the dispatcher).
      - emit_intent: enter_processing
    on:
      enter_processing:
        - target: processing
      look:
        - target: .
