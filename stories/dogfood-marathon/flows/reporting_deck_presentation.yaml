# reporting_deck_presentation — run the real deterministic deck builder over
# solved / partial / failed records so the generated slidey spec keeps clear
# before/after, result, and evidence affordances.

test_kind: flow
app: ../app.yaml
initial_state: aggregating
initial_world:
  run_id: "deck-presentation"
  run_dir: ".artifacts/dogfood-marathon/deck-presentation-flow"
  journal_path: ".artifacts/dogfood-marathon/deck-presentation-flow/journal.json"
