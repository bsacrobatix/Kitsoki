    worked:
      - "1 case independently verified solved"
      - "2 fixes shipped through the inner pipeline"
    didnt:
      - "1 case parked at needs-human"
      - "1 case failed the independent oracle"
      - "1 serious exception raised to the operator"
    headline: "Processed 3 case(s): 1 solved, 1 partial, 1 failed, 1 serious exception."
