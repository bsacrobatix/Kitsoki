host_handlers:
  host.slidey.render:
    by_call:
      render_report:
        data:
          ok: true
          path: ".artifacts/dogfood-marathon/deck-presentation-flow/decks/aggregate.html"
  host.artifacts_dir:
    by_call:
      emit_report:
        data:
          ok: true
          handle: { id: "dogfood-marathon#deck-presentation", kind: "slideshow", mime: "text/html" }
          path: ".artifacts/dogfood-marathon/deck-presentation-flow/decks/aggregate.html"

turns:
  - intent: { name: aggregated }
    advance_clock: "2s"
    expect_state: done
    expect_world:
      report_handle: "dogfood-marathon#deck-presentation"
      deck_spec:
        spec_path: ".artifacts/dogfood-marathon/deck-presentation-flow/decks/aggregate.slidey.json"
        summary: "Dogfood marathon deck-presentation: ✅ 1 solved, ⚠ 1 partial, ❌ 1 failed across 3 case(s); 3 per-bug deck(s)."
        case_decks:
          - case_id: "constructorfabric/Kitsoki#66"
            title: "TUI bug reporter shows raw AskOffPath payload"
            path: ".artifacts/dogfood-marathon/deck-presentation-flow/decks/constructorfabric-kitsoki-66.slidey.json"
            source: "https://github.com/constructorfabric/Kitsoki/issues/66"
            result: "✅ solved"
          - case_id: "constructorfabric/Kitsoki#61"
            title: "First-run profile setup is feature-sized and needs scope"
            path: ".artifacts/dogfood-marathon/deck-presentation-flow/decks/constructorfabric-kitsoki-61.slidey.json"
            source: "https://github.com/constructorfabric/Kitsoki/issues/61"
            result: "⚠ partial"
          - case_id: "bsacrobatix/Kitsoki#1196"
            title: "Observe-mode tour step dead-ends on mobile"
            path: ".artifacts/dogfood-marathon/deck-presentation-flow/decks/bsacrobatix-kitsoki-1196.slidey.json"
            source: "https://github.com/bsacrobatix/Kitsoki/issues/1196"
            result: "❌ failed"
        scenes_preview:
          - "title: deck-presentation"
          - "status: objectives with solved/partial/failed glyphs"
          - "scoreboard: color-coded cards"
          - "outcomes: before/after/result tables"
          - "per-bug decks: before-after + objectives + evidence"

expect_terminal: false
expect_no_errors: true
