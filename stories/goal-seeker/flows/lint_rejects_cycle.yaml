# lint_rejects_cycle — the structural gate rejects a decomposition with a dependency
# cycle (goal.py lint parity). bootstrap's gs_lint fail()s → needs_human with the
# cycle in last_error; the loop never starts.

test_kind: flow
app: ../app.yaml
initial_state: bootstrap
initial_world:
  goal_slug: cycle-test
  goal_dir:  stories/goal-seeker/testdata/cycle
  work_dir:  .artifacts/goal/flow-cycle
  reset_log: true
host_handlers: { host.run: { by_call: {} } }

turns:
  - intent: { name: look, slots: {} }
    expect_state: bootstrap
  - intent: { name: advance, slots: {} }        # bootstrap → lint_check (runs gs_lint)
    expect_state: lint_check
  - intent: { name: advance, slots: {} }        # lint fail → needs_human
    expect_state: needs_human
  - intent: { name: look, slots: {} }
    expect_view_matches: "cycle"

expect_no_errors: true
