# report_plan_evolution - WM.7 plan-evolution events surface in PM artifacts.

test_kind: flow
app: ../app.yaml
initial_state: evaluate
initial_world:
  goal_slug: report-events-test
  goal_dir:  stories/goal-seeker/testdata/report-events
  work_dir:  stories/goal-seeker/testdata/report-events

host_handlers:
  host.run: { by_call: {} }
  host.agent.decide: { by_call: {} }

turns:
  - intent: { name: report, slots: {} }
    expect_state: report
    expect_world:
      report_status: written
      report_change_count: 1
    expect_view_matches: "exec-"

expect_files:
  - path: ../../../stories/goal-seeker/testdata/report-events/reports/exec-summary.md
    content_matches: "session-fold-in"
  - path: ../../../stories/goal-seeker/testdata/report-events/reports/exec-summary.slidey.json
    content_matches: '"Trigger":"session-fold-in"'

expect_no_errors: true
