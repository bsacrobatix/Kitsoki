states:
  # bootstrap — the init step (goal.py:init). Ensures the log exists (fresh on reset),
  # then advance to the lint gate. (The structural lint lives in `lint_check`, entered
  # via a real advance turn, because a room reached through the init cascade does not
  # re-run its on_enter host.starlark.run binds — only a room entered by an explicit
  # transition does. The loop is driven one turn at a time.)
  bootstrap:
    description: "Initialize the goal work_dir."
    relevant_world: [goal_slug, work_dir, reset_log]
    on_enter:
      - invoke: host.starlark.run
        id: gs_init
        with:
          script: scripts/gs_init.star
          inputs:
            work_dir: "{{ world.work_dir }}"
            reset: "{{ world.reset_log }}"
        bind:
          init_log_path: log_path
        on_error: needs_human
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Initializing goal {{ world.goal_slug }} at {{ world.work_dir }}."
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "advance", hint: "lint the decomposition" }
                - { label: "look" }
    on:
      advance:
        - target: lint_check
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Advance to lint the decomposition."

  # lint_check — the structural gate (goal.py:cmd_lint). Reached via a real advance
  # turn, so gs_lint's route bind settles across the next turn boundary; `advance`
  # routes on the SETTLED verdict: fail → needs_human (the loop never starts on a bad
  # decomposition); ok → evaluate.
  lint_check:
    description: "Lint — is the decomposition structurally safe to drive?"
    relevant_world: [lint_route, lint_error]
    on_enter:
      - invoke: host.starlark.run
        id: gs_lint
        with:
          script: scripts/gs_lint.star
          inputs:
            goal_dir: "{{ world.goal_dir }}"
        bind:
          lint_route: route
          lint_error: error
        on_error: needs_human
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Lint: {{ world.lint_route|default:'(pending)' }}"
          - prose: "{{ world.lint_error }}"
            when: "world.lint_route == 'fail'"
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "advance", hint: "begin the loop (if lint passed)" }
                - { label: "look" }
    on:
      advance:
        - when: "world.lint_route == 'fail'"
          target: needs_human
          effects:
            - set: { last_error: "{{ world.lint_error }}" }
        - target: evaluate
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Advance to begin the loop."
