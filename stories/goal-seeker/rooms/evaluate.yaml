states:
  # evaluate — the DETERMINISTIC half of the bounded-context gate. Fold the log into
  # the ledger (reviewer-only-green enforced there) on entry, then PAUSE: the loop is
  # driven one turn at a time (WM.0: "/goal advances the session one turn"), and a
  # `host.starlark.run` bind (remaining) only settles across a turn boundary, never
  # inside a synthetic emit cascade. So `advance` (the next driver turn) routes on the
  # SETTLED remaining: remaining==0 ⇒ the goal is DONE (a deterministic fact, never an
  # LLM claim) → retrospective; work remaining → the advisory decide gate.
  evaluate:
    description: "Evaluate — fold the ledger; is the goal deterministically done?"
    relevant_world: [goal_slug, counts, remaining, ready_id, verdict]
    on_enter:
      - invoke: host.starlark.run
        id: gs_ledger
        with:
          script: scripts/gs_ledger.star
          inputs:
            goal_dir: "{{ world.goal_dir }}"
            work_dir: "{{ world.work_dir }}"
        bind:
          ledger: ledger
          counts: counts
          remaining: remaining
          ready_id: ready_id
        on_error: needs_human
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Remaining: '{{ world.remaining }}'
                Ready:     '{{ world.ready_id|default:"(none)" }}'
          - prose: "Every change integrated — the goal is done."
            when: "world.remaining == 0"
          - prose: "Work remains; advance to decide the next change."
            when: "world.remaining > 0"
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "advance", hint: "route on the folded ledger" }
                - { label: "retry", hint: "re-fold" }
                - { label: "quit", hint: "abandon → needs-human" }
                - { label: "look" }
    on:
      advance:
        - when: "world.remaining == 0"
          target: retrospective
        - target: deciding
      retry:
        - target: evaluate
          effects:
            - set: { verdict: "", summary: "", next_change_id: "" }
      quit:
        - target: "@exit:needs-human"
          effects:
            - set: { last_error: "operator abandoned the goal at evaluate" }
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Advance to route on the folded ledger."

  # deciding — the ADVISORY half: build the BOUNDED preamble (settled across this turn
  # boundary), show it, and PAUSE. The next `advance` runs the ONE decide gate (its
  # bind DOES settle in-cascade) and routes on the verdict. verdict=done is NOT honored
  # (we are here only because remaining>0, so the ledger disagrees — the deterministic
  # anti-false-done guarantee): a decide `done` is rejected and the loop dispatches the
  # ledger's ready_id anyway. The evaluator only ADVISES ordering.
  deciding:
    description: "Deciding — advisory: which ready change is next?"
    relevant_world: [preamble, verdict, summary, decide_change_id, ready_id]
    on_enter:
      - invoke: host.starlark.run
        id: gs_preamble
        with:
          script: scripts/gs_preamble.star
          inputs:
            goal_dir: "{{ world.goal_dir }}"
            work_dir: "{{ world.work_dir }}"
        bind:
          preamble: preamble
        on_error: needs_human
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Ready:   '{{ world.ready_id|default:"(none)" }}'
                Verdict: '{{ world.verdict|default:"(pending)" }}'
          - heading: "Preamble (bounded projection)"
          - code: '{{ world.preamble|default:"(pending)" }}'
        choices:
          - heading: "Actions"
          - list:
              items:
                - { label: "advance", hint: "run the evaluate decide gate" }
                - { label: "look" }
    on:
      advance:
        - target: deciding_gate
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Advance to run the decide gate."

  # deciding_gate — the decide runs here (its preamble input is now settled from the
  # prior turn). The decide bind settles in-cascade, so the guarded emits route
  # immediately on the verdict.
  deciding_gate:
    description: "Deciding — running the evaluate decide gate."
    relevant_world: [verdict, summary, decide_change_id, ready_id]
    on_enter:
      - invoke: host.agent.decide
        id: evaluate
        once: true
        with:
          prompt: prompts/evaluate.md
          schema: schemas/verdict.json
          agent: evaluator
          args:
            preamble: "{{ world.preamble }}"
        bind:
          verdict: submitted.verdict
          summary: submitted.summary
          decide_change_id: submitted.next_instruction.change_id
          next_pipeline: submitted.next_instruction.pipeline
          next_action: submitted.next_instruction.action
          next_gate_cmd: submitted.next_instruction.gate.cmd
        # The decide gate is ADVISORY (the ledger's ready_id is authoritative); an
        # evaluator FAILURE (crash / timeout / abandoned-without-submit) must NOT
        # dead-end the whole loop. Degrade gracefully to the deterministic ready pick —
        # exactly as the dispatch_next arc below falls back to ready_id when the advice
        # merely disagrees. Only an explicit verdict=blocked (a decision, not a
        # failure) escalates to needs_human. The failure still SURFACES: the
        # agent.call.error is in the trace and the degrade note lands in the log.
        on_error: deciding_degraded
      # A decide `done` is a FALSE done (ledger disagrees) — rejected; dispatch the
      # deterministic ready change anyway. `blocked` escalates. Guards read the decide
      # bind (settles in-cascade, unlike a starlark bind).
      - when: "world.verdict == 'blocked'"
        emit_intent: go_blocked
      - when: "world.verdict != 'blocked'"
        emit_intent: dispatch_next
    view:
      extends: "base"
      blocks:
        body:
          - prose: "Running the evaluate decide gate…"
        choices:
          - list:
              items:
                - { label: "look" }
    on:
      dispatch_next:
        - target: dispatch
          effects:
            # Honor the evaluator's advice ONLY when it names the ledger's ready
            # change; otherwise fall back to ready_id. Never trust a decide `done`.
            - set:
                next_change_id: "{{ world.decide_change_id == world.ready_id && world.decide_change_id != '' ? world.decide_change_id : world.ready_id }}"
      go_blocked:
        - target: needs_human
          effects:
            - set: { last_error: "evaluator returned blocked: {{ world.summary }}" }
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Deciding…"

  # deciding_degraded — the decide gate is ADVISORY, so an evaluator FAILURE degrades
  # here instead of dead-ending at needs_human. The ledger's ready_id is the
  # authoritative pick; dispatch it, exactly as deciding_gate falls back to ready_id
  # when the advice merely disagrees. This is graceful degradation, not error-hiding:
  # the agent.call.error stays in the trace as ground truth, and we clear the terminal
  # last_error precisely because a failed ADVISORY gate is non-terminal. Reaching this
  # state on EVERY pass would still self-heal (each pass dispatches the next ready
  # change deterministically); a genuine dead-end can only come from an explicit
  # verdict=blocked or a deterministic-backbone (starlark) failure, both of which keep
  # their own on_error: needs_human.
  deciding_degraded:
    description: "Decide gate failed — degrade to the deterministic ready pick (advisory only)."
    relevant_world: [ready_id, summary]
    on_enter:
      - set:
          summary: "decide gate failed; degraded to the deterministic ready pick {{ world.ready_id }}"
          verdict: "not_done"
          decide_change_id: ""
          last_error: ""
      - emit_intent: dispatch_next
    view:
      extends: "base"
      blocks:
        body:
          - kv:
              pairs:
                Ready: '{{ world.ready_id|default:"(none)" }}'
          - prose: "Decide gate failed — degrading to the deterministic ready pick (advisory gate; the ledger is authoritative)."
        choices:
          - list:
              items:
                - { label: "look" }
    on:
      dispatch_next:
        - target: dispatch
          effects:
            - set: { next_change_id: "{{ world.ready_id }}" }
      look:
        - target: .
      "*":
        - default: true
          target: .
          effects:
            - say: "Degrading to the deterministic ready pick…"
