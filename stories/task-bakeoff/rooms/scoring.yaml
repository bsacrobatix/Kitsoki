# scoring — DETERMINISTIC (no LLM). Aggregate the per-cell results through the
# explicit native host boundary for the harness's FREE report tool (no LLM, no cost — the skill's
# "Aggregation + offline regeneration" step). The committed cells/*.json the
# manual run produced are merged into results/summary.json + the rollup.
#
# We call the script — we never reimplement scoring/pricing (the harness is the
# single source of truth). `--generated-at` is REQUIRED (the build bans implicit
# wall-clock timestamps); we pass world.generated_at.
#
# `once: true` keyed on its own bind (summary) → reload-safe.

states:

  scoring:
    description: "Aggregating the cell results into a summary (deterministic, host.starlark.run → host.bakeoff.run)."
    relevant_world: [summary, summary_path, generated_at, harness_dir]
    view:
      - heading: "Bake-off · scoring"
      - kv:
          pairs:
            Summary: '{{ world.summary_path|default:"(aggregating…)" }}'
            Cells:   "{{ world.summary.cells|length }}"
      - prose: "The bakeoff report tool rolls the per-cell results up into a summary (by_treatment / by_candidate / by_cell_key). Deterministic — no LLM."
    on_enter:
      - invoke: host.starlark.run
        id: aggregate
        once: true
        with:
          script: scripts/bakeoff_run.star
          inputs:
            op: aggregate
            cwd: "{{ world.harness_dir }}"
            generated_at: "{{ world.generated_at }}"
          capabilities:
            host:
              verbs: [host.bakeoff.run]
        bind:
          summary:      "result.stdout_json"
          summary_path: "result.stdout_json.summary_path"
        on_error: running
      - when: "world.summary.generated_at != nil && world.summary.generated_at != ''"
        emit_intent: accept
    on:
      accept:
        - target: reporting
      quit:
        - target: "@exit:abandoned"
      look:
        - target: .
