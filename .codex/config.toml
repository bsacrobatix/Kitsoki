[mcp_servers.slidey]
# Keep this checked-in launcher portable: project config overrides the user's
# global MCP entry, so a developer-specific absolute path breaks every restart.
command = "slidey-mcp"
args = ["--root", "."]
cwd = "."

[mcp_servers.slidey.tools.slidey_scene_summary]
approval_mode = "approve"

[mcp_servers.slidey.tools.slidey_workspace_tree]
approval_mode = "approve"

[mcp_servers.slidey.tools.slidey_render_png]
approval_mode = "approve"

[mcp_servers.slidey.tools.slidey_render_html]
approval_mode = "approve"

[mcp_servers.slidey.tools.slidey_doctor]
approval_mode = "approve"

[mcp_servers.slidey.tools.slidey_audit]
approval_mode = "approve"

[mcp_servers.frontend-mockup]
command = "node"
args = ["tools/frontend-mockup-mcp/server.mjs"]

[mcp_servers.frontend-mockup.env]
KITSOKI_REPO = "."
KITSOKI_AGENT_CMD = "kitsoki"
