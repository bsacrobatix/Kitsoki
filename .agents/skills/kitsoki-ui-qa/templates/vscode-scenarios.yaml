# QA scenarios for the VS Code extension tour video.
# Each step is an OBSERVABLE claim grounded in a specific labeled frame
# (.artifacts/vscode-tour/NN-<beat>.png — pass via --frames for highest fidelity).
# These map 1:1 to the recorded beats; the evidence must show the kitsoki UI
# rendered INSIDE the VS Code chrome, with chat front/center and trace/graph as a
# maximizable hint rail (the layout rework), not in a browser.

feature: Embed the kitsoki web UI in a VS Code extension

scenarios:
  - id: a-story-library
    title: The Kitsoki editor panel renders the story library inside VS Code
    required: true
    steps:
      - The VS Code Activity Bar and editor chrome are visible (this is VS Code, not a browser)
      - A Kitsoki panel/tab is shown in the editor area
      - A "Weather & Climate" story card is listed
      - The embed is dark-themed to match the VS Code editor chrome

  - id: c-session-lobby
    title: A session starts with chat front/center and a trace+graph hint rail
    required: true
    steps:
      - An interactive chat / session view is shown (no longer just the story list)
      - The chat occupies the dominant, central area of the panel
      - A thin hint rail to the right shows a "Trace" card and a "Graph" card with live counts (events, room, rooms, or intents)
      - The session is in the "lobby" room or shows a lobby intent picker

  - id: d-turn-drives-state
    title: A driven turn advances state and renders the Tokyo forecast
    required: true
    steps:
      - The resolved place "Tokyo, Japan" is visible in the rendered report
      - A report / forecast card is shown (coordinates, conditions, or a 5-day table)
      - The room has advanced to the "report" state (the hint rail or a badge shows "report")
      - The chat remains front/center with the hint rail beside it

  - id: e-trace-maximized
    title: Maximizing the Trace hint expands the full timeline
    required: true
    steps:
      - The trace timeline is expanded prominently beside the chat (no longer a collapsed card)
      - Trace event rows are visible (with subsystem/category filters or timing)
      - A host (host.starlark.run) row or a host-call event is present in the timeline

  - id: f-graph-maximized
    title: Switching to the Graph expands the state diagram
    required: true
    steps:
      - The state diagram (the room graph) is expanded prominently beside the chat
      - The current station is marked (e.g. "report" highlighted or a "you are here" marker)
      - Room transitions / other rooms are drawn in the diagram

  - id: g-split-editor
    title: Code and kitsoki are shown side by side in one workspace
    required: true
    steps:
      - A YAML file (app.yaml) is open in a split editor showing the story source
      - The Kitsoki panel (chat + hint rail) remains visible beside the editor in the same window
