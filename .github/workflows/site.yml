# Builds and deploys the kitsoki promo site + help docs to GitHub Pages.
#
# Demo replays are NEVER committed — this workflow captures rrweb logs with
# Playwright against the freshly-built binary, in the deterministic no-LLM
# posture (--flow / --host-cassette). Two-level incrementality keeps that cheap:
#   1. actions/cache over .artifacts, keyed on every demo-affecting input —
#      an exact hit means nothing can be stale.
#   2. per-demo content stamps inside record-demos.sh (feature YAML + spec +
#      story inputs + binary) — on a partial restore, only changed demos
#      recapture.
# A docs-only push therefore deploys in minutes with 0 captures; a cold run
# captures every rrweb-first feature in the catalog (sequentially, watch-speed —
# see features-index.json's `demo != null && !demo.external` selector).
#
# One-time repo setup: Settings → Pages → Source: "GitHub Actions".
name: site

on:
  push:
    branches: [main]
    paths:
      - features/**
      - docs/**
      - tools/site/**
      - tools/runstatus/**
      - stories/**
      - internal/**
      - cmd/**
      - go.mod
      - go.sum
      - Makefile
      - scripts/record-demos.sh
      - .github/workflows/site.yml
  workflow_dispatch:
    inputs:
      rerecord:
        description: "Force re-record every demo (ignore stamps)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            tools/runstatus/pnpm-lock.yaml
            tools/site/pnpm-lock.yaml

      - name: Install capture deps (ffmpeg, jq)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq

      # make build-bin runs features-check (stale generated manifests fail here),
      # embeds the SPA, and produces bin/kitsoki, the binary the specs drive.
      - name: Build kitsoki
        run: make build-bin

      - name: Install Playwright
        working-directory: tools/runstatus
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Emit feature catalog contract
        run: make features-index && make site-data

      # Catch docs/site dead links before spending the longer replay-capture pass.
      # This is intentionally media-light: missing replays degrade to placeholders.
      - name: Build site preflight
        run: make site

      # Restore previous replay captures; the per-demo stamps decide what is stale.
      - uses: actions/cache@v4
        with:
          path: .artifacts
          key: rrweb-demos-v1-${{ hashFiles('features/**', 'tools/runstatus/tests/playwright/**', 'tools/runstatus/src/**', 'stories/**', 'internal/**/*.go', 'cmd/**/*.go', 'go.sum') }}
          restore-keys: |
            rrweb-demos-v1-

      - name: Capture rrweb demos
        id: record-demos
        continue-on-error: true
        run: ./scripts/record-demos.sh ${{ inputs.rerecord && '--force' || '' }}

      - name: Upload replay diagnostics
        if: ${{ steps.record-demos.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: replay-capture-diagnostics
          path: |
            .artifacts/**/diagnostic.log
            tools/runstatus/test-results/**
          retention-days: 7
          if-no-files-found: ignore

      - name: Build site
        run: make site

      # Hard gate (NOT continue-on-error): every promo-grid feature (the
      # landing-page set — a `promo:` block in features/<id>.yaml) must have
      # real staged replay media, not just cached shape. Capture above is
      # best-effort so a transient failure can't block docs-only pushes, but
      # this step makes sure that leniency can never silently ship a promo
      # feature with zero media — it fails the build instead.
      - name: Check promo media presence
        run: make media-check-promo

      # Hard gate: every releases/latest/download/... link in download.md must
      # resolve (the page 404'd for weeks with zero signal when no release
      # existed — v0.1.0's assets are live now, so a dead download page fails
      # the build outright).
      - name: Check download links
        run: node tools/site/scripts/check-download-links.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .temp/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
