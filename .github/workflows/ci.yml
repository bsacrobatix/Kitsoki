name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets `make pr-ci` (scripts/open-pr.sh --ci) trigger a run on any branch on
  # demand — so you can gate PR creation on a real green CI run without CI
  # firing on every half-finished push.
  workflow_dispatch:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The runner has no global git identity. Dozens of tests create real
      # temp git repos/worktrees/capsule checkouts and commit into them
      # (internal/capsule/reconcile, internal/orchestrator dogfood smokes,
      # internal/mcp, cmd/kitsoki, …); without this those commits fail
      # closed with "Author identity unknown / empty ident name", which
      # looks like unrelated logic bugs across many packages at once.
      - name: Configure git identity for test-created repos
        run: |
          git config --global user.email "ci@kitsoki.dev"
          git config --global user.name "Kitsoki CI"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tools/runstatus/pnpm-lock.yaml

      # ffmpeg backs the video-frame / chapter handlers (internal/video,
      # internal/host video tests, runstatus video RPC). jq is preinstalled on
      # ubuntu-latest; Go comes from setup-go above. Node/pnpm are present so
      # make test-full can run the same runstatus Vitest and feature/media
      # checks as local make test without building the SPA.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      # `make test-full` runs exhaustive `go test ./...` plus the deterministic
      # story flow suites, runstatus Vitest, feature/media checks, and Python
      # invariants (no LLM, no cost). KITSOKI_CASSETTE_STRICT hard-errors any
      # flow that tries to record/re-record a cassette instead of replaying one,
      # so a missing fixture fails CI loudly instead of silently recording (and
      # potentially calling a live LLM) in an environment with no credentials.
      - name: Run tests
        env:
          KITSOKI_CASSETTE_STRICT: "1"
        run: make test-full

  site:
    name: Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            tools/runstatus/pnpm-lock.yaml
            tools/site/pnpm-lock.yaml

      # Feature catalog checks: generated-manifest staleness, the demo-spec
      # recording invariants (demos:lint), and the tour target <-> data-testid
      # drift check (tour-targets:lint) — catches a UI commit silently
      # breaking a tour step's target/waitForTarget before it ever reaches a
      # recording. No LLM, no browser; fast and deterministic.
      - name: Feature catalog checks
        run: make features-check

      # Fast dead-link/docs/site-contract guard. It does not record demos or call
      # any LLM; missing media degrades to posters/placeholders.
      - name: Build site
        run: make site
