# kitsoki-tmux.conf — passed via `tmux new-session -f` so the user's
# ~/.tmux.conf is untouched. This config is loaded once per
# kitsoki-spawned tmux server; it shapes the status bar and a few
# in-pane affordances.
#
# Status bar layout:
#
#   left  : "kitsoki | <session-name>"  (always blue, identifies the chat)
#   right : empty                       (kitsoki populates via set-option
#                                        from a watcher goroutine — e.g.
#                                        inbox notification count)
#
# Keys are deliberately tmux-default (prefix C-b). The proposal's §6.5
# tighter keybindings (prefix+d/D/k/q) arrive in Phase E.

set -g status on
set -g status-interval 2
set -g status-style 'bg=#1F2937 fg=#F9FAFB'
set -g status-left-length 60
set -g status-left  '#[fg=#3B82F6 bold]kitsoki#[fg=#9CA3AF] | #[fg=#F9FAFB]#S '
set -g status-right ''
set -g status-right-length 80
set -g remain-on-exit on
