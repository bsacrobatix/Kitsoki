# bugfix.beat.yaml — flow-test-only dispatch-plumbing coverage
# (docs/proposals/gh-agent-honest-issues.md task 2.3). RunStorySession no
# longer reaches this fixture for the "bug" route in production — that route
# has a registered realDispatchPlans entry (internal/ghagent/realdispatch.go)
# and runs the REAL stories/bugfix machine end-to-end via a recorded cassette
# instead. This file is retained only as a plumbing check
# (runStubBeatFixture, exercised directly by
# internal/ghagent/dispatch_e2e_test.go) proving materializeJobFlowFixture's
# world-seeding shape stays valid for routes that DON'T have a real-dispatch
# plan yet (a caller-supplied route.BeatFixture still opts a route into this
# path deliberately). Host calls here are served by inline "always succeed"
# handlers (no LLM, no gh) — this is intentionally NOT what a real pipeline
# run looks like; see stories/bugfix/flows/happy_human.yaml +
# stories/bugfix/cassettes/happy_human.cassette.yaml for the real, recorded
# shape realDispatchPlans replays.
test_kind: flow
app: ../../../stories/bugfix/app.yaml
initial_state: idle
initial_world:
  # Mention-derived keys (the dispatcher seeds these from the GHJob).
  ticket_id: "42"
  thread: "github:o/r/issue/42"
  judge_mode: "human"
  gh_job_id: "job-stub"
  gh_origin_ref: "github:o/r/issue/42"
  repo: "o/r"

host_handlers:
  host.append_to_file: { data: { ok: true } }
  host.inbox.add:      { data: { ok: true } }
  host.git_worktree:   { data: { ok: true, log: "" } }
  host.git:            { data: { ok: true, sha: "abc", diff: "" } }
  host.local:          { data: { ok: true, log: "PASS", passed: 1, failed: 0 } }
  host.agent.task:
    data: { ok: true, submitted: { summary_title: "stub", summary_markdown: "stub" } }
  host.agent.ask:
    data: { ok: true, submitted: { summary_title: "stub", summary_markdown: "stub" } }
  host.agent.decide:
    data: { ok: true, submitted: { summary_title: "stub", summary_markdown: "stub" } }

turns:
  - intent: { name: start, slots: {} }
    expect_state: reproducing

expect_no_errors: true
