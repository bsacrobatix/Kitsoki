app:
  id: wb-overrides
  version: 0.1.0
hosts:
  - host.agent.task
intents:
  go:
    title: Go
root: bench
states:
  bench:
    workbench:
      agent: builder
      prompt: prompts/bench.md
      acceptance_schema: schemas/out.json
      capture_slot: custom_field
      off_ramp_agent: qa_agent
agents:
  builder:
    system_prompt: "build things"
    external_side_effect: false
  qa_agent:
    system_prompt: "answer questions"
    external_side_effect: false
