# synthetic-kit — an in-tree fixture-only kit for exercising the kit/v1
# loader (internal/kit) and BuildKitImporter/SynthesizeKit end to end.
# kitsoki itself carries no domain packs; this is testdata, not a shipped kit.
schema: kit/v1
kit: synthetic
namespace: kitsoki-test
version: 0.1.0
title: Synthetic test kit (S1 loader fixture)
summary: |
  Minimal kit.yaml exercising every S1 manifest field against a single
  standalone-loadable story. composes: and provides.ui/schemas are declared
  here purely for schema/round-trip coverage — synthetic-kit does not
  actually depend on or ship the referenced kit/ui module.
requires:
  kitsoki: ">=0.0.0"
composes:
  - kit: "@kitsoki-test/unused-example"
    constraint: ">=0.0.0"
parameters:
  greeting:
    type: string
    default: "hello"
    description: "Greeting folded into the greeter story's world."
provides:
  stories: [greeter]
  schemas: [synthetic/v1]
  interfaces: [reporter]
  ui: [greeter/panel]
  onboarding: greeter.start
conformance:
  flows: []
compat:
  renamed:
    exits:
      finished: done
