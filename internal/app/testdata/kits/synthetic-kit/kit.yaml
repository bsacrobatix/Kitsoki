# synthetic-kit — an in-tree fixture-only kit for exercising the kit/v1
# loader (internal/kit) and BuildKitImporter/SynthesizeKit end to end.
# kitsoki itself carries no domain packs; this is testdata, not a shipped kit.
schema: kit/v1
kit: synthetic
namespace: kitsoki-test
version: 0.1.0
title: Synthetic test kit (S1 loader fixture)
summary: |
  Minimal kit.yaml exercising every S1 manifest field against a single
  standalone-loadable story.
requires:
  kitsoki: ">=0.0.0"
parameters:
  greeting:
    type: string
    default: "hello"
    description: "Greeting folded into the greeter story's world."
provides:
  stories: [greeter]
  interfaces: [reporter]
  onboarding: greeter.start
conformance:
  flows: []
compat:
  renamed:
    exits:
      finished: done
