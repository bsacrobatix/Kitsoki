schema: project-object-graph/seed-catalog/v0
type_registry:
  - id: core-node
    schema: graph-type/v0
  - id: change
    schema: graph-type/v0
    extends: core-node
    edge_fields:
      - id: depends_on
        target_type: change
        cardinality: many
        storage: top_level
        acyclic: true
nodes:
  - schema: graph/change/v1
    id: change-a
    title: Change A
    status: todo
    visibility: internal
    depends_on: ["change-b"]
  - schema: graph/change/v1
    id: change-b
    title: Change B
    status: todo
    visibility: internal
    depends_on: ["change-a"]
