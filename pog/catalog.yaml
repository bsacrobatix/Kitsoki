  - authored_by: pog-gitflow-brief
    created_at: "2026-07-13T05:14:12Z"
    id: cs-7
    operations:
      - after:
          fields:
            edges:
              part_of:
                - product-kitsoki
            summary: 'Parallel agents clobber each other in git today: lost work, rebase-test-ff-fail race loops, duplicate work on the same node, free-form launches that bypass launch policy and commit to main. Target load: a 24/7 GX10 workstation running decomposed single-shot inference at high parallelism, fronted by a federated queue on Brad''s workstation. Kitsoki ships the engine primitives (merge queue, graph-claim semantics, launch enforcement, capsule workspace generalization, disk-pressure lifecycle); POG, slidey, and studio-sassfully are adopters. Ruled decisions (2026-07-13): D-Q1 queue is a first-class `kitsoki queue` subcommand; D-Q2 capsule workspaces are the fleet standard ASAP, .worktrees/ deprecated; D-Q3 claims have no fixed TTL, best-effort dead-agent detection with zombie-wins arbitration on return; D-Q4 federated queues route to multiple execution backends from day one.'
          id: program-parallel-agent-gitflow
          schema: kitsoki/program/v0
          sources:
            - .context/parallel-agent-gitflow-kitsoki-brief.md
          status: in-progress
          title: Parallel-agent gitflow
          type_id: program
          visibility: internal
        kind: added
      - after:
          fields:
            edges:
              part_of:
                - program-parallel-agent-gitflow
            gate: A red-team script (template shipped in the pack as scripts/launch-policy-gate.sh) that attempts (a) bare checkout of a main-adjacent branch in the primary checkout, (b) direct commit to main, (c) agent launch from repo root, (d) file write into a sibling repo — all must be refused; exit 0 only when all blocked.
            summary: 'Day-one enforcement: the conventions pack must install, together, in any consumer repo: the reference-transaction git hook (pin primary checkout to main tip), .claude/hooks/block-bare-checkout.sh, .claude/settings.json PreToolUse wiring, and a seeded agent_launch_policy: block for .kitsoki.local.yaml, via one make setup-style entrypoint. claude/codex shell aliases plus KITSOKI_AGENT_{CLAUDE,CODEX,...}_BIN shims route every launch through `kitsoki agent launch --exec` with a repo-default profile; a bare `claude` in a protected root must refuse to start with a teaching-shaped error. Launch policy protected_roots covers sibling repo paths; agents needing a foreign-repo change graph_propose a requirement/bug into that repo''s federated catalog instead. POG-side observation (2026-07-13): `kitsoki agent launch` already enforces agent_launch_policy protected_roots today (confirmed via a red-team gate run in POG), and `capsule ci` / `capsule workspace` subcommands already ship — what''s still open is the canonical pack-template distribution (POG hand-ported the hooks as a stopgap) and the claude/codex alias shims.'
          id: phase-k1-enforcement-layer
          schema: kitsoki/phase/v0
          sources:
            - .context/parallel-agent-gitflow-kitsoki-brief.md
          status: in-progress
          title: K1 — Enforcement layer
          type_id: phase
          visibility: internal
        kind: added
      - after:
          fields:
            edges:
              after:
                - phase-k1-enforcement-layer
              part_of:
                - program-parallel-agent-gitflow
            gate: Adversarial flow tests — two candidates with conflicting hunks submitted concurrently land exactly one and eject the other with evidence; ten path-disjoint candidates land in bounded time with fewer full-gate runs than candidates.
            summary: '`queue submit` takes a candidate = branch + passing capsule-ci-receipt/v1 bound to the exact candidate SHA. A serializer constructs the speculative merge state (queue-head = main + all queued candidates ahead), runs the gate against that predicted post-merge tree, and fast-forwards main only on green; a red candidate is ejected with the failing evidence attached as a typed rejection. Reuses capsule workspaces for the speculative build, receipts as the admission ticket, and the provider quota: .lock pattern for the queue''s single-writer lock. Smart change detection skips the full gate when a candidate''s changed-path set is path-disjoint from everything queued ahead, keyed by a per-check path-scope manifest consumer repos declare. Federated backend seam (D-Q4): job to backend routing plus a subscription/dispatch protocol so Brad''s workstation queue can dispatch to VM/GX10/Docker/native subscribers. POG-side observation (2026-07-13): only `kitsoki chat queue {add,list,dismiss,dispatch}` exists today — no top-level `kitsoki queue` subcommand found in cmd/kitsoki/*.go.'
          id: phase-k2-queue-primitive
          schema: kitsoki/phase/v0
          sources:
            - .context/parallel-agent-gitflow-kitsoki-brief.md
          status: planned
          title: K2 — kitsoki queue (new primitive)
          type_id: phase
          visibility: internal
        kind: added
      - after:
          fields:
            edges:
              after:
                - phase-k1-enforcement-layer
              part_of:
                - program-parallel-agent-gitflow
            gate: 'Extend graph-mcp-changeset-acceptance.sh: double-claim refused; claim steal after simulated holder death; zombie-return arbitration (zombie work accepted, replacement cancelled); cross-repo requirement lands as a proposed node in the foreign catalog.'
            summary: 'Add claim semantics on graph nodes: graph_claim/graph_release (or a claim op inside graph_apply) — lifecycle flip with provenance via the existing direct-writes-with-provenance channel. Claims carry actor + branch + liveness handle; a second claim on a live node is refused with a pointer to the holder. Dead-agent detector per D-Q3: heartbeat/liveness best effort; on presumed death the claim transfers. Zombie-return arbitration: the zombie''s candidate wins, the replacement is cancelled — the queue/claim registry decides, no steward sign-off needed. Steward remains the only authorize/apply authority; fleet agents run --mode propose with --actor stamped by the launcher. The same liveness signal drives the workspace reaper (K4). POG-side observation (2026-07-13): no graph_claim/graph_release tool or cobra command found anywhere in the Kitsoki source or the live MCP tool surface.'
          id: phase-k3-graph-claims-dead-detection
          schema: kitsoki/phase/v0
          sources:
            - .context/parallel-agent-gitflow-kitsoki-brief.md
          status: planned
          title: K3 — Graph MCP claims + dead detection
          type_id: phase
          visibility: internal
        kind: added
      - after:
          fields:
            edges:
              after:
                - phase-k2-queue-primitive
              part_of:
                - program-parallel-agent-gitflow
            gate: Disk-pressure drill — fill toward threshold, verify the reaper reclaims orphans/caches/temp automatically and the queue refuses admission until headroom returns; a marathon run ends with no net workspace/temp growth.
            summary: 'First-class, not cleanup-later — the disk fills 2-3x/day and breaks fleets as reliably as git races. Lease + reap: every workspace/capsule the fleet creates has an owner + liveness signal; a reaper continuously removes workspaces whose owner is dead and whose branch is landed or ejected. Budgeted caches: per-repo cache roots get size caps + LRU eviction; capsule environments/ci.yaml locked caches declare a max size the reconciler enforces. Session-scoped temp: agent launches get a per-run temp dir the launcher deletes on exit and the reaper deletes on dead-owner detection. Disk as admission signal: queue and launcher check free-space headroom before a speculative build or launch, running the reaper first and refusing admission if still insufficient. POG-side observation (2026-07-13): capsule workspace {create,list,status,exec,commit,integrate,close} is already generic and usable from a consumer repo, and a manual `kitsoki capsule cleanup plan|apply` exists (count/age heuristics), but Instance.Lease/ExpiresAt fields exist with nothing enforcing or continuously reaping them yet — this is what currently blocks POG''s marathon-grade disk-safety gate.'
          id: phase-k4-disk-pressure-lifecycle
          schema: kitsoki/phase/v0
          sources:
            - .context/parallel-agent-gitflow-kitsoki-brief.md
          status: in-progress
          title: K4 — Disk-pressure lifecycle
          type_id: phase
          visibility: internal
        kind: added
      - after:
          fields:
            edges:
              after:
                - phase-k4-disk-pressure-lifecycle
              part_of:
                - program-parallel-agent-gitflow
            gate: 'Runs in POG, needs K1-K4: dogfood-marathon run — N>=8 parallel workers through the queue on real POG backlog nodes; measure gate runs per landed change, duplicate-work incidents (target 0), main green throughout.'
            summary: 'A stories_first posture on agent launch profiles (system-prompt overlay + tool allowlist) so claude-backed workers reach for `kitsoki run <story>` before ad-hoc bash. Generalize the kitsoki-mcp-driver pattern: worker profiles whose tool surface is graph MCP + the relevant story, nothing else. Where a task decomposes to classify/extract/patch, run story rooms making single-shot inference calls (deterministic Starlark backbone, LLM only at judgment points). Smaller/faster models per room via harness_profiles.models + effort; the quota: bucket already arbitrates spend.'
          id: phase-k5-decomposed-single-shot-posture
          schema: kitsoki/phase/v0
          sources:
            - .context/parallel-agent-gitflow-kitsoki-brief.md
          status: planned
          title: K5 — Decomposed single-shot posture (GX10 efficiency)
          type_id: phase
          visibility: internal
        kind: added
    schema: graph/changeset/v1
    status: proposed
    title: Model parallel-agent gitflow (K1-K5) as a program with phases
    visibility: internal
  - authored_by: pog-gitflow-brief
    created_at: "2026-07-13T05:17:05Z"
    id: cs-8
    operations:
      - after:
          fields:
            edges:
              part_of:
                - product-kitsoki
            summary: 'Brad (2026-07-13): ''we need to be able to propose edges and nodes together, across different repos as a unified changeset with the saga pattern for merge failures/rejections/revisions.'' Motivating case: this same session filed program-parallel-agent-gitflow + phase-k1..k5 into this catalog (cs-7) and three separate upstream-ask nodes into POG''s own pog-program-catalog (cs-6/7/8), with zero structural linkage between the two catalogs -- only prose cross-references that can drift as either side''s ids or content change independently, since edge_fields target_type resolves only within one catalog''s own node id space today. Requirement: (1) a federated changeset that stages node+edge operations across N named catalog aliases (per the mcp-graph server''s --catalog stringArray binding model) as one logical proposal, validated across all member catalogs before any commits -- extending today''s single-catalog validate_only guarantee to the whole federation; (2) a first-class cross-catalog edge reference (e.g. {catalog: alias, id: node-id}) so graph lint can check referential integrity across repos instead of falling back to unvalidated prose in summary/sources; (3) saga/compensation semantics for apply -- each catalog''s apply is a separate commit in a separate repo''s working tree, so a cross-catalog changeset''s apply needs a defined leg order plus automatic compensation (auto-withdraw/revert an already-applied leg, or a clearly surfaced partial-saga state with a retry/reconcile path) when a later leg is rejected by its own steward, fails post-apply lint, or hits a git merge conflict on the underlying catalog file; (4) a revision path so a partially-rejected saga''s surviving leg can be reopened/amended without restarting the whole proposal. Twin filed into POG''s own catalog as ask-federated-changeset-saga.'
          id: req-federated-changeset-saga
          schema: kitsoki/requirement/v0
          sources:
            - .context/parallel-agent-gitflow-kitsoki-brief.md
          status: proposed
          title: Federated (cross-catalog) changesets with saga-pattern rollback
          type_id: requirement
          visibility: internal
        kind: added
    schema: graph/changeset/v1
    status: proposed
    title: Federated (cross-catalog) changesets with saga-pattern rollback for graph_propose/apply
    visibility: internal
  - authored_by: pog-gitflow-brief
    created_at: "2026-07-13T05:52:30Z"
    id: cs-9
    operations:
      - after:
          fields:
            edges:
              part_of:
                - product-kitsoki
            summary: 'An agent finishing a proposed changeset (or any artifact) needs a fire-and-forget way to hand it to the human steward: "here''s a link, go review and approve." Today''s closest primitives are mcp__operator__ask (synchronous, blocks for an answer, requires a live operator surface already attached — wrong shape for hand-off-and-continue) and feedback_report (durable + async, but pull-only: a human has to think to run feedback_list, and has no typed link/ref field — callers stuff a URL into the freeform `extra` map). POG-side observation (2026-07-13): built a workable-today version in POG by composing feedback_report (anchor.changeset + extra.link) with Claude Code''s own PushNotification tool, plus a new portal deep link (`#review=<changeset-id>` on CatalogPanel.vue, opens ReviewQueuePanel.vue pre-expanded/re-validated/scrolled to that row) — see AGENTS.md "Review handoff" section in POG. Requesting Kitsoki formalize the missing piece: (1) a typed `link`/`ref` field on feedback_report instead of prose-in-extra, and/or (2) an async non-blocking mode on the operator-ask bridge (queue-and-return instead of block-until-answered) so a fleet agent with no attached operator surface still gets a durable, structured hand-off instead of nothing.'
          id: req-review-handoff-notification
          schema: kitsoki/requirement/v0
          sources:
            - POG parallel-agent-gitflow brief, 2026-07-13
          status: proposed
          title: 'Review-handoff notification: async, link-carrying "go review and approve" primitive'
          visibility: internal
        kind: added
    schema: graph/changeset/v1
    status: proposed
    title: 'Review-handoff notification: async, link-carrying "go review and approve" primitive'
    visibility: internal
