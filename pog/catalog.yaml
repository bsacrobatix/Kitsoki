    status: shipped
    visibility: public
    summary: "The bugfix pipeline run against the real slidey repo (a Node/Vue narrated-deck renderer), fixing a frame-timing drift: grid `cards` scenes with more than six items had their narration desynced because the frame estimator over-counted each card beyond the table by ten frames. Every room is a deterministic state-machine beat: reproduce the drift with a failing unit test, propose the one-line root-cause fix, implement it in an isolated worktree, run slidey's real node --test suite, self-review the diff, validate end to end, and close out — ready to open a PR. The content is replayed verbatim from a real fix run; the render is no-LLM and deterministic."
