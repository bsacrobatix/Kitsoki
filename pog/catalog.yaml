  - schema: kitsoki/feature/v0
    id: feature-meta-improvement
    title: "Meta improvement reports"
    status: shipped
    visibility: public
    summary: "Meta improvement mode closes the loop after a run. When a story reaches a terminal state, Kitsoki recommends reviewing the session; one click opens `/meta improve`, streams the read-only story-improver agent, and produces a report about false starts, prompt/tool/script changes, permission cleanup, and no-LLM regression coverage. The web report path writes the same evidence bundle shape as Report Bug - redacted trace, rrweb playback, HAR, console state, screenshot, and posting metadata - so story authors can keep private iterations local, route community or engine issues to GitHub, or hand private-story findings to a custom ticket provider."
    sources: [source-feature-specs]
    edges:
      part_of: [product-kitsoki]
