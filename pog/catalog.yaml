  # --- scenarios (tools/product-journey/scenarios.json) ---------------------
  # The six persona-QA journey definitions, verbatim from scenarios.json
  # (task → summary, success_criteria → outcome). for_persona links follow
  # each persona's documented risk_focus; realizes is only set where an
  # existing use case genuinely captures the journey's job — the gaps are
  # honest (e.g. no use case yet models PRD authoring or product discovery).
  - schema: kitsoki/scenario/v0
    id: scenario-product-discovery
    title: Product discovery walkthrough
    status: reference
    visibility: public
    stage: Discover the product
    trigger: A newcomer needs to understand what Kitsoki does, who it is for, and what the first credible action should be — without private repo context.
    outcome: The persona identifies the product category, finds a documented next action, and files broken links, stale media, or confusing claims as product findings.
    summary: Walk the Kitsoki product overview story (stories/product-site) end to end and explain what Kitsoki does, who it is for, and what the first credible action should be.
    sources: [source-product-journey-scenarios]
    edges:
      part_of: [product-kitsoki]
      for_persona: [persona-docs-minded-contributor, persona-hobbyist-contributor]
  - schema: kitsoki/scenario/v0
    id: scenario-project-onboarding
    title: Project onboarding
    status: reference
    visibility: public
    stage: Onboard a project
    trigger: An assigned repository needs Kitsoki configured for it before any bugfix or design work can launch.
    outcome: Generated project config names real commands and relevant project files, the persona can state the next Kitsoki command or room to use, and no silent operator-question defaulting occurs.
    summary: Use the documented Kitsoki onboarding path (stories/dev-story) to configure the assigned repository and explain how bugfix/design work should be launched.
    sources: [source-product-journey-scenarios]
    edges:
      part_of: [product-kitsoki]
      for_persona: [persona-hobbyist-contributor, persona-docs-minded-contributor]
  - schema: kitsoki/scenario/v0
    id: scenario-bugfix-hidden-oracle
    title: Bug fix with hidden oracle
    status: reference
    visibility: public
    stage: Fix a bug
    trigger: Public issue/repro material describes a bug; the fix must be scored by a deterministic oracle the workflow never sees.
    outcome: The hidden oracle passes, the full suite passes or the failure is classified, and the patch shape is reviewable for the persona's project.
    summary: Start from public issue/repro material, drive Kitsoki's bugfix workflow (stories/bugfix), and score the resulting worktree with the project's deterministic oracle.
    sources: [source-product-journey-scenarios]
    edges:
      part_of: [product-kitsoki]
      for_persona: [persona-dependency-debugger, persona-core-maintainer]
      realizes: [usecase-developer-runs-bugfix-pipeline]
  - schema: kitsoki/scenario/v0
    id: scenario-prd-design
    title: PRD and design workflow
    status: reference
    visibility: public
    stage: Plan project work
    trigger: A project improvement idea needs to become a PRD/design artifact grounded in real repository files, conventions, and tests.
    outcome: Artifacts cite real repository files and commands, scope is small enough for review, and open questions are explicit instead of hidden in generated prose.
    summary: Use Kitsoki (stories/dev-story) to turn a project improvement idea into a PRD/design artifact grounded in repository files, conventions, and tests.
    sources: [source-product-journey-scenarios]
    edges:
      part_of: [product-kitsoki]
      for_persona: [persona-core-maintainer]
  - schema: kitsoki/scenario/v0
    id: scenario-feature-implementation
    title: Feature implementation
    status: reference
    visibility: public
    stage: Plan project work
    trigger: A small accepted design slice is ready to implement and must be validated with the project's own tests.
    outcome: The implementation follows the design artifact, tests are targeted and deterministic, and remaining work is separated from completed work.
    summary: Use Kitsoki (stories/dev-story) to implement a small accepted design slice and validate it with project tests.
    sources: [source-product-journey-scenarios]
    edges:
      part_of: [product-kitsoki]
      for_persona: [persona-ide-first-engineer, persona-core-maintainer]
  - schema: kitsoki/scenario/v0
    id: scenario-evidence-backed-product-bug
    title: Evidence-backed product bug
    status: reference
    visibility: public
    stage: File a product issue
    trigger: Confusing or broken Kitsoki behavior observed during a journey should become a useful product bug report instead of a lost impression.
    outcome: The report includes expected-versus-actual behavior and deterministic reproduction context, with sensitive local data redacted or explicitly marked local-only.
    summary: Convert any confusing or broken Kitsoki behavior observed during the journey into a useful product bug report with visual and trace evidence.
    sources: [source-product-journey-scenarios]
    edges:
      part_of: [product-kitsoki]
      for_persona: [persona-ide-first-engineer, persona-docs-minded-contributor]
